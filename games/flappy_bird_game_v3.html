<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flappy Bird</title>
  <style>
    :root {
      --panel: rgba(15, 23, 42, 0.94);
      --panel2: rgba(30, 41, 59, 0.96);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255,255,255,0.14);
      --gold: #facc15;
      --orange: #fb923c;
      --blue: #38bdf8;
      --green: #34d399;
      --red: #fb7185;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bird-body: #facc15;
      --bird-wing: #f59e0b;
      --bird-belly: #fde68a;
      --bird-beak: #fb923c;
      --bird-eye: #0f172a;
      --shadow: 0 22px 70px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #020617;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    #app {
      position: relative;
      width: min(100vw, 520px);
      height: min(100dvh, 940px);
      min-height: 560px;
      overflow: hidden;
      background: #7dd3fc;
      box-shadow: 0 0 90px rgba(0,0,0,0.46);
      isolation: isolate;
    }

    @media (min-width: 760px) {
      #app {
        border-radius: 30px;
      }
    }

    @media (max-width: 759px) {
      #app {
        width: 100vw;
        height: 100dvh;
        min-height: 100dvh;
      }
    }

    #sky {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transition: background 550ms ease;
    }

    #sky.day {
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.55), transparent 18%),
        linear-gradient(180deg, #65d8ff 0%, #9cebff 46%, #dff8ff 72%, #b9ef9f 100%);
    }

    #sky.sunset {
      background:
        radial-gradient(circle at 76% 18%, rgba(255,236,145,0.88), transparent 13%),
        linear-gradient(180deg, #ffb86b 0%, #fb8db6 46%, #8ed7ff 74%, #b8e89f 100%);
    }

    #sky.night {
      background:
        radial-gradient(circle at 76% 13%, rgba(255,255,215,0.95), transparent 8%),
        radial-gradient(circle at 20% 22%, rgba(56,189,248,0.16), transparent 22%),
        linear-gradient(180deg, #0f172a 0%, #1e3a8a 54%, #315979 77%, #223d2c 100%);
    }

    #sky.neon {
      background:
        radial-gradient(circle at 50% 18%, rgba(56,189,248,0.32), transparent 26%),
        linear-gradient(180deg, #111827 0%, #312e81 42%, #7c2d12 76%, #172554 100%);
    }

    .cloud {
      position: absolute;
      width: 118px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255,255,255,0.70);
      opacity: 0.68;
      animation: drift linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: inherit;
    }

    .cloud::before {
      left: 18px;
      top: -25px;
      width: 55px;
      height: 55px;
    }

    .cloud::after {
      right: 12px;
      top: -38px;
      width: 72px;
      height: 72px;
    }

    .cloud.c1 { top: 14%; left: -160px; animation-duration: 23s; }
    .cloud.c2 { top: 29%; left: -250px; transform: scale(0.72); animation-duration: 31s; animation-delay: -12s; opacity: 0.52; }
    .cloud.c3 { top: 8%; left: -190px; transform: scale(0.54); animation-duration: 36s; animation-delay: -23s; opacity: 0.43; }

    @keyframes drift {
      from { translate: -170px 0; }
      to { translate: calc(100vw + 820px) 0; }
    }

    #game {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    #ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      height: 82px;
      border-top: 4px solid rgba(255,255,255,0.48);
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.13) 0 16px, rgba(0,0,0,0.08) 16px 32px),
        linear-gradient(180deg, #a3e635 0%, #84cc16 28%, #65a30d 100%);
      box-shadow: 0 -14px 30px rgba(0,0,0,0.13);
    }

    #ground::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 12px;
      height: 16px;
      background: radial-gradient(circle, rgba(255,255,255,0.34) 0 2px, transparent 3px) 0 0 / 34px 16px;
      opacity: 0.82;
      animation: groundMove 900ms linear infinite;
    }

    @keyframes groundMove {
      from { background-position-x: 0; }
      to { background-position-x: -68px; }
    }

    .bird {
      position: absolute;
      width: 52px;
      height: 44px;
      z-index: 8;
      transform-origin: 50% 50%;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.24));
      will-change: left, top, transform;
    }

    .bird-body {
      position: absolute;
      inset: 4px 6px 3px 4px;
      border-radius: 58% 50% 54% 56%;
      background:
        radial-gradient(circle at 62% 70%, var(--bird-belly) 0 23%, transparent 24%),
        radial-gradient(circle at 28% 20%, rgba(255,255,255,0.55), transparent 22%),
        linear-gradient(135deg, rgba(255,255,255,0.22), transparent 42%),
        var(--bird-body);
      box-shadow:
        inset -5px -6px 0 rgba(0,0,0,0.10),
        inset 4px 4px 0 rgba(255,255,255,0.17);
    }

    .bird-wing {
      position: absolute;
      width: 25px;
      height: 20px;
      left: 2px;
      top: 17px;
      border-radius: 64% 36% 58% 44%;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.28), transparent 45%),
        var(--bird-wing);
      box-shadow: inset -3px -4px 0 rgba(0,0,0,0.12);
      transform-origin: 85% 32%;
      animation: wingIdle 620ms ease-in-out infinite;
    }

    .bird-eye {
      position: absolute;
      width: 14px;
      height: 14px;
      right: 10px;
      top: 12px;
      border-radius: 50%;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
    }

    .bird-eye::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      right: 2px;
      top: 4px;
      border-radius: 50%;
      background: var(--bird-eye);
    }

    .bird-beak {
      position: absolute;
      right: -1px;
      top: 20px;
      width: 18px;
      height: 13px;
      background: var(--bird-beak);
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.10));
    }

    .bird-tail {
      position: absolute;
      left: -1px;
      top: 18px;
      width: 15px;
      height: 16px;
      background: var(--bird-wing);
      clip-path: polygon(0 50%, 100% 0, 78% 50%, 100% 100%);
      opacity: 0.92;
    }

    .bird.flap .bird-wing {
      animation: wingFlap 180ms ease;
    }

    .bird.hurt {
      animation: hurtBlink 480ms ease;
    }

    .bird.hurt .bird-eye::after {
      width: 8px;
      height: 2px;
      top: 6px;
      border-radius: 99px;
    }

    .skin-yellow {
      --bird-body: #facc15;
      --bird-wing: #f59e0b;
      --bird-belly: #fde68a;
      --bird-beak: #fb923c;
      --bird-eye: #0f172a;
    }

    .skin-blue {
      --bird-body: #38bdf8;
      --bird-wing: #0284c7;
      --bird-belly: #bae6fd;
      --bird-beak: #f97316;
      --bird-eye: #082f49;
    }

    .skin-pink {
      --bird-body: #fb7185;
      --bird-wing: #e11d48;
      --bird-belly: #fecdd3;
      --bird-beak: #facc15;
      --bird-eye: #4c0519;
    }

    .skin-night {
      --bird-body: #334155;
      --bird-wing: #0f172a;
      --bird-belly: #94a3b8;
      --bird-beak: #f97316;
      --bird-eye: #020617;
    }

    .skin-robot {
      --bird-body: #cbd5e1;
      --bird-wing: #64748b;
      --bird-belly: #e2e8f0;
      --bird-beak: #38bdf8;
      --bird-eye: #ef4444;
    }

    .skin-ghost {
      --bird-body: #f8fafc;
      --bird-wing: #bae6fd;
      --bird-belly: #e0f2fe;
      --bird-beak: #c084fc;
      --bird-eye: #334155;
    }

    @keyframes wingIdle {
      0%, 100% { transform: rotate(8deg); }
      50% { transform: rotate(-12deg) translateY(-1px); }
    }

    @keyframes wingFlap {
      0% { transform: rotate(28deg) translateY(5px); }
      45% { transform: rotate(-45deg) translateY(-5px); }
      100% { transform: rotate(7deg); }
    }

    @keyframes hurtBlink {
      0%, 100% { filter: drop-shadow(0 8px 10px rgba(0,0,0,0.24)); }
      35% { filter: drop-shadow(0 8px 10px rgba(0,0,0,0.24)) brightness(1.45) saturate(1.35); }
    }

    .pipe {
      position: absolute;
      z-index: 5;
      width: 68px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.24), transparent 30%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.06) 0 12px, rgba(0,0,0,0.04) 12px 24px),
        linear-gradient(180deg, #22c55e, #15803d);
      box-shadow:
        inset -8px 0 0 rgba(0,0,0,0.15),
        inset 7px 0 0 rgba(255,255,255,0.17),
        0 10px 22px rgba(0,0,0,0.18);
      will-change: left;
    }

    .pipe.top {
      top: 0;
      border-radius: 0 0 17px 17px;
    }

    .pipe.bottom {
      border-radius: 17px 17px 0 0;
    }

    .pipe::after {
      content: "";
      position: absolute;
      left: -9px;
      width: calc(100% + 18px);
      height: 30px;
      border-radius: 13px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.24), transparent 34%),
        linear-gradient(180deg, #4ade80, #16a34a);
      box-shadow:
        inset -7px 0 0 rgba(0,0,0,0.15),
        inset 7px 0 0 rgba(255,255,255,0.17),
        0 8px 12px rgba(0,0,0,0.13);
    }

    .pipe.top::after {
      bottom: -22px;
    }

    .pipe.bottom::after {
      top: -22px;
    }

    .pipe.warn {
      animation: pipeWarn 420ms ease;
    }

    .pipe.hit {
      animation: pipeHit 520ms ease;
    }

    @keyframes pipeWarn {
      0%, 100% { filter: none; }
      50% { filter: brightness(1.32) saturate(1.25); }
    }

    @keyframes pipeHit {
      0%, 100% { filter: none; transform: translateX(0); }
      25% { filter: brightness(1.5) saturate(1.4); transform: translateX(-3px); }
      55% { transform: translateX(3px); }
    }

    .impact {
      position: absolute;
      z-index: 12;
      width: 16px;
      height: 16px;
      pointer-events: none;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 0 0 6px rgba(251,113,133,0.34), 0 0 24px rgba(255,255,255,0.78);
      animation: impactPop 430ms ease forwards;
    }

    @keyframes impactPop {
      0% { transform: translate(-50%, -50%) scale(0.25); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
    }

    #hud {
      position: absolute;
      top: calc(10px + var(--safe-top));
      left: 10px;
      right: 10px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }

    .hud-left,
    .hud-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .hud-card {
      min-height: 42px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.28);
      background: rgba(15,23,42,0.36);
      border: 1px solid rgba(255,255,255,0.26);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      white-space: nowrap;
      font-size: 14px;
    }

    .hud-card b {
      font-size: 17px;
    }

    #practiceHud {
      display: none;
      color: white;
      background: rgba(22,163,74,0.34);
      border-color: rgba(255,255,255,0.22);
    }

    #practiceHud.show {
      display: flex;
    }

    #pauseBtn {
      pointer-events: auto;
      width: 43px;
      height: 43px;
      border-radius: 999px;
      color: white;
      background: rgba(15,23,42,0.46);
      border: 1px solid rgba(255,255,255,0.30);
      backdrop-filter: blur(14px);
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
    }

    #scoreBig {
      position: absolute;
      z-index: 18;
      top: calc(74px + var(--safe-top));
      left: 50%;
      translate: -50% 0;
      color: rgba(255,255,255,0.96);
      font-size: clamp(58px, 18vw, 94px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.06em;
      text-shadow: 0 8px 24px rgba(0,0,0,0.24);
      pointer-events: none;
    }

    .score-pop {
      animation: scorePop 220ms ease;
    }

    @keyframes scorePop {
      0% { transform: scale(1); }
      45% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    #tapHint {
      position: absolute;
      left: 50%;
      bottom: calc(114px + var(--safe-bottom));
      translate: -50% 0;
      z-index: 18;
      padding: 10px 14px;
      border-radius: 999px;
      color: white;
      font-size: 14px;
      background: rgba(15,23,42,0.38);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      pointer-events: none;
      animation: hintFloat 1.35s ease-in-out infinite;
    }

    @keyframes hintFloat {
      0%, 100% { transform: translateY(0); opacity: 0.9; }
      50% { transform: translateY(-8px); opacity: 1; }
    }

    #countdown {
      position: absolute;
      inset: 0;
      z-index: 23;
      display: none;
      place-items: center;
      pointer-events: none;
      color: white;
      font-size: clamp(72px, 24vw, 132px);
      font-weight: 950;
      text-shadow: 0 12px 30px rgba(0,0,0,0.32);
    }

    #countdown.show {
      display: grid;
      animation: countPop 700ms ease;
    }

    @keyframes countPop {
      0% { transform: scale(0.66); opacity: 0; }
      30% { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); opacity: 0.92; }
    }

    #toast {
      position: absolute;
      left: 50%;
      top: calc(132px + var(--safe-top));
      translate: -50% 0;
      z-index: 24;
      max-width: calc(100% - 28px);
      padding: 10px 14px;
      border-radius: 999px;
      color: white;
      font-size: 13px;
      background: rgba(15,23,42,0.62);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.20);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: 180ms ease;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #flash {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background: white;
      opacity: 0;
    }

    .flash-hit {
      animation: flashHit 220ms ease;
    }

    @keyframes flashHit {
      0% { opacity: 0; }
      20% { opacity: 0.45; }
      100% { opacity: 0; }
    }

    .shake {
      animation: shake 300ms ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      42% { transform: translateX(6px); }
      62% { transform: translateX(-4px); }
      80% { transform: translateX(3px); }
    }

    .modal {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: calc(18px + var(--safe-top)) 16px calc(18px + var(--safe-bottom));
      background: rgba(2,6,23,0.36);
      backdrop-filter: blur(10px);
    }

    .modal.show {
      display: flex;
    }

    .panel {
      width: min(100%, 440px);
      max-height: calc(100dvh - 34px - var(--safe-top) - var(--safe-bottom));
      overflow: auto;
      padding: 18px;
      border-radius: 24px;
      color: var(--text);
      background:
        linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: var(--shadow);
    }

    .panel::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 27px;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    h2 {
      font-size: 21px;
      letter-spacing: -0.03em;
    }

    .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .title {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .logo {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 24%, rgba(255,255,255,0.72), transparent 34%),
        linear-gradient(135deg, #facc15, #fb923c);
      box-shadow: 0 14px 28px rgba(250,204,21,0.22);
    }

    .mini-bird {
      position: relative;
      width: 40px;
      height: 32px;
      flex: 0 0 auto;
      filter: drop-shadow(0 5px 7px rgba(0,0,0,0.18));
    }

    .mini-bird::before {
      content: "";
      position: absolute;
      inset: 4px 6px 3px 4px;
      border-radius: 58% 50% 54% 56%;
      background:
        radial-gradient(circle at 72% 30%, white 0 10%, transparent 11%),
        radial-gradient(circle at 75% 31%, var(--bird-eye) 0 4%, transparent 5%),
        radial-gradient(circle at 62% 72%, var(--bird-belly) 0 23%, transparent 24%),
        linear-gradient(135deg, rgba(255,255,255,0.28), transparent 42%),
        var(--bird-body);
      box-shadow: inset -4px -4px 0 rgba(0,0,0,0.10);
    }

    .mini-bird::after {
      content: "";
      position: absolute;
      right: 1px;
      top: 14px;
      width: 12px;
      height: 9px;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background: var(--bird-beak);
    }

    .mini-bird i {
      position: absolute;
      left: 2px;
      top: 15px;
      width: 17px;
      height: 14px;
      border-radius: 64% 36% 58% 44%;
      background: var(--bird-wing);
      box-shadow: inset -2px -3px 0 rgba(0,0,0,0.12);
      transform: rotate(-10deg);
    }

    .mini-bird.skin-yellow {
      --bird-body: #facc15;
      --bird-wing: #f59e0b;
      --bird-belly: #fde68a;
      --bird-beak: #fb923c;
      --bird-eye: #0f172a;
    }

    .mini-bird.skin-blue {
      --bird-body: #38bdf8;
      --bird-wing: #0284c7;
      --bird-belly: #bae6fd;
      --bird-beak: #f97316;
      --bird-eye: #082f49;
    }

    .mini-bird.skin-pink {
      --bird-body: #fb7185;
      --bird-wing: #e11d48;
      --bird-belly: #fecdd3;
      --bird-beak: #facc15;
      --bird-eye: #4c0519;
    }

    .mini-bird.skin-night {
      --bird-body: #334155;
      --bird-wing: #0f172a;
      --bird-belly: #94a3b8;
      --bird-beak: #f97316;
      --bird-eye: #020617;
    }

    .mini-bird.skin-robot {
      --bird-body: #cbd5e1;
      --bird-wing: #64748b;
      --bird-belly: #e2e8f0;
      --bird-beak: #38bdf8;
      --bird-eye: #ef4444;
    }

    .mini-bird.skin-ghost {
      --bird-body: #f8fafc;
      --bird-wing: #bae6fd;
      --bird-belly: #e0f2fe;
      --bird-beak: #c084fc;
      --bird-eye: #334155;
    }

    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid.three {
      grid-template-columns: repeat(3, 1fr);
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
    }

    select {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border-radius: 15px;
      outline: none;
      color: var(--text);
      background: rgba(15,23,42,0.72);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .skins {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .skin-btn {
      min-height: 58px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      box-shadow: 0 8px 16px rgba(0,0,0,0.11);
      font-size: 13px;
      font-weight: 750;
    }

    .skin-btn.active {
      outline: 2px solid var(--gold);
      background: rgba(250,204,21,0.15);
    }

    .toggle {
      min-height: 48px;
      border-radius: 15px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      cursor: pointer;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      flex: 0 0 auto;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: white;
      transition: transform 160ms ease;
    }

    .toggle.on .switch {
      background: rgba(52,211,153,0.58);
    }

    .toggle.on .switch::after {
      transform: translateX(22px);
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-row.three {
      grid-template-columns: repeat(3, 1fr);
    }

    .primary,
    .secondary,
    .danger {
      min-height: 49px;
      border-radius: 16px;
      padding: 10px 12px;
      font-weight: 850;
      box-shadow: 0 12px 26px rgba(0,0,0,0.20);
    }

    .primary {
      color: #0f172a;
      background: linear-gradient(135deg, #facc15, #fb923c);
    }

    .secondary {
      color: var(--text);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .danger {
      color: white;
      background: rgba(251,113,133,0.18);
      border: 1px solid rgba(251,113,133,0.38);
    }

    .wide {
      grid-column: 1 / -1;
    }

    .primary:active,
    .secondary:active,
    .danger:active,
    .skin-btn:active,
    #pauseBtn:active {
      transform: translateY(1px) scale(0.985);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px;
    }

    .stat-box {
      min-height: 78px;
      padding: 12px;
      border-radius: 18px;
      display: grid;
      gap: 4px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .stat-box span {
      color: var(--muted);
      font-size: 12px;
    }

    .stat-box b {
      font-size: 24px;
      line-height: 1.1;
    }

    .leader-list {
      display: grid;
      gap: 8px;
    }

    .leader-item {
      min-height: 42px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 8px;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 13px;
    }

    .leader-item small {
      color: var(--muted);
    }

    .empty {
      padding: 12px;
      border-radius: 14px;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      line-height: 1.5;
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 390px) {
      .panel {
        padding: 14px;
      }

      .hud-card {
        padding: 7px 9px;
        font-size: 12px;
      }

      #scoreBig {
        top: calc(70px + var(--safe-top));
      }

      .skins {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid.three {
        grid-template-columns: 1fr 1fr;
      }

      .btn-row.three {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app" aria-label="Flappy Bird">
    <div id="sky" class="day">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>

    <div id="game">
      <div id="bird" class="bird skin-yellow" aria-hidden="true">
        <div class="bird-tail"></div>
        <div class="bird-body"></div>
        <div class="bird-wing"></div>
        <div class="bird-eye"></div>
        <div class="bird-beak"></div>
      </div>
    </div>

    <div id="ground"></div>

    <div id="hud">
      <div class="hud-left">
        <div class="hud-card"><span>分數 <b id="hudScore">0</b></span><span>最高 <b id="hudBest">0</b></span></div>
        <div id="practiceHud" class="hud-card"><span>失誤 <b id="mistakeCount">0</b></span><span>目標 <b id="practiceTarget">20</b></span></div>
      </div>
      <div class="hud-right">
        <button id="pauseBtn" aria-label="暫停">Ⅱ</button>
      </div>
    </div>

    <div id="scoreBig">0</div>
    <div id="tapHint">點擊畫面讓小鳥飛起來</div>
    <div id="countdown"></div>
    <div id="toast"></div>
    <div id="flash"></div>

    <div id="startModal" class="modal show">
      <div class="panel">
        <div class="title">
          <div class="logo"><div class="mini-bird skin-yellow"><i></i></div></div>
          <div>
            <h1>Flappy Bird</h1>
            <p class="sub">點擊畫面讓小鳥飛起來，穿過水管取得分數。碰到水管或地面就會結束遊戲。</p>
          </div>
        </div>

        <div class="section">
          <div class="grid">
            <div class="field">
              <label for="difficultySelect">難度</label>
              <select id="difficultySelect">
                <option value="easy">簡單｜較寬、較慢</option>
                <option value="normal" selected>普通｜推薦</option>
                <option value="hard">困難｜節奏更快</option>
                <option value="hell">地獄｜高手挑戰</option>
              </select>
            </div>
            <div class="field">
              <label for="modeSelect">模式</label>
              <select id="modeSelect">
                <option value="classic" selected>經典模式</option>
                <option value="speed">加速模式</option>
                <option value="practice">練習模式｜20分完成</option>
              </select>
            </div>
          </div>

          <div class="field" style="margin-top: 12px;">
            <label>角色皮膚</label>
            <div id="skinButtons" class="skins"></div>
          </div>
        </div>

        <div class="section">
          <div class="grid">
            <div id="soundToggle" class="toggle on" role="button" tabindex="0">
              <span>音效</span>
              <span class="switch"></span>
            </div>
            <div id="vibeToggle" class="toggle on" role="button" tabindex="0">
              <span>震動</span>
              <span class="switch"></span>
            </div>
          </div>
        </div>

        <div class="btn-row">
          <button id="startBtn" class="primary wide">開始遊戲</button>
          <button id="leaderBtn" class="secondary">排行榜</button>
          <button id="resetBtn" class="danger">清除紀錄</button>
        </div>
      </div>
    </div>

    <div id="pauseModal" class="modal">
      <div class="panel">
        <h2>遊戲暫停</h2>
        <p id="pauseSub" class="sub">可以繼續、重新開始、結束本局，或直接回設定。</p>
        <div class="section">
          <div class="grid">
            <div class="stat-box">
              <span>目前分數</span>
              <b id="pauseScore">0</b>
            </div>
            <div class="stat-box">
              <span>目前模式</span>
              <b id="pauseMode" style="font-size: 18px;">經典</b>
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button id="resumeBtn" class="primary">繼續</button>
          <button id="restartBtn" class="secondary">重新開始</button>
          <button id="finishBtn" class="secondary">結束本局</button>
          <button id="backSettingsBtn" class="danger">回設定</button>
        </div>
      </div>
    </div>

    <div id="resultModal" class="modal">
      <div class="panel">
        <h2 id="resultTitle">本局結算</h2>
        <p id="resultText" class="sub">再挑戰一次，分數會越來越高。</p>

        <div class="section">
          <div class="grid three">
            <div class="stat-box">
              <span>本局分數</span>
              <b id="finalScore">0</b>
            </div>
            <div class="stat-box">
              <span>最高分</span>
              <b id="finalBest">0</b>
            </div>
            <div class="stat-box">
              <span>稱號</span>
              <b id="finalRank" style="font-size: 18px;">新手</b>
            </div>
          </div>
        </div>

        <div class="section">
          <div id="resultExtra" class="empty"></div>
        </div>

        <div class="section">
          <div id="quickLeaders" class="leader-list"></div>
        </div>

        <div class="btn-row">
          <button id="againBtn" class="primary">下一局</button>
          <button id="settingsBtn" class="secondary">回設定</button>
        </div>
      </div>
    </div>

    <div id="leaderModal" class="modal">
      <div class="panel">
        <h2>本地排行榜</h2>
        <p class="sub">依目前難度與模式顯示前 5 名，紀錄儲存在這台裝置的瀏覽器中。</p>
        <div class="section">
          <div id="leaderList" class="leader-list"></div>
        </div>
        <div class="btn-row">
          <button id="closeLeaderBtn" class="primary wide">返回</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const app = document.getElementById("app");
      const game = document.getElementById("game");
      const sky = document.getElementById("sky");
      const ground = document.getElementById("ground");
      const bird = document.getElementById("bird");
      const hudScore = document.getElementById("hudScore");
      const hudBest = document.getElementById("hudBest");
      const scoreBig = document.getElementById("scoreBig");
      const tapHint = document.getElementById("tapHint");
      const practiceHud = document.getElementById("practiceHud");
      const mistakeCount = document.getElementById("mistakeCount");
      const practiceTarget = document.getElementById("practiceTarget");
      const countdown = document.getElementById("countdown");
      const toast = document.getElementById("toast");
      const flash = document.getElementById("flash");
      const pauseBtn = document.getElementById("pauseBtn");

      const startModal = document.getElementById("startModal");
      const pauseModal = document.getElementById("pauseModal");
      const resultModal = document.getElementById("resultModal");
      const leaderModal = document.getElementById("leaderModal");

      const difficultySelect = document.getElementById("difficultySelect");
      const modeSelect = document.getElementById("modeSelect");
      const skinButtons = document.getElementById("skinButtons");
      const soundToggle = document.getElementById("soundToggle");
      const vibeToggle = document.getElementById("vibeToggle");

      const startBtn = document.getElementById("startBtn");
      const leaderBtn = document.getElementById("leaderBtn");
      const resetBtn = document.getElementById("resetBtn");
      const resumeBtn = document.getElementById("resumeBtn");
      const restartBtn = document.getElementById("restartBtn");
      const finishBtn = document.getElementById("finishBtn");
      const backSettingsBtn = document.getElementById("backSettingsBtn");
      const againBtn = document.getElementById("againBtn");
      const settingsBtn = document.getElementById("settingsBtn");
      const closeLeaderBtn = document.getElementById("closeLeaderBtn");

      const pauseScore = document.getElementById("pauseScore");
      const pauseMode = document.getElementById("pauseMode");
      const pauseSub = document.getElementById("pauseSub");

      const resultTitle = document.getElementById("resultTitle");
      const resultText = document.getElementById("resultText");
      const finalScore = document.getElementById("finalScore");
      const finalBest = document.getElementById("finalBest");
      const finalRank = document.getElementById("finalRank");
      const resultExtra = document.getElementById("resultExtra");
      const quickLeaders = document.getElementById("quickLeaders");
      const leaderList = document.getElementById("leaderList");

      const STORAGE_KEY = "flappy_bird_polished_v2";
      const PRACTICE_TARGET = 20;

      const skins = [
        { key: "yellow", name: "黃鳥", cls: "skin-yellow" },
        { key: "blue", name: "藍鳥", cls: "skin-blue" },
        { key: "pink", name: "粉鳥", cls: "skin-pink" },
        { key: "night", name: "夜鳥", cls: "skin-night" },
        { key: "robot", name: "機械", cls: "skin-robot" },
        { key: "ghost", name: "幽靈", cls: "skin-ghost" }
      ];

      const difficulties = {
        easy: {
          label: "簡單",
          gap: 210,
          minGap: 196,
          speed: 2.0,
          speedCap: 2.7,
          gravity: 0.295,
          flap: -5.9,
          spawn: 1740,
          minSpawn: 1500,
          pipeWidth: 64,
          maxDelta: 78,
          hitRadius: 15
        },
        normal: {
          label: "普通",
          gap: 184,
          minGap: 170,
          speed: 2.34,
          speedCap: 3.1,
          gravity: 0.318,
          flap: -6.1,
          spawn: 1600,
          minSpawn: 1370,
          pipeWidth: 66,
          maxDelta: 96,
          hitRadius: 15
        },
        hard: {
          label: "困難",
          gap: 160,
          minGap: 146,
          speed: 2.72,
          speedCap: 3.45,
          gravity: 0.342,
          flap: -6.34,
          spawn: 1490,
          minSpawn: 1280,
          pipeWidth: 68,
          maxDelta: 116,
          hitRadius: 14
        },
        hell: {
          label: "地獄",
          gap: 140,
          minGap: 130,
          speed: 3.0,
          speedCap: 3.78,
          gravity: 0.36,
          flap: -6.55,
          spawn: 1400,
          minSpawn: 1210,
          pipeWidth: 70,
          maxDelta: 134,
          hitRadius: 14
        }
      };

      const modeLabels = {
        classic: "經典模式",
        speed: "加速模式",
        practice: "練習模式"
      };

      const state = {
        w: 0,
        h: 0,
        groundH: 82,
        birdX: 95,
        birdY: 260,
        birdV: 0,
        birdSize: 44,
        score: 0,
        best: 0,
        mistakes: 0,
        running: false,
        paused: false,
        gameOver: false,
        ready: false,
        lastTime: 0,
        spawnTimer: 0,
        pipes: [],
        lastGapCenter: null,
        difficulty: "normal",
        mode: "classic",
        skin: "yellow",
        sound: true,
        vibe: true,
        records: {},
        invincibleUntil: 0,
        practiceCompleteShown: false
      };

      let rafId = 0;
      let resizeRaf = 0;
      let toastTimer = 0;
      let audioCtx = null;

      function loadStore() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          if (!saved || typeof saved !== "object") return;
          state.difficulty = saved.difficulty || state.difficulty;
          state.mode = saved.mode || state.mode;
          state.skin = saved.skin || state.skin;
          state.sound = saved.sound !== false;
          state.vibe = saved.vibe !== false;
          state.records = saved.records || {};
        } catch (err) {
          console.warn("讀取紀錄失敗", err);
        }
      }

      function saveStore() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          difficulty: state.difficulty,
          mode: state.mode,
          skin: state.skin,
          sound: state.sound,
          vibe: state.vibe,
          records: state.records
        }));
      }

      function recordKey(difficulty = state.difficulty, mode = state.mode) {
        return difficulty + "_" + mode;
      }

      function getRecords(key = recordKey()) {
        return Array.isArray(state.records[key]) ? state.records[key] : [];
      }

      function getBest(key = recordKey()) {
        const list = getRecords(key);
        return list.length ? Number(list[0].score) || 0 : 0;
      }

      function pushRecord(score, reason) {
        if (score <= 0 && reason !== "practiceComplete") return;

        const key = recordKey();
        const list = getRecords(key);
        list.push({
          score,
          mistakes: state.mistakes,
          skin: state.skin,
          difficulty: state.difficulty,
          mode: state.mode,
          reason: reason || "end",
          date: new Date().toLocaleString("zh-TW", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          })
        });

        list.sort((a, b) => b.score - a.score || a.mistakes - b.mistakes);
        state.records[key] = list.slice(0, 5);
        saveStore();
      }

      function fitLayout() {
        state.w = app.clientWidth;
        state.h = app.clientHeight;
        state.groundH = Math.max(76, Math.min(94, Math.round(state.h * 0.096)));
        ground.style.height = state.groundH + "px";

        if (!state.running) {
          resetBird();
          renderBird();
        }
      }

      function scheduleFit() {
        cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(fitLayout);
      }

      function resetBird() {
        state.birdX = Math.max(82, Math.min(112, state.w * 0.24));
        state.birdY = Math.max(140, Math.min(state.h - state.groundH - 80, state.h * 0.42));
        state.birdV = 0;
      }

      function getSkin() {
        return skins.find(s => s.key === state.skin) || skins[0];
      }

      function applySkin() {
        const active = getSkin();
        bird.className = "bird " + active.cls;
      }

      function renderSkinButtons() {
        skinButtons.innerHTML = "";
        skins.forEach(skin => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "skin-btn" + (skin.key === state.skin ? " active" : "");
          btn.innerHTML = `<span class="mini-bird ${skin.cls}"><i></i></span><span>${skin.name}</span>`;
          btn.addEventListener("click", () => {
            state.skin = skin.key;
            applySkin();
            renderSkinButtons();
            saveStore();
          });
          skinButtons.appendChild(btn);
        });
      }

      function syncSettingsUI() {
        difficultySelect.value = state.difficulty;
        modeSelect.value = state.mode;
        soundToggle.classList.toggle("on", state.sound);
        vibeToggle.classList.toggle("on", state.vibe);
        practiceTarget.textContent = PRACTICE_TARGET;
        applySkin();
        renderSkinButtons();
        updateHud();
      }

      function updateHud() {
        hudScore.textContent = String(state.score);
        scoreBig.textContent = String(state.score);
        state.best = getBest();
        hudBest.textContent = String(state.best);
        mistakeCount.textContent = String(state.mistakes);
        practiceHud.classList.toggle("show", state.mode === "practice");
      }

      function getConfig() {
        const base = difficulties[state.difficulty];
        const score = Math.max(0, state.score);
        const speedStep = state.mode === "speed" ? 0.032 : 0.014;
        const gapStep = state.mode === "speed" ? 0.62 : 0.34;
        const spawnStep = state.mode === "speed" ? 8 : 4;

        const speed = Math.min(base.speedCap, base.speed + score * speedStep);
        const gap = Math.max(base.minGap, base.gap - Math.floor(score * gapStep));
        const spawn = Math.max(base.minSpawn, base.spawn - score * spawnStep);

        return {
          ...base,
          speed,
          gap,
          spawn
        };
      }

      function clearPipes() {
        state.pipes.forEach(pipe => {
          pipe.topEl.remove();
          pipe.bottomEl.remove();
        });
        state.pipes = [];
      }

      function setTheme() {
        sky.className = "";
        if (state.score >= 55) sky.classList.add("neon");
        else if (state.score >= 30) sky.classList.add("night");
        else if (state.score >= 13) sky.classList.add("sunset");
        else sky.classList.add("day");
      }

      function spawnPipe() {
        const cfg = getConfig();
        const safeTop = 84 + cfg.gap / 2;
        const safeBottom = state.h - state.groundH - 48 - cfg.gap / 2;
        const minCenter = safeTop;
        const maxCenter = Math.max(safeTop + 4, safeBottom);

        let center;
        if (state.lastGapCenter === null) {
          const low = Math.max(minCenter, state.h * 0.34);
          const high = Math.min(maxCenter, state.h * 0.62);
          center = randomBetween(low, Math.max(low + 1, high));
        } else {
          const low = Math.max(minCenter, state.lastGapCenter - cfg.maxDelta);
          const high = Math.min(maxCenter, state.lastGapCenter + cfg.maxDelta);
          center = randomBetween(low, Math.max(low + 1, high));
        }

        state.lastGapCenter = center;

        const topHeight = Math.max(18, center - cfg.gap / 2);
        const bottomY = center + cfg.gap / 2;
        const bottomHeight = Math.max(18, state.h - state.groundH - bottomY);

        const topEl = document.createElement("div");
        const bottomEl = document.createElement("div");
        topEl.className = "pipe top";
        bottomEl.className = "pipe bottom";

        const x = state.w + cfg.pipeWidth + 10;
        topEl.style.width = cfg.pipeWidth + "px";
        bottomEl.style.width = cfg.pipeWidth + "px";
        topEl.style.height = topHeight + "px";
        bottomEl.style.height = bottomHeight + "px";
        topEl.style.left = x + "px";
        bottomEl.style.left = x + "px";
        bottomEl.style.top = bottomY + "px";

        game.appendChild(topEl);
        game.appendChild(bottomEl);

        state.pipes.push({
          x,
          width: cfg.pipeWidth,
          topHeight,
          bottomY,
          gapCenter: center,
          gap: cfg.gap,
          scored: false,
          topEl,
          bottomEl
        });
      }

      function updatePipes(dt) {
        const cfg = getConfig();
        const move = cfg.speed * dt * 0.06;

        state.spawnTimer += dt;
        if (state.spawnTimer >= cfg.spawn) {
          state.spawnTimer = 0;
          spawnPipe();
        }

        for (let i = state.pipes.length - 1; i >= 0; i--) {
          const pipe = state.pipes[i];
          pipe.x -= move;
          pipe.topEl.style.left = pipe.x + "px";
          pipe.bottomEl.style.left = pipe.x + "px";

          if (!pipe.scored && pipe.x + pipe.width < state.birdX - 12) {
            pipe.scored = true;
            addScore(1);
          }

          if (pipe.x + pipe.width < -96) {
            pipe.topEl.remove();
            pipe.bottomEl.remove();
            state.pipes.splice(i, 1);
          }
        }
      }

      function renderBird() {
        const angle = Math.max(-27, Math.min(62, state.birdV * 6.2));
        bird.style.left = state.birdX + "px";
        bird.style.top = state.birdY + "px";
        bird.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
      }

      function updateBird(dt) {
        const cfg = getConfig();
        state.birdV += cfg.gravity * dt * 0.06;
        state.birdV = Math.min(11.6, state.birdV);
        state.birdY += state.birdV * dt * 0.06;

        const topLimit = 24;
        const bottomLimit = state.h - state.groundH - state.birdSize / 2;

        if (state.birdY < topLimit) {
          state.birdY = topLimit;
          state.birdV = Math.max(0.4, state.birdV * -0.08);
        }

        if (state.birdY >= bottomLimit) {
          state.birdY = bottomLimit;
          handleCollision(null, state.birdX, state.birdY);
        }

        renderBird();
      }

      function addScore(amount) {
        state.score = Math.max(0, state.score + amount);
        hudScore.textContent = String(state.score);
        scoreBig.textContent = String(state.score);
        scoreBig.classList.remove("score-pop");
        void scoreBig.offsetWidth;
        scoreBig.classList.add("score-pop");
        setTheme();

        if (amount > 0) {
          beep("score");
          if (state.mode === "practice" && state.score >= PRACTICE_TARGET && !state.practiceCompleteShown) {
            state.practiceCompleteShown = true;
            setTimeout(() => {
              endGame("practiceComplete");
            }, 260);
          }
        }
      }

      function flap() {
        if (isModalVisible()) return;

        if (!state.running) return;
        if (state.paused || state.gameOver || !state.ready) return;

        const cfg = getConfig();
        state.birdV = cfg.flap;
        tapHint.classList.add("hidden");
        bird.classList.remove("flap");
        void bird.offsetWidth;
        bird.classList.add("flap");
        beep("flap");
      }

      function isModalVisible() {
        return startModal.classList.contains("show") ||
          pauseModal.classList.contains("show") ||
          resultModal.classList.contains("show") ||
          leaderModal.classList.contains("show");
      }

      function circleRectCollision(cx, cy, radius, rx, ry, rw, rh) {
        const closestX = clamp(cx, rx, rx + rw);
        const closestY = clamp(cy, ry, ry + rh);
        const dx = cx - closestX;
        const dy = cy - closestY;
        return dx * dx + dy * dy <= radius * radius;
      }

      function checkCollision() {
        if (performance.now() < state.invincibleUntil) return;

        const cfg = getConfig();
        const r = cfg.hitRadius;
        const cx = state.birdX;
        const cy = state.birdY;

        for (const pipe of state.pipes) {
          const shrinkX = 7;
          const pipeX = pipe.x + shrinkX;
          const pipeW = pipe.width - shrinkX * 2;

          const hitTop = circleRectCollision(cx, cy, r, pipeX, -8, pipeW, pipe.topHeight + 2);
          const hitBottom = circleRectCollision(cx, cy, r, pipeX, pipe.bottomY - 2, pipeW, state.h - state.groundH - pipe.bottomY + 12);

          if (hitTop || hitBottom) {
            const impactX = clamp(cx + 15, pipe.x + 5, pipe.x + pipe.width - 5);
            const impactY = hitTop ? Math.min(cy, pipe.topHeight + 5) : Math.max(cy, pipe.bottomY - 5);
            handleCollision(pipe, impactX, impactY);
            return;
          }
        }
      }

      function handleCollision(pipe, impactX, impactY) {
        const now = performance.now();
        if (state.mode === "practice") {
          if (now < state.invincibleUntil) return;
          state.invincibleUntil = now + 950;
          state.mistakes += 1;
          mistakeCount.textContent = String(state.mistakes);

          if (state.score > 0) addScore(-1);
          showToast("失誤 +1，已短暫無敵");
          markHit(pipe);
          showImpact(impactX, impactY);
          flashHit();
          shake();
          hurtBird();
          vibrate([28, 30, 28]);
          beep("hit");

          const targetY = pipe ? pipe.gapCenter : Math.max(125, state.h * 0.42);
          state.birdY = clamp(targetY, 90, state.h - state.groundH - 92);
          state.birdV = -3.7;
          renderBird();
          return;
        }

        markHit(pipe);
        showImpact(impactX, impactY);
        endGame("hit");
      }

      function markHit(pipe) {
        if (!pipe) return;
        pipe.topEl.classList.remove("hit", "warn");
        pipe.bottomEl.classList.remove("hit", "warn");
        void pipe.topEl.offsetWidth;
        pipe.topEl.classList.add("hit");
        pipe.bottomEl.classList.add("hit");
      }

      function showImpact(x, y) {
        const el = document.createElement("div");
        el.className = "impact";
        el.style.left = (x || state.birdX) + "px";
        el.style.top = (y || state.birdY) + "px";
        game.appendChild(el);
        setTimeout(() => el.remove(), 460);
      }

      function hurtBird() {
        bird.classList.remove("hurt");
        void bird.offsetWidth;
        bird.classList.add("hurt");
      }

      function flashHit() {
        flash.classList.remove("flash-hit");
        void flash.offsetWidth;
        flash.classList.add("flash-hit");
      }

      function shake() {
        app.classList.remove("shake");
        void app.offsetWidth;
        app.classList.add("shake");
      }

      function startGame() {
        state.difficulty = difficultySelect.value;
        state.mode = modeSelect.value;
        state.sound = soundToggle.classList.contains("on");
        state.vibe = vibeToggle.classList.contains("on");
        saveStore();

        startModal.classList.remove("show");
        pauseModal.classList.remove("show");
        resultModal.classList.remove("show");
        leaderModal.classList.remove("show");

        clearPipes();
        fitLayout();
        resetBird();

        state.score = 0;
        state.mistakes = 0;
        state.running = true;
        state.paused = false;
        state.gameOver = false;
        state.ready = false;
        state.lastTime = 0;
        state.spawnTimer = 760;
        state.lastGapCenter = null;
        state.birdV = 0;
        state.invincibleUntil = 0;
        state.practiceCompleteShown = false;

        tapHint.classList.add("hidden");
        practiceHud.classList.toggle("show", state.mode === "practice");
        setTheme();
        updateHud();
        renderBird();

        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(loop);

        startCountdown();
      }

      function startCountdown() {
        let n = 3;
        countdown.textContent = String(n);
        countdown.classList.add("show");
        beep("tick");

        const tick = () => {
          n -= 1;
          if (!state.running || state.gameOver) {
            countdown.classList.remove("show");
            return;
          }

          if (n > 0) {
            countdown.textContent = String(n);
            countdown.classList.remove("show");
            void countdown.offsetWidth;
            countdown.classList.add("show");
            beep("tick");
            setTimeout(tick, 620);
          } else {
            countdown.textContent = "GO";
            countdown.classList.remove("show");
            void countdown.offsetWidth;
            countdown.classList.add("show");
            setTimeout(() => countdown.classList.remove("show"), 520);
            state.ready = true;
            state.lastTime = 0;
            state.birdV = -4.1;
            tapHint.classList.remove("hidden");
            beep("start");
            vibrate(12);
          }
        };

        setTimeout(tick, 620);
      }

      function endGame(reason = "end") {
        if (state.gameOver) return;

        state.gameOver = true;
        state.running = false;
        state.paused = false;
        state.ready = false;
        cancelAnimationFrame(rafId);

        pauseModal.classList.remove("show");
        countdown.classList.remove("show");
        tapHint.classList.add("hidden");

        if (reason !== "manual" && reason !== "practiceComplete") {
          flashHit();
          shake();
          hurtBird();
          beep("hit");
          vibrate([42, 45, 75]);
        } else {
          beep("result");
        }

        const oldBest = getBest();
        pushRecord(state.score, reason);
        const newBest = getBest();
        state.best = newBest;
        updateHud();

        finalScore.textContent = String(state.score);
        finalBest.textContent = String(newBest);
        finalRank.textContent = getRank(state.score);
        renderQuickLeaders();

        const isNew = state.score > oldBest && state.score > 0;
        if (reason === "practiceComplete") {
          resultTitle.textContent = "練習完成";
          resultText.textContent = `你已達成練習目標 ${PRACTICE_TARGET} 分，可以回設定挑戰正式模式。`;
          resultExtra.textContent = `本次練習失誤 ${state.mistakes} 次。` + (isNew ? " 這也是新的練習紀錄。" : "");
        } else if (reason === "manual") {
          resultTitle.textContent = "本局結束";
          resultText.textContent = "你已手動結束本局，可以直接下一局或回設定調整。";
          resultExtra.textContent = buildResultExtra(isNew);
        } else {
          resultTitle.textContent = "本局結算";
          resultText.textContent = getResultText(state.score);
          resultExtra.textContent = buildResultExtra(isNew);
        }

        const delay = reason === "hit" ? 380 : 120;
        setTimeout(() => {
          resultModal.classList.add("show");
        }, delay);
      }

      function buildResultExtra(isNew) {
        const parts = [];
        parts.push(`${difficulties[state.difficulty].label} · ${modeLabels[state.mode]}`);
        if (state.mode === "practice") parts.push(`失誤 ${state.mistakes} 次`);
        if (isNew) parts.push("新紀錄");
        return parts.join("｜");
      }

      function openPause() {
        if (!state.running || state.gameOver) return;
        state.paused = true;
        state.lastTime = 0;
        pauseScore.textContent = String(state.score);
        pauseMode.textContent = modeLabels[state.mode] || "模式";
        pauseSub.textContent = state.mode === "practice"
          ? "練習模式可在這裡結束或回設定，不會再卡住無法退出。"
          : "可以繼續、重新開始、結束本局，或直接回設定。";
        pauseModal.classList.add("show");
        beep("pause");
      }

      function closePause() {
        if (!state.running || state.gameOver) return;
        pauseModal.classList.remove("show");
        state.paused = false;
        state.lastTime = 0;
        beep("start");
      }

      function showSettings() {
        state.running = false;
        state.paused = false;
        state.gameOver = false;
        state.ready = false;
        cancelAnimationFrame(rafId);
        clearPipes();
        resultModal.classList.remove("show");
        pauseModal.classList.remove("show");
        leaderModal.classList.remove("show");
        startModal.classList.add("show");
        countdown.classList.remove("show");
        tapHint.classList.add("hidden");
        practiceHud.classList.remove("show");
        fitLayout();
        updateHud();
      }

      function loop(time) {
        if (!state.running) return;

        if (!state.lastTime) state.lastTime = time;
        const dt = Math.min(34, time - state.lastTime);
        state.lastTime = time;

        if (!state.paused && state.ready) {
          updateBird(dt);
          updatePipes(dt);
          checkCollision();
        }

        rafId = requestAnimationFrame(loop);
      }

      function renderLeaders() {
        const list = getRecords();
        leaderList.innerHTML = "";
        if (!list.length) {
          leaderList.innerHTML = `<div class="empty">目前沒有紀錄。開始一局後，這裡會顯示目前難度與模式的前 5 名。</div>`;
          return;
        }

        list.forEach((item, idx) => {
          const el = document.createElement("div");
          el.className = "leader-item";
          const skin = skins.find(s => s.key === item.skin);
          el.innerHTML = `
            <b>#${idx + 1}</b>
            <div>${skin ? skin.name : "小鳥"}｜${item.score} 分<br><small>${difficulties[item.difficulty]?.label || ""} · ${modeLabels[item.mode] || ""}${item.mistakes ? " · 失誤 " + item.mistakes : ""}</small></div>
            <small>${item.date || ""}</small>
          `;
          leaderList.appendChild(el);
        });
      }

      function renderQuickLeaders() {
        const list = getRecords().slice(0, 3);
        quickLeaders.innerHTML = "";
        if (!list.length) {
          quickLeaders.innerHTML = `<div class="empty">目前尚無排行榜紀錄。</div>`;
          return;
        }

        const title = document.createElement("div");
        title.className = "empty";
        title.textContent = "目前排行前三名";
        quickLeaders.appendChild(title);

        list.forEach((item, idx) => {
          const skin = skins.find(s => s.key === item.skin);
          const el = document.createElement("div");
          el.className = "leader-item";
          el.innerHTML = `
            <b>#${idx + 1}</b>
            <div>${skin ? skin.name : "小鳥"}｜${item.score} 分<br><small>${item.date || ""}</small></div>
            <small>${modeLabels[item.mode] || ""}</small>
          `;
          quickLeaders.appendChild(el);
        });
      }

      function showLeaders() {
        renderLeaders();
        leaderModal.classList.add("show");
      }

      function resetRecords() {
        const ok = confirm("確定要清除所有最高分與排行榜紀錄嗎？");
        if (!ok) return;
        state.records = {};
        saveStore();
        updateHud();
        renderLeaders();
        showToast("紀錄已清除");
      }

      function getRank(score) {
        if (score >= 80) return "傳說鳥神";
        if (score >= 50) return "天空王者";
        if (score >= 30) return "飛行達人";
        if (score >= 15) return "空中好手";
        if (score >= 5) return "穩定飛行";
        return "新手小鳥";
      }

      function getResultText(score) {
        if (score >= 80) return "太強了，這已經不是飛，是統治天空。";
        if (score >= 50) return "節奏掌握得很好，已經是高手級表現。";
        if (score >= 30) return "很穩，距離高分排行榜頂端不遠了。";
        if (score >= 15) return "手感不錯，下一局有機會突破更高分。";
        if (score >= 5) return "已經開始抓到節奏了，再來一局會更順。";
        return "先熟悉點擊節奏，小鳥會越飛越穩。";
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1100);
      }

      function randomBetween(min, max) {
        return Math.random() * (max - min) + min;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function vibrate(pattern) {
        if (!state.vibe || !navigator.vibrate) return;
        try {
          navigator.vibrate(pattern);
        } catch (_) {}
      }

      function initAudio() {
        if (audioCtx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        audioCtx = new AC();
      }

      function beep(type) {
        if (!state.sound) return;
        initAudio();
        if (!audioCtx) return;

        if (audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }

        const map = {
          flap: [540, 0.045, "sine", 0.035],
          score: [880, 0.08, "triangle", 0.05],
          hit: [120, 0.16, "sawtooth", 0.06],
          start: [660, 0.09, "sine", 0.04],
          pause: [320, 0.07, "sine", 0.028],
          tick: [500, 0.045, "sine", 0.025],
          result: [720, 0.12, "triangle", 0.04]
        };

        const [freq, dur, wave, vol] = map[type] || map.flap;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = wave;
        osc.frequency.setValueAtTime(freq, now);
        if (type === "hit") {
          osc.frequency.exponentialRampToValueAtTime(70, now + dur);
        } else {
          osc.frequency.exponentialRampToValueAtTime(freq * 1.15, now + dur);
        }

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(vol, now + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur + 0.02);
      }

      function bindEvents() {
        startBtn.addEventListener("click", startGame);
        againBtn.addEventListener("click", startGame);
        settingsBtn.addEventListener("click", showSettings);

        pauseBtn.addEventListener("click", event => {
          event.stopPropagation();
          openPause();
        });

        resumeBtn.addEventListener("click", closePause);
        restartBtn.addEventListener("click", startGame);
        finishBtn.addEventListener("click", () => endGame("manual"));
        backSettingsBtn.addEventListener("click", showSettings);

        leaderBtn.addEventListener("click", showLeaders);
        closeLeaderBtn.addEventListener("click", () => leaderModal.classList.remove("show"));
        resetBtn.addEventListener("click", resetRecords);

        difficultySelect.addEventListener("change", () => {
          state.difficulty = difficultySelect.value;
          updateHud();
          saveStore();
        });

        modeSelect.addEventListener("change", () => {
          state.mode = modeSelect.value;
          updateHud();
          saveStore();
        });

        soundToggle.addEventListener("click", () => {
          soundToggle.classList.toggle("on");
          state.sound = soundToggle.classList.contains("on");
          saveStore();
          beep("start");
        });

        vibeToggle.addEventListener("click", () => {
          vibeToggle.classList.toggle("on");
          state.vibe = vibeToggle.classList.contains("on");
          saveStore();
          vibrate(15);
        });

        app.addEventListener("pointerdown", event => {
          const target = event.target;
          if (target.closest("button") || target.closest("select") || target.closest(".modal")) return;
          event.preventDefault();
          flap();
        }, { passive: false });

        window.addEventListener("keydown", event => {
          if (event.code === "Space" || event.code === "ArrowUp") {
            event.preventDefault();
            flap();
          }

          if (event.code === "KeyP" || event.code === "Escape") {
            if (pauseModal.classList.contains("show")) closePause();
            else openPause();
          }
        });

        window.addEventListener("resize", scheduleFit);
        window.addEventListener("orientationchange", scheduleFit);

        document.addEventListener("visibilitychange", () => {
          if (document.hidden && state.running && !state.paused && !state.gameOver) {
            openPause();
          }
        });

        document.addEventListener("touchmove", event => {
          event.preventDefault();
        }, { passive: false });
      }

      function init() {
        loadStore();
        bindEvents();
        syncSettingsUI();
        fitLayout();
        resetBird();
        renderBird();
        tapHint.classList.add("hidden");
      }

      init();
    })();
  </script>
</body>
</html>
