<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>踩地雷</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d14;
      --bg-soft: #111827;
      --panel: rgba(17, 24, 39, 0.88);
      --panel-strong: rgba(17, 24, 39, 0.96);
      --card: rgba(255,255,255,0.07);
      --card-2: rgba(255,255,255,0.105);
      --text: #f6f7fb;
      --muted: #9ba6bd;
      --line: rgba(255,255,255,0.12);
      --accent: #facc15;
      --accent-2: #38bdf8;
      --danger: #fb7185;
      --success: #34d399;
      --shadow: 0 24px 60px rgba(0,0,0,0.45);
      --radius: 24px;
      --cell-size: 34px;
      --cell-gap: 5px;
      --cell-hidden: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
      --cell-open: rgba(255,255,255,0.085);
      --cell-border: rgba(255,255,255,0.13);
      --button: linear-gradient(135deg, rgba(250,204,21,0.98), rgba(245,158,11,0.98));
      --button-text: #171306;
      --n1: #60a5fa;
      --n2: #34d399;
      --n3: #fb7185;
      --n4: #a78bfa;
      --n5: #f97316;
      --n6: #22d3ee;
      --n7: #f8fafc;
      --n8: #94a3b8;
    }

    body[data-theme="light"] {
      color-scheme: light;
      --bg: #edf2f8;
      --bg-soft: #f8fafc;
      --panel: rgba(255,255,255,0.88);
      --panel-strong: rgba(255,255,255,0.96);
      --card: rgba(15,23,42,0.055);
      --card-2: rgba(15,23,42,0.095);
      --text: #0f172a;
      --muted: #64748b;
      --line: rgba(15,23,42,0.12);
      --accent: #2563eb;
      --accent-2: #0ea5e9;
      --danger: #e11d48;
      --success: #059669;
      --shadow: 0 24px 60px rgba(15,23,42,0.16);
      --cell-hidden: linear-gradient(145deg, #ffffff, #dce5f0);
      --cell-open: rgba(15,23,42,0.06);
      --cell-border: rgba(15,23,42,0.11);
      --button: linear-gradient(135deg, #2563eb, #38bdf8);
      --button-text: #ffffff;
      --n7: #0f172a;
      --n8: #64748b;
    }

    body[data-theme="neon"] {
      --bg: #050712;
      --bg-soft: #0b1022;
      --panel: rgba(7, 10, 24, 0.9);
      --panel-strong: rgba(7, 10, 24, 0.98);
      --card: rgba(56,189,248,0.09);
      --card-2: rgba(168,85,247,0.12);
      --accent: #22d3ee;
      --accent-2: #a855f7;
      --button: linear-gradient(135deg, #22d3ee, #a855f7);
      --button-text: #ffffff;
      --cell-hidden: linear-gradient(145deg, rgba(34,211,238,0.22), rgba(168,85,247,0.12));
      --cell-open: rgba(34,211,238,0.08);
      --cell-border: rgba(34,211,238,0.2);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 34rem),
        radial-gradient(circle at bottom right, color-mix(in srgb, var(--accent-2) 16%, transparent), transparent 36rem),
        var(--bg);
      color: var(--text);
      transition: background 0.25s ease, color 0.25s ease;
      user-select: none;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
    }

    .app {
      width: min(1080px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 2px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.3rem, 6vw, 2.2rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 5px 0 0;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .topActions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .iconBtn,
    .pillBtn,
    .primaryBtn,
    .ghostBtn,
    .dangerBtn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 12px 26px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: transform 0.14s ease, filter 0.14s ease, background 0.14s ease, border-color 0.14s ease;
      white-space: nowrap;
    }

    .iconBtn {
      width: 42px;
      padding: 0;
      font-size: 1.05rem;
    }

    .iconBtn:active,
    .pillBtn:active,
    .primaryBtn:active,
    .ghostBtn:active,
    .dangerBtn:active {
      transform: scale(0.96);
    }

    .primaryBtn {
      background: var(--button);
      color: var(--button-text);
      font-weight: 900;
      border-color: transparent;
    }

    .dangerBtn {
      background: color-mix(in srgb, var(--danger) 22%, transparent);
      border-color: color-mix(in srgb, var(--danger) 40%, transparent);
      color: var(--text);
      font-weight: 800;
    }

    .ghostBtn {
      background: transparent;
      color: var(--muted);
    }

    .pillBtn.isActive {
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border-color: color-mix(in srgb, var(--accent) 56%, transparent);
      color: var(--text);
      font-weight: 900;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    .statCard {
      min-width: 0;
      padding: 12px 10px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 14px 36px rgba(0,0,0,0.16);
      backdrop-filter: blur(18px);
    }

    .statCard .label {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.1;
      margin-bottom: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .statCard .value {
      display: block;
      font-size: clamp(1.02rem, 4.5vw, 1.55rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .value.danger {
      color: var(--danger);
    }

    .gamePanel {
      min-height: 0;
      padding: 12px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }

    .gameHeader {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .statusLine {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .statusDot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--muted) 14%, transparent);
      flex: 0 0 auto;
    }

    .statusDot.playing {
      background: var(--success);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--success) 14%, transparent);
    }

    .statusDot.warning {
      background: var(--danger);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--danger) 14%, transparent);
    }

    .boardWrap {
      width: 100%;
      min-height: 240px;
      max-height: calc(100vh - 280px);
      overflow: auto;
      padding: 8px 2px 12px;
      display: grid;
      place-items: start center;
      overscroll-behavior: contain;
      touch-action: pan-x pan-y;
      border-radius: 18px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell-size));
      gap: var(--cell-gap);
      padding: 8px;
      border-radius: 20px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 18px 40px rgba(0,0,0,0.18);
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: clamp(7px, calc(var(--cell-size) * 0.28), 11px);
      background: var(--cell-hidden);
      border: 1px solid var(--cell-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.23),
        inset 0 -4px 9px rgba(0,0,0,0.16),
        0 7px 13px rgba(0,0,0,0.18);
      display: grid;
      place-items: center;
      font-size: calc(var(--cell-size) * 0.54);
      line-height: 1;
      font-weight: 950;
      cursor: pointer;
      touch-action: manipulation;
      transition:
        transform 0.09s ease,
        background 0.16s ease,
        box-shadow 0.16s ease,
        filter 0.16s ease;
      position: relative;
      overflow: hidden;
    }

    .cell::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 35% 22%, rgba(255,255,255,0.22), transparent 38%);
      opacity: 0.8;
      pointer-events: none;
    }

    .cell.pressing {
      transform: scale(0.92);
      filter: brightness(1.1);
    }

    .cell.revealed {
      background: var(--cell-open);
      box-shadow: inset 0 1px 8px rgba(0,0,0,0.18);
      cursor: default;
    }

    .cell.revealed::after {
      opacity: 0.2;
    }

    .cell.flagged {
      background: color-mix(in srgb, var(--accent) 28%, transparent);
      border-color: color-mix(in srgb, var(--accent) 52%, transparent);
    }

    .cell.mine {
      background: color-mix(in srgb, var(--danger) 25%, var(--cell-open));
    }

    .boardWrap.shaking .board {
      animation: boardShake 0.42s ease both;
    }

    .cell.mine {
      animation: minePop 0.22s ease both;
    }

    .cell.exploded {
      animation: boom 0.48s cubic-bezier(.18,.89,.32,1.28) both;
      background: color-mix(in srgb, var(--danger) 58%, transparent);
      border-color: color-mix(in srgb, var(--danger) 80%, transparent);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--danger) 72%, transparent),
        0 0 18px color-mix(in srgb, var(--danger) 58%, transparent),
        0 0 34px color-mix(in srgb, var(--accent) 22%, transparent);
      overflow: visible;
      z-index: 4;
    }

    .cell.exploded::before {
      content: "";
      position: absolute;
      inset: -42%;
      border-radius: 999px;
      background:
        radial-gradient(circle, color-mix(in srgb, var(--danger) 44%, transparent) 0 22%, transparent 58%),
        radial-gradient(circle, color-mix(in srgb, var(--accent) 35%, transparent) 0 12%, transparent 42%);
      pointer-events: none;
      z-index: -1;
      animation: blastRing 0.52s ease-out both;
    }

    .cell.wrongFlag {
      background: color-mix(in srgb, var(--danger) 20%, transparent);
    }

    .cell.hint {
      outline: 3px solid var(--success);
      outline-offset: 2px;
      animation: hintPulse 0.8s ease infinite alternate;
      z-index: 1;
    }

    .n1 { color: var(--n1); }
    .n2 { color: var(--n2); }
    .n3 { color: var(--n3); }
    .n4 { color: var(--n4); }
    .n5 { color: var(--n5); }
    .n6 { color: var(--n6); }
    .n7 { color: var(--n7); }
    .n8 { color: var(--n8); }

    @keyframes minePop {
      0% { transform: scale(0.72); filter: brightness(1); }
      100% { transform: scale(1); filter: brightness(1.08); }
    }

    @keyframes boom {
      0% { transform: scale(1); filter: brightness(1); }
      34% { transform: scale(1.24) rotate(-4deg); filter: brightness(1.55); }
      68% { transform: scale(0.96) rotate(3deg); filter: brightness(1.16); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    @keyframes blastRing {
      0% { transform: scale(0.25); opacity: 0.95; }
      70% { opacity: 0.36; }
      100% { transform: scale(1.28); opacity: 0; }
    }

    @keyframes boardShake {
      0%, 100% { transform: translate3d(0, 0, 0); }
      15% { transform: translate3d(-5px, 2px, 0); }
      32% { transform: translate3d(5px, -2px, 0); }
      49% { transform: translate3d(-4px, -1px, 0); }
      66% { transform: translate3d(4px, 2px, 0); }
      83% { transform: translate3d(-2px, 1px, 0); }
    }

    @keyframes hintPulse {
      from { transform: scale(1); filter: brightness(1); }
      to { transform: scale(1.06); filter: brightness(1.25); }
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .actions button {
      min-width: 0;
      min-height: 48px;
      border-radius: 16px;
      padding: 7px 5px;
      flex-direction: column;
      font-size: 0.78rem;
      line-height: 1.08;
    }

    .actions .big {
      font-size: 1.2rem;
      line-height: 1;
    }

    .modalLayer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.58);
      backdrop-filter: blur(12px);
    }

    .modalLayer.show {
      display: flex;
    }

    .modal {
      width: min(720px, 100%);
      max-height: min(88vh, 760px);
      display: none;
      overflow: hidden;
      border-radius: 28px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .modal.show {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .modalHead,
    .modalFoot {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-color: var(--line);
    }

    .modalHead {
      border-bottom: 1px solid var(--line);
    }

    .modalFoot {
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .modalTitle {
      min-width: 0;
    }

    .modalTitle h2 {
      margin: 0;
      font-size: clamp(1.12rem, 5.5vw, 1.65rem);
      letter-spacing: -0.035em;
    }

    .modalTitle p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .modalBody {
      padding: 16px;
      overflow: auto;
    }

    .settingsGrid {
      display: grid;
      gap: 14px;
    }

    .sectionTitle {
      margin: 4px 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .optionGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .option {
      display: grid;
      gap: 6px;
      padding: 12px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      cursor: pointer;
      min-height: 74px;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option b {
      font-size: 0.96rem;
    }

    .option small {
      color: var(--muted);
      line-height: 1.35;
    }

    .option:has(input:checked) {
      background: color-mix(in srgb, var(--accent) 17%, transparent);
      border-color: color-mix(in srgb, var(--accent) 56%, transparent);
    }

    .fieldGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 7px;
      padding: 12px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
    }

    .field label,
    .switchRow span:first-child {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    select {
      width: 100%;
      min-height: 40px;
      border-radius: 12px;
      padding: 0 12px;
      color: var(--text);
      background: var(--card-2);
      border: 1px solid var(--line);
      outline: none;
    }

    body[data-theme="light"] select {
      color: #0f172a;
      background: rgba(255,255,255,0.86);
    }

    .switchRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(148,163,184,0.35);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 6px 14px rgba(0,0,0,0.22);
      transition: transform 0.18s ease;
    }

    .switch input:checked + .slider {
      background: color-mix(in srgb, var(--accent) 70%, #111827);
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .resultHero {
      text-align: center;
      padding: 8px 8px 12px;
    }

    .resultIcon {
      width: 82px;
      height: 82px;
      margin: 0 auto 10px;
      display: grid;
      place-items: center;
      border-radius: 27px;
      background: var(--card);
      border: 1px solid var(--line);
      font-size: 2.2rem;
      box-shadow: 0 18px 42px rgba(0,0,0,0.16);
    }

    .resultHero h2 {
      margin: 0;
      font-size: 1.55rem;
      letter-spacing: -0.04em;
    }

    .resultHero p {
      margin: 7px auto 0;
      max-width: 44ch;
      color: var(--muted);
      line-height: 1.55;
    }

    .resultStats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .rankTabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .rankTabs button {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
    }

    .rankTabs button.active {
      color: var(--button-text);
      background: var(--button);
      border-color: transparent;
      font-weight: 900;
    }

    .rankList {
      display: grid;
      gap: 8px;
    }

    .rankItem {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
    }

    .rankNo {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--card-2);
      font-weight: 950;
    }

    .rankMeta b {
      display: block;
    }

    .rankMeta small {
      display: block;
      color: var(--muted);
      margin-top: 3px;
    }

    .empty {
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      z-index: 70;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translate(-50%, 120%);
      max-width: min(92vw, 520px);
      padding: 12px 14px;
      border-radius: 999px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      color: var(--text);
      opacity: 0;
      transition: transform 0.22s ease, opacity 0.22s ease;
      text-align: center;
      pointer-events: none;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    .muted {
      color: var(--muted);
    }

    .desktopOnly {
      display: inline;
    }

    @media (max-width: 760px) {
      .app {
        gap: 10px;
      }

      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .gamePanel {
        padding: 10px;
      }

      .boardWrap {
        max-height: calc(100vh - 350px);
      }

      .actions {
        position: sticky;
        bottom: 0;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        padding: 8px;
        margin: 0 -6px -6px;
        border-radius: 22px;
        background: color-mix(in srgb, var(--panel-strong) 92%, transparent);
        border: 1px solid var(--line);
        backdrop-filter: blur(18px);
        box-shadow: 0 -12px 30px rgba(0,0,0,0.18);
      }

      .optionGrid,
      .fieldGrid,
      .resultStats {
        grid-template-columns: 1fr;
      }

      .modal {
        max-height: 92vh;
        border-radius: 24px;
      }

      .modalHead,
      .modalFoot,
      .modalBody {
        padding: 14px;
      }

      .desktopOnly {
        display: none;
      }
    }

    @media (max-width: 390px) {
      .brand p {
        display: none;
      }

      .statCard {
        padding: 10px 9px;
      }

      .actions button {
        min-height: 46px;
        font-size: 0.72rem;
      }

      .topActions {
        gap: 6px;
      }

      .iconBtn {
        width: 40px;
        min-height: 40px;
      }
    }
  </style>
</head>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const DIFFICULTIES = {
      beginner: { name: "新手", rows: 8, cols: 8, mines: 10, limit: 60 },
      normal: { name: "普通", rows: 10, cols: 10, mines: 18, limit: 120 },
      hard: { name: "困難", rows: 14, cols: 14, mines: 40, limit: 240 },
      hell: { name: "地獄", rows: 16, cols: 20, mines: 80, limit: 480 }
    };

    const CHALLENGES = {
      classic: { name: "標準" },
      timed: { name: "限時" },
      noflag: { name: "無旗" },
      hardcore: { name: "硬派" }
    };

    const SETTINGS_KEY = "minesweeper.settings.singlefile";
    const SCORE_KEY = "minesweeper.records.singlefile";
    const MAX_RECORDS = 5;

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    const els = {
      body: document.body,
      modalLayer: $("#modalLayer"),
      board: $("#board"),
      boardWrap: $("#boardWrap"),
      mineCounter: $("#mineCounter"),
      timerLabel: $("#timerLabel"),
      timerValue: $("#timerValue"),
      difficultyValue: $("#difficultyValue"),
      bestValue: $("#bestValue"),
      boardInfo: $("#boardInfo"),
      statusText: $("#statusText"),
      statusDot: $("#statusDot"),
      flagModeBtn: $("#flagModeBtn"),
      hintBtn: $("#hintBtn"),
      toast: $("#toast"),
      resultTitle: $("#resultTitle"),
      resultSub: $("#resultSub"),
      resultIcon: $("#resultIcon"),
      resultHeadline: $("#resultHeadline"),
      resultMessage: $("#resultMessage"),
      resultMode: $("#resultMode"),
      resultTime: $("#resultTime"),
      resultOpen: $("#resultOpen"),
      resultMistakes: $("#resultMistakes"),
      rankTabs: $("#rankTabs"),
      rankList: $("#rankList")
    };

    let settings = {
      difficulty: "normal",
      challenge: "classic",
      theme: "dark",
      mineIcon: "💣",
      longPress: 450,
      cellSize: "auto",
      vibrate: true,
      safeZone: true,
      hintEnabled: true
    };

    let state = createEmptyState();
    let press = null;
    let toastTimer = null;

    function createEmptyState() {
      return {
        cells: [],
        rows: 0,
        cols: 0,
        mines: 0,
        limit: 0,
        started: false,
        generated: false,
        ended: false,
        won: false,
        flags: 0,
        revealed: 0,
        firstClickIndex: null,
        startAt: 0,
        elapsed: 0,
        timerId: null,
        explosionTimers: [],
        flagMode: false,
        hintsLeft: 3,
        hintsUsed: 0,
        clicks: 0
      };
    }

    function saveSettings() {
      try {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      } catch (error) {
        console.warn("設定無法儲存：", error);
      }
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        settings = { ...settings, ...parsed };
      } catch (error) {
        console.warn("設定讀取失敗：", error);
      }
    }

    function applySettingsToUI() {
      const diffInput = document.querySelector(`input[name="difficulty"][value="${settings.difficulty}"]`);
      if (diffInput) diffInput.checked = true;

      const challengeInput = document.querySelector(`input[name="challenge"][value="${settings.challenge}"]`);
      if (challengeInput) challengeInput.checked = true;

      $("#themeSelect").value = settings.theme;
      $("#mineIconSelect").value = settings.mineIcon;
      $("#longPressSelect").value = String(settings.longPress);
      $("#cellSizeSelect").value = settings.cellSize;
      $("#vibrateToggle").checked = !!settings.vibrate;
      $("#safeZoneToggle").checked = !!settings.safeZone;
      $("#hintToggle").checked = !!settings.hintEnabled;
      applyTheme();
    }

    function readSettingsFromUI() {
      const difficulty = document.querySelector("input[name='difficulty']:checked")?.value || "normal";
      const challenge = document.querySelector("input[name='challenge']:checked")?.value || "classic";

      settings = {
        difficulty,
        challenge,
        theme: $("#themeSelect").value,
        mineIcon: $("#mineIconSelect").value,
        longPress: Number($("#longPressSelect").value),
        cellSize: $("#cellSizeSelect").value,
        vibrate: $("#vibrateToggle").checked,
        safeZone: $("#safeZoneToggle").checked,
        hintEnabled: $("#hintToggle").checked
      };

      if (settings.challenge === "hardcore") {
        settings.safeZone = false;
        $("#safeZoneToggle").checked = false;
      }

      saveSettings();
      applyTheme();
    }

    function applyTheme() {
      els.body.dataset.theme = settings.theme || "dark";
    }

    function bindEvents() {
      $("#settingsBtn").addEventListener("click", () => showModal("settingsModal"));
      $("#settingsTopBtn").addEventListener("click", () => showModal("settingsModal"));
      $("#closeSettingsBtn").addEventListener("click", () => hideModal());
      $("#applySettingsBtn").addEventListener("click", () => {
        readSettingsFromUI();
        newGame(true);
        hideModal();
      });

      $("#newGameBtn").addEventListener("click", () => newGame(true));
      $("#restartTopBtn").addEventListener("click", () => newGame(true));

      $("#flagModeBtn").addEventListener("click", () => {
        if (settings.challenge === "noflag") {
          toast("無旗模式不能插旗。");
          return;
        }
        state.flagMode = !state.flagMode;
        updateHud();
        vibrate(16);
      });

      $("#hintBtn").addEventListener("click", useHint);
      $("#rankBtn").addEventListener("click", () => showRankModal());
      $("#openRankFromSettingsBtn").addEventListener("click", () => showRankModal());
      $("#closeRankBtn").addEventListener("click", () => hideModal());
      $("#rankStartBtn").addEventListener("click", () => {
        hideModal();
        newGame(true);
      });
      $("#clearRankBtn").addEventListener("click", clearCurrentRank);

      $("#resultNextBtn").addEventListener("click", () => {
        hideModal();
        newGame(true);
      });
      $("#resultSettingsBtn").addEventListener("click", () => showModal("settingsModal"));

      $("#themeSelect").addEventListener("change", () => {
        settings.theme = $("#themeSelect").value;
        applyTheme();
      });

      els.board.addEventListener("contextmenu", (event) => event.preventDefault());
      els.board.addEventListener("pointerdown", handlePointerDown);
      els.board.addEventListener("pointermove", handlePointerMove);
      els.board.addEventListener("pointerup", handlePointerUp);
      els.board.addEventListener("pointercancel", cancelPress);
      els.board.addEventListener("pointerleave", handlePointerLeave);

      window.addEventListener("resize", () => {
        if (state.rows && state.cols) {
          setBoardSizing();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") hideModal();
      });
    }

    function newGame(resetClock = true) {
      stopTimer();
      clearExplosionTimers();
      els.boardWrap.classList.remove("shaking");

      const config = DIFFICULTIES[settings.difficulty];
      state = createEmptyState();
      state.rows = config.rows;
      state.cols = config.cols;
      state.mines = config.mines;
      state.limit = config.limit;
      state.hintsLeft = settings.hintEnabled && settings.challenge !== "hardcore" ? 3 : 0;
      state.cells = Array.from({ length: state.rows * state.cols }, (_, index) => ({
        index,
        mine: false,
        revealed: false,
        flagged: false,
        adjacent: 0,
        exploded: false,
        hint: false,
        wrongFlag: false
      }));

      if (settings.challenge === "noflag") {
        state.flagMode = false;
      }

      renderBoard();
      updateHud();

      if (resetClock) {
        toast("新局已建立，第一次點擊一定安全。");
      }

      setStatus("ready", "點開任一格開始計時");
    }

    function renderBoard() {
      setBoardSizing();
      const fragment = document.createDocumentFragment();

      state.cells.forEach((cell) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "cell";
        button.dataset.index = String(cell.index);
        button.setAttribute("role", "gridcell");
        button.setAttribute("aria-label", "未翻開");
        fragment.appendChild(button);
      });

      els.board.innerHTML = "";
      els.board.appendChild(fragment);
      updateBoardInfo();
    }

    function setBoardSizing() {
      const available = Math.max(280, Math.min(window.innerWidth - 34, 760));
      let base = Math.floor((available - 16 - (state.cols - 1) * 5) / state.cols);

      if (settings.cellSize === "large") base += 4;
      if (settings.cellSize === "compact") base -= 3;

      const min = state.cols >= 18 ? 24 : 26;
      const max = state.cols <= 10 ? 46 : 38;
      const size = Math.max(min, Math.min(max, base));

      document.documentElement.style.setProperty("--cell-size", `${size}px`);
      document.documentElement.style.setProperty("--cols", String(state.cols));
    }

    function updateBoardInfo() {
      const challengeName = CHALLENGES[settings.challenge]?.name || "標準";
      els.boardInfo.textContent = `${state.rows}×${state.cols}｜${state.mines} 雷｜${challengeName}`;
    }

    function updateHud() {
      const config = DIFFICULTIES[settings.difficulty];
      const challengeName = CHALLENGES[settings.challenge]?.name || "標準";
      const remaining = state.mines - state.flags;

      els.mineCounter.textContent = String(remaining);
      els.mineCounter.classList.toggle("danger", remaining < 0);

      els.difficultyValue.textContent = config.name;
      els.timerLabel.textContent = settings.challenge === "timed" ? "倒數" : "時間";

      const displayTime = settings.challenge === "timed" && state.started && !state.ended
        ? Math.max(0, state.limit - state.elapsed)
        : state.elapsed;

      els.timerValue.textContent = formatTime(displayTime);
      els.timerValue.classList.toggle("danger", settings.challenge === "timed" && displayTime <= 10 && state.started && !state.ended);

      const best = getBestRecord(settings.difficulty, settings.challenge);
      els.bestValue.textContent = best ? formatTime(best.time) : "--";

      els.flagModeBtn.classList.toggle("isActive", state.flagMode);
      els.flagModeBtn.disabled = settings.challenge === "noflag";
      els.flagModeBtn.style.opacity = settings.challenge === "noflag" ? "0.48" : "";

      els.hintBtn.disabled = state.hintsLeft <= 0 || !settings.hintEnabled || settings.challenge === "hardcore";
      els.hintBtn.style.opacity = els.hintBtn.disabled ? "0.48" : "";
      els.hintBtn.querySelector("span:last-child").textContent = `提示 ${state.hintsLeft}`;

      updateBoardInfo();

      if (!state.started && !state.ended) {
        setStatus("ready", `目前：${config.name} / ${challengeName}`);
      }
    }

    function updateCell(index) {
      const cell = state.cells[index];
      const el = els.board.querySelector(`[data-index="${index}"]`);
      if (!el) return;

      el.className = "cell";
      el.textContent = "";
      el.removeAttribute("data-adjacent");

      if (cell.hint && !cell.revealed && !cell.flagged) {
        el.classList.add("hint");
      }

      if (cell.revealed) {
        el.classList.add("revealed");
        if (cell.mine) {
          el.classList.add("mine");
          el.textContent = settings.mineIcon;
          el.setAttribute("aria-label", "地雷");
        } else if (cell.adjacent > 0) {
          el.textContent = String(cell.adjacent);
          el.classList.add(`n${cell.adjacent}`);
          el.dataset.adjacent = String(cell.adjacent);
          el.setAttribute("aria-label", `數字 ${cell.adjacent}`);
        } else {
          el.setAttribute("aria-label", "空白");
        }
      } else if (cell.flagged) {
        el.classList.add("flagged");
        el.textContent = "🚩";
        el.setAttribute("aria-label", "已插旗");
      } else {
        el.setAttribute("aria-label", "未翻開");
      }

      if (cell.exploded) {
        el.classList.add("exploded");
      }

      if (cell.wrongFlag) {
        el.classList.add("wrongFlag");
        el.textContent = "❌";
      }
    }

    function updateAllCells() {
      for (let i = 0; i < state.cells.length; i++) {
        updateCell(i);
      }
    }

    function getCellIndexFromEvent(event) {
      const target = event.target.closest(".cell");
      if (!target || !els.board.contains(target)) return null;
      return Number(target.dataset.index);
    }

    function handlePointerDown(event) {
      const index = getCellIndexFromEvent(event);
      if (index === null || state.ended) return;
      if (event.pointerType === "mouse" && event.button !== 0) return;

      const cellEl = els.board.querySelector(`[data-index="${index}"]`);
      if (cellEl) {
        try {
          cellEl.setPointerCapture(event.pointerId);
        } catch {}
        cellEl.classList.add("pressing");
      }

      press = {
        index,
        pointerId: event.pointerId,
        x: event.clientX,
        y: event.clientY,
        long: false,
        moved: false,
        timer: window.setTimeout(() => {
          if (!press || press.index !== index || press.moved || state.ended) return;
          press.long = true;
          handleFlag(index);
          vibrate(25);
        }, settings.longPress)
      };
    }

    function handlePointerMove(event) {
      if (!press) return;
      const dx = Math.abs(event.clientX - press.x);
      const dy = Math.abs(event.clientY - press.y);
      if (dx > 12 || dy > 12) {
        press.moved = true;
        clearTimeout(press.timer);
        const cellEl = els.board.querySelector(`[data-index="${press.index}"]`);
        if (cellEl) cellEl.classList.remove("pressing");
      }
    }

    function handlePointerLeave(event) {
      if (!press || event.pointerId !== press.pointerId) return;
      cancelPress();
    }

    function handlePointerUp(event) {
      if (!press || event.pointerId !== press.pointerId) return;
      const currentPress = press;
      cancelPress();

      if (state.ended || currentPress.moved) return;

      if (!currentPress.long) {
        handleTap(currentPress.index);
      }
    }

    function cancelPress() {
      if (!press) return;
      clearTimeout(press.timer);
      const cellEl = els.board.querySelector(`[data-index="${press.index}"]`);
      if (cellEl) cellEl.classList.remove("pressing");
      press = null;
    }

    function handleTap(index) {
      const cell = state.cells[index];
      if (!cell || state.ended) return;

      state.clicks += 1;

      if (state.flagMode && settings.challenge !== "noflag") {
        handleFlag(index);
        return;
      }

      if (cell.revealed && cell.adjacent > 0) {
        chordReveal(index);
        return;
      }

      reveal(index);
    }

    function handleFlag(index) {
      if (state.ended) return;

      if (settings.challenge === "noflag") {
        toast("無旗模式不能插旗。");
        return;
      }

      const cell = state.cells[index];
      if (!cell || cell.revealed) return;

      if (!cell.flagged && state.flags >= state.mines) {
        toast("旗子已達地雷數上限。");
        return;
      }

      cell.flagged = !cell.flagged;
      state.flags += cell.flagged ? 1 : -1;
      cell.hint = false;
      updateCell(index);
      updateHud();
      vibrate(12);
    }

    function reveal(index) {
      const cell = state.cells[index];
      if (!cell || cell.revealed || cell.flagged || state.ended) return;

      if (!state.generated) {
        generateMines(index);
        state.generated = true;
        state.firstClickIndex = index;
      }

      if (!state.started) {
        startTimer();
        setStatus("playing", "遊戲進行中");
      }

      if (cell.mine) {
        lose(index, "mine");
        return;
      }

      floodReveal(index);
      updateHud();
      checkWin();
    }

    function floodReveal(startIndex) {
      const stack = [startIndex];
      const visited = new Set();

      while (stack.length) {
        const index = stack.pop();
        if (visited.has(index)) continue;
        visited.add(index);

        const cell = state.cells[index];
        if (!cell || cell.revealed || cell.flagged) continue;

        cell.revealed = true;
        cell.hint = false;
        state.revealed += 1;
        updateCell(index);

        if (cell.adjacent === 0 && !cell.mine) {
          getNeighbors(index).forEach((neighborIndex) => {
            const neighbor = state.cells[neighborIndex];
            if (neighbor && !neighbor.revealed && !neighbor.flagged && !neighbor.mine) {
              stack.push(neighborIndex);
            }
          });
        }
      }
    }

    function chordReveal(index) {
      const cell = state.cells[index];
      if (!cell.revealed || cell.adjacent <= 0) return;

      const neighbors = getNeighbors(index);
      const flags = neighbors.filter((i) => state.cells[i].flagged).length;

      if (flags !== cell.adjacent) {
        toast(`周圍需要 ${cell.adjacent} 面旗，目前是 ${flags} 面。`);
        return;
      }

      for (const neighborIndex of neighbors) {
        const neighbor = state.cells[neighborIndex];
        if (!neighbor.revealed && !neighbor.flagged) {
          if (neighbor.mine) {
            lose(neighborIndex, "mine");
            return;
          }
          floodReveal(neighborIndex);
        }
      }

      updateHud();
      checkWin();
    }

    function generateMines(firstIndex) {
      const excluded = new Set([firstIndex]);
      const protectAround = settings.safeZone && settings.challenge !== "hardcore";
      if (protectAround) {
        getNeighbors(firstIndex).forEach((i) => excluded.add(i));
      }

      const candidates = state.cells
        .map((cell) => cell.index)
        .filter((index) => !excluded.has(index));

      shuffle(candidates);

      for (let i = 0; i < state.mines; i++) {
        const mineIndex = candidates[i];
        if (mineIndex !== undefined) {
          state.cells[mineIndex].mine = true;
        }
      }

      state.cells.forEach((cell) => {
        if (cell.mine) return;
        cell.adjacent = getNeighbors(cell.index).filter((i) => state.cells[i].mine).length;
      });
    }

    function getNeighbors(index) {
      const row = Math.floor(index / state.cols);
      const col = index % state.cols;
      const neighbors = [];

      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = row + dr;
          const nc = col + dc;
          if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
            neighbors.push(nr * state.cols + nc);
          }
        }
      }

      return neighbors;
    }

    function checkWin() {
      const safeCells = state.rows * state.cols - state.mines;
      if (state.revealed >= safeCells) {
        win();
      }
    }

    function win() {
      if (state.ended) return;

      state.ended = true;
      state.won = true;
      stopTimer();

      state.cells.forEach((cell) => {
        if (cell.mine && !cell.flagged) {
          cell.flagged = true;
          state.flags += 1;
        }
      });

      updateAllCells();
      updateHud();
      setStatus("success", "挑戰成功");
      vibrate([35, 30, 35]);

      const saved = saveRecordIfEligible();
      showResultModal("win", saved);
    }

    function lose(index, reason) {
      if (state.ended) return;

      state.ended = true;
      state.won = false;
      stopTimer();
      clearExplosionTimers();

      setStatus("danger", reason === "timeout" ? "時間到，地雷連鎖爆開中" : "踩到地雷，連鎖爆炸中");
      updateHud();
      vibrate([55, 35, 75]);

      playMineExplosionSequence(index, reason, () => {
        state.cells.forEach((cell) => {
          if (cell.flagged && !cell.mine) {
            cell.wrongFlag = true;
            updateCell(cell.index);
          }
        });

        els.boardWrap.classList.remove("shaking");
        setStatus("danger", reason === "timeout" ? "時間到" : "踩到地雷");
        updateHud();
        showResultModal("lose", { saved: false, reason });
      });
    }

    function playMineExplosionSequence(triggerIndex, reason, onComplete) {
      const mineIndexes = getOrderedMineIndexes(triggerIndex);
      if (!mineIndexes.length) {
        onComplete();
        return;
      }

      const total = mineIndexes.length;
      const stepDelay = total >= 70 ? 32 : total >= 40 ? 42 : 58;
      els.boardWrap.classList.add("shaking");

      mineIndexes.forEach((mineIndex, order) => {
        const timerId = window.setTimeout(() => {
          const cell = state.cells[mineIndex];
          if (!cell) return;

          cell.flagged = false;
          cell.revealed = true;
          cell.exploded = true;
          updateCell(mineIndex);

          if (order === 0 || order % 4 === 0) {
            vibrate(order === 0 ? [45, 25, 70] : 18);
          }

          window.setTimeout(() => {
            if (!state.cells[mineIndex]) return;
            state.cells[mineIndex].exploded = false;
            updateCell(mineIndex);
          }, 560);
        }, order * stepDelay);

        state.explosionTimers.push(timerId);
      });

      const finishTimer = window.setTimeout(() => {
        state.cells.forEach((cell) => {
          if (cell.mine) {
            cell.revealed = true;
            cell.exploded = false;
          }
        });
        updateAllCells();
        onComplete();
      }, total * stepDelay + 660);

      state.explosionTimers.push(finishTimer);
    }

    function getOrderedMineIndexes(triggerIndex) {
      const mines = state.cells
        .filter((cell) => cell.mine)
        .map((cell) => cell.index);

      if (typeof triggerIndex !== "number" || !state.cells[triggerIndex]) {
        return shuffle(mines.slice());
      }

      const triggerRow = Math.floor(triggerIndex / state.cols);
      const triggerCol = triggerIndex % state.cols;

      return mines.sort((a, b) => {
        if (a === triggerIndex) return -1;
        if (b === triggerIndex) return 1;

        const ar = Math.floor(a / state.cols);
        const ac = a % state.cols;
        const br = Math.floor(b / state.cols);
        const bc = b % state.cols;
        const da = Math.hypot(ar - triggerRow, ac - triggerCol);
        const db = Math.hypot(br - triggerRow, bc - triggerCol);

        return da - db || a - b;
      });
    }

    function clearExplosionTimers() {
      if (!state.explosionTimers) return;
      state.explosionTimers.forEach((timerId) => clearTimeout(timerId));
      state.explosionTimers = [];
    }

    function startTimer() {
      state.started = true;
      state.startAt = Date.now();
      state.elapsed = 0;
      tickTimer();
      state.timerId = window.setInterval(tickTimer, 250);
    }

    function tickTimer() {
      if (!state.started || state.ended) return;

      state.elapsed = Math.floor((Date.now() - state.startAt) / 1000);

      if (settings.challenge === "timed" && state.elapsed >= state.limit) {
        state.elapsed = state.limit;
        updateHud();
        lose(null, "timeout");
        return;
      }

      updateHud();
    }

    function stopTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function useHint() {
      if (state.ended) return;

      if (!settings.hintEnabled || settings.challenge === "hardcore") {
        toast("目前模式不提供提示。");
        return;
      }

      if (state.hintsLeft <= 0) {
        toast("本局提示已用完。");
        return;
      }

      if (!state.generated) {
        toast("先點開第一格後，才會產生提示。");
        return;
      }

      const safeHidden = state.cells.filter((cell) => !cell.revealed && !cell.flagged && !cell.mine);
      if (!safeHidden.length) {
        toast("沒有可提示的安全格。");
        return;
      }

      state.cells.forEach((cell) => {
        cell.hint = false;
      });

      const pick = safeHidden[Math.floor(Math.random() * safeHidden.length)];
      pick.hint = true;
      state.hintsLeft -= 1;
      state.hintsUsed += 1;

      updateAllCells();
      updateHud();
      vibrate(18);
      toast("已標出一格安全格，使用提示後不列入正式最快紀錄。");

      window.setTimeout(() => {
        if (!state.cells[pick.index]) return;
        state.cells[pick.index].hint = false;
        updateCell(pick.index);
      }, 4500);
    }

    function showResultModal(type, saveInfo) {
      const isWin = type === "win";
      const config = DIFFICULTIES[settings.difficulty];
      const challengeName = CHALLENGES[settings.challenge]?.name || "標準";
      const wrongFlags = state.cells.filter((cell) => cell.wrongFlag).length;
      const safeCells = state.rows * state.cols - state.mines;

      els.resultTitle.textContent = isWin ? "勝利結算" : "失敗結算";
      els.resultSub.textContent = `${config.name} / ${challengeName}`;
      els.resultIcon.textContent = isWin ? "🎉" : (saveInfo.reason === "timeout" ? "⏰" : settings.mineIcon);
      els.resultHeadline.textContent = isWin ? "挑戰成功" : (saveInfo.reason === "timeout" ? "時間到" : "踩到地雷");
      els.resultMessage.textContent = isWin
        ? (saveInfo.saved ? `已更新本機排行榜：第 ${saveInfo.rank} 名。` : "你成功避開所有地雷。")
        : "本局已結束，地雷位置已全部揭曉。";

      if (isWin && !saveInfo.saved && saveInfo.reason) {
        els.resultMessage.textContent = saveInfo.reason;
      }

      els.resultMode.textContent = `${config.name} / ${challengeName}`;
      els.resultTime.textContent = formatTime(state.elapsed);
      els.resultOpen.textContent = `${state.revealed} / ${safeCells}`;
      els.resultMistakes.textContent = `${wrongFlags} / ${state.hintsUsed}`;

      showModal("resultModal");
    }

    function saveRecordIfEligible() {
      if (state.hintsUsed > 0) {
        return { saved: false, reason: "使用提示完成，本局不列入正式最快紀錄。" };
      }

      const key = scoreKey(settings.difficulty, settings.challenge);
      const all = readAllScores();
      const list = all[key] || [];

      const record = {
        time: state.elapsed,
        date: new Date().toLocaleDateString("zh-TW"),
        difficulty: settings.difficulty,
        challenge: settings.challenge,
        flags: state.flags,
        clicks: state.clicks
      };

      list.push(record);
      list.sort((a, b) => a.time - b.time);
      const trimmed = list.slice(0, MAX_RECORDS);
      all[key] = trimmed;
      writeAllScores(all);

      const rank = trimmed.findIndex((item) =>
        item.time === record.time &&
        item.date === record.date &&
        item.flags === record.flags &&
        item.clicks === record.clicks
      ) + 1;

      return rank > 0
        ? { saved: true, rank }
        : { saved: false, reason: "完成時間未進入最快 5 筆。" };
    }

    function readAllScores() {
      try {
        return JSON.parse(localStorage.getItem(SCORE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function writeAllScores(all) {
      try {
        localStorage.setItem(SCORE_KEY, JSON.stringify(all));
      } catch (error) {
        console.warn("排行榜無法儲存：", error);
      }
    }

    function scoreKey(difficulty, challenge) {
      return `${difficulty}.${challenge}`;
    }

    function getBestRecord(difficulty, challenge) {
      const all = readAllScores();
      const list = all[scoreKey(difficulty, challenge)] || [];
      return list[0] || null;
    }

    function showRankModal() {
      renderRankTabs();
      renderRankList(settings.difficulty, settings.challenge);
      showModal("rankModal");
    }

    function renderRankTabs() {
      const fragment = document.createDocumentFragment();

      Object.entries(DIFFICULTIES).forEach(([difficultyKey, difficulty]) => {
        Object.entries(CHALLENGES).forEach(([challengeKey, challenge]) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.dataset.difficulty = difficultyKey;
          btn.dataset.challenge = challengeKey;
          btn.textContent = `${difficulty.name}/${challenge.name}`;
          btn.classList.toggle("active", difficultyKey === settings.difficulty && challengeKey === settings.challenge);
          btn.addEventListener("click", () => {
            settings.difficulty = difficultyKey;
            settings.challenge = challengeKey;
            applySettingsToUI();
            saveSettings();
            renderRankTabs();
            renderRankList(difficultyKey, challengeKey);
          });
          fragment.appendChild(btn);
        });
      });

      els.rankTabs.innerHTML = "";
      els.rankTabs.appendChild(fragment);
    }

    function renderRankList(difficulty, challenge) {
      const all = readAllScores();
      const list = all[scoreKey(difficulty, challenge)] || [];
      const config = DIFFICULTIES[difficulty];
      const mode = CHALLENGES[challenge];

      if (!list.length) {
        els.rankList.innerHTML = `<div class="empty">${config.name} / ${mode.name} 目前沒有紀錄。</div>`;
        return;
      }

      els.rankList.innerHTML = "";
      const fragment = document.createDocumentFragment();

      list.forEach((record, index) => {
        const item = document.createElement("div");
        item.className = "rankItem";
        item.innerHTML = `
          <div class="rankNo">${index + 1}</div>
          <div class="rankMeta">
            <b>${formatTime(record.time)}</b>
            <small>${record.date}｜旗子 ${record.flags ?? "--"}｜點擊 ${record.clicks ?? "--"}</small>
          </div>
          <div>🏁</div>
        `;
        fragment.appendChild(item);
      });

      els.rankList.appendChild(fragment);
    }

    function clearCurrentRank() {
      const active = els.rankTabs.querySelector("button.active");
      const difficulty = active?.dataset.difficulty || settings.difficulty;
      const challenge = active?.dataset.challenge || settings.challenge;
      const all = readAllScores();
      delete all[scoreKey(difficulty, challenge)];
      writeAllScores(all);
      renderRankTabs();
      renderRankList(difficulty, challenge);
      updateHud();
      toast("已清除此頁排行榜。");
    }

    function showModal(id) {
      $$(".modal").forEach((modal) => modal.classList.remove("show"));
      const modal = document.getElementById(id);
      if (!modal) return;
      els.modalLayer.classList.add("show");
      els.modalLayer.setAttribute("aria-hidden", "false");
      modal.classList.add("show");
    }

    function hideModal() {
      els.modalLayer.classList.remove("show");
      els.modalLayer.setAttribute("aria-hidden", "true");
      $$(".modal").forEach((modal) => modal.classList.remove("show"));
    }

    function setStatus(type, text) {
      els.statusText.textContent = text;
      els.statusDot.className = "statusDot";

      if (type === "playing") {
        els.statusDot.classList.add("playing");
      } else if (type === "danger") {
        els.statusDot.classList.add("warning");
      } else if (type === "success") {
        els.statusDot.classList.add("playing");
      }
    }

    function formatTime(totalSeconds) {
      const seconds = Math.max(0, Number(totalSeconds) || 0);
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return `${min}:${String(sec).padStart(2, "0")}`;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function vibrate(pattern) {
      if (!settings.vibrate || !navigator.vibrate) return;
      try {
        navigator.vibrate(pattern);
      } catch {}
    }

    function toast(message) {
      clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, 2200);
    }

    function init() {
      loadSettings();
      applySettingsToUI();
      bindEvents();
      newGame(false);
      showModal("settingsModal");
    }

    init();
  </script>
</body>
</html>
