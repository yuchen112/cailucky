<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>俄羅斯方塊</title>
<style>
:root{
  --bg:#080b12; --bg2:#111827; --text:#f8fafc; --muted:#aab6c8; --panel:rgba(15,23,42,.72); --panel2:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.12); --strong:rgba(255,255,255,.22); --accent:#7dd3fc; --danger:#fb7185; --good:#86efac;
  --cell:30px; --gap:2px; --btnAlpha:.76; --btnScale:1;
}
[data-mode="light"]{
  --bg:#eef3f9; --bg2:#d8e4f1; --text:#020617; --muted:#1e293b; --panel:rgba(255,255,255,.96); --panel2:rgba(15,23,42,.12);
  --line:rgba(15,23,42,.24); --strong:rgba(15,23,42,.36); --accent:#075985; --danger:#9f1239; --good:#166534;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;color:var(--text);background:var(--bg)}
body{position:fixed;inset:0;user-select:none}
.app{position:relative;width:100%;height:100%;min-height:100dvh;overflow:hidden;background:var(--bg)}
.app:not(.playing) .topbar,.app:not(.playing) .controls{display:none}
.bg{position:absolute;inset:0;z-index:0;background:linear-gradient(145deg,var(--bg),var(--bg2));}
.bg::before,.bg::after{content:"";position:absolute;inset:0;pointer-events:none}.bg::before{opacity:.5;background:radial-gradient(circle at 22% 18%, rgba(125,211,252,.2), transparent 33%),radial-gradient(circle at 78% 72%, rgba(168,85,247,.16), transparent 35%)}
.bg.grid::after{opacity:.42;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:34px 34px}.bg.stars::after{opacity:.58;background-image:radial-gradient(circle at 10% 20%,rgba(255,255,255,.45) 0 1px,transparent 1.5px),radial-gradient(circle at 70% 35%,rgba(255,255,255,.32) 0 1px,transparent 1.4px),radial-gradient(circle at 42% 80%,rgba(255,255,255,.26) 0 1px,transparent 1.4px),radial-gradient(circle at 88% 65%,rgba(255,255,255,.35) 0 1px,transparent 1.4px);background-size:160px 180px,220px 200px,190px 160px,240px 210px}.bg.frost::after{opacity:.4;background:linear-gradient(135deg,rgba(148,163,184,.22),transparent 38%,rgba(56,189,248,.14) 72%,transparent)}.bg.industrial::after{opacity:.28;background-image:linear-gradient(135deg,rgba(255,255,255,.08) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.08) 75%,transparent 75%);background-size:18px 18px}
.topbar{position:absolute;z-index:5;top:calc(env(safe-area-inset-top) + 10px);left:10px;right:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}.hud{display:flex;gap:7px;align-items:center;min-width:0}.pill{padding:8px 10px;border:1px solid var(--line);border-radius:16px;background:var(--panel);backdrop-filter:blur(16px);box-shadow:0 12px 30px rgba(0,0,0,.18);font-weight:800;font-size:12px;line-height:1.05;white-space:nowrap}.pill small{display:block;color:var(--muted);font-size:10px;font-weight:800;margin-bottom:2px}.iconBtn{border:1px solid var(--line);color:var(--text);background:var(--panel);backdrop-filter:blur(18px);border-radius:17px;min-width:44px;height:44px;font-size:20px;font-weight:900;box-shadow:0 14px 34px rgba(0,0,0,.2)}
.stage{position:absolute;z-index:2;inset:62px 0 calc(118px + env(safe-area-inset-bottom)) 0;display:flex;justify-content:center;align-items:center;padding:4px 6px}.playWrap{position:relative;display:flex;align-items:flex-start;justify-content:center;gap:8px;max-width:100%;max-height:100%}.boardBox{position:relative;padding:8px;border-radius:24px;background:linear-gradient(145deg,var(--panel),rgba(255,255,255,.04));border:1px solid var(--strong);box-shadow:0 22px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.13);backdrop-filter:blur(18px);overflow:hidden}.boardBox::before{content:"";position:absolute;inset:1px;border-radius:23px;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.16),transparent 28%,transparent 68%,rgba(255,255,255,.07));mix-blend-mode:screen}.boardBox canvas{position:relative;z-index:1}
canvas{display:block}.side{display:flex;flex-direction:column;gap:8px;min-width:76px}.mini{width:76px;border:1px solid var(--line);border-radius:18px;background:var(--panel);backdrop-filter:blur(16px);padding:8px;box-shadow:0 15px 32px rgba(0,0,0,.2)}.mini .label{color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.08em;margin-bottom:4px}.mini canvas{width:60px;height:60px}.combo{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:8;padding:10px 16px;border-radius:18px;background:rgba(15,23,42,.76);border:1px solid rgba(255,255,255,.18);color:#fff;font-weight:1000;font-size:22px;opacity:0;pointer-events:none;text-shadow:0 2px 16px rgba(125,211,252,.8)}.combo.show{animation:pop .75s ease-out}@keyframes pop{0%{opacity:0;transform:translate(-50%,-38%) scale(.78)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-66%) scale(.96)}}
.controls{position:absolute;z-index:6;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 10px);height:112px;pointer-events:none}.cluster{position:absolute;bottom:0;display:grid;gap:8px;pointer-events:auto}.leftCtl{left:12px;grid-template-columns:repeat(2,calc(54px * var(--btnScale)));}.rightCtl{right:12px;grid-template-columns:repeat(2,calc(62px * var(--btnScale)));}.ctl{height:calc(48px * var(--btnScale));border-radius:20px;border:1px solid var(--line);background:color-mix(in srgb, var(--panel) calc(var(--btnAlpha)*100%), transparent);color:var(--text);backdrop-filter:blur(18px);box-shadow:0 12px 28px rgba(0,0,0,.24);font-weight:1000;font-size:calc(13px * var(--btnScale));display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1.05}.ctl b{font-size:calc(18px * var(--btnScale));}.ctl.wide{grid-column:span 2}.ctl:active{transform:scale(.94);filter:brightness(1.18)}
.overlay{position:absolute;z-index:20;inset:0;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.42);backdrop-filter:blur(10px)}.overlay.show{display:flex}.modal{width:min(430px,94vw);max-height:88dvh;overflow:auto;border-radius:28px;border:1px solid var(--strong);background:var(--panel);box-shadow:0 30px 80px rgba(0,0,0,.45);padding:18px;backdrop-filter:blur(22px)}.modal h1,.modal h2{margin:0 0 8px;font-size:24px}.modal p{margin:6px 0 14px;color:var(--muted);line-height:1.5;font-size:14px}.modal p:empty{display:none}.row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.btn{border:1px solid var(--line);border-radius:17px;background:var(--panel2);color:var(--text);padding:11px 13px;font-weight:900}.btn.primary{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 45%,#9333ea));color:white;border-color:transparent}.selectGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 14px}.choice{border:1px solid var(--line);border-radius:18px;background:var(--panel2);padding:10px;color:var(--text);font-weight:900;text-align:left}.choice.active{outline:2px solid var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}.choice small{display:block;color:var(--muted);font-weight:800;margin-top:3px}.range{width:100%}.hide{display:none!important}

[data-mode="light"] .pill,[data-mode="light"] .mini,[data-mode="light"] .modal,[data-mode="light"] .iconBtn,[data-mode="light"] .ctl{color:#020617;background:rgba(255,255,255,.94);border-color:rgba(15,23,42,.28);box-shadow:0 14px 34px rgba(15,23,42,.18)}
[data-mode="light"] .pill span,[data-mode="light"] .pill b,[data-mode="light"] #score,[data-mode="light"] #level,[data-mode="light"] #lines,[data-mode="light"] #best{color:#020617!important;text-shadow:none;font-weight:1000}
[data-mode="light"] .pill small,[data-mode="light"] .mini .label,[data-mode="light"] .modal p,[data-mode="light"] .choice small{color:#334155!important}
[data-mode="light"] .btn,[data-mode="light"] .choice{color:#020617;background:rgba(255,255,255,.78);border-color:rgba(15,23,42,.26)}
[data-mode="light"] .btn.primary{color:#fff;background:linear-gradient(135deg,#075985,#4f46e5)}
[data-mode="light"] .overlay{background:rgba(226,232,240,.58)}
[data-mode="light"] .boardBox{background:linear-gradient(145deg,rgba(255,255,255,.95),rgba(226,232,240,.78));box-shadow:0 22px 60px rgba(15,23,42,.20), inset 0 1px 0 rgba(255,255,255,.85)}
.menuSettings{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.menuSettings h2{font-size:18px!important;margin-top:0!important}
.menuSettings .selectGrid{margin-bottom:10px}
@media (max-width:420px){.pill{padding:7px 8px;font-size:11px}.side{min-width:62px}.mini{width:62px;padding:6px;border-radius:15px}.mini canvas{width:48px;height:48px}.stage{inset:58px 0 calc(110px + env(safe-area-inset-bottom)) 0}.leftCtl{left:8px}.rightCtl{right:8px}.ctl{border-radius:17px}.topbar{left:8px;right:8px}}
</style>
</head>
<body>
<div class="app" id="app" data-mode="dark">
  <div id="bg" class="bg grid"></div>
  <div class="topbar">
    <div class="hud">
      <div class="pill"><small>分數</small><span id="score">0</span></div>
      <div class="pill"><small>等級</small><span id="level">1</span></div>
      <div class="pill"><small>行數</small><span id="lines">0</span></div>
    </div>
    <button class="iconBtn" id="pauseBtn">⏸</button>
  </div>
  <main class="stage">
    <div class="playWrap">
      <section class="boardBox"><canvas id="board"></canvas><div id="combo" class="combo">TETRIS!</div></section>
      <aside class="side">
        <div class="mini"><div class="label">NEXT</div><canvas id="next" width="80" height="80"></canvas></div>
        <div class="mini"><div class="label">HOLD</div><canvas id="hold" width="80" height="80"></canvas></div>
      </aside>
    </div>
  </main>
  <div class="controls" id="controls">
    <div class="cluster leftCtl"><button class="ctl" data-act="left"><b>←</b>左移</button><button class="ctl" data-act="right"><b>→</b>右移</button><button class="ctl wide" data-act="hold"><b>保留</b>Hold</button></div>
    <div class="cluster rightCtl"><button class="ctl" data-act="rot"><b>旋轉</b>轉向</button><button class="ctl" data-act="soft"><b>↓</b>慢降</button><button class="ctl wide" data-act="drop"><b>直落</b>瞬降</button></div>
  </div>
  <div id="menu" class="overlay show"><div class="modal"><h1>俄羅斯方塊</h1><p id="menuMsg"></p><div class="row"><button class="btn primary" id="startBtn">開始遊戲</button></div><p>最高分：<b id="best">0</b></p><div id="menuSettings" class="menuSettings"></div></div></div>
  <div id="pause" class="overlay"><div class="modal"><h2>暫停</h2><div class="row"><button class="btn primary" id="resumeBtn">繼續</button><button class="btn" id="restartBtn">重新開始</button><button class="btn" id="homeBtn">主選單</button></div><div id="settings"></div></div></div>
</div>
<script>
(()=>{
'use strict';
const COLS=10, ROWS=20;
const SHAPES={I:[[1,1,1,1]],O:[[1,1],[1,1]],T:[[0,1,0],[1,1,1]],S:[[0,1,1],[1,1,0]],Z:[[1,1,0],[0,1,1]],J:[[1,0,0],[1,1,1]],L:[[0,0,1],[1,1,1]]};
const TYPES=Object.keys(SHAPES);
const COLORS={I:'#38bdf8',O:'#facc15',T:'#a855f7',S:'#22c55e',Z:'#fb7185',J:'#3b82f6',L:'#fb923c'};
let canvas=document.getElementById('board'),ctx=canvas.getContext('2d'),nctx=document.getElementById('next').getContext('2d'),hctx=document.getElementById('hold').getContext('2d');
const el=id=>document.getElementById(id); const app=el('app'), bg=el('bg');
let board,cur,next,hold=null,canHold=true,score=0,level=1,lines=0,best=+localStorage.tetrisBest||0,dropMs=850,last=0,acc=0,running=false,paused=false,cell=30,combo=0;
let settings={mode:localStorage.tMode||'dark',block:localStorage.tBlock||'neon',bg:localStorage.tBg||'grid',btnSize:+localStorage.tBtnSize||1,btnAlpha:+localStorage.tBtnAlpha||.76,ghost:localStorage.tGhost!=='0'};
function saveSettings(){localStorage.tMode=settings.mode;localStorage.tBlock=settings.block;localStorage.tBg=settings.bg;localStorage.tBtnSize=settings.btnSize;localStorage.tBtnAlpha=settings.btnAlpha;localStorage.tGhost=settings.ghost?'1':'0'}
function applySettings(){app.dataset.mode=settings.mode;bg.className='bg '+settings.bg;document.documentElement.style.setProperty('--btnScale',settings.btnSize);document.documentElement.style.setProperty('--btnAlpha',settings.btnAlpha);saveSettings();drawAll();}
function rand(){let t=TYPES[Math.floor(Math.random()*TYPES.length)];return {type:t,m:SHAPES[t].map(r=>r.slice()),x:3,y:0}}
function reset(){app.classList.add('playing');board=Array.from({length:ROWS},()=>Array(COLS).fill(0));cur=rand();next=rand();hold=null;canHold=true;score=0;level=1;lines=0;dropMs=850;combo=0;updateHUD();running=true;paused=false;hideOverlays();resize();drawAll();}
function updateHUD(){el('score').textContent=score;el('level').textContent=level;el('lines').textContent=lines;el('best').textContent=Math.max(best,score)}
function hideOverlays(){el('menu').classList.remove('show');el('pause').classList.remove('show')}
function collide(p=cur,dx=0,dy=0,m=p.m){for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++)if(m[y][x]){let nx=p.x+x+dx,ny=p.y+y+dy;if(nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&board[ny][nx]))return true}return false}
function merge(){cur.m.forEach((r,y)=>r.forEach((v,x)=>{if(v&&cur.y+y>=0)board[cur.y+y][cur.x+x]=cur.type}));}
function spawn(){cur=next;next=rand();canHold=true;if(collide()){gameOver();}}
function clearLines(){let cleared=0;for(let y=ROWS-1;y>=0;y--){if(board[y].every(Boolean)){board.splice(y,1);board.unshift(Array(COLS).fill(0));cleared++;y++;}}
 if(cleared){combo++;let pts=[0,100,300,500,850][cleared]*(level)+combo*35;score+=pts;lines+=cleared;level=Math.floor(lines/10)+1;dropMs=Math.max(90,850-(level-1)*62);showCombo(cleared===4?'TETRIS!':'COMBO '+combo);vibrate(cleared===4?45:20)}else combo=0;}
function showCombo(t){const c=el('combo');c.textContent=t;c.classList.remove('show');void c.offsetWidth;c.classList.add('show')}
function gameOver(){running=false;app.classList.remove('playing');if(score>best){best=score;localStorage.tetrisBest=best}updateHUD();el('menu').querySelector('h1').textContent='遊戲結束';el('menuMsg').innerHTML=`本局分數 <b>${score}</b>，消除 <b>${lines}</b> 行。`;renderSettings('menuSettings');el('menu').classList.add('show')}
function rotMat(m){return m[0].map((_,i)=>m.map(r=>r[i]).reverse())}
function rotate(){let m=rotMat(cur.m);let old=cur.x;for(const off of [0,-1,1,-2,2]){cur.x=old+off;if(!collide(cur,0,0,m)){cur.m=m;drawAll();return}}cur.x=old}
function move(dx){if(!collide(cur,dx,0)){cur.x+=dx;drawAll();return true}return false}
function soft(){if(!collide(cur,0,1)){cur.y++;score++;updateHUD();drawAll();return true}lock();return false}
function hard(){let d=0;while(!collide(cur,0,1)){cur.y++;d++}score+=d*2;lock();vibrate(28)}
function lock(){merge();clearLines();spawn();updateHUD();drawAll()}
function doHold(){if(!canHold)return;if(!hold){hold={type:cur.type,m:SHAPES[cur.type].map(r=>r.slice()),x:3,y:0};cur=next;next=rand();}else{let t=hold.type;hold={type:cur.type,m:SHAPES[cur.type].map(r=>r.slice()),x:3,y:0};cur={type:t,m:SHAPES[t].map(r=>r.slice()),x:3,y:0};}canHold=false;drawAll()}
function ghostY(){let y=cur.y;while(!collide({...cur,y},0,1))y++;return y}
function shade(hex, amt){let n=parseInt(hex.slice(1),16),r=(n>>16)+amt,g=(n>>8&255)+amt,b=(n&255)+amt;return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('')}
function drawCell(c,x,y,type,alpha=1,size=cell){
 let col=COLORS[type]||type;let px=x*size,py=y*size;let inset=Math.max(1.6,size*.075);let r=settings.block==='minimal'?Math.max(3,size*.13):Math.max(6,size*.22);
 let x0=px+inset,y0=py+inset,w=size-inset*2,h=size-inset*2;
 c.save();c.globalAlpha=alpha;
 c.beginPath();roundRect(c,x0,y0,w,h,r);
 if(settings.block==='neon'){
   c.shadowColor=col;c.shadowBlur=size*.42;
   let body=c.createLinearGradient(x0,y0,x0+w,y0+h);
   body.addColorStop(0,shade(col,38));body.addColorStop(.48,col);body.addColorStop(1,shade(col,-55));
   c.fillStyle=body;c.fill();
   c.shadowBlur=0;c.lineWidth=Math.max(1,size*.055);c.strokeStyle='rgba(255,255,255,.46)';c.stroke();
   c.beginPath();roundRect(c,x0+size*.16,y0+size*.12,w-size*.32,h-size*.48,Math.max(2,r*.55));
   let hi=c.createLinearGradient(x0,y0,x0,y0+h*.56);hi.addColorStop(0,'rgba(255,255,255,.44)');hi.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=hi;c.fill();
 }else if(settings.block==='gem'){
   c.shadowColor=shade(col,-25);c.shadowBlur=size*.22;
   let body=c.createRadialGradient(x0+w*.28,y0+h*.18,size*.06,x0+w*.62,y0+h*.76,size*.76);
   body.addColorStop(0,'rgba(255,255,255,.95)');body.addColorStop(.18,shade(col,52));body.addColorStop(.58,col);body.addColorStop(1,shade(col,-70));
   c.fillStyle=body;c.fill();c.shadowBlur=0;
   c.save();c.clip();
   c.strokeStyle='rgba(255,255,255,.34)';c.lineWidth=Math.max(1,size*.045);
   c.beginPath();c.moveTo(x0+w*.12,y0+h*.18);c.lineTo(x0+w*.48,y0+h*.5);c.lineTo(x0+w*.2,y0+h*.88);c.stroke();
   c.beginPath();c.moveTo(x0+w*.86,y0+h*.12);c.lineTo(x0+w*.48,y0+h*.5);c.lineTo(x0+w*.9,y0+h*.78);c.stroke();
   c.restore();
   c.lineWidth=Math.max(1,size*.06);c.strokeStyle='rgba(255,255,255,.62)';c.stroke();
 }else if(settings.block==='metal'){
   c.shadowColor='rgba(0,0,0,.45)';c.shadowBlur=size*.16;c.shadowOffsetY=size*.06;
   let body=c.createLinearGradient(x0,y0,x0+w,y0+h);
   body.addColorStop(0,shade(col,18));body.addColorStop(.18,shade(col,-28));body.addColorStop(.5,shade(col,10));body.addColorStop(.82,shade(col,-70));body.addColorStop(1,shade(col,-16));
   c.fillStyle=body;c.fill();c.shadowBlur=0;c.shadowOffsetY=0;
   c.lineWidth=Math.max(1.5,size*.075);c.strokeStyle=shade(col,-88);c.stroke();
   c.beginPath();roundRect(c,x0+size*.18,y0+size*.18,w-size*.36,h-size*.36,Math.max(2,r*.38));
   c.fillStyle='rgba(0,0,0,.16)';c.fill();c.strokeStyle='rgba(255,255,255,.23)';c.lineWidth=Math.max(1,size*.035);c.stroke();
   c.beginPath();c.moveTo(x0+size*.18,y0+size*.2);c.lineTo(x0+w-size*.2,y0+size*.2);c.strokeStyle='rgba(255,255,255,.42)';c.stroke();
 }else{
   let body=c.createLinearGradient(x0,y0,x0,y0+h);
   body.addColorStop(0,shade(col,20));body.addColorStop(1,shade(col,-18));
   c.fillStyle=body;c.fill();
   c.lineWidth=Math.max(1,size*.04);c.strokeStyle=app.dataset.mode==='light'?'rgba(15,23,42,.34)':'rgba(255,255,255,.2)';c.stroke();
   c.beginPath();roundRect(c,x0+size*.1,y0+size*.1,w-size*.2,h-size*.2,Math.max(2,r*.55));c.strokeStyle='rgba(255,255,255,.12)';c.stroke();
 }
 c.restore();}
function roundRect(c,x,y,w,h,r){c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);}
function drawBoard(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle=app.dataset.mode==='light'?'rgba(255,255,255,.28)':'rgba(0,0,0,.25)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--line');ctx.lineWidth=1;for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*cell+.5,0);ctx.lineTo(x*cell+.5,ROWS*cell);ctx.stroke()}for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*cell+.5);ctx.lineTo(COLS*cell,y*cell+.5);ctx.stroke()}board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,x,y,v,1)));
 if(settings.ghost){let gy=ghostY();cur.m.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,cur.x+x,gy+y,cur.type,.22)))}cur.m.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(ctx,cur.x+x,cur.y+y,cur.type,1)));}
function drawMini(c,p){c.clearRect(0,0,80,80);if(!p)return;let s=16,m=p.m,ox=(80-m[0].length*s)/2,oy=(80-m.length*s)/2;c.save();c.translate(ox,oy);let old=cell;cell=s;m.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(c,x,y,p.type,1,s)));cell=old;c.restore()}
function drawAll(){if(!board)return;drawBoard();drawMini(nctx,next);drawMini(hctx,hold)}
function resize(){let stage=document.querySelector('.stage').getBoundingClientRect();let sideW=window.innerWidth>360?84:68;let maxW=stage.width-sideW-22;let maxH=stage.height-18;cell=Math.floor(Math.min(maxW/COLS,maxH/ROWS));cell=Math.max(16,Math.min(34,cell));canvas.width=COLS*cell;canvas.height=ROWS*cell;drawAll()}
function loop(ts){if(!last)last=ts;let dt=ts-last;last=ts;if(running&&!paused){acc+=dt;if(acc>dropMs){soft();acc=0}}requestAnimationFrame(loop)}
function pause(){if(!running)return;paused=true;el('pause').classList.add('show');renderSettings()}
function resume(){paused=false;el('pause').classList.remove('show');last=0}
function renderSettings(target='settings'){el(target).innerHTML=`
<h2>設定</h2>
<div class="selectGrid">
<button class="choice ${settings.mode==='dark'?'active':''}" data-set="mode" data-val="dark">暗色模式<small>高級深色、長時間舒適</small></button>
<button class="choice ${settings.mode==='light'?'active':''}" data-set="mode" data-val="light">亮色模式<small>清晰乾淨、文字高對比</small></button>
<button class="choice ${settings.block==='neon'?'active':''}" data-set="block" data-val="neon">霓虹方塊<small>邊緣光感</small></button>
<button class="choice ${settings.block==='gem'?'active':''}" data-set="block" data-val="gem">寶石方塊<small>折射亮面</small></button>
<button class="choice ${settings.block==='metal'?'active':''}" data-set="block" data-val="metal">金屬方塊<small>硬邊立體</small></button>
<button class="choice ${settings.block==='minimal'?'active':''}" data-set="block" data-val="minimal">極簡方塊<small>乾淨耐看</small></button>
<button class="choice ${settings.bg==='grid'?'active':''}" data-set="bg" data-val="grid">精緻網格<small>專注耐玩</small></button>
<button class="choice ${settings.bg==='stars'?'active':''}" data-set="bg" data-val="stars">靜態星空<small>有深度不干擾</small></button>
<button class="choice ${settings.bg==='frost'?'active':''}" data-set="bg" data-val="frost">霧面漸層<small>乾淨高級</small></button>
<button class="choice ${settings.bg==='industrial'?'active':''}" data-set="bg" data-val="industrial">工業暗紋<small>低調質感</small></button>
</div>
<p>虛擬按鍵大小</p><input class="range" id="btnSize" type="range" min=".85" max="1.25" step=".05" value="${settings.btnSize}">
<p>虛擬按鍵透明度</p><input class="range" id="btnAlpha" type="range" min=".45" max=".95" step=".05" value="${settings.btnAlpha}">
<div class="row"><button class="btn" id="ghostBtn">幽靈方塊：${settings.ghost?'開':'關'}</button></div>`}
function vibrate(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}
function act(a){if(!running||paused)return;({left:()=>move(-1),right:()=>move(1),rot:rotate,soft:soft,drop:hard,hold:doHold}[a]||(()=>{}))()}
let timers={};document.querySelectorAll('.ctl').forEach(b=>{let a=b.dataset.act;let down=e=>{e.preventDefault();act(a);if(a==='left'||a==='right'||a==='soft'){clearTimeout(timers[a]);timers[a]=setTimeout(()=>{timers[a]=setInterval(()=>act(a),a==='soft'?45:72)},180)}};let up=()=>{clearTimeout(timers[a]);clearInterval(timers[a])};b.addEventListener('pointerdown',down);b.addEventListener('pointerup',up);b.addEventListener('pointercancel',up);b.addEventListener('pointerleave',up)});
el('startBtn').onclick=reset;el('pauseBtn').onclick=pause;el('resumeBtn').onclick=resume;el('restartBtn').onclick=reset;el('homeBtn').onclick=()=>{running=false;app.classList.remove('playing');el('pause').classList.remove('show');el('menu').querySelector('h1').textContent='俄羅斯方塊';el('menuMsg').innerHTML='';renderSettings('menuSettings');el('menu').classList.add('show')};
document.addEventListener('click',e=>{let target=e.target.closest('#menuSettings')?'menuSettings':'settings';let c=e.target.closest('.choice');if(c){settings[c.dataset.set]=c.dataset.val;applySettings();renderSettings(target)}if(e.target.id==='ghostBtn'){settings.ghost=!settings.ghost;applySettings();renderSettings(target)}});
document.addEventListener('input',e=>{if(e.target.id==='btnSize'){settings.btnSize=+e.target.value;applySettings()}if(e.target.id==='btnAlpha'){settings.btnAlpha=+e.target.value;applySettings()}});
window.addEventListener('resize',resize);document.addEventListener('keydown',e=>{if(e.key==='Escape')paused?resume():pause(); if(e.key==='ArrowLeft')act('left'); if(e.key==='ArrowRight')act('right'); if(e.key==='ArrowUp')act('rot'); if(e.key==='ArrowDown')act('soft'); if(e.code==='Space'){e.preventDefault();act('drop')} if(e.key.toLowerCase()==='c')act('hold')});
applySettings();el('best').textContent=best;renderSettings('menuSettings');requestAnimationFrame(loop);
})();
</script>
