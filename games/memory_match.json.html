<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0b1220"/>
<title>Memory Match｜精美版</title>
<style>
  :root{
    --bg0:#070b14;
    --bg1:#0e1830;
    --bg2:#18294a;
    --panel:rgba(255,255,255,.075);
    --panel2:rgba(255,255,255,.115);
    --panel3:rgba(255,255,255,.16);
    --text:rgba(255,255,255,.94);
    --muted:rgba(255,255,255,.66);
    --muted2:rgba(255,255,255,.48);
    --line:rgba(255,255,255,.14);
    --line2:rgba(255,255,255,.22);
    --shadow:0 24px 80px rgba(0,0,0,.48);
    --shadow2:0 12px 30px rgba(0,0,0,.26);
    --radius:28px;
    --gap:10px;
    --tileSize:76px;
    --tileRadius:20px;
    --emojiSize:calc(var(--tileSize) * .56);
    --accent:#7aa7ff;
    --accent2:#9ee8ff;
    --glow:rgba(122,167,255,.23);
    --success:#56f0bc;
    --danger:#ff6d8b;
    --tileFrontA:rgba(255,255,255,.125);
    --tileFrontB:rgba(255,255,255,.055);
    --tileBackA:rgba(255,255,255,.145);
    --tileBackB:rgba(255,255,255,.07);
    --tileStroke:rgba(255,255,255,.18);
    --safeTop:env(safe-area-inset-top, 0px);
    --safeBottom:env(safe-area-inset-bottom, 0px);
  }

  body[data-tone="ocean"]{ --accent:#7aa7ff; --accent2:#9ee8ff; --bg0:#070b14; --bg1:#0e1830; --bg2:#17284d; --glow:rgba(122,167,255,.24); }
  body[data-tone="mint"]{ --accent:#57f0c8; --accent2:#b7ffe9; --bg0:#06110f; --bg1:#09251f; --bg2:#103c33; --glow:rgba(87,240,200,.22); }
  body[data-tone="grape"]{ --accent:#b08cff; --accent2:#ffd1ff; --bg0:#0e0618; --bg1:#21113f; --bg2:#381a68; --glow:rgba(176,140,255,.25); }
  body[data-tone="sunset"]{ --accent:#ff8a5c; --accent2:#ffd06c; --bg0:#170807; --bg1:#35110f; --bg2:#58231b; --glow:rgba(255,138,92,.22); }
  body[data-tone="mono"]{ --accent:#cfd6e6; --accent2:#ffffff; --bg0:#090d13; --bg1:#111822; --bg2:#202836; --glow:rgba(207,214,230,.12); }

  body[data-card="soft"]{
    --tileStroke:rgba(255,255,255,.18);
    --tileFrontA:rgba(255,255,255,.12);
    --tileFrontB:rgba(255,255,255,.052);
    --tileBackA:rgba(255,255,255,.14);
    --tileBackB:rgba(255,255,255,.065);
  }
  body[data-card="neon"]{
    --tileStroke:color-mix(in srgb, var(--accent) 42%, rgba(255,255,255,.18));
    --tileFrontA:color-mix(in srgb, var(--accent) 17%, rgba(255,255,255,.08));
    --tileFrontB:rgba(0,0,0,.10);
    --tileBackA:color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,.12));
    --tileBackB:rgba(0,0,0,.08);
  }
  body[data-card="bold"]{
    --tileStroke:rgba(255,255,255,.23);
    --tileFrontA:rgba(255,255,255,.18);
    --tileFrontB:rgba(255,255,255,.085);
    --tileBackA:rgba(255,255,255,.18);
    --tileBackB:rgba(255,255,255,.08);
  }

  body[data-mode="light"]{
    --panel:rgba(255,255,255,.66);
    --panel2:rgba(255,255,255,.82);
    --panel3:rgba(255,255,255,.94);
    --text:rgba(13,18,29,.92);
    --muted:rgba(13,18,29,.62);
    --muted2:rgba(13,18,29,.44);
    --line:rgba(13,18,29,.10);
    --line2:rgba(13,18,29,.16);
    --shadow:0 24px 70px rgba(23,34,54,.20);
    --shadow2:0 14px 28px rgba(23,34,54,.12);
    --tileFrontA:rgba(255,255,255,.90);
    --tileFrontB:rgba(255,255,255,.58);
    --tileBackA:rgba(255,255,255,.94);
    --tileBackB:rgba(255,255,255,.66);
    --tileStroke:rgba(13,18,29,.10);
  }

  *{ box-sizing:border-box; }
  html,body{ min-height:100%; }
  body{
    margin:0;
    font-family:ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
    color:var(--text);
    background:
      radial-gradient(900px 650px at 16% 7%, color-mix(in srgb, var(--accent) 25%, transparent), transparent 62%),
      radial-gradient(900px 650px at 90% 18%, color-mix(in srgb, var(--accent2) 14%, transparent), transparent 60%),
      radial-gradient(900px 650px at 50% 105%, rgba(0,0,0,.54), transparent 62%),
      linear-gradient(145deg, var(--bg2), var(--bg1) 48%, var(--bg0));
    display:flex;
    align-items:center;
    justify-content:center;
    padding:calc(16px + var(--safeTop)) 16px calc(16px + var(--safeBottom));
    overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent;
  }
  body[data-mode="light"]{
    background:
      radial-gradient(900px 650px at 14% 8%, color-mix(in srgb, var(--accent) 17%, transparent), transparent 62%),
      radial-gradient(900px 650px at 90% 22%, color-mix(in srgb, var(--accent2) 16%, transparent), transparent 60%),
      linear-gradient(145deg, color-mix(in srgb, var(--accent) 10%, #fff), #f5f7fb 56%, #eef2f8);
  }

  .app{
    width:min(1060px,100%);
    border-radius:calc(var(--radius) + 8px);
    position:relative;
    overflow:hidden;
    isolation:isolate;
    background:linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.04));
    border:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  body[data-mode="light"] .app{
    background:linear-gradient(180deg, rgba(255,255,255,.90), rgba(255,255,255,.68));
  }
  .app::before{
    content:"";
    position:absolute;
    inset:-40%;
    z-index:-2;
    background:
      radial-gradient(circle at 18% 12%, var(--glow), transparent 30%),
      radial-gradient(circle at 86% 20%, rgba(255,255,255,.11), transparent 28%),
      conic-gradient(from 210deg at 50% 50%, transparent, rgba(255,255,255,.07), transparent 35%);
    animation:ambient 9s ease-in-out infinite alternate;
  }
  .app::after{
    content:"";
    position:absolute;
    inset:0;
    z-index:-1;
    pointer-events:none;
    background:linear-gradient(120deg, rgba(255,255,255,.16), transparent 28%, transparent 72%, rgba(255,255,255,.08));
    opacity:.45;
  }
  @keyframes ambient{
    from{ transform:translate3d(-1.2%, -1%, 0) rotate(-1deg); }
    to{ transform:translate3d(1.2%, 1%, 0) rotate(1deg); }
  }

  header{
    display:grid;
    grid-template-columns:minmax(210px, 1fr) auto;
    gap:14px;
    align-items:start;
    padding:18px 18px 12px;
  }
  .brand{
    display:flex;
    gap:12px;
    align-items:center;
    min-width:0;
  }
  .logo{
    width:48px;
    height:48px;
    border-radius:17px;
    display:grid;
    place-items:center;
    flex:0 0 auto;
    font-size:24px;
    background:
      radial-gradient(circle at 28% 20%, rgba(255,255,255,.36), transparent 34%),
      linear-gradient(145deg, color-mix(in srgb, var(--accent) 38%, rgba(255,255,255,.10)), rgba(255,255,255,.055));
    border:1px solid var(--line2);
    box-shadow:var(--shadow2), inset 0 1px 0 rgba(255,255,255,.20);
  }
  .title{ min-width:0; }
  .title h1{
    margin:0;
    font-size:clamp(20px, 3vw, 30px);
    line-height:1.05;
    letter-spacing:.3px;
    font-weight:900;
  }
  .title .sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    line-height:1.35;
  }

  .actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    flex-wrap:wrap;
  }
  .btnIcon, button, select{
    font:inherit;
  }
  button, select{
    border:1px solid var(--line);
    color:var(--text);
    background:rgba(0,0,0,.18);
    outline:none;
  }
  body[data-mode="light"] button,
  body[data-mode="light"] select{
    background:rgba(255,255,255,.62);
  }
  button{
    min-height:40px;
    border-radius:14px;
    padding:9px 12px;
    font-size:13px;
    cursor:pointer;
    user-select:none;
    transition:transform .10s ease, border-color .16s ease, background .16s ease, filter .16s ease;
  }
  button:hover{ border-color:color-mix(in srgb, var(--accent) 44%, var(--line)); }
  button:active{ transform:translateY(1px) scale(.985); }
  button:focus-visible, select:focus-visible, .tile:focus-visible{
    outline:3px solid color-mix(in srgb, var(--accent) 42%, transparent);
    outline-offset:2px;
  }
  .primary{
    background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 42%, rgba(255,255,255,.10)), color-mix(in srgb, var(--accent2) 17%, rgba(0,0,0,.18)));
    border-color:color-mix(in srgb, var(--accent) 58%, var(--line));
    font-weight:800;
    box-shadow:0 10px 22px color-mix(in srgb, var(--accent) 18%, transparent);
  }

  .toolbar{
    display:grid;
    grid-template-columns:repeat(6, minmax(118px, 1fr));
    gap:10px;
    padding:0 18px 14px;
  }
  .field{
    border-radius:18px;
    background:var(--panel);
    border:1px solid var(--line);
    padding:9px 10px;
    backdrop-filter:blur(16px);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  }
  label{
    display:block;
    color:var(--muted);
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:6px;
    user-select:none;
  }
  select{
    width:100%;
    height:34px;
    border-radius:12px;
    padding:0 9px;
    font-size:13px;
    cursor:pointer;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:10px;
    padding:0 18px 16px;
  }
  .stat{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    background:var(--panel);
    border:1px solid var(--line);
    padding:11px 12px;
    min-height:66px;
  }
  .stat::after{
    content:"";
    position:absolute;
    inset:auto -20px -34px auto;
    width:82px;
    height:82px;
    border-radius:50%;
    background:color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .stat span{
    display:block;
    color:var(--muted);
    font-size:12px;
  }
  .stat b{
    display:block;
    margin-top:5px;
    font-size:clamp(18px, 3.5vw, 26px);
    line-height:1;
    font-weight:900;
  }
  .stat small{
    color:var(--muted2);
    font-size:11px;
    margin-left:2px;
  }

  .boardWrap{ padding:0 18px 18px; }
  .boardPanel{
    border-radius:calc(var(--radius) + 2px);
    border:1px solid var(--line);
    background:
      radial-gradient(780px 420px at 18% 5%, var(--glow), transparent 68%),
      linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.10));
    padding:16px;
    position:relative;
    overflow:hidden;
    min-height:260px;
  }
  body[data-mode="light"] .boardPanel{
    background:
      radial-gradient(780px 420px at 18% 5%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 68%),
      linear-gradient(180deg, rgba(255,255,255,.50), rgba(255,255,255,.28));
  }
  .boardPanel::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:.35;
    background-image:
      linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
    background-size:34px 34px;
    mask-image:radial-gradient(circle at 50% 32%, #000 0 48%, transparent 78%);
  }
  .board{
    position:relative;
    z-index:1;
    display:grid;
    gap:var(--gap);
    justify-content:center;
    align-content:center;
    touch-action:manipulation;
    min-height:220px;
  }

  .tile{
    width:var(--tileSize);
    height:var(--tileSize);
    border:0;
    padding:0;
    border-radius:var(--tileRadius);
    perspective:900px;
    background:transparent !important;
    appearance:none;
  }
  .inner{
    width:100%;
    height:100%;
    position:relative;
    border-radius:inherit;
    transform-style:preserve-3d;
    transition:transform .32s cubic-bezier(.2,.82,.2,1), filter .18s ease;
  }
  .tile.revealed .inner,
  .tile.matched .inner{ transform:rotateY(180deg); }
  .face{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:inherit;
    backface-visibility:hidden;
    overflow:hidden;
    border:1px solid var(--tileStroke);
  }
  .front{
    background:
      radial-gradient(110% 110% at 28% 18%, rgba(255,255,255,.19), transparent 42%),
      linear-gradient(160deg, var(--tileFrontA), var(--tileFrontB));
    box-shadow:0 14px 30px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.16);
  }
  .front::before{
    content:"";
    position:absolute;
    inset:-40%;
    background:conic-gradient(from 140deg, transparent, color-mix(in srgb, var(--accent) 20%, transparent), transparent 28%);
    opacity:.65;
  }
  .front::after{
    content:"";
    position:absolute;
    inset:12%;
    border-radius:calc(var(--tileRadius) - 7px);
    border:1px solid color-mix(in srgb, var(--accent) 24%, rgba(255,255,255,.13));
    box-shadow:inset 0 0 20px rgba(255,255,255,.035);
  }
  .badge{
    position:relative;
    z-index:1;
    width:43%;
    height:43%;
    border-radius:35%;
    background:
      radial-gradient(circle at 32% 25%, rgba(255,255,255,.34), transparent 35%),
      linear-gradient(135deg, color-mix(in srgb, var(--accent) 36%, rgba(255,255,255,.12)), rgba(0,0,0,.06));
    border:1px solid rgba(255,255,255,.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.20), 0 10px 22px rgba(0,0,0,.14);
    transform:rotate(10deg);
  }
  .back{
    transform:rotateY(180deg);
    background:
      radial-gradient(110% 110% at 28% 18%, rgba(255,255,255,.19), transparent 42%),
      linear-gradient(160deg, var(--tileBackA), var(--tileBackB));
    box-shadow:0 14px 30px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.16);
  }
  .back::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:linear-gradient(135deg, rgba(255,255,255,.18), transparent 30%, transparent 68%, rgba(255,255,255,.06));
  }
  .symbol{
    position:relative;
    z-index:1;
    font-size:var(--emojiSize);
    line-height:1;
    user-select:none;
    filter:drop-shadow(0 8px 15px rgba(0,0,0,.26));
  }
  .symbol.poker{
    font-size:calc(var(--tileSize) * .36);
    font-weight:950;
    letter-spacing:-.08em;
    font-family:Georgia, "Times New Roman", serif;
  }
  .symbol.poker.red{ color:#ff5d75; }
  .symbol.poker.black{ color:var(--text); }
  .tile:not(.revealed):not(.matched):hover .inner{ transform:translateY(-2px); filter:brightness(1.05); }
  .tile:not(.revealed):not(.matched):active .inner{ transform:translateY(0) scale(.985); }
  .tile.matched .face{
    border-color:color-mix(in srgb, var(--success) 55%, var(--tileStroke));
    box-shadow:0 0 0 2px color-mix(in srgb, var(--success) 22%, transparent), 0 0 30px color-mix(in srgb, var(--success) 16%, transparent);
  }
  .tile.wrong .face{
    border-color:color-mix(in srgb, var(--danger) 50%, var(--tileStroke));
    animation:shake .26s ease both;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    30%{ transform:translateX(-3px); }
    65%{ transform:translateX(3px); }
  }

  .lock{
    position:absolute;
    inset:0;
    z-index:5;
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,.26);
    backdrop-filter:blur(4px);
  }
  .lock.show{ display:flex; }
  .lockBox{
    border-radius:18px;
    padding:14px 16px;
    color:rgba(255,255,255,.92);
    background:rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 18px 45px rgba(0,0,0,.26);
    font-size:14px;
    font-weight:800;
  }
  body[data-mode="light"] .lock{ background:rgba(255,255,255,.35); }
  body[data-mode="light"] .lockBox{ color:rgba(13,18,29,.88); background:rgba(255,255,255,.78); border-color:rgba(13,18,29,.10); }

  .footerNote{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:0 18px 18px;
    color:var(--muted);
    font-size:12px;
  }
  .progressShell{
    height:8px;
    flex:1;
    border-radius:999px;
    overflow:hidden;
    background:rgba(255,255,255,.10);
    border:1px solid var(--line);
  }
  body[data-mode="light"] .progressShell{ background:rgba(13,18,29,.06); }
  .progressBar{
    width:0%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    transition:width .28s ease;
  }

  .modal{
    position:fixed;
    inset:0;
    z-index:40;
    display:none;
    align-items:center;
    justify-content:center;
    padding:22px;
    background:rgba(0,0,0,.48);
    backdrop-filter:blur(8px);
  }
  .modal.show{ display:flex; }
  body[data-mode="light"] .modal{ background:rgba(13,18,29,.26); }
  .dialog{
    width:min(460px, 94vw);
    border-radius:24px;
    border:1px solid var(--line2);
    background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.07));
    box-shadow:0 24px 80px rgba(0,0,0,.38);
    overflow:hidden;
  }
  body[data-mode="light"] .dialog{ background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.82)); }
  .dialogHead{
    padding:18px 18px 8px;
    text-align:center;
  }
  .winIcon{
    width:76px;
    height:76px;
    margin:0 auto 10px;
    display:grid;
    place-items:center;
    position:relative;
  }
  .winIcon::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 42%, transparent), color-mix(in srgb, var(--accent2) 24%, transparent));
    border:1px solid var(--line2);
    animation:popIn .32s cubic-bezier(.2,.8,.2,1) both;
  }
  .winIcon::after{
    content:"✓";
    position:relative;
    font-size:40px;
    font-weight:950;
    color:var(--text);
    animation:tick .42s .08s cubic-bezier(.2,.9,.2,1) both;
  }
  .dialog h2{
    margin:0;
    font-size:26px;
    font-weight:950;
  }
  .dialog p{
    margin:8px 0 0;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
  }
  .resultGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:9px;
    padding:14px 18px 4px;
  }
  .resultGrid .mini{
    border-radius:16px;
    border:1px solid var(--line);
    background:var(--panel);
    padding:10px;
    text-align:center;
  }
  .mini span{ display:block; color:var(--muted); font-size:12px; }
  .mini b{ display:block; margin-top:4px; font-size:20px; font-weight:900; }
  .dialogBtns{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    padding:16px 18px 18px;
  }
  .confetti{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
  }
  .confetti i{
    position:absolute;
    width:8px;
    height:15px;
    border-radius:4px;
    opacity:0;
    animation:confetti 1.1s ease-in forwards;
  }
  @keyframes popIn{ from{ transform:scale(.72); opacity:0; } to{ transform:scale(1); opacity:1; } }
  @keyframes tick{ from{ transform:scale(.6); opacity:0; } to{ transform:scale(1); opacity:1; } }
  @keyframes confetti{
    0%{ opacity:0; transform:translateY(-40px) rotate(0deg); }
    14%{ opacity:1; }
    100%{ opacity:0; transform:translateY(620px) rotate(560deg); }
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:calc(18px + var(--safeBottom));
    transform:translateX(-50%) translateY(12px);
    z-index:80;
    opacity:0;
    pointer-events:none;
    padding:10px 14px;
    border-radius:999px;
    color:var(--text);
    background:rgba(0,0,0,.48);
    border:1px solid rgba(255,255,255,.16);
    backdrop-filter:blur(12px);
    box-shadow:0 14px 40px rgba(0,0,0,.24);
    font-size:13px;
    transition:opacity .2s ease, transform .2s ease;
  }
  body[data-mode="light"] .toast{ background:rgba(255,255,255,.82); border-color:rgba(13,18,29,.12); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:900px){
    header{ grid-template-columns:1fr; }
    .actions{ justify-content:flex-start; }
    .toolbar{ grid-template-columns:repeat(3, 1fr); }
    .stats{ grid-template-columns:repeat(3, 1fr); }
  }
  @media (max-width:620px){
    body{ padding:10px; align-items:flex-start; }
    .app{ border-radius:24px; }
    header{ padding:14px 14px 10px; gap:12px; }
    .brand{ align-items:flex-start; }
    .logo{ width:42px; height:42px; border-radius:15px; font-size:21px; }
    .title .sub{ font-size:12px; }
    .toolbar{ grid-template-columns:repeat(2, minmax(0, 1fr)); padding:0 14px 12px; gap:8px; }
    .field{ border-radius:16px; padding:8px; }
    select{ font-size:12px; }
    .actions button{ flex:1 1 auto; }
    .stats{ grid-template-columns:repeat(2, 1fr); padding:0 14px 12px; gap:8px; }

  }
  @media (prefers-reduced-motion:reduce){
    *, *::before, *::after{ animation:none !important; transition:none !important; scroll-behavior:auto !important; }
  }
</style>
</head>
<body data-card="soft" data-tone="ocean" data-mode="dark">
  <main class="app" aria-label="Memory Match 遊戲">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">🧩</div>
        <div class="title">
          <h1>Memory Match</h1>
          <div class="sub">翻開卡牌並找出相同配對。支援預覽模式、不同牌庫、亮暗色與最佳紀錄。</div>
        </div>
      </div>
      <div class="actions">
        <button id="startBtn" class="primary" type="button">開始遊戲</button>
        <button id="restartBtn" type="button">重新洗牌</button>
        <button id="peekBtn" type="button">提示 1 秒</button>
      </div>
    </header>

    <section class="toolbar" aria-label="遊戲設定">
      <div class="field">
        <label for="cardSel">牌面風格</label>
        <select id="cardSel">
          <option value="soft">柔和玻璃</option>
          <option value="neon">霓虹光暈</option>
          <option value="bold">鮮明厚卡</option>
        </select>
      </div>
      <div class="field">
        <label for="toneSel">畫面色調</label>
        <select id="toneSel">
          <option value="ocean">海洋藍</option>
          <option value="mint">薄荷綠</option>
          <option value="grape">葡萄紫</option>
          <option value="sunset">夕陽橘</option>
          <option value="mono">高級黑白</option>
        </select>
      </div>
      <div class="field">
        <label for="themeSel">顯示模式</label>
        <select id="themeSel">
          <option value="dark">暗色模式</option>
          <option value="light">亮色模式</option>
        </select>
      </div>
      <div class="field">
        <label for="deckSel">牌庫</label>
        <select id="deckSel">
          <option value="faces">表情</option>
          <option value="animals">動物</option>
          <option value="plants">花草水果</option>
          <option value="monsters">怪獸</option>
          <option value="poker">撲克牌</option>
        </select>
      </div>
      <div class="field">
        <label for="sizeSel">盤面大小</label>
        <select id="sizeSel">
          <option value="4">4 × 4｜輕鬆</option>
          <option value="6">6 × 6｜標準</option>
          <option value="8">8 × 8｜挑戰</option>
        </select>
      </div>
      <div class="field">
        <label for="modeSel">開局方式</label>
        <select id="modeSel">
          <option value="preview">全翻預覽 2 秒</option>
          <option value="direct">直接開始</option>
        </select>
      </div>
    </section>

    <section class="stats" aria-label="遊戲狀態">
      <div class="stat"><span>步數</span><b id="moves">0</b></div>
      <div class="stat"><span>已配對</span><b><span id="matched">0</span><small>/ <span id="pairs">0</span></small></b></div>
      <div class="stat"><span>時間</span><b><span id="time">0.0</span><small>s</small></b></div>
      <div class="stat"><span>最佳時間</span><b><span id="bestTime">--</span><small id="bestTimeUnit"></small></b></div>
      <div class="stat"><span>最佳步數</span><b id="bestMoves">--</b></div>
    </section>

    <section class="boardWrap">
      <div class="boardPanel">
        <div id="lock" class="lock"><div id="lockText" class="lockBox">預覽中…</div></div>
        <div id="board" class="board" aria-label="翻牌盤面"></div>
      </div>
    </section>

    <div class="footerNote">
      <div class="progressShell" aria-label="完成進度"><div id="progressBar" class="progressBar"></div></div>
      <div id="hintText">選好設定後按「開始遊戲」。</div>
    </div>
  </main>

  <div id="win" class="modal" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <div class="dialogHead">
        <div class="winIcon" aria-hidden="true"></div>
        <h2 id="winTitle">成功過關</h2>
        <p id="winMeta">完成所有配對。</p>
      </div>
      <div class="resultGrid">
        <div class="mini"><span>時間</span><b id="resultTime">0.0s</b></div>
        <div class="mini"><span>步數</span><b id="resultMoves">0</b></div>
        <div class="mini"><span>評價</span><b id="resultRank">S</b></div>
      </div>
      <div class="dialogBtns">
        <button id="winAgain" class="primary" type="button">再玩一次</button>
        <button id="winClose" type="button">關閉</button>
      </div>
      <div class="confetti" aria-hidden="true"></div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  "use strict";

  const LS_PREF = "memory_match_beautiful_prefs_v3";
  const LS_BEST = "memory_match_beautiful_records_v3";
  const $ = (id) => document.getElementById(id);

  const els = {
    cardSel: $("cardSel"), toneSel: $("toneSel"), themeSel: $("themeSel"), deckSel: $("deckSel"), sizeSel: $("sizeSel"), modeSel: $("modeSel"),
    startBtn: $("startBtn"), restartBtn: $("restartBtn"), peekBtn: $("peekBtn"), board: $("board"), lock: $("lock"), lockText: $("lockText"),
    moves: $("moves"), matched: $("matched"), pairs: $("pairs"), time: $("time"), bestTime: $("bestTime"), bestTimeUnit: $("bestTimeUnit"), bestMoves: $("bestMoves"),
    progressBar: $("progressBar"), hintText: $("hintText"), win: $("win"), winMeta: $("winMeta"), resultTime: $("resultTime"), resultMoves: $("resultMoves"), resultRank: $("resultRank"),
    winAgain: $("winAgain"), winClose: $("winClose"), toast: $("toast")
  };

  const DECKS = {
    faces: ["😀","😎","🥶","🤯","🥳","🥹","😂","😍","🤖","😈","👻","🤠","😺","🙃","😴","🤩","😇","😡","🤓","🤪","😜","😷","😱","😆","😋","😏","😬","😌","😔","😐","🤐","🤭","🥺","🫠","😤","😵‍💫","🤔","🫣","🫡","🤨","😅","🥲","😮‍💨","🤑","👽","💀","🤡","😹","😻","🙀","😿","😾","👾","🧠","🫨","🥴","😶‍🌫️","🥸","🫢","😭","😮","😲","😶","😑","😯"],
    animals: ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🐤","🐺","🦄","🐝","🐛","🦋","🐌","🐞","🐢","🐍","🦎","🦂","🦀","🐙","🐠","🐟","🐬","🦈","🐳","🦭","🦦","🦥","🦔","🐘","🦒","🦓","🦬","🐎","🐑","🐐","🦌","🐕","🐈","🦜","🦢","🦩","🦚","🦉","🦇","🐊","🦧","🦣","🦘","🦨","🦡","🦫","🦙","🦝"],
    plants: ["🌸","🌼","🌻","🌷","🌿","🍀","🍁","🍂","🍃","🌹","🥀","🌺","🌱","🌲","🌳","🌴","🌵","🎍","🌾","🌰","🍄","🪴","🪻","🎋","🪵","🍓","🍒","🍑","🍉","🍋","🍊","🍍","🥝","🥑","🥕","🌽","🫒","🍇","🍈","🥥","🫐","🍎","🍏","🍐","🍌","🥭","🍅","🥬","🥦","🧄","🧅"],
    monsters: ["👹","👺","👻","💀","☠️","👽","🤖","👾","🧟","🧛","🧌","🧙","🦹","🕷️","🦂","🦇","🦴","🔥","⚡","🌪️","🌚","🌝","🧿","🪬","🗿","🐲","🐉","🦖","🦕","🦑","🧠","🫥","😈","👿","🤡","🙀","😱","🫨"],
    poker: (() => {
      const suits = ["♠","♥","♦","♣"];
      const ranks = ["A","K","Q","J","10","9","8","7","6","5","4","3","2"];
      const out = [];
      suits.forEach((s) => ranks.forEach((r) => out.push(r + s)));
      return out;
    })()
  };

  const unique = (arr) => [...new Set(arr)];
  Object.keys(DECKS).forEach((key) => { DECKS[key] = unique(DECKS[key]); });

  let state = null;
  let toastTimer = null;

  function safeJsonParse(raw, fallback){
    try{ return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; }
  }

  function showToast(text){
    els.toast.textContent = text;
    els.toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1500);
  }

  function prefValues(){
    return {
      card: els.cardSel.value,
      tone: els.toneSel.value,
      theme: els.themeSel.value,
      deck: els.deckSel.value,
      size: els.sizeSel.value,
      mode: els.modeSel.value
    };
  }

  function savePrefs(){
    localStorage.setItem(LS_PREF, JSON.stringify(prefValues()));
  }

  function loadPrefs(){
    const p = safeJsonParse(localStorage.getItem(LS_PREF), null);
    if(!p || typeof p !== "object") return;
    ["card","tone","theme","deck","size","mode"].forEach((k) => {
      const el = els[k + "Sel"];
      if(el && p[k] && [...el.options].some((o) => o.value === p[k])) el.value = p[k];
    });
  }

  function applyAppearance(){
    document.body.dataset.card = els.cardSel.value;
    document.body.dataset.tone = els.toneSel.value;
    document.body.dataset.mode = els.themeSel.value;
    document.querySelector('meta[name="theme-color"]')?.setAttribute("content", els.themeSel.value === "dark" ? "#0b1220" : "#f5f7fb");
  }

  function bestKey(){
    return `${els.deckSel.value}_${els.sizeSel.value}_${els.modeSel.value}`;
  }

  function getRecords(){
    return safeJsonParse(localStorage.getItem(LS_BEST), {});
  }

  function setRecord(key, record){
    const records = getRecords();
    records[key] = record;
    localStorage.setItem(LS_BEST, JSON.stringify(records));
  }

  function updateBestDisplay(){
    const record = getRecords()[bestKey()];
    if(record){
      els.bestTime.textContent = Number(record.time).toFixed(1);
      els.bestTimeUnit.textContent = "s";
      els.bestMoves.textContent = String(record.moves);
    }else{
      els.bestTime.textContent = "--";
      els.bestTimeUnit.textContent = "";
      els.bestMoves.textContent = "--";
    }
  }

  function computeMetrics(size){
    const panel = els.board.parentElement;
    const root = document.documentElement;
    const width = Math.max(260, panel.clientWidth - 20);
    const height = Math.max(260, window.innerHeight - 355);
    const gap = size >= 8 ? 7 : size >= 6 ? 9 : 10;
    const maxByW = Math.floor((width - gap * (size - 1)) / size);
    const maxByH = Math.floor((height - gap * (size - 1)) / size);
    const raw = Math.min(maxByW, maxByH, 118);
    const tile = Math.max(size >= 8 ? 38 : 48, raw);
    root.style.setProperty("--gap", gap + "px");
    root.style.setProperty("--tileSize", tile + "px");
    root.style.setProperty("--tileRadius", Math.max(12, Math.round(tile * 0.24)) + "px");
    root.style.setProperty("--emojiSize", Math.round(tile * 0.58) + "px");
    els.board.style.gridTemplateColumns = `repeat(${size}, var(--tileSize))`;
  }

  function shuffled(arr){
    const a = arr.slice();
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildDeck(deckKey, pairs){
    const source = unique(DECKS[deckKey] || DECKS.faces);
    if(source.length < pairs){
      throw new Error(`牌庫數量不足，需要 ${pairs} 種，現在只有 ${source.length} 種。`);
    }
    const selected = shuffled(source).slice(0, pairs);
    return shuffled([...selected, ...selected]);
  }

  function isPokerRed(sym){ return sym.includes("♥") || sym.includes("♦"); }

  function resetRuntime(){
    if(state?.timer) clearInterval(state.timer);
    state = {
      size:Number(els.sizeSel.value),
      deckKey:els.deckSel.value,
      mode:els.modeSel.value,
      pairs:(Number(els.sizeSel.value) ** 2) / 2,
      cards:[],
      revealed:[],
      matchedCount:0,
      moves:0,
      startedAt:null,
      elapsed:0,
      timer:null,
      allowInput:false,
      peeking:false,
      completed:false
    };
  }

  function updateStats(){
    if(!state) return;
    els.moves.textContent = String(state.moves);
    els.matched.textContent = String(state.matchedCount);
    els.pairs.textContent = String(state.pairs);
    const pct = state.pairs ? (state.matchedCount / state.pairs) * 100 : 0;
    els.progressBar.style.width = pct.toFixed(2) + "%";
  }

  function setLock(locked, text){
    if(!state) return;
    state.allowInput = !locked;
    if(text){ els.lockText.textContent = text; }
    els.lock.classList.toggle("show", locked && !!text);
    els.board.style.pointerEvents = locked ? "none" : "auto";
  }

  function startTimer(){
    if(!state) return;
    clearInterval(state.timer);
    state.startedAt = performance.now();
    state.timer = setInterval(() => {
      state.elapsed = (performance.now() - state.startedAt) / 1000;
      els.time.textContent = state.elapsed.toFixed(1);
    }, 100);
  }

  function stopTimer(){
    if(state?.timer){
      clearInterval(state.timer);
      state.timer = null;
    }
    if(state?.startedAt){
      state.elapsed = (performance.now() - state.startedAt) / 1000;
      els.time.textContent = state.elapsed.toFixed(1);
    }
  }

  function renderBoard(){
    const size = state.size;
    computeMetrics(size);
    els.board.innerHTML = "";
    state.cards = buildDeck(state.deckKey, state.pairs);

    state.cards.forEach((sym, index) => {
      const tile = document.createElement("button");
      tile.type = "button";
      tile.className = "tile";
      tile.dataset.index = String(index);
      tile.dataset.deck = state.deckKey;
      tile.setAttribute("aria-label", "未翻開的卡牌");

      const inner = document.createElement("div");
      inner.className = "inner";

      const front = document.createElement("div");
      front.className = "face front";
      const badge = document.createElement("div");
      badge.className = "badge";
      front.appendChild(badge);

      const back = document.createElement("div");
      back.className = "face back";
      const symbol = document.createElement("div");
      symbol.className = "symbol" + (state.deckKey === "poker" ? " poker " + (isPokerRed(sym) ? "red" : "black") : "");
      symbol.textContent = sym;
      back.appendChild(symbol);

      inner.append(front, back);
      tile.appendChild(inner);
      els.board.appendChild(tile);
    });
  }

  function startGame(){
    savePrefs();
    applyAppearance();
    hideWin();
    resetRuntime();
    els.time.textContent = "0.0";
    els.hintText.textContent = "找出兩張相同卡牌即可配對。";

    try{
      renderBoard();
    }catch(err){
      showToast(err.message || "建立牌局失敗");
      return;
    }

    updateStats();
    updateBestDisplay();

    if(state.mode === "preview"){
      const tiles = [...els.board.querySelectorAll(".tile")];
      setLock(true, "預覽中…請記住牌的位置");
      tiles.forEach((tile) => tile.classList.add("revealed"));
      setTimeout(() => {
        tiles.forEach((tile) => tile.classList.remove("revealed"));
        setLock(false, "");
        startTimer();
        els.hintText.textContent = "遊戲開始。";
      }, 2000);
    }else{
      setLock(false, "");
      startTimer();
      els.hintText.textContent = "遊戲開始。";
    }
  }

  function restartGame(){ startGame(); }

  function revealTile(tile, index){
    tile.classList.add("revealed");
    tile.setAttribute("aria-label", "已翻開的卡牌");
    state.revealed.push(index);
  }

  function resolvePair(){
    const [a, b] = state.revealed;
    const ta = els.board.querySelector(`.tile[data-index="${a}"]`);
    const tb = els.board.querySelector(`.tile[data-index="${b}"]`);
    const matched = state.cards[a] === state.cards[b];

    state.moves += 1;
    updateStats();
    setLock(true, "");

    if(matched){
      setTimeout(() => {
        ta?.classList.add("matched");
        tb?.classList.add("matched");
        ta?.setAttribute("aria-label", "已配對的卡牌");
        tb?.setAttribute("aria-label", "已配對的卡牌");
        state.matchedCount += 1;
        state.revealed = [];
        updateStats();
        if(state.matchedCount === state.pairs){
          completeGame();
        }else{
          setLock(false, "");
        }
      }, 210);
    }else{
      ta?.classList.add("wrong");
      tb?.classList.add("wrong");
      setTimeout(() => {
        ta?.classList.remove("revealed", "wrong");
        tb?.classList.remove("revealed", "wrong");
        ta?.setAttribute("aria-label", "未翻開的卡牌");
        tb?.setAttribute("aria-label", "未翻開的卡牌");
        state.revealed = [];
        setLock(false, "");
      }, 560);
    }
  }

  function onBoardClick(e){
    if(!state || !state.allowInput || state.peeking || state.completed) return;
    const tile = e.target.closest(".tile");
    if(!tile || !els.board.contains(tile)) return;
    const index = Number(tile.dataset.index);
    if(Number.isNaN(index)) return;
    if(tile.classList.contains("matched") || tile.classList.contains("revealed")) return;
    if(state.revealed.length >= 2) return;
    revealTile(tile, index);
    if(state.revealed.length === 2) resolvePair();
  }

  function peek(){
    if(!state || state.completed) return;
    if(state.peeking) return;
    const hidden = [...els.board.querySelectorAll(".tile:not(.matched):not(.revealed)")];
    if(!hidden.length) return;
    state.peeking = true;
    const oldAllow = state.allowInput;
    setLock(true, "提示中…");
    hidden.forEach((tile) => tile.classList.add("revealed"));
    setTimeout(() => {
      hidden.forEach((tile) => tile.classList.remove("revealed"));
      state.peeking = false;
      setLock(!oldAllow, oldAllow ? "" : "請先開始遊戲");
    }, 1000);
  }

  function rankFor(size, moves, seconds){
    const minMoves = (size * size) / 2;
    const moveRatio = moves / minMoves;
    const timeRatio = seconds / (size * size * 1.35);
    const score = moveRatio * 0.68 + timeRatio * 0.32;
    if(score <= 1.35) return "S";
    if(score <= 1.75) return "A";
    if(score <= 2.25) return "B";
    return "C";
  }

  function completeGame(){
    state.completed = true;
    stopTimer();
    setLock(true, "");
    const key = bestKey();
    const current = { time: Number(state.elapsed.toFixed(1)), moves: state.moves, at: new Date().toISOString() };
    const old = getRecords()[key];
    let isNewRecord = false;
    if(!old || current.time < old.time || (current.time === old.time && current.moves < old.moves)){
      setRecord(key, current);
      isNewRecord = true;
    }
    updateBestDisplay();
    showWin(current, isNewRecord);
  }

  function burstConfetti(){
    const wrap = els.win.querySelector(".confetti");
    if(!wrap) return;
    wrap.innerHTML = "";
    const accent = getComputedStyle(document.body).getPropertyValue("--accent").trim() || "#7aa7ff";
    const accent2 = getComputedStyle(document.body).getPropertyValue("--accent2").trim() || "#9ee8ff";
    for(let i = 0; i < 34; i++){
      const p = document.createElement("i");
      p.style.left = (Math.random() * 100).toFixed(2) + "%";
      p.style.top = (-25 - Math.random() * 60).toFixed(0) + "px";
      p.style.animationDelay = (Math.random() * .16).toFixed(2) + "s";
      p.style.animationDuration = (.9 + Math.random() * .5).toFixed(2) + "s";
      p.style.background = Math.random() < .5 ? accent : (Math.random() < .75 ? accent2 : "rgba(255,255,255,.78)");
      wrap.appendChild(p);
    }
  }

  function showWin(record, isNewRecord){
    const rank = rankFor(state.size, record.moves, record.time);
    els.winMeta.textContent = isNewRecord ? "新紀錄！這局表現非常漂亮。" : "所有卡牌都已成功配對。";
    els.resultTime.textContent = record.time.toFixed(1) + "s";
    els.resultMoves.textContent = String(record.moves);
    els.resultRank.textContent = rank;
    els.win.classList.add("show");
    els.win.setAttribute("aria-hidden", "false");
    burstConfetti();
  }

  function hideWin(){
    els.win.classList.remove("show");
    els.win.setAttribute("aria-hidden", "true");
    const wrap = els.win.querySelector(".confetti");
    if(wrap) wrap.innerHTML = "";
  }

  function bindControls(){
    els.board.addEventListener("click", onBoardClick);
    els.startBtn.addEventListener("click", startGame);
    els.restartBtn.addEventListener("click", restartGame);
    els.peekBtn.addEventListener("click", peek);
    els.winAgain.addEventListener("click", () => { hideWin(); startGame(); });
    els.winClose.addEventListener("click", hideWin);
    els.win.addEventListener("click", (e) => { if(e.target === els.win) hideWin(); });

    [els.cardSel, els.toneSel, els.themeSel].forEach((el) => {
      el.addEventListener("change", () => { savePrefs(); applyAppearance(); });
    });
    [els.deckSel, els.sizeSel, els.modeSel].forEach((el) => {
      el.addEventListener("change", () => {
        savePrefs();
        updateBestDisplay();
        els.hintText.textContent = "設定已更新，按「開始遊戲」套用新牌局。";
      });
    });
    window.addEventListener("resize", () => {
      if(state) computeMetrics(state.size);
    }, { passive:true });
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape") hideWin();
    });
  }

  function init(){
    loadPrefs();
    applyAppearance();
    updateBestDisplay();
    resetRuntime();
    computeMetrics(Number(els.sizeSel.value));
    updateStats();
    bindControls();
  }

  init();
})();
</script>
</body>
</html>
