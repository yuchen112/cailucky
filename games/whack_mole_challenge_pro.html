<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>打地鼠挑戰 Pro</title>
<style>
:root{
  --vh:1vh;--bg:#f4efe6;--bg2:#fff8ea;--card:rgba(255,255,255,.78);--solid:#fffdf7;
  --text:#2c2118;--muted:#796956;--line:rgba(83,55,25,.14);--primary:#df842b;--primary2:#ffbd65;
  --danger:#d64545;--good:#2fa96c;--gold:#dca617;--hole:#58341e;--hole2:#1f120b;--shadow:0 18px 48px rgba(55,34,15,.18);
  --grid:3;
}
body.dark{
  --bg:#10131a;--bg2:#1e222d;--card:rgba(30,34,45,.82);--solid:#202532;--text:#fff3e6;
  --muted:#b6a998;--line:rgba(255,255,255,.11);--primary:#ff9c38;--primary2:#ffd17f;
  --danger:#ff6262;--good:#63d88d;--gold:#ffd75d;--hole:#21160f;--hole2:#050403;--shadow:0 18px 48px rgba(0,0,0,.42);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;min-height:100%;margin:0;overscroll-behavior:none;touch-action:manipulation}
body{
  min-height:calc(var(--vh)*100);display:flex;justify-content:center;align-items:stretch;padding:10px;
  background:radial-gradient(circle at 15% 7%,rgba(255,186,80,.35),transparent 28%),radial-gradient(circle at 92% 20%,rgba(84,190,120,.2),transparent 28%),linear-gradient(145deg,var(--bg),var(--bg2));
  color:var(--text);font-family:"Microsoft JhengHei","PingFang TC",system-ui,-apple-system,sans-serif;overflow:hidden;
}
button,select{font-family:inherit;color:inherit}
.app{
  width:min(100%,590px);height:calc(var(--vh)*100 - 20px);position:relative;overflow:hidden;display:flex;flex-direction:column;
  border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.18);backdrop-filter:blur(14px);box-shadow:var(--shadow);
}
body.dark .app{background:rgba(0,0,0,.16)}
.app::before{content:"";position:absolute;inset:-90px -80px auto;height:230px;background:radial-gradient(circle,rgba(255,188,90,.35),transparent 68%);pointer-events:none}
.app.fever{animation:feverAura .9s ease-in-out infinite alternate}
@keyframes feverAura{from{box-shadow:0 18px 48px rgba(255,162,45,.24)}to{box-shadow:0 18px 65px rgba(255,207,86,.56)}}
.app.dangerFlash::after,.app.goldFlash::after,.app.hitFlash::after{content:"";position:absolute;inset:0;z-index:20;pointer-events:none;animation:flash .24s ease forwards}
.app.dangerFlash::after{background:rgba(255,0,0,.2)}
.app.goldFlash::after{background:rgba(255,214,60,.23)}
.app.hitFlash::after{background:rgba(93,255,154,.12)}
@keyframes flash{to{opacity:0}}
.screen{position:relative;z-index:1;display:none;flex:1;min-height:0;padding:16px}
.screen.active{display:flex;flex-direction:column}
.menu{gap:12px;overflow:auto}
.brand{text-align:center;padding:8px 4px 0}
.badge{display:inline-flex;padding:7px 13px;border-radius:999px;font-size:12px;font-weight:1000;color:var(--primary);background:rgba(255,168,64,.13);border:1px solid rgba(255,168,64,.25);margin-bottom:10px}
h1{margin:0;font-size:clamp(32px,10vw,54px);line-height:1;letter-spacing:-1.6px}
.sub{max-width:430px;margin:11px auto 0;color:var(--muted);font-size:13px;line-height:1.55;font-weight:700}
.panel{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:13px;box-shadow:0 10px 26px rgba(0,0,0,.07)}
.title{margin:0 0 9px;display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:13px;font-weight:1000}
.modeGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.diffGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.settingGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.choice,.smallBtn,.bigBtn,.setting button,.setting select{
  border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.48);font-weight:1000;cursor:pointer;transition:.14s transform,.14s filter,.14s border-color,.14s background;
}
body.dark .choice,body.dark .smallBtn,body.dark .bigBtn.secondary,body.dark .setting button,body.dark .setting select{background:rgba(255,255,255,.07)}
.choice{min-height:63px;padding:10px 9px;text-align:left}
.choice:active,.bigBtn:active,.smallBtn:active{transform:scale(.97)}
.choice.active{border-color:var(--primary);background:linear-gradient(145deg,rgba(255,185,90,.36),rgba(255,255,255,.24));box-shadow:0 8px 22px rgba(223,132,43,.13)}
.choice .e{display:block;font-size:22px;margin-bottom:4px}
.choice .d{display:block;margin-top:3px;color:var(--muted);font-size:10.5px;line-height:1.32;font-weight:800}
.diffGrid .choice{min-height:50px;text-align:center;display:flex;align-items:center;justify-content:center;padding:7px 5px;font-size:12px}
.setting{border:1px solid var(--line);border-radius:17px;padding:9px;background:rgba(255,255,255,.32)}
body.dark .setting{background:rgba(255,255,255,.045)}
.setting label{display:block;margin-bottom:5px;color:var(--muted);font-size:11px;font-weight:1000}
.setting select,.setting button{width:100%;border:0;padding:9px 8px;border-radius:12px;outline:0}
.actions{display:grid;gap:9px;margin-top:auto}
.bigBtn{min-height:54px;padding:13px 14px;border:0;background:linear-gradient(145deg,var(--primary),var(--primary2));color:#2b1b0c;font-size:17px;box-shadow:0 12px 28px rgba(223,132,43,.27)}
.bigBtn.secondary{background:rgba(255,255,255,.42);color:var(--text);box-shadow:none;border:1px solid var(--line);font-size:14px}
.game{gap:8px;padding:9px}
.hud{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;flex-shrink:0}
.hudBox{min-width:0;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:7px 4px}
.hudBox.warn{animation:pulseRed .55s ease infinite alternate;border-color:rgba(255,80,80,.5)}
@keyframes pulseRed{to{transform:scale(1.04);background:rgba(255,80,80,.15)}}
.hudLab{font-size:10px;color:var(--muted);font-weight:1000;white-space:nowrap}
.hudVal{font-size:clamp(15px,4.7vw,23px);font-weight:1000;line-height:1.05;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;flex-shrink:0}
.smallBtn{min-height:40px;padding:8px 6px;background:var(--card);font-size:12.5px}
.smallBtn.danger{color:var(--danger)}
.status{min-height:30px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:12.5px;font-weight:1000;line-height:1.25;padding:0 7px;flex-shrink:0}
.boardWrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:2px}
.board{
  --s:min(100%,calc((var(--vh)*100 - 215px)*.98));width:var(--s);max-width:520px;aspect-ratio:1/1;
  display:grid;grid-template-columns:repeat(var(--grid),1fr);gap:clamp(7px,2.2vw,13px);padding:clamp(8px,2.4vw,14px);
  border-radius:25px;background:linear-gradient(145deg,rgba(255,255,255,.42),rgba(255,255,255,.12)),rgba(112,80,38,.11);border:1px solid var(--line);
}
.hole{
  position:relative;overflow:hidden;border:0;border-radius:28%;cursor:pointer;touch-action:manipulation;
  background:radial-gradient(ellipse at 50% 67%,var(--hole2) 0%,var(--hole) 56%,rgba(120,72,34,.88) 76%,rgba(255,255,255,.08) 100%);
  box-shadow:inset 0 9px 13px rgba(0,0,0,.42),0 8px 18px rgba(0,0,0,.12);
}
.hole::after{content:"";position:absolute;left:14%;right:14%;bottom:8%;height:18%;border-radius:50%;background:rgba(0,0,0,.2);filter:blur(2px);z-index:4}
.hole.shake{animation:holeShake .18s linear}
@keyframes holeShake{25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}
.mole{
  position:absolute;left:50%;bottom:-60%;width:78%;height:78%;display:flex;align-items:center;justify-content:center;
  transform:translateX(-50%) scale(.86);opacity:0;transition:bottom .12s ease,opacity .1s ease,transform .12s ease;
  font-size:clamp(31px,12vw,68px);filter:drop-shadow(0 10px 8px rgba(0,0,0,.28));z-index:3;
}
.mole.show{bottom:6%;opacity:1;transform:translateX(-50%) scale(1)}
.mole.hit{opacity:0;transform:translateX(-50%) translateY(6%) scale(.7) rotate(-8deg)}
.pop{position:absolute;left:50%;top:17%;transform:translate(-50%,0);z-index:8;pointer-events:none;font-weight:1000;color:var(--primary2);text-shadow:0 2px 8px rgba(0,0,0,.26);animation:pop .58s ease forwards;white-space:nowrap}
@keyframes pop{from{opacity:0;transform:translate(-50%,10px) scale(.85)}25%{opacity:1}to{opacity:0;transform:translate(-50%,-24px) scale(1.06)}}
.comboBanner{
  position:absolute;left:50%;top:96px;z-index:9;transform:translate(-50%,-10px) scale(.92);opacity:0;pointer-events:none;
  border-radius:999px;padding:8px 14px;background:rgba(28,18,8,.82);color:#fff5df;font-size:13px;font-weight:1000;box-shadow:0 10px 25px rgba(0,0,0,.22)
}
.comboBanner.show{animation:banner .75s ease forwards}
@keyframes banner{20%{opacity:1;transform:translate(-50%,0) scale(1.04)}80%{opacity:1}to{opacity:0;transform:translate(-50%,-12px) scale(.96)}}
.overlay{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.36);backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{width:min(100%,460px);max-height:calc(var(--vh)*90);overflow:auto;border-radius:24px;background:var(--solid);border:1px solid var(--line);box-shadow:var(--shadow);padding:17px;color:var(--text)}
.modal h2{font-size:24px;line-height:1.18;margin:0 0 8px}
.modal p{margin:8px 0;color:var(--muted);font-size:13.5px;line-height:1.55;font-weight:750}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
.stat{background:rgba(127,127,127,.07);border:1px solid var(--line);border-radius:16px;padding:10px;color:var(--muted);font-size:12px;font-weight:900}
.stat b{display:block;color:var(--text);font-size:20px;margin-top:4px}
.detailGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:10px 0}
.detail{border:1px solid var(--line);border-radius:14px;padding:8px;font-size:12px;font-weight:900;background:rgba(127,127,127,.055)}
.tipBox{border-radius:16px;padding:11px;margin-top:10px;background:rgba(255,180,80,.13);border:1px solid rgba(255,180,80,.25);font-size:13px;line-height:1.45;font-weight:900}
.modalActions{display:grid;gap:8px;margin-top:12px}
.leaders{display:grid;gap:7px;margin-top:8px}
.leader{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:15px;padding:9px;background:rgba(127,127,127,.07);font-size:12.5px;font-weight:1000}
.leader .meta{color:var(--muted);font-size:10.5px;margin-top:2px;font-weight:750}
.toast{position:absolute;left:50%;bottom:16px;z-index:50;transform:translateX(-50%) translateY(16px);opacity:0;pointer-events:none;max-width:calc(100% - 32px);border-radius:999px;background:rgba(30,22,16,.9);color:#fff4df;padding:9px 14px;font-size:12.5px;font-weight:1000;text-align:center;box-shadow:0 10px 28px rgba(0,0,0,.24);transition:.2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.good{color:var(--good)}.bad{color:var(--danger)}.gold{color:var(--gold)}
@media (max-width:430px){
  body{padding:7px}.app{height:calc(var(--vh)*100 - 14px);border-radius:22px}.screen{padding:11px}.game{padding:7px;gap:7px}
  .panel{padding:11px;border-radius:19px}.choice{min-height:58px;padding:9px 7px;font-size:13px}.choice .e{font-size:20px}.choice .d{font-size:10px}
  .diffGrid{gap:6px}.settingGrid{gap:7px}.setting{padding:8px}.hud{gap:5px}.hudBox{border-radius:14px;padding:6px 3px}.hudLab{font-size:9.5px}
  .smallBtn{min-height:38px;font-size:12px}.status{min-height:27px;font-size:12px}.modal{border-radius:21px;padding:14px}
}
@media (orientation:landscape) and (max-height:560px){
  body{padding:6px}.app{width:min(100%,900px);height:calc(var(--vh)*100 - 12px)}
  .game.active{display:grid;grid-template-columns:230px 1fr;grid-template-rows:auto auto 1fr;column-gap:8px}
  .hud{grid-column:1;grid-row:1;grid-template-columns:1fr 1fr}.controls{grid-column:1;grid-row:2;grid-template-columns:1fr}.status{grid-column:1;grid-row:3;align-items:flex-start;padding-top:8px}
  .boardWrap{grid-column:2;grid-row:1/4}.board{--s:min(100%,calc(var(--vh)*100 - 34px));max-width:560px}
  .comboBanner{top:14px}
  .menu{padding:10px}.brand{padding-top:0}.sub{display:none}.panel{padding:10px}.choice .d{display:none}.actions{grid-template-columns:1fr 1fr}
}
@media (max-height:710px) and (orientation:portrait){
  .brand{padding-top:0}h1{font-size:clamp(28px,8.6vw,42px)}.sub{font-size:12px;margin-top:7px}
  .panel{padding:10px}.choice{min-height:51px}.choice .d{display:none}.bigBtn{min-height:48px}.setting{padding:7px}
  .board{--s:min(100%,calc((var(--vh)*100 - 195px)*.99))}
}
</style>
</head>
<body>
<main class="app" id="app">
  <section class="screen menu active" id="menuScreen">
    <div class="brand">
      <div class="badge">Pro 版 · 節奏 / 狂熱 / 手感強化</div>
      <h1>打地鼠挑戰</h1>
      <p class="sub">每個模式都有獨立節奏與狂熱調整：限時衝分、生存保命、連擊爆發、炸彈判斷、金鼠追分、反應測速。</p>
    </div>
    <div class="panel">
      <p class="title">選擇模式 <span id="modeHint"></span></p>
      <div class="modeGrid" id="modeGrid"></div>
    </div>
    <div class="panel">
      <p class="title">選擇難度 <span id="diffHint"></span></p>
      <div class="diffGrid" id="diffGrid"></div>
    </div>
    <div class="panel">
      <p class="title">遊戲設定</p>
      <div class="settingGrid">
        <div class="setting"><label for="timeSelect">時間</label><select id="timeSelect"><option value="30">30 秒</option><option value="60" selected>60 秒</option><option value="90">90 秒</option></select></div>
        <div class="setting"><label for="themeSelect">主題</label><select id="themeSelect"><option value="light">亮色</option><option value="dark">深色</option></select></div>
        <div class="setting"><label>音效</label><button id="soundToggle" type="button">開啟</button></div>
        <div class="setting"><label>震動</label><button id="vibrateToggle" type="button">開啟</button></div>
      </div>
    </div>
    <div class="actions">
      <button class="bigBtn" id="startBtn" type="button">開始遊戲</button>
      <button class="bigBtn secondary" id="leaderBtn" type="button">查看排行榜</button>
    </div>
  </section>

  <section class="screen game" id="gameScreen">
    <div class="hud">
      <div class="hudBox"><div class="hudLab">分數</div><div class="hudVal" id="scoreText">0</div></div>
      <div class="hudBox" id="timeBox"><div class="hudLab">時間</div><div class="hudVal" id="timeText">60</div></div>
      <div class="hudBox"><div class="hudLab">連擊</div><div class="hudVal" id="comboText">0</div></div>
      <div class="hudBox"><div class="hudLab">生命</div><div class="hudVal" id="lifeText">∞</div></div>
      <div class="hudBox"><div class="hudLab">狂熱</div><div class="hudVal" id="feverText">-</div></div>
    </div>
    <div class="controls">
      <button class="smallBtn" id="pauseBtn" type="button">暫停</button>
      <button class="smallBtn" id="restartBtn" type="button">重新開始</button>
      <button class="smallBtn danger" id="menuBtn" type="button">主選單</button>
    </div>
    <div class="status" id="status">準備開始</div>
    <div class="boardWrap"><div class="board" id="board"></div></div>
    <div class="comboBanner" id="comboBanner">連擊！</div>
  </section>

  <div class="overlay" id="infoOverlay"><div class="modal">
    <h2 id="infoTitle">遊戲說明</h2><p id="infoText"></p>
    <div class="modalActions"><button class="bigBtn" id="confirmStartBtn" type="button">我知道了，開始</button><button class="bigBtn secondary" id="cancelInfoBtn" type="button">返回設定</button></div>
  </div></div>

  <div class="overlay" id="pauseOverlay"><div class="modal">
    <h2>已暫停</h2><p>目前進度已暫停。回到畫面後會重新計算節奏，避免切換視窗造成誤判。</p>
    <div class="modalActions"><button class="bigBtn" id="resumeBtn" type="button">繼續遊戲</button><button class="bigBtn secondary" id="pauseRestartBtn" type="button">重新開始</button><button class="bigBtn secondary" id="pauseMenuBtn" type="button">回主選單</button></div>
  </div></div>

  <div class="overlay" id="resultOverlay"><div class="modal">
    <h2 id="resultTitle">挑戰結束</h2><p id="resultDesc"></p>
    <div class="stats">
      <div class="stat">分數<b id="resultScore">0</b></div><div class="stat">評價<b id="resultRank">C</b></div>
      <div class="stat">最高連擊<b id="resultCombo">0</b></div><div class="stat">命中率<b id="resultAcc">0%</b></div>
    </div>
    <div class="detailGrid" id="resultDetails"></div>
    <div class="tipBox" id="resultTip"></div>
    <div class="modalActions"><button class="bigBtn" id="againBtn" type="button">再玩一次</button><button class="bigBtn secondary" id="resultMenuBtn" type="button">回主選單</button></div>
  </div></div>

  <div class="overlay" id="leaderOverlay"><div class="modal">
    <h2>排行榜</h2><p>依模式與難度分開保存，並列出歷史最佳表現。</p>
    <div class="leaders" id="leaders"></div>
    <div class="modalActions"><button class="bigBtn secondary" id="clearLeaderBtn" type="button">清除排行榜</button><button class="bigBtn" id="closeLeaderBtn" type="button">關閉</button></div>
  </div></div>

  <div class="toast" id="toast"></div>
</main>

<script>
const $=id=>document.getElementById(id);
const MODES={
  timed:{name:"限時挑戰",icon:"⏱️",desc:"尾段加速衝高分",help:"限時模式會在後段逐步加速，最後 10 秒進入衝刺節奏。狂熱時提高分數與金鼠機率，適合追高分。"},
  survival:{name:"生存模式",icon:"❤️",desc:"節奏穩定重保命",help:"生存模式不會過度暴衝，重點是避免漏打與炸彈。狂熱時提高愛心機率，並降低漏打壓力。"},
  combo:{name:"連擊挑戰",icon:"🔥",desc:"連擊越高越快",help:"連擊模式會依連擊數明顯加速。狂熱更容易觸發，分數倍率最高，但斷連擊損失也最大。"},
  bomb:{name:"炸彈迴避",icon:"💣",desc:"炸彈壓力持續提高",help:"炸彈迴避會維持高炸彈比例，後段會更考驗判斷。狂熱不會把炸彈消掉，只會提高正確命中的回報。"},
  golden:{name:"金鼠追擊",icon:"🟡",desc:"金鼠短暫高分",help:"金鼠追擊會提高金鼠出現率，但金鼠停留較短。狂熱時金鼠機率更高，適合爆發追分。"},
  reaction:{name:"反應測試",icon:"⚡",desc:"短停留測手速",help:"反應測試保持單一目標與短停留時間，重點是平均反應與命中率。狂熱時間較短，但會給更高反應分。"}
};
const DIFF={
  easy:{name:"簡單",grid:3,spawn:[650,900],stay:[1050,1350],bomb:.06,gold:.08,heart:.05,max:1,life:5,score:1},
  normal:{name:"普通",grid:3,spawn:[500,760],stay:[850,1100],bomb:.11,gold:.09,heart:.035,max:2,life:4,score:1.15},
  hard:{name:"困難",grid:4,spawn:[390,610],stay:[650,880],bomb:.16,gold:.11,heart:.025,max:2,life:3,score:1.35},
  hell:{name:"地獄",grid:4,spawn:[280,460],stay:[450,680],bomb:.22,gold:.13,heart:.018,max:3,life:3,score:1.65}
};
const TYPES={
  normal:{emoji:"🦫",score:10,label:"地鼠"},gold:{emoji:"🐹",score:50,label:"金鼠"},bomb:{emoji:"💣",score:-50,label:"炸彈"},
  heart:{emoji:"💖",score:20,label:"愛心"},rogue:{emoji:"🦝",score:30,label:"快鼠"}
};
const els={
  app:$("app"),menu:$("menuScreen"),game:$("gameScreen"),modeGrid:$("modeGrid"),diffGrid:$("diffGrid"),modeHint:$("modeHint"),diffHint:$("diffHint"),

  board:$("board"),score:$("scoreText"),time:$("timeText"),combo:$("comboText"),life:$("lifeText"),fever:$("feverText"),timeBox:$("timeBox"),status:$("status"),

  els.againBtn.onclick=start;els.resultMenuBtn.onclick=menu;
  els.leaderBtn.onclick=()=>{renderBoards();els.leader.classList.add("show")};els.closeLeaderBtn.onclick=()=>els.leader.classList.remove("show");
  els.clearLeaderBtn.onclick=()=>{localStorage.removeItem("wmProBoards");renderBoards();toast("排行榜已清除")};
  els.timeSelect.onchange=()=>{S.duration=+els.timeSelect.value;persist()};els.themeSelect.onchange=()=>setTheme(els.themeSelect.value);
  els.soundToggle.onclick=()=>{S.sound=!S.sound;els.soundToggle.textContent=S.sound?"開啟":"關閉";persist();toast(`音效已${S.sound?"開啟":"關閉"}`)};
  els.vibrateToggle.onclick=()=>{S.vibrate=!S.vibrate;els.vibrateToggle.textContent=S.vibrate?"開啟":"關閉";persist();toast(`震動已${S.vibrate?"開啟":"關閉"}`)};
  document.addEventListener("visibilitychange",()=>{if(document.hidden&&S.running&&!S.paused)pause()});
  window.addEventListener("resize",vh);window.addEventListener("orientationchange",()=>setTimeout(vh,130));
  document.addEventListener("gesturestart",e=>e.preventDefault());
  let lastTouch=0;document.addEventListener("touchend",e=>{let now=Date.now();if(now-lastTouch<300)e.preventDefault();lastTouch=now},{passive:false});
}
function init(){vh();els.timeSelect.value=String(S.duration);els.soundToggle.textContent=S.sound?"開啟":"關閉";els.vibrateToggle.textContent=S.vibrate?"開啟":"關閉";setTheme(S.theme);buildMenu();bind();updateHud()}
init();
</script>
</body>
</html>
