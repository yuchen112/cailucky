<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2048</title>
  <style>
    :root {
      --bg: #f3eee7;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: #ffffff;
      --text: #312b25;
      --muted: #7d7168;
      --board: #b9aa9e;
      --cell: rgba(238, 228, 218, 0.48);
      --button: #8f7a66;
      --button-text: #ffffff;
      --button-soft: rgba(143, 122, 102, 0.14);
      --shadow: rgba(49, 43, 37, 0.16);
      --accent: #f2b179;
      --danger: #e76f51;
      --success: #2a9d8f;
      --gap: 10px;
      --radius: 20px;
      --tile-text-dark: #776e65;
      --tile-text-light: #f9f6f2;
    }

    body[data-theme="dark"] {
      --bg: #10131a;
      --panel: rgba(29, 34, 45, 0.78);
      --panel-strong: #1d222d;
      --text: #f5f0e8;
      --muted: #a8b0bf;
      --board: #2a3140;
      --cell: rgba(255, 255, 255, 0.07);
      --button: #4d7cff;
      --button-soft: rgba(77, 124, 255, 0.16);
      --shadow: rgba(0, 0, 0, 0.36);
      --accent: #7cc7ff;
      --tile-text-dark: #eef2ff;
      --tile-text-light: #ffffff;
    }

    body[data-theme="candy"] {
      --bg: #fff1f8;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: #ffffff;
      --text: #402235;
      --muted: #9b6b87;
      --board: #f0b8d4;
      --cell: rgba(255, 255, 255, 0.5);
      --button: #d95f9f;
      --button-soft: rgba(217, 95, 159, 0.16);
      --shadow: rgba(120, 35, 88, 0.18);
      --accent: #ff9ecd;
      --danger: #ef476f;
      --success: #06d6a0;
    }

    body[data-theme="neon"] {
      --bg: #090914;
      --panel: rgba(15, 16, 34, 0.82);
      --panel-strong: #13142a;
      --text: #f7f7ff;
      --muted: #a7a6d6;
      --board: #1d2148;
      --cell: rgba(125, 249, 255, 0.08);
      --button: #8a5cff;
      --button-soft: rgba(138, 92, 255, 0.18);
      --shadow: rgba(0, 0, 0, 0.48);
      --accent: #7df9ff;
      --danger: #ff4d8d;
      --success: #45ffbc;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.55), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,.28), transparent 26%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      transition: background .25s ease, color .25s ease;
      overflow-x: hidden;
    }

    button, select {
      font: inherit;
    }

    .app {
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      min-width: 110px;
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 16px 34px var(--shadow);
      padding: 14px 16px;
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(34px, 10vw, 54px);
      line-height: .92;
      letter-spacing: -2px;
      font-weight: 950;
    }

    .brand span {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .score-wrap {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .score-card {
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 16px 34px var(--shadow);
      padding: 12px 10px;
      text-align: center;
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .score-card::after {
      content: "";
      position: absolute;
      inset: auto 12px 0 12px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      opacity: .55;
    }

    .score-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .score-value {
      margin-top: 4px;
      font-size: clamp(22px, 7vw, 34px);
      line-height: 1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .score-float {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      pointer-events: none;
      font-weight: 950;
      color: var(--success);
      opacity: 0;
      animation: scoreFloat .75s ease-out forwards;
      text-shadow: 0 8px 18px var(--shadow);
    }

    @keyframes scoreFloat {
      0% { opacity: 0; transform: translate(-50%, 10px) scale(.9); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -32px) scale(1.12); }
    }

    .mode-strip {
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 16px 34px var(--shadow);
      padding: 10px;
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .mode-info {
      min-width: 0;
    }

    .mode-title {
      font-size: 15px;
      font-weight: 950;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mode-desc {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .board-card {
      border-radius: 28px;
      padding: 12px;
      background: var(--panel);
      box-shadow: 0 20px 46px var(--shadow);
      backdrop-filter: blur(18px);
    }

    .board {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      background: var(--board);
      padding: var(--gap);
      position: relative;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    .cell-layer {
      position: absolute;
      inset: var(--gap);
      display: grid;
      gap: var(--gap);
      z-index: 1;
    }

    .cell {
      border-radius: 15px;
      background: var(--cell);
      box-shadow: inset 0 2px 8px rgba(255,255,255,.08);
    }

    .tile-layer {
      position: absolute;
      inset: var(--gap);
      z-index: 2;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 10px 24px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.2);
      transition: transform .13s ease, filter .16s ease;
      will-change: transform;
      color: var(--tile-text-light);
    }

    .tile.new {
      animation: tileNew .18s ease-out;
    }

    .tile.merged {
      animation: tileMerge .2s ease-out;
      z-index: 5;
    }

    @keyframes tileNew {
      0% { opacity: 0; transform: var(--tile-transform) scale(.25); }
      100% { opacity: 1; transform: var(--tile-transform) scale(1); }
    }

    @keyframes tileMerge {
      0% { transform: var(--tile-transform) scale(1); filter: brightness(1); }
      55% { transform: var(--tile-transform) scale(1.14); filter: brightness(1.08); }
      100% { transform: var(--tile-transform) scale(1); filter: brightness(1); }
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .btn {
      min-height: 46px;
      border: 0;
      border-radius: 18px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(0,0,0,.15);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
    }

    .btn:active {
      transform: translateY(1px) scale(.98);
    }

    .btn.secondary {
      background: var(--button-soft);
      color: var(--text);
      box-shadow: none;
    }

    .btn.danger {
      background: var(--danger);
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .stats-panel {
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 16px 34px var(--shadow);
      padding: 12px;
      backdrop-filter: blur(18px);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      border-radius: 16px;
      background: var(--button-soft);
      padding: 10px 8px;
      text-align: center;
    }

    .stat b {
      display: block;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .42);
      backdrop-filter: blur(12px);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(100%, 460px);
      max-height: min(92dvh, 760px);
      overflow: auto;
      border-radius: 28px;
      background: var(--panel-strong);
      color: var(--text);
      box-shadow: 0 28px 80px rgba(0,0,0,.36);
      padding: 18px;
      animation: modalIn .16s ease-out;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -.6px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 15px;
      background: var(--button-soft);
      color: var(--text);
      font-weight: 950;
      cursor: pointer;
    }

    .setting-list {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .5px;
    }

    .select, .toggle-row {
      width: 100%;
      min-height: 46px;
      border-radius: 16px;
      border: 0;
      outline: 0;
      background: var(--button-soft);
      color: var(--text);
      padding: 0 12px;
      font-weight: 900;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
    }

    .switch {
      width: 50px;
      height: 28px;
      border-radius: 999px;
      background: rgba(127,127,127,.34);
      position: relative;
      flex: 0 0 auto;
      transition: background .15s ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,.22);
      transition: transform .15s ease;
    }

    .toggle-row.on .switch {
      background: var(--success);
    }

    .toggle-row.on .switch::after {
      transform: translateX(22px);
    }

    .hint {
      margin: 0;
      border-radius: 16px;
      background: var(--button-soft);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.55;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .result-main {
      text-align: center;
      padding: 4px 4px 10px;
    }

    .result-main .big {
      font-size: clamp(42px, 14vw, 72px);
      font-weight: 950;
      line-height: 1;
      margin: 4px 0 8px;
    }

    .result-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
      line-height: 1.6;
    }

    .rank-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .rank-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 16px;
      background: var(--button-soft);
      font-size: 13px;
      font-weight: 850;
    }

    .rank-item .num {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--button);
      color: var(--button-text);
      font-weight: 950;
    }

    .rank-item small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-weight: 750;
    }

    .empty-rank {
      margin: 10px 0 0;
      color: var(--muted);
      text-align: center;
      font-weight: 850;
    }

    @media (max-width: 420px) {
      body { padding: 10px; align-items: flex-start; }
      .app { gap: 10px; }
      .topbar { gap: 8px; }
      .brand { min-width: 96px; padding: 12px; border-radius: 20px; }
      .score-wrap { gap: 8px; }
      .score-card { border-radius: 20px; padding: 11px 8px; }
      .controls { gap: 7px; }
      .btn { min-height: 44px; border-radius: 16px; font-size: 14px; }
      .board-card { padding: 10px; border-radius: 24px; }
      .board { border-radius: 20px; --gap: 8px; }
      .cell, .tile { border-radius: 12px; }
      .stats-grid { gap: 7px; }
      .stat { padding: 9px 6px; }
      .stat b { font-size: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .tile, .btn, .modal, body, .switch, .switch::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body data-theme="light">
  <main class="app" aria-label="2048 遊戲">
    <section class="topbar">
      <div class="brand">
        <h1>2048</h1>
        <span id="goalText">目標 2048</span>
      </div>
      <div class="score-wrap">
        <div class="score-card" id="scoreCard">
          <div class="score-label">分數</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-card">
          <div class="score-label">最高分</div>
          <div class="score-value" id="best">0</div>
        </div>
      </div>
    </section>

    <section class="mode-strip">
      <div class="mode-info">
        <div class="mode-title" id="modeTitle">經典模式 · 4x4</div>
        <div class="mode-desc" id="modeDesc">2 出現 90%，4 出現 10%</div>
      </div>
      <button class="btn secondary" id="openSettingsBtn" type="button">設定</button>
    </section>

    <section class="board-card">
      <div class="board" id="board" aria-label="遊戲棋盤">
        <div class="cell-layer" id="cellLayer"></div>
        <div class="tile-layer" id="tileLayer"></div>
      </div>
    </section>

    <section class="controls">
      <button class="btn" id="newGameBtn" type="button">新局</button>
      <button class="btn secondary" id="undoBtn" type="button">復原</button>
      <button class="btn secondary" id="rankBtn" type="button">紀錄</button>
      <button class="btn secondary" id="themeBtn" type="button">換色</button>
    </section>

    <section class="stats-panel">
      <div class="stats-grid">
        <div class="stat"><b id="maxTile">0</b><span>最大方塊</span></div>
        <div class="stat"><b id="moves">0</b><span>移動步數</span></div>
        <div class="stat"><b id="played">0</b><span>遊玩局數</span></div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="settingsModal" role="dialog" aria-modal="true" aria-label="遊戲設定">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">遊戲設定</div>
        <button class="icon-btn" id="closeSettingsBtn" type="button">×</button>
      </div>
      <div class="setting-list">
        <div class="field">
          <label for="sizeSelect">棋盤大小</label>
          <select class="select" id="sizeSelect">
            <option value="4">4x4 經典棋盤</option>
            <option value="5">5x5 輕鬆長局</option>
          </select>
        </div>
        <div class="field">
          <label for="modeSelect">遊戲模式</label>
          <select class="select" id="modeSelect">
            <option value="classic">經典模式：2 出現 90%，4 出現 10%</option>
            <option value="easy">輕鬆模式：2 出現 95%，4 出現 5%</option>
            <option value="challenge">挑戰模式：2 出現 70%，4 出現 30%</option>
          </select>
        </div>
        <div class="field">
          <label for="targetSelect">目標方塊</label>
          <select class="select" id="targetSelect">
            <option value="1024">1024</option>
            <option value="2048">2048</option>
            <option value="4096">4096</option>
            <option value="8192">8192</option>
            <option value="16384">16384</option>
            <option value="endless">無盡模式：直到無法移動才結算</option>
          </select>
        </div>
        <div class="field">
          <label for="themeSelect">主題</label>
          <select class="select" id="themeSelect">
            <option value="light">經典亮色</option>
            <option value="dark">深色模式</option>
            <option value="candy">糖果色</option>
            <option value="neon">霓虹夜色</option>
          </select>
        </div>
        <div class="toggle-row on" id="animationToggle" role="button" tabindex="0">
          <strong>方塊動畫</strong>
          <span class="switch"></span>
        </div>
        <div class="toggle-row" id="soundToggle" role="button" tabindex="0">
          <strong>音效</strong>
          <span class="switch"></span>
        </div>
        <p class="hint" id="settingsHint">經典模式適合標準遊玩；輕鬆模式更容易合成大數字；挑戰模式會提高 4 的出現率，棋盤更容易被卡住。</p>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="applyOnlyBtn" type="button">套用設定</button>
        <button class="btn" id="applyNewBtn" type="button">套用並新局</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="resultModal" role="dialog" aria-modal="true" aria-label="遊戲結果">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="resultTitle">遊戲結束</div>
        <button class="icon-btn" id="closeResultBtn" type="button">×</button>
      </div>
      <div class="result-main">
        <div class="big" id="resultBig">0</div>
        <p class="result-text" id="resultText">本局分數 0</p>
      </div>
      <div class="modal-actions" id="resultActions"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="rankModal" role="dialog" aria-modal="true" aria-label="成績紀錄">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">成績紀錄</div>
        <button class="icon-btn" id="closeRankBtn" type="button">×</button>
      </div>
      <div id="rankList" class="rank-list"></div>
      <div class="modal-actions">
        <button class="btn secondary" id="clearRankBtn" type="button">清除紀錄</button>
        <button class="btn" id="rankOkBtn" type="button">返回遊戲</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_SETTINGS = "game2048_settings_v1";
      const STORAGE_DATA = "game2048_data_v1";
      const THEMES = ["light", "dark", "candy", "neon"];
      const MODE_META = {
        classic: { name: "經典模式", p4: 0.10, desc: "2 出現 90%，4 出現 10%" },
        easy: { name: "輕鬆模式", p4: 0.05, desc: "2 出現 95%，4 出現 5%" },
        challenge: { name: "挑戰模式", p4: 0.30, desc: "2 出現 70%，4 出現 30%" }
      };
      const TILE_PALETTES = {
        light: {
          2: "#eee4da", 4: "#ede0c8", 8: "#f2b179", 16: "#f59563",
          32: "#f67c5f", 64: "#f65e3b", 128: "#edcf72", 256: "#edcc61",
          512: "#edc850", 1024: "#edc53f", 2048: "#edc22e", 4096: "#3c91e6",
          8192: "#9b5de5", 16384: "#00bbf9", 32768: "#00f5d4"
        },
        dark: {
          2: "#30405c", 4: "#3b4e72", 8: "#4d7cff", 16: "#5f6bff",
          32: "#825cff", 64: "#a855f7", 128: "#00a7c7", 256: "#00c2e8",
          512: "#2dd4bf", 1024: "#22c55e", 2048: "#eab308", 4096: "#f97316",
          8192: "#ef4444", 16384: "#ec4899", 32768: "#f0f9ff"
        },
        candy: {
          2: "#ffe4ef", 4: "#ffd6e8", 8: "#ff9ecd", 16: "#ff7ab8",
          32: "#ff5ca8", 64: "#ef476f", 128: "#ffd166", 256: "#f9c74f",
          512: "#90be6d", 1024: "#43aa8b", 2048: "#4d96ff", 4096: "#9b5de5",
          8192: "#ff006e", 16384: "#00bbf9", 32768: "#00f5d4"
        },
        neon: {
          2: "#172554", 4: "#312e81", 8: "#4c1d95", 16: "#7c3aed",
          32: "#c026d3", 64: "#e11d48", 128: "#f97316", 256: "#facc15",
          512: "#84cc16", 1024: "#22c55e", 2048: "#14b8a6", 4096: "#06b6d4",
          8192: "#38bdf8", 16384: "#a78bfa", 32768: "#f0f9ff"
        }
      };

      const TILE_TEXT_OPTIONS = {
        light: { dark: "#05050c", light: "#fffaf5" },
        dark: { dark: "#05050c", light: "#f8fbff" },
        candy: { dark: "#05050c", light: "#fff7fb" },
        neon: { dark: "#05050c", light: "#ffffff" }
      };

      const $ = (id) => document.getElementById(id);
      const els = {
        board: $("board"),
        cellLayer: $("cellLayer"),
        tileLayer: $("tileLayer"),
        score: $("score"),
        best: $("best"),
        scoreCard: $("scoreCard"),
        maxTile: $("maxTile"),
        moves: $("moves"),
        played: $("played"),
        goalText: $("goalText"),
        modeTitle: $("modeTitle"),
        modeDesc: $("modeDesc"),
        openSettingsBtn: $("openSettingsBtn"),
        closeSettingsBtn: $("closeSettingsBtn"),
        settingsModal: $("settingsModal"),
        resultModal: $("resultModal"),
        resultTitle: $("resultTitle"),
        resultBig: $("resultBig"),
        resultText: $("resultText"),
        resultActions: $("resultActions"),
        closeResultBtn: $("closeResultBtn"),
        rankModal: $("rankModal"),
        rankList: $("rankList"),
        closeRankBtn: $("closeRankBtn"),
        clearRankBtn: $("clearRankBtn"),
        rankOkBtn: $("rankOkBtn"),
        sizeSelect: $("sizeSelect"),
        modeSelect: $("modeSelect"),
        targetSelect: $("targetSelect"),
        themeSelect: $("themeSelect"),
        settingsHint: $("settingsHint"),
        animationToggle: $("animationToggle"),
        soundToggle: $("soundToggle"),
        applyOnlyBtn: $("applyOnlyBtn"),
        applyNewBtn: $("applyNewBtn"),
        newGameBtn: $("newGameBtn"),
        undoBtn: $("undoBtn"),
        rankBtn: $("rankBtn"),
        themeBtn: $("themeBtn")
      };

      let settings = loadSettings();
      let data = loadData();
      let board = [];
      let score = 0;
      let moves = 0;
      let nextTileId = 1;
      let history = null;
      let wonShown = false;
      let currentRecorded = false;
      let touchStart = null;

      function loadSettings() {
        const defaults = { size: 4, mode: "classic", target: 2048, theme: "light", animations: true, sound: false };
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_SETTINGS) || "{}");
          return normalizeSettings({ ...defaults, ...saved });
        } catch (err) {
          return defaults;
        }
      }

      function normalizeSettings(value) {
        const next = { ...value };
        next.size = [4, 5].includes(Number(next.size)) ? Number(next.size) : 4;
        next.mode = MODE_META[next.mode] ? next.mode : "classic";
        next.theme = THEMES.includes(next.theme) ? next.theme : "light";
        const allowedTargets = ["1024", "2048", "4096", "8192", "16384", "endless"];
        const rawTarget = String(next.target);
        next.target = rawTarget === "endless" ? "endless" : Number(allowedTargets.includes(rawTarget) ? rawTarget : 2048);
        next.animations = next.animations !== false;
        next.sound = next.sound === true;
        return next;
      }

      function loadData() {
        const defaults = { best: {}, records: [], played: 0 };
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_DATA) || "{}");
          return { ...defaults, ...saved, best: saved.best || {}, records: saved.records || [] };
        } catch (err) {
          return defaults;
        }
      }

      function saveSettings() {
        localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings));
      }

      function saveData() {
        localStorage.setItem(STORAGE_DATA, JSON.stringify(data));
      }

      function keyForCurrent() {
        return `${settings.mode}_${settings.size}_${settings.target}`;
      }

      function getBest() {
        return data.best[keyForCurrent()] || 0;
      }

      function setBest(value) {
        const key = keyForCurrent();
        if (value > (data.best[key] || 0)) {
          data.best[key] = value;
          saveData();
        }
      }

      function makeEmptyBoard() {
        return Array.from({ length: settings.size }, () => Array.from({ length: settings.size }, () => null));
      }

      function newTile(value, flags = {}) {
        return { id: nextTileId++, value, new: !!flags.new, merged: !!flags.merged };
      }

      function startNewGame(countPlayed = true) {
        if (!currentRecorded && score > 0) recordGame("中止");
        board = makeEmptyBoard();
        score = 0;
        moves = 0;
        history = null;
        wonShown = false;
        currentRecorded = false;
        nextTileId = 1;
        if (countPlayed) {
          data.played = (data.played || 0) + 1;
          saveData();
        }
        addRandomTile(true);
        addRandomTile(true);
        hideModal(els.resultModal);
        updateLayout();
        render();
      }

      function cloneBoardValues(src = board) {
        return src.map(row => row.map(tile => tile ? tile.value : 0));
      }

      function restoreBoardValues(values) {
        nextTileId = 1;
        board = values.map(row => row.map(value => value ? newTile(value) : null));
      }

      function serializeState() {
        return { values: cloneBoardValues(), score, moves, wonShown };
      }

      function restoreState(state) {
        restoreBoardValues(state.values);
        score = state.score;
        moves = state.moves;
        wonShown = state.wonShown;
        currentRecorded = false;
        render();
      }

      function emptyCells() {
        const cells = [];
        for (let r = 0; r < settings.size; r++) {
          for (let c = 0; c < settings.size; c++) {
            if (!board[r][c]) cells.push([r, c]);
          }
        }
        return cells;
      }

      function addRandomTile(markNew = true) {
        const cells = emptyCells();
        if (!cells.length) return false;
        const [r, c] = cells[Math.floor(Math.random() * cells.length)];
        const value = Math.random() < MODE_META[settings.mode].p4 ? 4 : 2;
        board[r][c] = newTile(value, { new: markNew });
        return true;
      }

      function processLine(line) {
        const compact = line.filter(Boolean);
        const out = [];
        let gained = 0;
        for (let i = 0; i < compact.length; i++) {
          const current = compact[i];
          const next = compact[i + 1];
          if (next && current.value === next.value) {
            const merged = newTile(current.value * 2, { merged: true });
            out.push(merged);
            gained += merged.value;
            i++;
          } else {
            current.new = false;
            current.merged = false;
            out.push(current);
          }
        }
        while (out.length < settings.size) out.push(null);
        return { line: out, gained };
      }

      function canMove() {
        if (emptyCells().length) return true;
        const n = settings.size;
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            const value = board[r][c]?.value;
            if (r + 1 < n && board[r + 1][c]?.value === value) return true;
            if (c + 1 < n && board[r][c + 1]?.value === value) return true;
          }
        }
        return false;
      }

      function boardsEqualValues(a, b) {
        for (let r = 0; r < settings.size; r++) {
          for (let c = 0; c < settings.size; c++) {
            const av = a[r][c] ? a[r][c].value : 0;
            const bv = b[r][c] ? b[r][c].value : 0;
            if (av !== bv) return false;
          }
        }
        return true;
      }

      function move(direction) {
        if (!direction) return;
        const beforeBoard = board.map(row => row.slice());
        const beforeState = serializeState();
        const n = settings.size;
        let gainedTotal = 0;
        const next = makeEmptyBoard();

        if (direction === "left" || direction === "right") {
          for (let r = 0; r < n; r++) {
            const raw = direction === "left" ? board[r].slice() : board[r].slice().reverse();
            const { line, gained } = processLine(raw);
            gainedTotal += gained;
            const finalLine = direction === "left" ? line : line.reverse();
            for (let c = 0; c < n; c++) next[r][c] = finalLine[c];
          }
        } else {
          for (let c = 0; c < n; c++) {
            const raw = [];
            if (direction === "up") {
              for (let r = 0; r < n; r++) raw.push(board[r][c]);
            } else {
              for (let r = n - 1; r >= 0; r--) raw.push(board[r][c]);
            }
            const { line, gained } = processLine(raw);
            gainedTotal += gained;
            if (direction === "up") {
              for (let r = 0; r < n; r++) next[r][c] = line[r];
            } else {
              for (let r = n - 1, i = 0; r >= 0; r--, i++) next[r][c] = line[i];
            }
          }
        }

        if (boardsEqualValues(beforeBoard, next)) return;
        board = next;
        history = beforeState;
        moves += 1;
        score += gainedTotal;
        setBest(score);
        if (gainedTotal > 0) showScoreFloat(gainedTotal);
        playSound(gainedTotal > 0 ? 740 : 420, gainedTotal > 0 ? 0.045 : 0.025);
        addRandomTile(true);
        render();

        const max = getMaxTile();
        if (!wonShown && settings.target !== "endless" && max >= Number(settings.target)) {
          wonShown = true;
          recordGame("達成");
          showResult("win");
          return;
        }

        if (!canMove()) {
          recordGame("結束");
          showResult("lose");
        }
      }

      function undo() {
        if (!history) return;
        restoreState(history);
        history = null;
        playSound(320, 0.035);
      }

      function getMaxTile() {
        let max = 0;
        for (const row of board) {
          for (const tile of row) if (tile && tile.value > max) max = tile.value;
        }
        return max;
      }

      function showScoreFloat(gained) {
        const el = document.createElement("div");
        el.className = "score-float";
        el.textContent = `+${gained}`;
        els.scoreCard.appendChild(el);
        setTimeout(() => el.remove(), 800);
      }

      function updateLayout() {
        const n = settings.size;
        els.cellLayer.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
        els.cellLayer.innerHTML = "";
        for (let i = 0; i < n * n; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          els.cellLayer.appendChild(cell);
        }
      }

      function tileStyle(value) {
        const palette = TILE_PALETTES[settings.theme] || TILE_PALETTES.light;
        const bg = palette[value] || fallbackTileColor(value);
        const text = readableTileText(bg);
        return { bg, color: text.color, shadow: text.shadow };
      }

      function fallbackTileColor(value) {
        const hue = Math.round((Math.log2(value) * 37) % 360);
        if (settings.theme === "candy") return `hsl(${hue}, 92%, 66%)`;
        if (settings.theme === "neon") return `hsl(${hue}, 100%, 52%)`;
        if (settings.theme === "dark") return `hsl(${hue}, 78%, 42%)`;
        return `hsl(${hue}, 78%, 48%)`;
      }

      function readableTileText(bg) {
        const options = TILE_TEXT_OPTIONS[settings.theme] || TILE_TEXT_OPTIONS.light;
        const bgRgb = colorToRgb(bg);
        const darkRgb = colorToRgb(options.dark);
        const lightRgb = colorToRgb(options.light);
        if (!bgRgb || !darkRgb || !lightRgb) {
          return { color: options.light, shadow: "0 2px 8px rgba(0,0,0,.34)" };
        }
        const darkRatio = contrastRatio(bgRgb, darkRgb);
        const lightRatio = contrastRatio(bgRgb, lightRgb);
        if (darkRatio >= lightRatio) {
          return { color: options.dark, shadow: "0 1px 0 rgba(255,255,255,.28)" };
        }
        return { color: options.light, shadow: "0 2px 8px rgba(0,0,0,.42)" };
      }

      function colorToRgb(color) {
        if (!color) return null;
        const hex = color.trim().match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
        if (hex) {
          let raw = hex[1];
          if (raw.length === 3) raw = raw.split("").map(ch => ch + ch).join("");
          return {
            r: parseInt(raw.slice(0, 2), 16),
            g: parseInt(raw.slice(2, 4), 16),
            b: parseInt(raw.slice(4, 6), 16)
          };
        }
        const hsl = color.trim().match(/^hsl\(([-\d.]+),\s*([\d.]+)%,\s*([\d.]+)%\)$/i);
        if (hsl) return hslToRgb(Number(hsl[1]), Number(hsl[2]) / 100, Number(hsl[3]) / 100);
        return null;
      }

      function hslToRgb(h, s, l) {
        const hue = ((h % 360) + 360) % 360 / 360;
        if (s === 0) {
          const v = Math.round(l * 255);
          return { r: v, g: v, b: v };
        }
        const q = l < 0.5 ? l * (1 + s) : l + s - l * s;
        const p = 2 * l - q;
        const channel = (t) => {
          let x = t;
          if (x < 0) x += 1;
          if (x > 1) x -= 1;
          if (x < 1 / 6) return p + (q - p) * 6 * x;
          if (x < 1 / 2) return q;
          if (x < 2 / 3) return p + (q - p) * (2 / 3 - x) * 6;
          return p;
        };
        return {
          r: Math.round(channel(hue + 1 / 3) * 255),
          g: Math.round(channel(hue) * 255),
          b: Math.round(channel(hue - 1 / 3) * 255)
        };
      }

      function relativeLuminance(rgb) {
        const convert = (value) => {
          const v = value / 255;
          return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
        };
        return 0.2126 * convert(rgb.r) + 0.7152 * convert(rgb.g) + 0.0722 * convert(rgb.b);
      }

      function contrastRatio(a, b) {
        const l1 = relativeLuminance(a);
        const l2 = relativeLuminance(b);
        const bright = Math.max(l1, l2);
        const dark = Math.min(l1, l2);
        return (bright + 0.05) / (dark + 0.05);
      }

      function fitFont(value, cellSize) {
        const digits = String(value).length;
        const base = cellSize * (digits <= 2 ? 0.44 : digits <= 3 ? 0.38 : digits <= 4 ? 0.31 : 0.25);
        return Math.max(16, Math.min(base, 44));
      }

      function render() {
        els.score.textContent = score.toLocaleString("zh-TW");
        els.best.textContent = getBest().toLocaleString("zh-TW");
        els.maxTile.textContent = getMaxTile().toLocaleString("zh-TW");
        els.moves.textContent = moves.toLocaleString("zh-TW");
        els.played.textContent = (data.played || 0).toLocaleString("zh-TW");
        els.goalText.textContent = formatTargetLabel(settings.target);
        els.modeTitle.textContent = `${MODE_META[settings.mode].name} · ${settings.size}x${settings.size} · ${settings.target === "endless" ? "無盡" : settings.target}`;
        els.modeDesc.textContent = `${MODE_META[settings.mode].desc} · ${settings.target === "endless" ? "直到無法移動才結算" : "達成目標可繼續挑戰"}`;
        els.undoBtn.disabled = !history;

        const boardRect = els.board.getBoundingClientRect();
        const gap = parseFloat(getComputedStyle(els.board).getPropertyValue("--gap")) || 10;
        const n = settings.size;
        const layerSize = boardRect.width - gap * 2;
        const cellSize = (layerSize - gap * (n - 1)) / n;
        els.tileLayer.innerHTML = "";

        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            const tile = board[r][c];
            if (!tile) continue;
            const div = document.createElement("div");
            const x = c * (cellSize + gap);
            const y = r * (cellSize + gap);
            const transform = `translate(${x}px, ${y}px)`;
            const style = tileStyle(tile.value);
            div.className = `tile${tile.new && settings.animations ? " new" : ""}${tile.merged && settings.animations ? " merged" : ""}`;
            div.textContent = tile.value;
            div.style.width = `${cellSize}px`;
            div.style.height = `${cellSize}px`;
            div.style.transform = transform;
            div.style.setProperty("--tile-transform", transform);
            div.style.background = style.bg;
            div.style.color = style.color;
            div.style.textShadow = style.shadow;
            div.style.fontSize = `${fitFont(tile.value, cellSize)}px`;
            els.tileLayer.appendChild(div);
            tile.new = false;
            tile.merged = false;
          }
        }
      }

      function formatTargetLabel(target) {
        return target === "endless" ? "無盡模式" : `目標 ${target}`;
      }

      function recordGame(status) {
        if (currentRecorded || score <= 0) return;
        currentRecorded = true;
        const item = {
          date: new Date().toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }),
          score,
          maxTile: getMaxTile(),
          moves,
          size: settings.size,
          mode: settings.mode,
          target: settings.target,
          status
        };
        data.records = [item, ...(data.records || [])]
          .sort((a, b) => b.score - a.score)
          .slice(0, 10);
        saveData();
      }

      function showResult(type) {
        const max = getMaxTile();
        const isWin = type === "win";
        els.resultTitle.textContent = isWin ? `達成 ${settings.target}` : "遊戲結束";
        els.resultBig.textContent = max.toLocaleString("zh-TW");
        els.resultText.innerHTML = `本局分數：<b>${score.toLocaleString("zh-TW")}</b><br>最高分：<b>${getBest().toLocaleString("zh-TW")}</b><br>移動步數：<b>${moves.toLocaleString("zh-TW")}</b>`;
        els.resultActions.innerHTML = "";

        if (isWin) {
          const continueBtn = document.createElement("button");
          continueBtn.className = "btn secondary";
          continueBtn.type = "button";
          continueBtn.textContent = "繼續挑戰";
          continueBtn.addEventListener("click", () => hideModal(els.resultModal));
          els.resultActions.appendChild(continueBtn);
        } else {
          const rankBtn = document.createElement("button");
          rankBtn.className = "btn secondary";
          rankBtn.type = "button";
          rankBtn.textContent = "查看紀錄";
          rankBtn.addEventListener("click", () => { hideModal(els.resultModal); openRank(); });
          els.resultActions.appendChild(rankBtn);
        }

        const nextBtn = document.createElement("button");
        nextBtn.className = "btn";
        nextBtn.type = "button";
        nextBtn.textContent = isWin ? "重新開始" : "再玩一局";
        nextBtn.addEventListener("click", () => startNewGame(true));
        els.resultActions.appendChild(nextBtn);
        showModal(els.resultModal);
      }

      function renderRank() {
        const records = data.records || [];
        els.rankList.innerHTML = "";
        if (!records.length) {
          const empty = document.createElement("p");
          empty.className = "empty-rank";
          empty.textContent = "目前還沒有成績紀錄";
          els.rankList.appendChild(empty);
          return;
        }
        records.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = "rank-item";
          const targetText = item.target === "endless" ? "無盡" : `目標 ${item.target || 2048}`;
          div.innerHTML = `
            <span class="num">${index + 1}</span>
            <span>${item.score.toLocaleString("zh-TW")} 分<small>${MODE_META[item.mode]?.name || item.mode} · ${item.size}x${item.size} · ${targetText} · 最大 ${item.maxTile} · ${item.status}</small></span>
            <span>${item.date}</span>
          `;
          els.rankList.appendChild(div);
        });
      }

      function openRank() {
        renderRank();
        showModal(els.rankModal);
      }

      function showModal(modal) {
        modal.classList.add("show");
      }

      function hideModal(modal) {
        modal.classList.remove("show");
      }

      function fillSettingsForm() {
        els.sizeSelect.value = String(settings.size);
        els.modeSelect.value = settings.mode;
        els.targetSelect.value = String(settings.target);
        els.themeSelect.value = settings.theme;
        setToggle(els.animationToggle, settings.animations);
        setToggle(els.soundToggle, settings.sound);
        updateSettingsHint();
      }

      function readSettingsForm() {
        settings.size = Number(els.sizeSelect.value);
        settings.mode = els.modeSelect.value;
        settings.target = els.targetSelect.value === "endless" ? "endless" : Number(els.targetSelect.value);
        settings.theme = els.themeSelect.value;
        settings.animations = els.animationToggle.classList.contains("on");
        settings.sound = els.soundToggle.classList.contains("on");
        applyTheme();
        saveSettings();
      }

      function updateSettingsHint() {
        const meta = MODE_META[els.modeSelect.value];
        const targetNote = els.targetSelect.value === "endless"
          ? "無盡模式不會在 2048、4096 或更高數字跳出勝利視窗，會一路玩到無法移動才結算。"
          : `目標方塊為 ${els.targetSelect.value}，達成後可選擇繼續挑戰。`;
        els.settingsHint.textContent = `${meta.name}：${meta.desc}。${els.modeSelect.value === "challenge" ? "4 的比例較高，合併壓力更大。" : els.modeSelect.value === "easy" ? "2 的比例較高，比較容易整理棋盤。" : "標準規則，適合一般挑戰。"}${targetNote}`;
      }

      function setToggle(el, value) {
        el.classList.toggle("on", !!value);
      }

      function toggleElement(el) {
        el.classList.toggle("on");
      }

      function applyTheme() {
        document.body.dataset.theme = settings.theme;
      }

      function cycleTheme() {
        const index = THEMES.indexOf(settings.theme);
        settings.theme = THEMES[(index + 1) % THEMES.length];
        applyTheme();
        fillSettingsForm();
        saveSettings();
      }

      function playSound(freq = 440, duration = 0.035) {
        if (!settings.sound) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.045, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + duration);
          setTimeout(() => ctx.close(), 120);
        } catch (err) {}
      }

      function directionFromKey(event) {
        const key = event.key.toLowerCase();
        if (key === "arrowleft" || key === "a") return "left";
        if (key === "arrowright" || key === "d") return "right";
        if (key === "arrowup" || key === "w") return "up";
        if (key === "arrowdown" || key === "s") return "down";
        return null;
      }

      function handleTouchStart(event) {
        const t = event.changedTouches[0];
        touchStart = { x: t.clientX, y: t.clientY, time: Date.now() };
      }

      function handleTouchEnd(event) {
        if (!touchStart) return;
        const t = event.changedTouches[0];
        const dx = t.clientX - touchStart.x;
        const dy = t.clientY - touchStart.y;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        touchStart = null;
        const threshold = 28;
        if (Math.max(absX, absY) < threshold) return;
        if (absX > absY * 1.15) move(dx > 0 ? "right" : "left");
        else if (absY > absX * 1.15) move(dy > 0 ? "down" : "up");
      }

      function bindEvents() {
        window.addEventListener("keydown", (event) => {
          const dir = directionFromKey(event);
          if (!dir) return;
          event.preventDefault();
          if (els.settingsModal.classList.contains("show") || els.rankModal.classList.contains("show")) return;
          move(dir);
        }, { passive: false });

        els.board.addEventListener("touchstart", handleTouchStart, { passive: true });
        els.board.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });
        els.board.addEventListener("touchend", handleTouchEnd, { passive: true });

        els.newGameBtn.addEventListener("click", () => startNewGame(true));
        els.undoBtn.addEventListener("click", undo);
        els.rankBtn.addEventListener("click", openRank);
        els.themeBtn.addEventListener("click", cycleTheme);

        els.openSettingsBtn.addEventListener("click", () => { fillSettingsForm(); showModal(els.settingsModal); });
        els.closeSettingsBtn.addEventListener("click", () => hideModal(els.settingsModal));
        els.closeResultBtn.addEventListener("click", () => hideModal(els.resultModal));
        els.closeRankBtn.addEventListener("click", () => hideModal(els.rankModal));
        els.rankOkBtn.addEventListener("click", () => hideModal(els.rankModal));
        els.clearRankBtn.addEventListener("click", () => {
          data.records = [];
          saveData();
          renderRank();
        });

        els.modeSelect.addEventListener("change", updateSettingsHint);
        els.targetSelect.addEventListener("change", updateSettingsHint);
        els.animationToggle.addEventListener("click", () => toggleElement(els.animationToggle));
        els.soundToggle.addEventListener("click", () => toggleElement(els.soundToggle));
        els.animationToggle.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") toggleElement(els.animationToggle); });
        els.soundToggle.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") toggleElement(els.soundToggle); });

        els.applyOnlyBtn.addEventListener("click", () => {
          const oldSize = settings.size;
          readSettingsForm();
          if (oldSize !== settings.size) startNewGame(true);
          else render();
          hideModal(els.settingsModal);
        });

        els.applyNewBtn.addEventListener("click", () => {
          readSettingsForm();
          startNewGame(true);
          hideModal(els.settingsModal);
        });

        for (const modal of [els.settingsModal, els.resultModal, els.rankModal]) {
          modal.addEventListener("click", (event) => {
            if (event.target === modal) hideModal(modal);
          });
        }

        window.addEventListener("resize", () => render());
      }

      function init() {
        applyTheme();
        fillSettingsForm();
        bindEvents();
        startNewGame(true);
        showModal(els.settingsModal);
      }

      init();
    })();
  </script>
</body>
</html>
