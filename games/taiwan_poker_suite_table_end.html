<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>台式撲克合集</title>
<style>
:root{
  --bg:#08110f;
  --bg2:#10241f;
  --panel:rgba(255,255,255,.09);
  --panel2:rgba(255,255,255,.13);
  --line:rgba(255,255,255,.16);
  --text:#f5fff9;
  --muted:rgba(245,255,249,.68);
  --accent:#ffd46b;
  --accent2:#46e7b8;
  --danger:#ff6a7a;
  --ok:#78f09b;
  --shadow:0 18px 50px rgba(0,0,0,.38);
  --radius:22px;
  --cardW:clamp(42px, 12.2vw, 78px);
  --cardH:calc(var(--cardW) * 1.38);
  --smallCardW:clamp(26px, 7.4vw, 48px);
  --smallCardH:calc(var(--smallCardW) * 1.38);
  --safeBottom:env(safe-area-inset-bottom, 0px);
}
:root.light{
  --bg:#f2f4ef;
  --bg2:#e0eadf;
  --panel:rgba(255,255,255,.76);
  --panel2:rgba(255,255,255,.96);
  --line:rgba(17,28,24,.14);
  --text:#102018;
  --muted:rgba(16,32,24,.62);
  --accent:#9b6a00;
  --accent2:#0d8c68;
  --danger:#c93f52;
  --ok:#13894a;
  --shadow:0 18px 40px rgba(16,32,24,.14);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at top,#183b33 0%,var(--bg) 58%,#030504 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;touch-action:manipulation}
body.light{background:radial-gradient(circle at top,#f7fff6 0%,var(--bg2) 55%,#d4ded2 100%)}
button,input,select{font-family:inherit;color:inherit}
button{border:0;cursor:pointer}
#app{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.topbar{height:clamp(54px,8vh,72px);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(8px + env(safe-area-inset-top,0px)) clamp(10px,3vw,24px) 8px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(0,0,0,.24),rgba(0,0,0,.02));backdrop-filter:blur(18px);z-index:10}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.logo{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#1dd9a0,#f4c55b);box-shadow:0 10px 30px rgba(0,0,0,.28);font-size:22px;color:#08110f;flex:0 0 auto}
.brand h1{margin:0;font-size:clamp(17px,4vw,24px);letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .sub{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconBtns{display:flex;gap:8px;align-items:center;flex:0 0 auto}
.iconBtn,.pillBtn{height:40px;min-width:40px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--text);display:inline-grid;place-items:center;box-shadow:0 8px 22px rgba(0,0,0,.14);font-weight:800}
.pillBtn{padding:0 13px;display:inline-flex;gap:6px;align-items:center;font-size:13px;min-width:0}
.iconBtn:active,.pillBtn:active,.primary:active,.ghost:active,.danger:active{transform:translateY(1px) scale(.99)}
.main{flex:1;min-height:0;overflow:auto;padding:clamp(12px,3vw,24px);padding-bottom:calc(16px + var(--safeBottom));scrollbar-width:none}
.main::-webkit-scrollbar,.handScroll::-webkit-scrollbar,.log::-webkit-scrollbar{display:none}
.lobbyHero{display:grid;gap:12px;margin-bottom:16px}
.heroCard{border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.05));box-shadow:var(--shadow);border-radius:calc(var(--radius) + 6px);padding:18px;position:relative;overflow:hidden}
.heroCard:before{content:"";position:absolute;inset:auto -60px -80px auto;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(255,212,107,.38),transparent 68%)}
.heroCard h2{font-size:clamp(24px,7vw,44px);margin:0 0 8px;line-height:1.05}
.heroCard p{margin:0;color:var(--muted);font-size:14px;line-height:1.55;max-width:760px}
.statusRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.statusChip{font-size:12px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 10px;backdrop-filter:blur(12px)}
.gameGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.gameTile{border-radius:24px;border:1px solid var(--line);padding:14px;min-height:148px;text-align:left;background:linear-gradient(160deg,rgba(255,255,255,.12),rgba(255,255,255,.045));box-shadow:0 14px 38px rgba(0,0,0,.22);position:relative;overflow:hidden;color:var(--text)}
.gameTile:before{content:"";position:absolute;right:-34px;bottom:-52px;width:128px;height:128px;border-radius:30px;background:rgba(255,255,255,.08);transform:rotate(18deg)}
.gameTile .emoji{font-size:34px;margin-bottom:12px;filter:drop-shadow(0 10px 14px rgba(0,0,0,.25))}
.gameTile h3{margin:0 0 7px;font-size:18px;letter-spacing:.02em}
.gameTile p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.45}
.gameTile .meta{position:absolute;left:14px;bottom:12px;font-size:11px;color:var(--accent2);font-weight:800}
.gameTile:active{transform:scale(.985)}
@media (min-width:760px){.gameGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.gameTile{min-height:170px}}
.gameScreen{height:100%;display:flex;flex-direction:column;gap:10px;min-height:0}
.scoreStrip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}
.seatMini{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:8px;min-width:0;position:relative;overflow:hidden}
.seatMini.active{outline:2px solid var(--accent);box-shadow:0 0 0 4px rgba(255,212,107,.12)}
.seatMini .name{font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seatMini .score{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.table{flex:1;min-height:280px;border-radius:28px;border:1px solid var(--line);background:radial-gradient(circle at 50% 40%,rgba(33,135,101,.55),rgba(17,64,54,.56) 43%,rgba(8,20,18,.8) 100%);box-shadow:var(--shadow);position:relative;overflow:hidden;padding:10px;display:flex;flex-direction:column;gap:8px}
.light .table{background:radial-gradient(circle at 50% 40%,rgba(86,181,131,.34),rgba(213,238,218,.68) 52%,rgba(255,255,255,.6) 100%)}
.table:before{content:"";position:absolute;inset:12px;border:1px dashed rgba(255,255,255,.16);border-radius:24px;pointer-events:none}
.message{position:relative;z-index:1;border:1px solid var(--line);background:rgba(0,0,0,.16);backdrop-filter:blur(10px);border-radius:18px;padding:10px 12px;font-size:13px;line-height:1.45;color:var(--text);min-height:42px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.light .message{background:rgba(255,255,255,.55)}
.message b{color:var(--accent)}
.tableArea{position:relative;z-index:1;flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;justify-content:center}
.centerPile{display:flex;justify-content:center;align-items:center;gap:clamp(4px,1.1vw,8px);flex-wrap:wrap;min-height:calc(var(--cardH) + 10px)}
.card{width:var(--cardW);height:var(--cardH);border-radius:clamp(8px,2vw,13px);background:#fff;color:#131313;border:1px solid rgba(0,0,0,.12);box-shadow:0 9px 16px rgba(0,0,0,.22);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:5px;position:relative;user-select:none;transition:transform .15s ease, box-shadow .15s ease, outline .15s ease, opacity .15s ease;font-weight:900;flex:0 0 auto}
.card.small{width:var(--smallCardW);height:var(--smallCardH);border-radius:9px;padding:3px;box-shadow:0 6px 12px rgba(0,0,0,.18)}
.card.back{background:linear-gradient(135deg,#21335f,#111a37);border:1px solid rgba(255,255,255,.25);color:#fff;display:grid;place-items:center;padding:0}
.card.back:after{content:"✦";width:70%;height:72%;border-radius:9px;border:1px solid rgba(255,255,255,.35);display:grid;place-items:center;color:rgba(255,255,255,.8);font-size:20px}
.card.red{color:#d22138}.card.black{color:#111}
.card .rank{font-size:clamp(16px,4.3vw,29px);line-height:1}.card.small .rank{font-size:clamp(12px,3vw,18px)}
.card .suit{font-size:clamp(15px,4vw,26px);line-height:1}.card.small .suit{font-size:clamp(11px,2.6vw,17px)}
.card .corner{position:absolute;top:4px;left:5px;font-size:10px;line-height:1;display:flex;flex-direction:column;align-items:center}.card.small .corner{display:none}
.card.selected{transform:translateY(-18px);outline:3px solid var(--accent);box-shadow:0 18px 26px rgba(0,0,0,.35),0 0 0 5px rgba(255,212,107,.18)}
.card.hint{outline:3px solid var(--accent2)}
.card.disabled{opacity:.45;filter:saturate(.6)}
.handPanel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));border-radius:24px;padding:9px 10px 10px;box-shadow:0 12px 34px rgba(0,0,0,.2)}
.handTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}.handTop h3{font-size:13px;margin:0}.handTop span{font-size:12px;color:var(--muted)}
.handScroll{display:flex;gap:calc(var(--cardW) * -.37);overflow-x:auto;overflow-y:visible;padding:20px 4px 8px;min-height:calc(var(--cardH) + 30px);scroll-snap-type:x proximity}
.handScroll .card{scroll-snap-align:center}
.actionBar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;padding-bottom:var(--safeBottom)}
.actionBar.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.actionBar.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.actionBar.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}
.primary,.ghost,.danger{height:46px;border-radius:16px;font-weight:900;font-size:13px;border:1px solid var(--line);box-shadow:0 8px 22px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;gap:5px;min-width:0;padding:0 8px}
.primary{background:linear-gradient(135deg,#ffd46b,#e49a26);color:#241500;border:0}.ghost{background:var(--panel);color:var(--text)}.danger{background:rgba(255,88,108,.18);color:var(--danger)}
.primary:disabled,.ghost:disabled,.danger:disabled{opacity:.45;filter:grayscale(.5);transform:none}
.aiRow{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}.aiHand{display:flex;gap:-4px;align-items:center;justify-content:center;min-height:var(--smallCardH)}
.aiBadge{border:1px solid var(--line);background:rgba(0,0,0,.13);border-radius:16px;padding:7px 9px;display:flex;align-items:center;gap:8px;min-width:82px}.light .aiBadge{background:rgba(255,255,255,.48)}
.avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,rgba(70,231,184,.9),rgba(255,212,107,.9));font-size:14px;color:#092019;font-weight:900;flex:0 0 auto}.aiBadge .t{min-width:0}.aiBadge .n{font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.aiBadge .s{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log{max-height:120px;overflow:auto;border:1px solid var(--line);background:rgba(0,0,0,.13);border-radius:16px;padding:8px;font-size:12px;color:var(--muted);line-height:1.45}.log div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05)}.log div:last-child{border-bottom:0}
.modalMask{position:absolute;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(8px);z-index:50;display:none;align-items:center;justify-content:center;padding:18px}.modalMask.show{display:flex}.modal{width:min(560px,100%);max-height:min(82vh,760px);overflow:auto;border-radius:28px;background:linear-gradient(180deg,rgba(32,45,41,.96),rgba(13,23,21,.98));border:1px solid var(--line);box-shadow:var(--shadow);padding:16px}.light .modal{background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(238,245,237,.98))}.modal h2{margin:0 0 8px;font-size:22px}.modal p{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.55}.formGrid{display:grid;gap:10px}.field{border:1px solid var(--line);background:var(--panel);border-radius:18px;padding:12px}.field label{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:14px;font-weight:800}.field small{display:block;color:var(--muted);font-size:12px;line-height:1.4;margin-top:5px}.field select,.field input{background:rgba(0,0,0,.16);border:1px solid var(--line);border-radius:12px;height:36px;padding:0 10px;outline:0;min-width:126px}.light .field select,.light .field input{background:rgba(255,255,255,.82)}
.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.toast{position:absolute;left:50%;bottom:calc(18px + var(--safeBottom));transform:translateX(-50%) translateY(30px);opacity:0;pointer-events:none;background:rgba(0,0,0,.72);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:10px 14px;font-size:13px;font-weight:800;z-index:100;transition:.22s ease;max-width:92%;text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pileGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.pileBox{border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:18px;padding:8px;min-height:108px}.pileBox.active{outline:2px solid var(--accent)}.pileBox h4{margin:0 0 7px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:6px}.pileCards{display:flex;gap:-4px;flex-wrap:wrap;align-items:center}.tableCards{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}.selectableTable .card{cursor:pointer}.miniResult{display:grid;gap:7px}.resultLine{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:8px;font-size:12px;line-height:1.45}
.helpList{margin:0;padding-left:18px;color:var(--muted);font-size:13px;line-height:1.6}.tag{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:5px 8px;font-size:11px;color:var(--muted);font-weight:800}.kbd{font-size:11px;padding:2px 6px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--accent);font-weight:900}
@media (max-width:430px){
  .topbar{gap:6px}.brand .sub{display:none}.iconBtn{width:38px;height:38px}.pillBtn{height:38px;padding:0 10px;font-size:12px}.main{padding:10px}.scoreStrip{gap:5px}.seatMini{padding:7px 6px;border-radius:14px}.seatMini .name{font-size:11px}.seatMini .score{font-size:10px}.table{border-radius:22px;padding:8px;min-height:260px}.message{font-size:12px;padding:9px 10px}.actionBar{gap:6px}.primary,.ghost,.danger{height:43px;border-radius:14px;font-size:12px;padding:0 4px}.gameTile{min-height:136px;padding:12px}.gameTile .emoji{font-size:30px}.gameTile h3{font-size:16px}.gameTile p{font-size:12px}.heroCard{padding:15px}.handPanel{padding:8px}.pileGrid{grid-template-columns:1fr}.pileBox{min-height:88px}
}
@media (orientation:landscape) and (max-height:560px){
  .topbar{height:48px;padding-top:6px}.main{padding:8px}.gameScreen{gap:6px}.table{min-height:190px}.message{min-height:34px;padding:7px 9px}.handPanel{padding:6px 8px}.handScroll{min-height:calc(var(--cardH) + 18px);padding-top:15px}.actionBar button{height:38px}.scoreStrip{grid-template-columns:repeat(4,1fr)}
}


.main.gameMode{overflow:hidden;padding:clamp(7px,2.2vw,14px);padding-bottom:calc(7px + var(--safeBottom));}
.gameScreen{height:100%;max-height:100%;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto auto;gap:clamp(5px,1.6vw,9px);}
.gameTop{display:flex;align-items:center;justify-content:space-between;gap:7px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.045));border-radius:18px;padding:7px 8px;box-shadow:0 8px 22px rgba(0,0,0,.13);min-height:42px;}
.gameTop .leftTools,.gameTop .rightTools{display:flex;align-items:center;gap:6px;min-width:0;}
.toolBtn{height:30px;border-radius:999px;padding:0 9px;background:var(--panel);border:1px solid var(--line);font-size:11px;font-weight:900;color:var(--text);white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:3px;}
.toolBtn.primaryTool{background:linear-gradient(135deg,rgba(255,212,107,.96),rgba(228,154,38,.96));color:#231500;border:0;}
.bankText{font-size:11px;color:var(--muted);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45vw;}
.setupScreen{display:grid;gap:12px;max-width:760px;margin:0 auto;width:100%;padding-bottom:calc(10px + var(--safeBottom));}
.setupHead{border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.045));border-radius:28px;padding:18px;box-shadow:var(--shadow);}
.setupHead h2{margin:0 0 6px;font-size:clamp(24px,7vw,38px);line-height:1.05;}.setupHead p{margin:0;color:var(--muted);font-size:13px;line-height:1.55;}
.setupGrid{display:grid;gap:10px;grid-template-columns:1fr 1fr;}.setupGrid .field{min-height:78px;}.setupActions{display:grid;grid-template-columns:1fr 1.2fr;gap:10px;position:sticky;bottom:0;padding-top:4px;background:linear-gradient(180deg,transparent,var(--bg));}
.light .setupActions{background:linear-gradient(180deg,transparent,var(--bg2));}
.settleBanner{border:1px solid var(--line);border-radius:18px;padding:10px 12px;background:linear-gradient(135deg,rgba(255,212,107,.20),rgba(70,231,184,.11));box-shadow:0 12px 28px rgba(0,0,0,.16);font-size:13px;line-height:1.45;font-weight:900;color:var(--text);}
.settleBanner.lose{background:linear-gradient(135deg,rgba(255,106,122,.22),rgba(255,255,255,.05));}.settleBanner.win{outline:2px solid rgba(255,212,107,.28)}
.settleBanner small{display:block;margin-top:3px;color:var(--muted);font-weight:700;}
.table{min-height:0;}.main.gameMode .table{min-height:0;}.tableArea{overflow:auto;justify-content:flex-start;padding-bottom:2px;}.centerPile{min-height:auto;}.log{max-height:min(18vh,95px);}
.handPanel{flex:0 0 auto;}.handScroll{justify-content:center;overflow:visible;gap:0;padding:14px 2px 5px;min-height:calc(var(--cardH) + 20px);scroll-snap-type:none;}.handScroll .card{scroll-snap-align:unset;}.handScroll .card + .card{margin-left:calc(var(--cardW) * -.56);}.handScroll .card:hover{z-index:3}.card.selected{z-index:5}.tableCards{gap:clamp(3px,1vw,6px)}
@media (max-width:430px){
  :root{--cardW:clamp(34px,10.3vw,46px);--smallCardW:clamp(24px,7vw,34px);} 
  .main.gameMode{padding:6px;}.topbar{height:46px;min-height:46px}.logo{width:34px;height:34px;border-radius:12px;font-size:19px}.brand h1{font-size:15px}.pillBtn{height:34px;padding:0 8px}.iconBtn{height:34px;min-width:34px}.scoreStrip{gap:4px}.seatMini{padding:5px 5px;border-radius:12px}.seatMini .name{font-size:10.5px}.seatMini .score{font-size:9.5px}.gameTop{padding:5px 6px;border-radius:15px;min-height:35px}.toolBtn{height:27px;padding:0 7px;font-size:10.5px}.bankText{font-size:10.5px;max-width:35vw}.message{min-height:30px;font-size:11.5px;padding:6px 8px;border-radius:14px}.table{border-radius:18px;padding:6px;gap:5px}.table:before{inset:7px;border-radius:15px}.aiBadge{padding:5px 6px;min-width:72px;border-radius:13px}.avatar{width:23px;height:23px;font-size:12px}.aiBadge .n{font-size:10.5px}.aiBadge .s{font-size:9.5px}.log{max-height:58px;font-size:10.5px;padding:6px;border-radius:12px}.handPanel{border-radius:17px;padding:5px 6px}.handTop{margin-bottom:2px}.handTop h3{font-size:11.5px}.handTop span{font-size:10.5px}.handScroll{gap:0;padding-top:10px;min-height:calc(var(--cardH) + 16px)}.handScroll .card + .card{margin-left:calc(var(--cardW) * -.60)}.card{padding:3px;border-radius:9px}.card .corner{font-size:8px;top:3px;left:4px}.card.selected{transform:translateY(-11px);outline-width:2px}.actionBar{gap:5px}.primary,.ghost,.danger{height:37px;border-radius:12px;font-size:11px;padding:0 3px}.setupGrid{grid-template-columns:1fr}.setupHead{padding:15px;border-radius:23px}.setupActions{grid-template-columns:1fr 1fr}.pileGrid{grid-template-columns:1fr}.pileBox{min-height:72px;padding:6px}.resultLine{font-size:11px;padding:7px}.miniResult{gap:5px}

function newDeck(){let deck=[];for(const s of SUITS){for(const r of RANKS){deck.push({id:s.id+r+'_'+Math.random().toString(36).slice(2,7),suit:s.id,rank:r})}}return deck}

function bjValue(hand){let total=0,aces=0;for(const c of hand){if(c.rank==='A'){aces++;total+=11}else total+=Math.min(rankNum(c.rank),10)}while(total>21&&aces>0){total-=10;aces--}return total}
function bjSoft(hand){let total=0,aces=0;for(const c of hand){if(c.rank==='A'){aces++;total+=11}else total+=Math.min(rankNum(c.rank),10)}return aces>0&&total<=21}
function redNum(c){if(c.rank==='A')return 1;if(['J','Q','K'].includes(c.rank))return 10;return Number(c.rank)}
function isRedCard(c){return c.suit==='H'||c.suit==='D'}
function redCardScore(c){if(isRedCard(c)){if(c.rank==='A')return 20;if(['10','J','Q','K'].includes(c.rank))return 10;return Number(c.rank)}if(S.settings.redSpadeA&&c.suit==='S'&&c.rank==='A')return 30;return 0}
function calcRedScore(cards){return (cards||[]).reduce((s,c)=>s+redCardScore(c),0)}
function redMatches(card,table){return table.filter(t=>{if(redNum(card)===10&&redNum(t)===10)return card.rank===t.rank;return redNum(card)+redNum(t)===10})}

 newGame(keepChips=false){const players=makePlayers(keepChips?currentChipsFor('redpoint'):null);resetRoundState(players);let deck=shuffle(newDeck());let table=[];for(let i=0;i<4;i++)table.push(deck.pop());for(let r=0;r<6;r++)for(const p of players)p.hand.push(deck.pop());players.forEach(p=>sortStd(p.hand));S.game={type:'redpoint',players,deck,table,turn:0,message:'撿紅點開始。點手牌，若有可撿的桌牌會自動提示。',phase:'play',roundNo:(keepChips&&S.game?.type==='redpoint'?(S.game.roundNo||1)+1:1),aiBusy:false};S.selected.clear();S.tableSelect=null;setTitles('撿紅點','湊 10 撿紅牌');this.render()},
 render(){const g=S.game;const table=`<div class="tableCards selectableTable">${g.table.map(c=>cardHTML(c,{onclick:`RedPoint.pickTable('${c.id}')`,hint:S.tableSelect===c.id})).join('')}</div>`;const ai=`<div class="aiRow">${g.players.slice(1).map((p,i)=>`<div class="aiBadge"><div class="avatar">${i+1}</div><div class="t"><div class="n">${p.name}</div><div class="s">紅點 ${calcRedScore(p.captured)}｜手牌 ${p.hand.length}｜籌碼 ${Math.round(p.chips)}</div></div></div>`).join('')}</div>`;const body=`${ai}<div class="resultLine"><b>桌面牌</b><div style="margin-top:8px">${table}</div></div><div class="roundStats">${g.players.map((p,i)=>`<span class="statusChip ${i===0&&p.roundDelta>0?'win':i===0&&p.roundDelta<0?'lose':''}">${p.name} ${Math.round(p.chips)}｜${calcRedScore(p.captured)}分</span>`).join('')}</div>${logHTML(false)}`;const handCards=g.players[0].hand.map(c=>cardHTML(c,{selected:S.selected.has(c.id),onclick:`RedPoint.toggle('${c.id}')`})).join('');const hand=`<div class="handPanel"><div class="handTop"><h3>你的手牌</h3><span>紅點：${calcRedScore(g.players[0].captured)}｜第 ${g.roundNo||1} 局</span></div><div class="handScroll">${handCards}</div></div>`;const human=g.turn===0&&g.phase==='play';const actions=g.phase==='settled'?`<div class="actionBar cols3"><button class="primary" onclick="App.tableEnded()?RedPoint.newGame(false):RedPoint.newGame(true)">${App.tableEnded()?'開新局':'下一局'}</button><button class="ghost" onclick="RedPoint.newGame(false)">重開桌</button><button class="danger" onclick="App.goLobby()">大廳</button></div>`:`<div class="actionBar cols4"><button class="primary" ${!human?'disabled':''} onclick="RedPoint.playHuman()">出牌</button><button class="ghost" ${!human?'disabled':''} onclick="RedPoint.hint()">提示</button><button class="ghost" onclick="RedPoint.newGame(false)">重開桌</button><button class="danger" onclick="App.goLobby()">大廳</button></div>`;App.render(gameShell(body,actions,hand,g.message));if(g.phase==='play'&&!g.players[g.turn].human&&!g.aiBusy)this.aiTurn()},
 toggle(id){if(S.game.turn!==0)return;S.selected.clear();S.selected.add(id);S.tableSelect=null;const card=S.game.players[0].hand.find(c=>c.id===id);const m=redMatches(card,S.game.table);if(m.length===1)S.tableSelect=m[0].id;this.render()},
 pickTable(id){if(S.game.turn!==0)return;const card=this.selCard();if(!card)return toast('請先選一張手牌');const t=S.game.table.find(c=>c.id===id);if(!redMatches(card,[t]).length)return toast('這張桌牌無法搭配');S.tableSelect=id;this.render()},
 selCard(){return S.game.players[0].hand.find(c=>S.selected.has(c.id))},
 playHuman(){const g=S.game,p=g.players[0],card=this.selCard();if(!card)return toast('請先選一張手牌');const matches=redMatches(card,g.table);let tableCard=null;if(matches.length){tableCard=g.table.find(c=>c.id===S.tableSelect)||matches.sort((a,b)=>redCardScore(b)-redCardScore(a))[0]}this.commit(0,card,tableCard)},
 commit(i,card,tableCard){const g=S.game,p=g.players[i];p.hand=p.hand.filter(c=>c.id!==card.id);if(tableCard){g.table=g.table.filter(c=>c.id!==tableCard.id);p.captured.push(card,tableCard);g.message=`${p.name} 用 ${cardName(card)} 撿走 ${cardName(tableCard)}。`;log(g.message)}else{g.table.push(card);g.message=`${p.name} 丟出 ${cardName(card)} 到桌面。`;log(g.message)}S.selected.clear();S.tableSelect=null;if(g.players.every(x=>x.hand.length===0)){if(g.deck.length>0){for(let r=0;r<6;r++)for(const pl of g.players)if(g.deck.length)pl.hand.push(g.deck.pop());g.players.forEach(pl=>sortStd(pl.hand));log('重新發手牌。')}else{return this.settle()}}g.turn=(i+1)%4;this.render()},
 hint(){const g=S.game,p=g.players[0];let best=null;for(const c of p.hand){for(const t of redMatches(c,g.table)){const score=redCardScore(c)+redCardScore(t);if(!best||score>best.score)best={c,t,score}}}S.selected.clear();S.tableSelect=null;if(best){S.selected.add(best.c.id);S.tableSelect=best.t.id;toast(`建議用 ${cardName(best.c)} 撿 ${cardName(best.t)}`)}else{const c=p.hand.slice().sort((a,b)=>redCardScore(a)-redCardScore(b)||cardValue(a)-cardValue(b))[0];S.selected.add(c.id);toast(`無牌可撿，建議丟 ${cardName(c)}`)}this.render()},
 async aiTurn(){const g=S.game;if(g.aiBusy)return;g.aiBusy=true;await sleep(delay());const i=g.turn,p=g.players[i];g.aiBusy=false;if(S.game!==g||!g||g.type!=='redpoint'||g.phase!=='play'||p.human)return;let best=null;for(const c of p.hand){for(const t of redMatches(c,g.table)){const score=redCardScore(c)+redCardScore(t);if(!best||score>best.score)best={c,t,score}}}if(best)this.commit(i,best.c,best.t);else{const c=p.hand.slice().sort((a,b)=>redCardScore(a)-redCardScore(b)||cardValue(a)-cardValue(b))[0];this.commit(i,c,null)}},
 settle(){const g=S.game;if(g.phase==='settled')return;g.phase='settled';let scores=g.players.map(p=>calcRedScore(p.captured));let max=Math.max(...scores),w=scores.indexOf(max);const unit=Number(S.activePrefs?.redPointValue||S.settings.redPointValue||5);resetDeltas(g.players);g.players.forEach((p,i)=>p.score+=scores[i]);for(let i=0;i<4;i++){for(let j=i+1;j<4;j++){const diff=scores[i]-scores[j];if(diff>0)settleTransfer(g.players,j,i,diff*unit);else if(diff<0)settleTransfer(g.players,i,j,Math.abs(diff)*unit)}}const humanDelta=g.players[0].roundDelta;g.message=`本局結算：${g.players.map((p,i)=>p.name+' '+scores[i]+' 分').join('，')}。${g.players[w].name} 最高分。`;g.resultBanner={type:humanDelta>=0?'win':'lose',title:humanDelta>=0?`你本局 ${chipDeltaText(humanDelta)} 籌碼`:`你本局 ${chipDeltaText(humanDelta)} 籌碼`,delta:humanDelta,detail:`每分差 ${unit} 籌碼，四家互相結算，下一局保留籌碼。`};log(g.message);if(w===0)incStat('redpoint','win');this.render();setTimeout(()=>App.showSettlement(),0)}
}; window.RedPoint=RedPoint;
const Thirteen={
 newGame(keepChips=false){const players=makePlayers(keepChips?currentChipsFor('thirteen'):null);resetRoundState(players);let deck=shuffle(newDeck());for(let r=0;r<13;r++)for(const p of players)p.hand.push(deck.pop());players.forEach(p=>sortStd(p.hand));S.game={type:'thirteen',players,arranged:null,aiArranged:[],message:'13支開始。可手動分墩，或直接按自動理牌。',phase:'arrange',roundNo:(keepChips&&S.game?.type==='thirteen'?(S.game.roundNo||1)+1:1)};S.thirteenTarget='back';S.selected.clear();setTitles('13支','自動排墩');this.render()},
 render(){const g=S.game;const arr=g.arranged||{front:[],middle:[],back:[]};const locked=g.phase==='settled';const pile=(key,title,max)=>{const boxClick=locked?'':`Thirteen.setTarget('${key}')`;const cardList=arr[key].map(c=>cardHTML(c,{small:true,onclick:locked?'':`Thirteen.returnCard('${key}','${c.id}')`})).join('');return `<div class="pileBox ${S.thirteenTarget===key?'active':''}" onclick="${boxClick}"><h4><span>${title}</span><span>${arr[key].length}/${max}</span></h4><div class="pileCards">${cardList}</div></div>`};const piles=`<div class="pileGrid">${pile('front','頭墩 3張',3)}${pile('middle','中墩 5張',5)}${pile('back','尾墩 5張',5)}</div>`;let body=`${piles}<div class="roundStats">${g.players.map((p,i)=>`<span class="statusChip ${i===0&&p.roundDelta>0?'win':i===0&&p.roundDelta<0?'lose':''}">${p.name} ${Math.round(p.chips)}</span>`).join('')}</div>${logHTML(false)}`;const placedIds=new Set([...arr.front,...arr.middle,...arr.back].map(c=>c.id));const handCards=g.players[0].hand.filter(c=>!placedIds.has(c.id)).map(c=>cardHTML(c,{onclick:locked?'':`Thirteen.place('${c.id}')`})).join('');const targetName=S.thirteenTarget==='front'?'頭墩':S.thirteenTarget==='middle'?'中墩':'尾墩';const hand=`<div class="handPanel"><div class="handTop"><h3>未分配手牌</h3><span>${locked?'已結算':`目前放入：${targetName}｜第 ${g.roundNo||1} 局`}</span></div><div class="handScroll">${handCards||'<span class="tag">已全部分配</span>'}</div></div>`;const actions=locked?`<div class="actionBar cols3"><button class="primary" onclick="App.tableEnded()?Thirteen.newGame(false):Thirteen.newGame(true)">${App.tableEnded()?'開新局':'下一局'}</button><button class="ghost" onclick="Thirteen.newGame(false)">重開桌</button><button class="danger" onclick="App.goLobby()">大廳</button></div>`:`<div class="actionBar"><button class="primary" onclick="Thirteen.auto()">自動理牌</button><button class="ghost" onclick="Thirteen.compare()">比牌</button><button class="ghost" onclick="Thirteen.clear()">重排</button><button class="ghost" onclick="Thirteen.newGame(false)">重開桌</button><button class="danger" onclick="App.goLobby()">大廳</button></div>`;App.render(gameShell(body,actions,hand,g.message))},
 setTarget(k){S.thirteenTarget=k;this.render()},
 ensureArr(){const g=S.game;if(!g.arranged)g.arranged={front:[],middle:[],back:[]};return g.arranged},
 place(id){const g=S.game,arr=this.ensureArr();const max={front:3,middle:5,back:5}[S.thirteenTarget];if(arr[S.thirteenTarget].length>=max)return toast('這一墩已滿');const card=g.players[0].hand.find(c=>c.id===id);arr[S.thirteenTarget].push(card);this.render()},
 returnCard(k,id){const arr=this.ensureArr();arr[k]=arr[k].filter(c=>c.id!==id);this.render()},
 clear(){S.game.arranged={front:[],middle:[],back:[]};S.game.resultHTML='';S.game.message='已清空分墩。';this.render()},
 auto(){const g=S.game;g.arranged=autoArrange13(g.players[0].hand);g.message='已自動排出一組合法墩。仍可手動調整。';this.render()},
 compare(){const g=S.game;if(g.phase==='settled')return toast('本局已結算，請按下一局');if(!g.arranged)this.auto();const a=g.arranged;if(a.front.length!==3||a.middle.length!==5||a.back.length!==5)return toast('請先分成 3 / 5 / 5 張');const ev=arrEval(a);if(ev.foul)return toast('倒水：尾墩需 ≥ 中墩 ≥ 頭墩');const arranged=[g.arranged];g.aiArranged=[];for(let i=1;i<4;i++){g.aiArranged[i]=autoArrange13(g.players[i].hand);arranged[i]=g.aiArranged[i]}const evals=arranged.map(arrEval);resetDeltas(g.players);const unit=Number(S.activePrefs?.thirteenWaterValue||S.settings.thirteenWaterValue||20);let html='<div class="miniResult">';let humanWater=0;for(let i=1;i<4;i++){let s=0;const parts=['front','middle','back'].map(k=>{const c=cmpEval(evals[0][k],evals[i][k]);s+=c>0?1:c<0?-1:0;return `${k==='front'?'頭':k==='middle'?'中':'尾'} ${c>0?'勝':c<0?'負':'平'}`});humanWater+=s;html+=`<div class="resultLine"><b>你 對 ${g.players[i].name}</b>：${parts.join(' / ')}，本家 ${s>0?'+':''}${s} 水<br><span class="tag">你的：頭${evals[0].front.name}・中${evals[0].middle.name}・尾${evals[0].back.name}</span></div>`}for(let i=0;i<4;i++){for(let j=i+1;j<4;j++){let s=0;for(const k of ['front','middle','back']){const c=cmpEval(evals[i][k],evals[j][k]);s+=c>0?1:c<0?-1:0}if(s>0)settleTransfer(g.players,j,i,s*unit);else if(s<0)settleTransfer(g.players,i,j,Math.abs(s)*unit)}}html+=`<div class="resultLine"><b>四家互結</b>：${g.players.map(p=>`${p.name} ${chipDeltaText(p.roundDelta||0)}`).join('｜')}</div></div>`;g.players.forEach((p,i)=>p.score+=(p.roundDelta||0));if((g.players[0].roundDelta||0)>0)incStat('thirteen','win');g.phase='settled';const humanDelta=g.players[0].roundDelta||0;g.message=`比牌完成，你對三家合計 ${humanWater>0?'+':''}${humanWater} 水，實際籌碼 ${chipDeltaText(humanDelta)}。`;g.resultBanner={type:humanDelta>=0?'win':'lose',title:humanDelta>=0?`你本局 ${chipDeltaText(humanDelta)} 籌碼`:`你本局 ${chipDeltaText(humanDelta)} 籌碼`,delta:humanDelta,detail:`每水 ${unit} 籌碼，四家互相結算，下一局會保留目前籌碼。`};g.resultHTML=html;log(g.message);this.render();setTimeout(()=>App.showSettlement(),0)}
}; window.Thirteen=Thirteen;
function arrEval(a){const front=pokerEval3(a.front),middle=pokerEval5(a.middle),back=pokerEval5(a.back);const foul=cmpEval(middle,back)>0||front.score>middle.score;return {front,middle,back,foul,score:front.score+middle.score*1.4+back.score*1.8}}
function autoArrange13(hand){let cards=hand.slice();let best=null;const backs=combinations(cards,5);for(const back of backs){const rem1=cards.filter(c=>!back.some(x=>x.id===c.id));const be=pokerEval5(back);for(const mid of combinations(rem1,5)){const front=rem1.filter(c=>!mid.some(x=>x.id===c.id));const me=pokerEval5(mid),fe=pokerEval3(front);if(cmpEval(me,be)>0)continue;if(fe.score>me.score)continue;const score=be.score*1.8+me.score*1.35+fe.score*.82;if(!best||score>best.score)best={front,middle:mid,back,score}}}
if(!best){const sorted=cards.slice().sort((a,b)=>cardValue(b)-cardValue(a));return {back:sorted.slice(0,5),middle:sorted.slice(5,10),front:sorted.slice(10,13)}}return {front:sortStd(best.front.slice()),middle:sortStd(best.middle.slice()),back:sortStd(best.back.slice())}}
App.init();
})();
