<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Emoji 連連看｜智慧排盤版</title>
  <style>
    :root {
      --bg: #101114;
      --panel: rgba(255, 255, 255, 0.078);
      --panel-strong: rgba(24, 28, 38, 0.96);
      --panel-solid: #171b25;
      --text: #f8fafc;
      --text-strong: #ffffff;
      --muted: #b7bfce;
      --muted-2: #8f9aad;
      --line: rgba(255, 255, 255, 0.14);
      --cell: #1b1f29;
      --cell-2: #252b38;
      --cell-border: rgba(255, 255, 255, 0.12);
      --input-bg: #151923;
      --input-text: #f8fafc;
      --input-border: rgba(255, 255, 255, 0.16);
      --btn-bg: rgba(255, 255, 255, 0.12);
      --btn-text: #f8fafc;
      --disabled-bg: rgba(255, 255, 255, 0.055);
      --disabled-text: rgba(248, 250, 252, 0.42);
      --accent: #8b5cf6;
      --accent-2: #22d3ee;
      --danger: #fb7185;
      --success: #34d399;
      --warning: #fbbf24;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      --radius: 18px;
      --tileSize: 42px;
      --tileGap: 6px;
      --safeBottom: env(safe-area-inset-bottom, 0px);
      color-scheme: dark;
    }

    body.light {
      --bg: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.98);
      --panel-solid: #ffffff;
      --text: #172033;
      --text-strong: #0f172a;
      --muted: #475569;
      --muted-2: #64748b;
      --line: rgba(15, 23, 42, 0.13);
      --cell: #ffffff;
      --cell-2: #eef4fb;
      --cell-border: rgba(15, 23, 42, 0.13);
      --input-bg: #ffffff;
      --input-text: #0f172a;
      --input-border: rgba(15, 23, 42, 0.18);
      --btn-bg: #ffffff;
      --btn-text: #111827;
      --disabled-bg: #e8edf5;
      --disabled-text: #94a3b8;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.13);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(139, 92, 246, 0.22), transparent 34%),
        radial-gradient(circle at 85% 14%, rgba(34, 211, 238, 0.18), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(52, 211, 153, 0.12), transparent 34%),
        var(--bg);
      color: var(--text);
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select {
      -webkit-appearance: none;
      appearance: none;
    }

    .app {
      width: min(100vw, 560px);
      height: 100dvh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 12px 12px calc(12px + var(--safeBottom));
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      position: relative;
    }

    .topbar,
    .stats,
    .toolbar,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: var(--radius);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      gap: 10px;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .title strong {
      color: var(--text-strong);
      font-size: 18px;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 275px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: var(--btn-bg);
      color: var(--btn-text);
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 999px;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 130ms ease, opacity 130ms ease, background 130ms ease;
    }

    .pill:active {
      transform: scale(0.96);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px;
    }

    .stat {
      min-width: 0;
      padding: 8px 6px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      text-align: center;
    }

    body.light .stat {
      background: rgba(15, 23, 42, 0.04);
    }

    .stat b {
      display: block;
      color: var(--text-strong);
      font-size: 17px;
      line-height: 1.08;
      letter-spacing: 0.01em;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      margin-top: 4px;
    }

    .gameArea {
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
      padding: 2px;
    }

    .boardFrame {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.025));
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), var(--shadow);
      position: relative;
    }

    body.light .boardFrame {
      background:
        radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.11), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(241, 245, 249, 0.78));
    }

    .startHint {
      position: absolute;
      inset: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      z-index: 1;
      color: var(--muted);
      pointer-events: none;
    }

    .startHintCard {
      width: min(88%, 340px);
      padding: 20px 16px;
      border-radius: 24px;
      border: 1px dashed var(--line);
      background: rgba(255,255,255,0.045);
    }

    body.light .startHintCard {
      background: rgba(255,255,255,0.62);
    }

    .startHintCard .big {
      display: block;
      font-size: 44px;
      margin-bottom: 8px;
    }

    .startHintCard b {
      display: block;
      color: var(--text-strong);
      font-size: 18px;
      margin-bottom: 6px;
    }

    .startHintCard span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 650;
    }

    .boardScale {
      position: relative;
      transform-origin: center center;
      transition: transform 180ms ease;
      z-index: 2;
    }

    #pathSvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
      z-index: 3;
    }

    #pathSvg polyline {
      fill: none;
      stroke: var(--accent-2);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 7px rgba(34, 211, 238, 0.88));
      opacity: 0.95;
    }

    body.light #pathSvg polyline {
      stroke: #0891b2;
      filter: drop-shadow(0 0 4px rgba(8, 145, 178, 0.34));
    }

    .board {
      display: grid;
      gap: var(--tileGap);
      padding: 4px;
      position: relative;
      z-index: 2;
    }

    .tile {
      width: var(--tileSize);
      height: var(--tileSize);
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid var(--cell-border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02)),
        linear-gradient(135deg, var(--cell), var(--cell-2));
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      font-size: calc(var(--tileSize) * 0.56);
      cursor: pointer;
      transition:
        transform 120ms ease,
        opacity 160ms ease,
        border-color 120ms ease,
        background 120ms ease,
        filter 120ms ease,
        box-shadow 120ms ease;
      touch-action: manipulation;
    }

    body.light .tile {
      box-shadow:
        0 8px 16px rgba(15, 23, 42, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .tile:active {
      transform: scale(0.94);
    }

    .tile.selected {
      border-color: var(--accent-2);
      box-shadow:
        0 0 0 2px rgba(34, 211, 238, 0.36),
        0 0 18px rgba(34, 211, 238, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.13);
      transform: translateY(-1px) scale(1.04);
    }

    body.light .tile.selected {
      border-color: #0891b2;
      box-shadow:
        0 0 0 2px rgba(8, 145, 178, 0.22),
        0 10px 20px rgba(8, 145, 178, 0.18);
    }

    .tile.hint {
      animation: hintPulse 720ms ease-in-out 3;
      border-color: var(--warning);
    }

    .tile.bad {
      animation: badShake 260ms ease;
      border-color: var(--danger);
    }

    .tile.empty {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.82);
    }

    .tile.removing {
      animation: popOut 180ms ease forwards;
    }

    .pauseOverlay {
      position: absolute;
      inset: 12px;
      display: none;
      place-items: center;
      text-align: center;
      border-radius: 20px;
      background: rgba(3, 7, 18, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #ffffff;
      z-index: 8;
      pointer-events: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .pauseOverlay.show {
      display: grid;
    }

    .pauseOverlay b {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .pauseOverlay span {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      font-weight: 700;
    }

    @keyframes hintPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.12); filter: brightness(1.35); }
    }

    @keyframes badShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }

    @keyframes popOut {
      to { opacity: 0; transform: scale(0.42) rotate(8deg); }
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px;
    }

    .btn {
      min-height: 46px;
      border: 1px solid var(--line);
      background: var(--btn-bg);
      color: var(--btn-text);
      border-radius: 16px;
      font-weight: 850;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      transition: transform 130ms ease, filter 130ms ease, opacity 130ms ease, background 130ms ease;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border-color: rgba(255, 255, 255, 0.18);
    }

    .btn.danger {
      color: white;
      background: linear-gradient(135deg, #ef4444, #fb7185);
    }

    .btn:disabled {
      opacity: 1;
      cursor: not-allowed;
      color: var(--disabled-text);
      background: var(--disabled-bg);
      border-color: rgba(148, 163, 184, 0.14);
      transform: none;
    }

    .modalMask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.50);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .modalMask.show {
      display: flex;
    }

    .modal {
      width: min(100%, 480px);
      max-height: min(88dvh, 720px);
      overflow: auto;
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.18), transparent 40%),
        var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 16px;
      color: var(--text);
    }

    body.light .modal {
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.10), transparent 38%),
        var(--panel-strong);
    }

    .modalHeader {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modalHeader h2 {
      color: var(--text-strong);
      font-size: 20px;
      margin: 0 0 4px;
    }

    .modalHeader p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      line-height: 1.45;
    }

    .iconBtn {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--btn-bg);
      color: var(--btn-text);
      font-weight: 900;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .iconBtn.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .settingsGrid {
      display: grid;
      gap: 10px;
    }

    .settingGroup {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.035);
    }

    body.light .settingGroup {
      background: rgba(15, 23, 42, 0.028);
    }

    .groupTitle {
      color: var(--text-strong);
      font-size: 14px;
      font-weight: 900;
      padding: 0 2px 2px;
    }

    .field {
      padding: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
      border-radius: 18px;
      display: grid;
      gap: 8px;
    }

    body.light .field {
      background: rgba(255, 255, 255, 0.68);
    }

    .field label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
    }

    .field label span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .field select,
    .field input[type="checkbox"] {
      cursor: pointer;
    }

    .field select {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: 14px;
      background: var(--input-bg);
      color: var(--input-text);
      padding: 10px 36px 10px 12px;
      outline: none;
      min-height: 43px;
      font-weight: 750;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 18px,
        calc(100% - 12px) 18px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .field select option {
      background: var(--input-bg);
      color: var(--input-text);
    }

    .switchRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-strong);
      font-weight: 900;
      line-height: 1.35;
    }

    .switchRow span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .switchRow input {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .modalActions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .resultBody {
      display: grid;
      gap: 12px;
      text-align: center;
      padding: 8px 2px 0;
    }

    .resultEmoji {
      font-size: 54px;
      line-height: 1;
    }

    .resultTitle {
      color: var(--text-strong);
      margin: 0;
      font-size: 24px;
    }

    .resultText {
      margin: 0;
      color: var(--muted);
      font-weight: 650;
      line-height: 1.55;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(78px + var(--safeBottom));
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      z-index: 40;
      max-width: min(92vw, 440px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.94);
      color: white;
      font-size: 13px;
      font-weight: 850;
      box-shadow: 0 12px 35px rgba(0,0,0,0.32);
      transition: 180ms ease;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 390px) {
      .app {
        padding-left: 8px;
        padding-right: 8px;
        gap: 8px;
      }

      .title strong {
        font-size: 16px;
      }

      .title small {
        max-width: 210px;
      }

      .stat b {
        font-size: 15px;
      }

      .stat span {
        font-size: 10.5px;
      }

      .btn {
        font-size: 13px;
        min-height: 43px;
      }

      .modal {
        padding: 14px;
      }
    }

    @media (max-height: 690px) {
      .topbar {
        padding-block: 8px;
      }

      .stats {
        padding: 6px;
      }

      .stat {
        padding-block: 6px;
      }

      .toolbar {
        padding: 6px;
      }

      .btn {
        min-height: 40px;
      }

      .field {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="title">
        <strong>🧩 Emoji 連連看</strong>
        <small id="subtitle">先完成開局設定，再開始遊戲</small>
      </div>
      <button class="pill" id="pauseBtn" type="button">🎮 設定</button>
    </section>

    <section class="stats">
      <div class="stat"><b id="leftCount">0</b><span>剩餘</span></div>
      <div class="stat"><b id="timerText">00:00</b><span>時間</span></div>
      <div class="stat"><b id="hintCount">0</b><span>提示</span></div>
      <div class="stat"><b id="shuffleCount">0</b><span>洗牌</span></div>
    </section>

    <section class="gameArea">
      <div class="boardFrame" id="boardFrame">
        <div class="startHint" id="startHint">
          <div class="startHintCard">
            <span class="big">🎮</span>
            <b>準備開始連連看</b>
            <span>選擇難度、時間與圖案包後，按「開始遊戲」才會產生棋盤並開始計時。</span>
          </div>
        </div>

        <div class="boardScale" id="boardScale">
          <svg id="pathSvg"></svg>
          <div class="board" id="board"></div>
        </div>

        <div class="pauseOverlay" id="pauseOverlay">
          <div>
            <b>⏸ 遊戲已暫停</b>
            <span>點右上角「繼續」回到遊戲</span>
          </div>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <button class="btn primary" id="newBtn" type="button">🔄 新局</button>
      <button class="btn" id="hintBtn" type="button">💡 提示</button>
      <button class="btn" id="shuffleBtn" type="button">🌀 洗牌</button>
      <button class="btn" id="settingsBtn" type="button">⚙️ 設定</button>
    </section>
  </main>

  <div class="modalMask" id="settingsModal">
    <div class="modal">
      <div class="modalHeader">
        <div>
          <h2 id="settingsTitle">🎮 開局設定</h2>
          <p id="settingsDesc">先選擇難度、時間與圖案包，按「開始遊戲」後才會產生棋盤並開始計時。</p>
        </div>
        <button class="iconBtn hidden" id="closeSettingsBtn" type="button">✕</button>
      </div>

      <div class="settingsGrid">
        <div class="settingGroup">
          <div class="groupTitle">🎮 遊戲設定</div>

          <div class="field">
            <label for="difficultySelect">難度 <span>手機建議普通</span></label>
            <select id="difficultySelect">
              <option value="easy">簡單｜6 × 6</option>
              <option value="normal">普通｜8 × 8</option>
              <option value="hard">困難｜10 × 8</option>
              <option value="hell">地獄｜10 × 10</option>
            </select>
          </div>

          <div class="field">
            <label for="timeSelect">時間限制 <span>可選不限時間</span></label>
            <select id="timeSelect">
              <option value="0">不限時間</option>
              <option value="180">3 分鐘</option>
              <option value="300">5 分鐘</option>
              <option value="600">10 分鐘</option>
            </select>
          </div>

          <div class="field">
            <label for="packSelect">圖案包 <span>Emoji 素材</span></label>
            <select id="packSelect">
              <option value="animals">動物包</option>
              <option value="foods">食物包</option>
              <option value="faces">表情包</option>
              <option value="objects">小物包</option>
              <option value="mixed">混合包</option>
            </select>
          </div>
        </div>

        <div class="settingGroup">
          <div class="groupTitle">🧰 輔助功能</div>

          <div class="field">
            <label for="assistSelect">輔助資源 <span>提示 / 洗牌次數</span></label>
            <select id="assistSelect">
              <option value="standard">標準｜提示 3、洗牌 2</option>
              <option value="more">輕鬆｜提示 5、洗牌 4</option>
              <option value="unlimited">練習｜提示無限、洗牌無限</option>
              <option value="none">挑戰｜禁用提示、洗牌</option>
            </select>
          </div>

          <div class="field">
            <div class="switchRow">
              <div>🧠 無解自動洗牌<br><span>找不到可消除組合時，系統會智慧重排；開局也會盡量產生可解盤</span></div>
              <input type="checkbox" id="autoCheck" />
            </div>
          </div>
        </div>

        <div class="settingGroup">
          <div class="groupTitle">🎨 顯示與操作</div>

          <div class="field">
            <label for="themeSelect">主題模式 <span>自動儲存</span></label>
            <select id="themeSelect">
              <option value="dark">深色模式</option>
              <option value="light">亮色模式</option>
              <option value="system">跟隨系統</option>
            </select>
          </div>

          <div class="field">
            <div class="switchRow">
              <div>📳 震動回饋<br><span>手機支援時才會生效</span></div>
              <input type="checkbox" id="vibrationCheck" />
            </div>
          </div>

          <div class="field">
            <div class="switchRow">
              <div>🔊 音效提示<br><span>使用簡單短音，不需外部檔案</span></div>
              <input type="checkbox" id="soundCheck" />
            </div>
          </div>
        </div>
      </div>

      <div class="modalActions">
        <button class="btn" id="resetBestBtn" type="button">🗑 清除紀錄</button>
        <button class="btn primary" id="applySettingsBtn" type="button">✅ 開始遊戲</button>
      </div>
    </div>
  </div>

  <div class="modalMask" id="resultModal">
    <div class="modal">
      <div class="resultBody">
        <div class="resultEmoji" id="resultEmoji">🎉</div>
        <h2 class="resultTitle" id="resultTitle">過關成功</h2>
        <p class="resultText" id="resultText">你完成了這一局。</p>
        <div class="modalActions">
          <button class="btn" id="resultSettingsBtn" type="button">⚙️ 設定</button>
          <button class="btn primary" id="resultNewBtn" type="button">🔄 再玩一次</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "emoji-linklink-mobile-v3";

    const difficulties = {
      easy: { name: "簡單", rows: 6, cols: 6 },
      normal: { name: "普通", rows: 8, cols: 8 },
      hard: { name: "困難", rows: 8, cols: 10 },
      hell: { name: "地獄", rows: 10, cols: 10 }
    };

    const assistModes = {
      standard: { hints: 3, shuffles: 2 },
      more: { hints: 5, shuffles: 4 },
      unlimited: { hints: Infinity, shuffles: Infinity },
      none: { hints: 0, shuffles: 0 }
    };

    const emojiPacks = {
      animals: ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🐤","🦄","🐝","🦋","🐢","🐙","🦀","🐳","🐬","🦖","🦕","🐺","🦉","🦆","🐞","🦥","🦦","🦩","🐿️","🦔","🐲","🐴","🐗","🦌","🦘","🦡","🦨","🦭","🐠","🐡","🦑","🪼"],
      foods: ["🍎","🍊","🍋","🍉","🍇","🍓","🍒","🍑","🥭","🍍","🥝","🍅","🥑","🍆","🥕","🌽","🍔","🍟","🍕","🌭","🥪","🌮","🍣","🍜","🍙","🍤","🍩","🍪","🍰","🧁","🍫","🍭","🍮","🍦","🥨","🥐","🥯","🥞","🧇","🍗","🍖","🥓","🥚","🧀","🥗","🍿","🧋","☕","🍵","🥛"],
      faces: ["😀","😆","😂","🤣","😍","😘","😎","🤓","🥳","😤","😭","😱","😴","🤔","😈","👻","🤖","💩","🤡","🙀","😺","😹","😻","😼","🙈","🙉","🙊","💀","👽","👾","🤠","🥶","🥵","😵","🤯","🥺","😬","🤤","🤩","😇","😜","😋","😡","🤢","🤮","🫠","🫣","🫡","🥸","🫥"],
      objects: ["⚽","🏀","🏈","⚾","🎾","🏐","🎱","🏓","🎮","🎲","🎯","🎸","🎧","🎤","🎬","🎨","🚗","🚕","🚌","🚑","🚒","🚲","✈️","🚀","🛸","⌚","📱","💻","⌨️","🖱️","💡","🔦","📷","🎁","🎈","🧸","🪀","🪁","🧩","🔮","💎","🔑","🧲","🪄","🛎️","📚","✏️","📌","✂️","🧰"],
      mixed: []
    };

    emojiPacks.mixed = [
      ...emojiPacks.animals,
      ...emojiPacks.foods,
      ...emojiPacks.faces,
      ...emojiPacks.objects
    ];

    const state = {
      rows: 8,
      cols: 8,
      board: [],
      selected: null,
      startedAt: 0,
      elapsedBeforePause: 0,
      timerId: null,
      paused: false,
      pausedByModal: false,
      over: true,
      gameStarted: false,
      remaining: 0,
      hintsLeft: 0,
      shufflesLeft: 0,
      settingsModalMode: "start",
      settings: {
        difficulty: "normal",
        timeLimit: 300,
        pack: "animals",
        assist: "standard",
        theme: "dark",
        vibration: true,
        sound: true,
        autoCheck: true
      },
      best: {}
    };

    const el = {
      body: document.body,
      boardFrame: document.getElementById("boardFrame"),
      boardScale: document.getElementById("boardScale"),
      board: document.getElementById("board"),
      pathSvg: document.getElementById("pathSvg"),
      startHint: document.getElementById("startHint"),
      pauseOverlay: document.getElementById("pauseOverlay"),
      leftCount: document.getElementById("leftCount"),
      timerText: document.getElementById("timerText"),
      hintCount: document.getElementById("hintCount"),
      shuffleCount: document.getElementById("shuffleCount"),
      subtitle: document.getElementById("subtitle"),
      pauseBtn: document.getElementById("pauseBtn"),
      newBtn: document.getElementById("newBtn"),
      hintBtn: document.getElementById("hintBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      settingsBtn: document.getElementById("settingsBtn"),
      settingsModal: document.getElementById("settingsModal"),
      settingsTitle: document.getElementById("settingsTitle"),
      settingsDesc: document.getElementById("settingsDesc"),
      closeSettingsBtn: document.getElementById("closeSettingsBtn"),
      applySettingsBtn: document.getElementById("applySettingsBtn"),
      resetBestBtn: document.getElementById("resetBestBtn"),
      difficultySelect: document.getElementById("difficultySelect"),
      timeSelect: document.getElementById("timeSelect"),
      packSelect: document.getElementById("packSelect"),
      assistSelect: document.getElementById("assistSelect"),
      themeSelect: document.getElementById("themeSelect"),
      vibrationCheck: document.getElementById("vibrationCheck"),
      soundCheck: document.getElementById("soundCheck"),
      autoCheck: document.getElementById("autoCheck"),
      resultModal: document.getElementById("resultModal"),
      resultEmoji: document.getElementById("resultEmoji"),
      resultTitle: document.getElementById("resultTitle"),
      resultText: document.getElementById("resultText"),
      resultSettingsBtn: document.getElementById("resultSettingsBtn"),
      resultNewBtn: document.getElementById("resultNewBtn"),
      toast: document.getElementById("toast")
    };

    function loadStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data.settings) state.settings = { ...state.settings, ...data.settings };
        if (data.best) state.best = data.best;
      } catch (error) {
        console.warn("讀取儲存資料失敗", error);
      }
    }

    function saveStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          settings: state.settings,
          best: state.best
        }));
      } catch (error) {
        console.warn("儲存資料失敗", error);
      }
    }

    function applyTheme() {
      const theme = state.settings.theme;
      const systemLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      el.body.classList.toggle("light", theme === "light" || (theme === "system" && systemLight));
    }

    function syncSettingsUI() {
      el.difficultySelect.value = state.settings.difficulty;
      el.timeSelect.value = String(state.settings.timeLimit);
      el.packSelect.value = state.settings.pack;
      el.assistSelect.value = state.settings.assist;
      el.themeSelect.value = state.settings.theme;
      el.vibrationCheck.checked = state.settings.vibration;
      el.soundCheck.checked = state.settings.sound;
      el.autoCheck.checked = state.settings.autoCheck;
    }

    function readSettingsUI() {
      state.settings.difficulty = el.difficultySelect.value;
      state.settings.timeLimit = Number(el.timeSelect.value);
      state.settings.pack = el.packSelect.value;
      state.settings.assist = el.assistSelect.value;
      state.settings.theme = el.themeSelect.value;
      state.settings.vibration = el.vibrationCheck.checked;
      state.settings.sound = el.soundCheck.checked;
      state.settings.autoCheck = el.autoCheck.checked;
      saveStorage();
      applyTheme();
    }

    function formatTime(totalSeconds) {
      totalSeconds = Math.max(0, Math.floor(totalSeconds));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function getElapsedSeconds() {
      if (!state.startedAt || !state.gameStarted) return 0;
      if (state.paused) return Math.floor(state.elapsedBeforePause / 1000);
      return Math.floor((Date.now() - state.startedAt + state.elapsedBeforePause) / 1000);
    }

    function getDisplaySeconds() {
      const limit = state.settings.timeLimit;
      if (limit > 0) return Math.max(0, limit - getElapsedSeconds());
      return getElapsedSeconds();
    }

    function updateStats() {
      el.leftCount.textContent = state.remaining;
      el.timerText.textContent = formatTime(getDisplaySeconds());
      el.hintCount.textContent = state.hintsLeft === Infinity ? "∞" : state.hintsLeft;
      el.shuffleCount.textContent = state.shufflesLeft === Infinity ? "∞" : state.shufflesLeft;

      const disabledBeforeStart = !state.gameStarted || state.over;
      el.hintBtn.disabled = disabledBeforeStart || state.paused || state.hintsLeft === 0;
      el.shuffleBtn.disabled = disabledBeforeStart || state.paused || state.shufflesLeft === 0;
      el.newBtn.disabled = false;

      if (!state.gameStarted) {
        el.pauseBtn.textContent = "🎮 設定";
      } else {
        el.pauseBtn.textContent = state.paused ? "▶️ 繼續" : "⏸ 暫停";
      }

      el.pauseOverlay.classList.toggle("show", state.gameStarted && state.paused && !state.over && !el.settingsModal.classList.contains("show"));
    }

    function startTimer() {
      clearInterval(state.timerId);
      state.startedAt = Date.now();
      state.elapsedBeforePause = 0;
      state.paused = false;
      state.timerId = setInterval(() => {
        if (state.over || state.paused || !state.gameStarted) return;
        updateStats();
        if (state.settings.timeLimit > 0 && getDisplaySeconds() <= 0) {
          endGame(false, "時間到了", "這局沒有在限制時間內完成，可以調整時間或難度後再試一次。");
        }
      }, 250);
    }

    function setPaused(shouldPause, showMessage = true) {
      if (!state.gameStarted || state.over) return;

      if (shouldPause && !state.paused) {
        state.elapsedBeforePause += Date.now() - state.startedAt;
        state.paused = true;
        if (showMessage) showToast("遊戲已暫停");
      }

      if (!shouldPause && state.paused) {
        state.startedAt = Date.now();
        state.paused = false;
        if (showMessage) showToast("繼續遊戲");
      }

      updateStats();
      renderBoard();
    }

    function pauseGame() {
      if (!state.gameStarted) {
        openSettings("start");
        return;
      }
      setPaused(!state.paused, true);
    }

    function vibrate(pattern) {
      if (!state.settings.vibration) return;
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function beep(type = "ok") {
      if (!state.settings.sound) return;
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const freq = type === "bad" ? 150 : type === "win" ? 660 : type === "shuffle" ? 280 : 420;
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.14);
      } catch (error) {}
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        el.toast.classList.remove("show");
      }, 1700);
    }

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function createTiles(pairCount) {
      const pack = emojiPacks[state.settings.pack] || emojiPacks.animals;
      const pairs = [];
      for (let i = 0; i < pairCount; i++) {
        const icon = pack[i % pack.length];
        pairs.push(icon, icon);
      }
      return shuffleArray(pairs);
    }

    function buildBoard() {
      const diff = difficulties[state.settings.difficulty] || difficulties.normal;
      state.rows = diff.rows;
      state.cols = diff.cols;
      const total = state.rows * state.cols;

      state.board = createSmartBoard(total / 2);
      state.remaining = total;
      state.selected = null;

      const assist = assistModes[state.settings.assist] || assistModes.standard;
      state.hintsLeft = assist.hints;
      state.shufflesLeft = assist.shuffles;
    }

    function createEmptyBoard() {
      return Array.from({ length: state.rows + 2 }, () => Array(state.cols + 2).fill(null));
    }

    function createSmartBoard(pairCount) {
      const maxAttempts = getSmartAttemptLimit();
      let bestBoard = null;
      let bestScore = -1;

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const candidate = createRandomBoard(pairCount);
        const score = scoreBoard(candidate);

        if (score > bestScore) {
          bestScore = score;
          bestBoard = cloneBoard(candidate);
        }

        if (score >= getOpeningPairTarget() && canSolveBoard(candidate, getSolveTrialCount())) {
          return candidate;
        }
      }

      return bestBoard || createRandomBoard(pairCount);
    }

    function createRandomBoard(pairCount) {
      const tiles = createTiles(pairCount);
      const board = createEmptyBoard();
      let index = 0;

      for (let r = 1; r <= state.rows; r++) {
        for (let c = 1; c <= state.cols; c++) {
          board[r][c] = tiles[index++];
        }
      }

      return board;
    }

    function getSmartAttemptLimit() {
      if (state.settings.difficulty === "easy") return 180;
      if (state.settings.difficulty === "normal") return 150;
      if (state.settings.difficulty === "hard") return 120;
      return 100;
    }

    function getSolveTrialCount() {
      if (state.settings.difficulty === "easy") return 26;
      if (state.settings.difficulty === "normal") return 20;
      if (state.settings.difficulty === "hard") return 14;
      return 10;
    }

    function getOpeningPairTarget() {
      if (state.settings.difficulty === "easy") return 4;
      if (state.settings.difficulty === "normal") return 3;
      return 2;
    }

    function scoreBoard(board) {
      const availableCount = countAvailablePairsOnBoard(board, 8);
      const solvableBonus = canSolveBoard(board, Math.max(4, Math.floor(getSolveTrialCount() / 2))) ? 20 : 0;
      return availableCount + solvableBonus;
    }

    function renderWaitingScreen() {
      el.board.innerHTML = "";
      clearPath();
      el.startHint.style.display = "grid";
      el.pauseOverlay.classList.remove("show");
      state.remaining = 0;
      state.hintsLeft = 0;
      state.shufflesLeft = 0;
      updateStats();
      updateSubtitle();
    }

    function renderBoard() {
      if (!state.gameStarted) {
        renderWaitingScreen();
        return;
      }

      el.startHint.style.display = "none";
      el.board.innerHTML = "";
      clearPath();

      el.board.style.gridTemplateColumns = `repeat(${state.cols}, var(--tileSize))`;
      el.board.style.gridTemplateRows = `repeat(${state.rows}, var(--tileSize))`;

      for (let r = 1; r <= state.rows; r++) {
        for (let c = 1; c <= state.cols; c++) {
          const value = state.board[r][c];
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "tile";
          btn.dataset.r = r;
          btn.dataset.c = c;
          btn.textContent = value || "";
          btn.setAttribute("aria-label", value ? `圖案 ${value}` : "空格");

          if (!value) btn.classList.add("empty");
          if (state.selected && state.selected.r === r && state.selected.c === c) btn.classList.add("selected");
          if (state.paused && value) {
            btn.textContent = "❔";
          }

          btn.addEventListener("click", () => handleTileClick(r, c));
          el.board.appendChild(btn);
        }
      }

      resizeBoard();
      updateStats();
      updateSubtitle();
    }

    function resizeBoard() {
      requestAnimationFrame(() => {
        if (!state.gameStarted) return;
        const frameRect = el.boardFrame.getBoundingClientRect();
        const baseWidth = state.cols * 42 + (state.cols - 1) * 6 + 8;
        const baseHeight = state.rows * 42 + (state.rows - 1) * 6 + 8;
        const widthScale = (frameRect.width - 18) / baseWidth;
        const heightScale = (frameRect.height - 18) / baseHeight;
        const scale = Math.min(1.36, widthScale, heightScale);
        const tileSize = Math.max(28, Math.min(48, 42 * scale));
        const gap = Math.max(3, Math.min(7, 6 * scale));

        document.documentElement.style.setProperty("--tileSize", `${tileSize}px`);
        document.documentElement.style.setProperty("--tileGap", `${gap}px`);
        el.boardScale.style.transform = "scale(1)";
      });
    }

    function updateSubtitle() {
      if (!state.gameStarted) {
        const diff = difficulties[state.settings.difficulty];
        const modeText = state.settings.timeLimit > 0 ? `限時 ${formatTime(state.settings.timeLimit)}` : "不限時間";
        el.subtitle.textContent = `開局設定｜${diff.name} ${diff.rows}×${diff.cols}｜${modeText}`;
        return;
      }

      const diff = difficulties[state.settings.difficulty];
      const bestKey = makeBestKey();
      const best = state.best[bestKey];
      const bestText = best ? `｜最佳 ${formatTime(best)}` : "";
      const modeText = state.settings.timeLimit > 0 ? `限時 ${formatTime(state.settings.timeLimit)}` : "不限時間";
      el.subtitle.textContent = `${diff.name} ${state.rows}×${state.cols}｜${modeText}${bestText}`;
    }

    function handleTileClick(r, c) {
      if (state.over || state.paused || !state.gameStarted) return;
      const value = state.board[r][c];
      if (!value) return;

      if (!state.selected) {
        state.selected = { r, c, value };
        vibrate(12);
        renderBoard();
        return;
      }

      if (state.selected.r === r && state.selected.c === c) {
        state.selected = null;
        renderBoard();
        return;
      }

      const first = state.selected;
      const second = { r, c, value };

      if (first.value !== second.value) {
        markBad(first, second);
        state.selected = second;
        vibrate(35);
        beep("bad");
        renderBoard();
        return;
      }

      const path = findPath(first, second);
      if (!path) {
        markBad(first, second);
        state.selected = second;
        vibrate(35);
        beep("bad");
        renderBoard();
        return;
      }

      state.selected = null;
      drawPath(path);
      removePair(first, second);
    }

    function markBad(a, b) {
      requestAnimationFrame(() => {
        document.querySelectorAll(`.tile[data-r="${a.r}"][data-c="${a.c}"], .tile[data-r="${b.r}"][data-c="${b.c}"]`).forEach(tile => {
          tile.classList.add("bad");
        });
      });
    }

    function removePair(a, b) {
      requestAnimationFrame(() => {
        const tiles = document.querySelectorAll(`.tile[data-r="${a.r}"][data-c="${a.c}"], .tile[data-r="${b.r}"][data-c="${b.c}"]`);
        tiles.forEach(tile => tile.classList.add("removing"));
      });

      state.board[a.r][a.c] = null;
      state.board[b.r][b.c] = null;
      state.remaining -= 2;
      vibrate([16, 20, 16]);
      beep("ok");

      setTimeout(() => {
        clearPath();

        if (state.remaining === 0) {
          renderBoard();
          endGame(true, "過關成功", "你已經清空所有圖案。");
          return;
        }

        const autoShuffled = autoShuffleIfDeadEnd();
        renderBoard();

        if (autoShuffled) {
          showToast("盤面已自動整理");
          beep("shuffle");
          vibrate([20, 30, 20]);
        }
      }, 190);
    }

    function isInside(r, c) {
      return r >= 0 && r <= state.rows + 1 && c >= 0 && c <= state.cols + 1;
    }

    function isPassable(r, c, target) {
      if (!isInside(r, c)) return false;
      if (target && r === target.r && c === target.c) return true;
      return state.board[r][c] === null;
    }

    function findPath(a, b) {
      const dirs = [
        { dr: -1, dc: 0 },
        { dr: 0, dc: 1 },
        { dr: 1, dc: 0 },
        { dr: 0, dc: -1 }
      ];

      const visited = Array.from({ length: state.rows + 2 }, () =>
        Array.from({ length: state.cols + 2 }, () => Array(4).fill(Infinity))
      );

      const queue = [{ r: a.r, c: a.c, dir: -1, turns: 0, path: [{ r: a.r, c: a.c }] }];

      while (queue.length) {
        const current = queue.shift();

        for (let d = 0; d < dirs.length; d++) {
          const nextTurns = current.dir === -1 ? 0 : current.turns + (current.dir === d ? 0 : 1);
          if (nextTurns > 2) continue;

          let nr = current.r + dirs[d].dr;
          let nc = current.c + dirs[d].dc;

          while (isInside(nr, nc) && isPassable(nr, nc, b)) {
            const nextPath = [...current.path, { r: nr, c: nc }];

            if (nr === b.r && nc === b.c) {
              return simplifyPath(nextPath);
            }

            if (visited[nr][nc][d] > nextTurns) {
              visited[nr][nc][d] = nextTurns;
              queue.push({ r: nr, c: nc, dir: d, turns: nextTurns, path: nextPath });
            }

            nr += dirs[d].dr;
            nc += dirs[d].dc;
          }
        }
      }

      return null;
    }

    function simplifyPath(path) {
      if (path.length <= 2) return path;
      const result = [path[0]];

      for (let i = 1; i < path.length - 1; i++) {
        const prev = path[i - 1];
        const now = path[i];
        const next = path[i + 1];
        const sameLine = (prev.r === now.r && now.r === next.r) || (prev.c === now.c && now.c === next.c);
        if (!sameLine) result.push(now);
      }

      result.push(path[path.length - 1]);
      return result;
    }

    function pointToPixel(point) {
      const tileSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--tileSize"));
      const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--tileGap"));
      const step = tileSize + gap;
      let x = (point.c - 1) * step + tileSize / 2 + 4;
      let y = (point.r - 1) * step + tileSize / 2 + 4;

      if (point.c === 0) x = -gap * 2;
      if (point.c === state.cols + 1) x = state.cols * step + gap;
      if (point.r === 0) y = -gap * 2;
      if (point.r === state.rows + 1) y = state.rows * step + gap;

      return { x, y };
    }

    function drawPath(path) {
      clearPath();
      const tileSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--tileSize"));
      const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--tileGap"));
      const width = state.cols * tileSize + (state.cols - 1) * gap + 8;
      const height = state.rows * tileSize + (state.rows - 1) * gap + 8;

      el.pathSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
      polyline.setAttribute("points", path.map(pointToPixel).map(p => `${p.x},${p.y}`).join(" "));
      el.pathSvg.appendChild(polyline);
    }

    function clearPath() {
      el.pathSvg.innerHTML = "";
    }

    function getAllFilledCells() {
      const cells = [];
      for (let r = 1; r <= state.rows; r++) {
        for (let c = 1; c <= state.cols; c++) {
          const value = state.board[r][c];
          if (value) cells.push({ r, c, value });
        }
      }
      return cells;
    }

    function findAvailablePair() {
      const groups = new Map();
      const cells = getAllFilledCells();

      for (const cell of cells) {
        if (!groups.has(cell.value)) groups.set(cell.value, []);
        groups.get(cell.value).push(cell);
      }

      for (const group of groups.values()) {
        for (let i = 0; i < group.length; i++) {
          for (let j = i + 1; j < group.length; j++) {
            const path = findPath(group[i], group[j]);
            if (path) return { a: group[i], b: group[j], path };
          }
        }
      }

      return null;
    }

    function autoShuffleIfDeadEnd() {
      if (!state.settings.autoCheck || state.remaining <= 0) return false;
      if (findAvailablePair()) return false;

      const success = smartReshuffleRemaining();
      state.selected = null;
      return success;
    }

    function useHint() {
      if (state.over || state.paused || !state.gameStarted || state.hintsLeft === 0) return;
      const pair = findAvailablePair();

      if (!pair) {
        const autoShuffled = autoShuffleIfDeadEnd();
        renderBoard();
        showToast(autoShuffled ? "盤面已自動整理" : "目前沒有可提示的組合");
        vibrate(35);
        beep("bad");
        return;
      }

      if (state.hintsLeft !== Infinity) state.hintsLeft -= 1;
      updateStats();

      const selector = `.tile[data-r="${pair.a.r}"][data-c="${pair.a.c}"], .tile[data-r="${pair.b.r}"][data-c="${pair.b.c}"]`;
      document.querySelectorAll(selector).forEach(tile => tile.classList.add("hint"));
      drawPath(pair.path);
      vibrate([18, 30, 18]);

      setTimeout(() => {
        clearPath();
        document.querySelectorAll(selector).forEach(tile => tile.classList.remove("hint"));
      }, 1800);
    }

    function reshuffleRemaining(showMessage = true) {
      const cells = getAllFilledCells();
      const values = shuffleArray(cells.map(cell => cell.value));

      cells.forEach((cell, index) => {
        state.board[cell.r][cell.c] = values[index];
      });

      state.selected = null;

      if (showMessage) {
        showToast("已重新洗牌目前剩餘圖案");
        vibrate([20, 30, 20]);
      }
    }

    function smartReshuffleRemaining() {
      const cells = getAllFilledCells();
      if (cells.length <= 0) return false;

      const values = cells.map(cell => cell.value);
      const originalBoard = cloneBoard(state.board);
      let bestBoard = null;
      let bestScore = -1;
      const maxAttempts = Math.max(80, getSmartAttemptLimit());

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const candidate = cloneBoard(originalBoard);
        const shuffledValues = shuffleArray(values);

        cells.forEach((cell, index) => {
          candidate[cell.r][cell.c] = shuffledValues[index];
        });

        const score = scoreBoard(candidate);

        if (score > bestScore) {
          bestScore = score;
          bestBoard = candidate;
        }

        if (score >= 2 && canSolveBoard(candidate, getSolveTrialCount())) {
          state.board = candidate;
          state.selected = null;
          return true;
        }
      }

      if (bestBoard) {
        state.board = bestBoard;
        state.selected = null;
        return true;
      }

      return false;
    }

    function useShuffle() {
      if (state.over || state.paused || !state.gameStarted || state.shufflesLeft === 0) return;

      if (state.shufflesLeft !== Infinity) state.shufflesLeft -= 1;

      const success = smartReshuffleRemaining();
      if (!success) reshuffleRemaining(false);

      renderBoard();
      updateStats();
      showToast(success ? "已智慧洗牌完成" : "已洗牌完成");
      vibrate([20, 30, 20]);
      beep("shuffle");
    }

    function cloneBoard(board) {
      return board.map(row => [...row]);
    }

    function isPassableOnBoard(board, r, c, target) {
      if (r < 0 || r > state.rows + 1 || c < 0 || c > state.cols + 1) return false;
      if (target && r === target.r && c === target.c) return true;
      return board[r][c] === null;
    }

    function findPathOnBoard(board, a, b) {
      const dirs = [
        { dr: -1, dc: 0 },
        { dr: 0, dc: 1 },
        { dr: 1, dc: 0 },
        { dr: 0, dc: -1 }
      ];

      const visited = Array.from({ length: state.rows + 2 }, () =>
        Array.from({ length: state.cols + 2 }, () => Array(4).fill(Infinity))
      );

      const queue = [{ r: a.r, c: a.c, dir: -1, turns: 0 }];

      while (queue.length) {
        const current = queue.shift();

        for (let d = 0; d < dirs.length; d++) {
          const nextTurns = current.dir === -1 ? 0 : current.turns + (current.dir === d ? 0 : 1);
          if (nextTurns > 2) continue;

          let nr = current.r + dirs[d].dr;
          let nc = current.c + dirs[d].dc;

          while (
            nr >= 0 &&
            nr <= state.rows + 1 &&
            nc >= 0 &&
            nc <= state.cols + 1 &&
            isPassableOnBoard(board, nr, nc, b)
          ) {
            if (nr === b.r && nc === b.c) return true;

            if (visited[nr][nc][d] > nextTurns) {
              visited[nr][nc][d] = nextTurns;
              queue.push({ r: nr, c: nc, dir: d, turns: nextTurns });
            }

            nr += dirs[d].dr;
            nc += dirs[d].dc;
          }
        }
      }

      return false;
    }

    function getAllFilledCellsFromBoard(board) {
      const cells = [];
      for (let r = 1; r <= state.rows; r++) {
        for (let c = 1; c <= state.cols; c++) {
          const value = board[r][c];
          if (value) cells.push({ r, c, value });
        }
      }
      return cells;
    }

    function getAvailablePairsOnBoard(board, limit = Infinity) {
      const groups = new Map();
      const cells = getAllFilledCellsFromBoard(board);
      const pairs = [];

      for (const cell of cells) {
        if (!groups.has(cell.value)) groups.set(cell.value, []);
        groups.get(cell.value).push(cell);
      }

      for (const group of groups.values()) {
        for (let i = 0; i < group.length; i++) {
          for (let j = i + 1; j < group.length; j++) {
            if (findPathOnBoard(board, group[i], group[j])) {
              pairs.push({ a: group[i], b: group[j] });
              if (pairs.length >= limit) return pairs;
            }
          }
        }
      }

      return pairs;
    }

    function countAvailablePairsOnBoard(board, limit = Infinity) {
      return getAvailablePairsOnBoard(board, limit).length;
    }

    function canSolveBoard(board, trials = 12) {
      const totalCells = getAllFilledCellsFromBoard(board).length;
      if (totalCells === 0) return true;

      for (let trial = 0; trial < trials; trial++) {
        const testBoard = cloneBoard(board);
        let remaining = totalCells;
        let guard = 0;

        while (remaining > 0 && guard < totalCells + 4) {
          let pairs = getAvailablePairsOnBoard(testBoard, 24);
          if (pairs.length === 0) break;

          pairs = rankPairsForSolving(testBoard, pairs);
          const pickRange = Math.min(pairs.length, trial < 3 ? 1 : 4);
          const pair = pairs[Math.floor(Math.random() * pickRange)];

          testBoard[pair.a.r][pair.a.c] = null;
          testBoard[pair.b.r][pair.b.c] = null;
          remaining -= 2;
          guard++;
        }

        if (remaining === 0) return true;
      }

      return false;
    }

    function rankPairsForSolving(board, pairs) {
      return pairs
        .map(pair => {
          const nextBoard = cloneBoard(board);
          nextBoard[pair.a.r][pair.a.c] = null;
          nextBoard[pair.b.r][pair.b.c] = null;
          return {
            pair,
            score: countAvailablePairsOnBoard(nextBoard, 10)
          };
        })
        .sort((x, y) => y.score - x.score)
        .map(item => item.pair);
    }

    function makeBestKey() {
      return `${state.settings.difficulty}-${state.settings.pack}-${state.settings.timeLimit}`;
    }

    function getPackName() {
      const names = {
        animals: "動物包",
        foods: "食物包",
        faces: "表情包",
        objects: "小物包",
        mixed: "混合包"
      };
      return names[state.settings.pack] || "圖案包";
    }

    function endGame(win, title, text) {
      state.over = true;
      clearInterval(state.timerId);
      updateStats();

      const elapsed = getElapsedSeconds();
      const diff = difficulties[state.settings.difficulty];
      const info = `${diff.name}｜${getPackName()}｜本局 ${formatTime(elapsed)}`;

      if (win) {
        const key = makeBestKey();
        if (!state.best[key] || elapsed < state.best[key]) {
          state.best[key] = elapsed;
          saveStorage();
          text += ` ${info}｜刷新最佳紀錄！`;
        } else {
          text += ` ${info}｜最佳 ${formatTime(state.best[key])}`;
        }
        el.resultEmoji.textContent = "🎉";
        beep("win");
        vibrate([25, 35, 25, 35, 45]);
      } else {
        text += ` ${info}`;
        el.resultEmoji.textContent = "⏰";
        beep("bad");
        vibrate(80);
      }

      el.resultTitle.textContent = title;
      el.resultText.textContent = text;
      el.resultModal.classList.add("show");
    }

    function newGame() {
      state.gameStarted = true;
      state.over = false;
      state.paused = false;
      state.pausedByModal = false;
      clearInterval(state.timerId);
      el.resultModal.classList.remove("show");
      el.settingsModal.classList.remove("show");
      buildBoard();
      renderBoard();
      startTimer();
      updateStats();
      showToast("新局開始");
    }

    function openSettings(mode = "settings") {
      syncSettingsUI();

      const isStart = mode === "start" || !state.gameStarted;
      state.settingsModalMode = isStart ? "start" : "settings";

      if (isStart) {
        el.settingsTitle.textContent = "🎮 開局設定";
        el.settingsDesc.textContent = "先選擇難度、時間與圖案包，按「開始遊戲」後才會產生棋盤並開始計時。";
        el.applySettingsBtn.textContent = "✅ 開始遊戲";
        el.closeSettingsBtn.classList.add("hidden");
      } else {
        el.settingsTitle.textContent = "⚙️ 遊戲設定";
        el.settingsDesc.textContent = "修改設定後按「套用新局」，會依照目前設定重新產生盤面。";
        el.applySettingsBtn.textContent = "✅ 套用新局";
        el.closeSettingsBtn.classList.remove("hidden");

        if (state.gameStarted && !state.over && !state.paused) {
          state.pausedByModal = true;
          setPaused(true, false);
        } else {
          state.pausedByModal = false;
        }
      }

      el.settingsModal.classList.add("show");
      updateStats();
    }

    function closeSettings() {
      if (state.settingsModalMode === "start" && !state.gameStarted) return;
      el.settingsModal.classList.remove("show");

      if (state.pausedByModal && state.gameStarted && !state.over) {
        state.pausedByModal = false;
        setPaused(false, false);
      }

      updateStats();
    }

    function resetBestRecords() {
      state.best = {};
      saveStorage();
      updateSubtitle();
      showToast("最佳紀錄已清除");
    }

    function setupEvents() {
      el.newBtn.addEventListener("click", () => {
        if (!state.gameStarted) {
          openSettings("start");
          return;
        }
        newGame();
      });

      el.hintBtn.addEventListener("click", useHint);
      el.shuffleBtn.addEventListener("click", useShuffle);
      el.settingsBtn.addEventListener("click", () => openSettings(state.gameStarted ? "settings" : "start"));
      el.pauseBtn.addEventListener("click", pauseGame);

      el.closeSettingsBtn.addEventListener("click", closeSettings);
      el.settingsModal.addEventListener("click", (event) => {
        if (event.target === el.settingsModal) closeSettings();
      });

      el.applySettingsBtn.addEventListener("click", () => {
        readSettingsUI();
        state.pausedByModal = false;
        newGame();
      });

      el.resetBestBtn.addEventListener("click", resetBestRecords);

      el.resultNewBtn.addEventListener("click", newGame);
      el.resultSettingsBtn.addEventListener("click", () => {
        el.resultModal.classList.remove("show");
        openSettings("settings");
      });

      window.addEventListener("resize", resizeBoard);

      if (window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: light)").addEventListener?.("change", applyTheme);
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && state.gameStarted && !state.paused && !state.over) {
          setPaused(true, true);
        }
      });
    }

    function init() {
      loadStorage();
      applyTheme();
      syncSettingsUI();
      setupEvents();
      renderWaitingScreen();
      openSettings("start");
    }

    init();
  </script>
</body>
