<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>命運占卜室</title>
  <style>
    :root {
      --bg: #090914;
      --bg2: #111124;
      --panel: rgba(23, 22, 43, 0.78);
      --panel-strong: rgba(31, 29, 58, 0.94);
      --card: rgba(255,255,255,.075);
      --card2: rgba(255,255,255,.12);
      --text: #f7f3ff;
      --muted: #c9c0df;
      --soft: #9e93ba;
      --line: rgba(255,255,255,.16);
      --gold: #f1c36d;
      --gold2: #fff0b7;
      --violet: #9a78ff;
      --violet2: #d4c3ff;
      --blue: #83d9ff;
      --danger: #ff7f9f;
      --ok: #9ff0c7;
      --shadow: 0 22px 60px rgba(0,0,0,.42);
      --radius: 24px;
      --radius2: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body[data-theme="light"] {
      --bg: #f9f3ff;
      --bg2: #efe3ff;
      --panel: rgba(255,255,255,.78);
      --panel-strong: rgba(255,255,255,.95);
      --card: rgba(73, 44, 111, .08);
      --card2: rgba(73, 44, 111, .13);
      --text: #241831;
      --muted: #554369;
      --soft: #76688b;
      --line: rgba(53, 30, 80, .18);
      --gold: #a97418;
      --gold2: #5d3f08;
      --violet: #6c43d5;
      --violet2: #351e66;
      --blue: #006c9e;
      --danger: #a21a43;
      --ok: #087b4f;
      --shadow: 0 18px 44px rgba(88, 61, 128, .20);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(154,120,255,.28), transparent 34%),
        radial-gradient(circle at 86% 18%, rgba(241,195,109,.18), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(131,217,255,.16), transparent 34%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      overflow-x: hidden;
      transition: color .25s ease, background .25s ease;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
    }
    body::before {
      opacity: .68;
      background-image:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,.42) 0 1px, transparent 1.5px),
        radial-gradient(circle at 42% 68%, rgba(255,255,255,.32) 0 1px, transparent 1.5px),
        radial-gradient(circle at 73% 28%, rgba(255,255,255,.34) 0 1px, transparent 1.5px),
        radial-gradient(circle at 88% 82%, rgba(255,255,255,.30) 0 1px, transparent 1.5px);
      background-size: 220px 220px, 260px 260px, 300px 300px, 360px 360px;
      animation: starDrift 22s linear infinite;
    }
    body::after {
      z-index: -1;
      background: radial-gradient(ellipse at center, transparent 18%, rgba(0,0,0,.22) 100%);
      opacity: .7;
    }
    body[data-theme="light"]::before { opacity: .36; }
    body[data-theme="light"]::after { opacity: .18; }

    body.bg-forest {
      background:
        radial-gradient(circle at 20% 18%, rgba(148, 218, 180, .24), transparent 32%),
        radial-gradient(circle at 84% 16%, rgba(199, 224, 255, .20), transparent 28%),
        linear-gradient(135deg, #061512, #142130 58%, #1a1130);
    }
    body[data-theme="light"].bg-forest {
      background:
        radial-gradient(circle at 18% 18%, rgba(93, 161, 128, .22), transparent 32%),
        radial-gradient(circle at 84% 10%, rgba(121, 106, 196, .18), transparent 30%),
        linear-gradient(135deg, #f2fff8, #eef5ff 60%, #faf0ff);
    }
    body.bg-table {
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 215, 139, .18), transparent 30%),
        radial-gradient(circle at 15% 85%, rgba(154, 120, 255, .20), transparent 32%),
        linear-gradient(135deg, #130d0b, #231526 54%, #0b0b18);
    }
    body[data-theme="light"].bg-table {
      background:
        radial-gradient(circle at 50% 14%, rgba(201, 128, 31, .16), transparent 30%),
        linear-gradient(135deg, #fff8ed, #f5e8ff 54%, #eef4ff);
    }
    body.bg-crystal {
      background:
        radial-gradient(circle at 22% 20%, rgba(87, 244, 255, .20), transparent 32%),
        radial-gradient(circle at 78% 30%, rgba(185, 114, 255, .26), transparent 34%),
        linear-gradient(135deg, #071223, #16153c 54%, #071522);
    }
    body[data-theme="light"].bg-crystal {
      background:
        radial-gradient(circle at 22% 18%, rgba(0, 145, 185, .16), transparent 32%),
        radial-gradient(circle at 80% 22%, rgba(122, 72, 199, .16), transparent 34%),
        linear-gradient(135deg, #effbff, #f7f1ff 58%, #f2ffff);
    }
    body.bg-temple {
      background:
        radial-gradient(circle at 20% 14%, rgba(255, 74, 74, .16), transparent 32%),
        radial-gradient(circle at 84% 20%, rgba(241, 195, 109, .18), transparent 32%),
        linear-gradient(135deg, #130708, #24121d 56%, #0f0c19);
    }
    body[data-theme="light"].bg-temple {
      background:
        radial-gradient(circle at 20% 14%, rgba(218, 51, 58, .10), transparent 32%),
        radial-gradient(circle at 84% 20%, rgba(176, 115, 21, .14), transparent 32%),
        linear-gradient(135deg, #fff7f0, #fff8df 56%, #f9efff);
    }

    @keyframes starDrift {
      0% { transform: translateY(0); }
      100% { transform: translateY(-80px); }
    }

    .app-shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: calc(14px + var(--safe-top)) 14px calc(22px + var(--safe-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0 12px;
      backdrop-filter: blur(16px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .sigil {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(154,120,255,.95), rgba(241,195,109,.82));
      box-shadow: 0 12px 30px rgba(154,120,255,.26);
      color: #fff;
      font-size: 23px;
      flex: 0 0 auto;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 4.6vw, 34px);
      line-height: 1.05;
      letter-spacing: .04em;
    }
    .brand p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions { display: flex; gap: 8px; flex: 0 0 auto; }

    button, select, textarea, input {
      font-family: inherit;
      color: inherit;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: none;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, opacity .18s ease;
      font-weight: 700;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover { background: var(--card2); border-color: rgba(241,195,109,.38); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(154,120,255,.94), rgba(241,195,109,.86));
      color: #fff;
      border-color: rgba(255,255,255,.20);
      box-shadow: 0 14px 34px rgba(154,120,255,.22);
    }
    .btn.gold {
      background: linear-gradient(135deg, rgba(241,195,109,.92), rgba(255,230,171,.72));
      color: #221608;
      border-color: rgba(255,255,255,.20);
    }
    .btn.ghost { background: transparent; }
    .btn.danger { color: var(--danger); border-color: rgba(255,127,159,.38); }
    .btn.small { min-height: 34px; padding: 7px 11px; font-size: 13px; }
    .btn.square { width: 42px; padding: 0; }
    .btn[disabled] { opacity: .48; cursor: not-allowed; }

    .hero {
      margin-top: 8px;
      padding: clamp(18px, 5vw, 34px);
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255,255,255,.09), transparent),
        var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(24px);
    }
    .hero::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      right: -70px;
      top: -70px;
      background: radial-gradient(circle, rgba(241,195,109,.30), rgba(154,120,255,.12) 46%, transparent 70%);
      filter: blur(1px);
    }
    .hero-content { position: relative; z-index: 1; }
    .hero h2 {
      margin: 0;
      font-size: clamp(26px, 7vw, 58px);
      letter-spacing: .04em;
      line-height: 1.08;
    }
    .hero .lead {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 720px;
      font-size: 15px;
    }
    .hero-stats {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      border-radius: 18px;
      padding: 12px;
      min-height: 72px;
    }
    .mini-stat b { display: block; font-size: 20px; color: var(--gold2); }
    body[data-theme="light"] .mini-stat b { color: var(--gold2); }
    .mini-stat span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }

    .section-title {
      margin: 22px 4px 12px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }
    .section-title h3 { margin: 0; font-size: 18px; letter-spacing: .04em; }
    .section-title p { margin: 0; font-size: 12px; color: var(--muted); }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .mode-card {
      position: relative;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.045));
      border-radius: 22px;
      padding: 16px;
      min-height: 152px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 14px 38px rgba(0,0,0,.14);
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
      backdrop-filter: blur(18px);
    }
    .mode-card:hover { transform: translateY(-3px); border-color: rgba(241,195,109,.46); }
    .mode-card:active { transform: scale(.985); }
    .mode-card::before {
      content: "";
      position: absolute;
      inset: -40% -20% auto auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(154,120,255,.28), transparent 70%);
    }
    .mode-icon { font-size: 34px; margin-bottom: 12px; }
    .mode-card h4 { margin: 0; font-size: 18px; }
    .mode-card p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .mode-card .tag {
      position: absolute;
      right: 12px;
      bottom: 12px;
      color: var(--gold2);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.04);
    }
    .panel-title h2 { margin: 0; font-size: 22px; }
    .panel-title p { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.4; }
    .panel-body { padding: 16px; }
    .soft-card {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 12px;
    }
    .soft-card:last-child { margin-bottom: 0; }

    .form-grid { display: grid; gap: 12px; }
    .field label {
      display: block;
      margin: 0 0 7px 2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      outline: none;
      border-radius: 18px;
      background: rgba(255,255,255,.07);
      color: var(--text);
      padding: 13px 14px;
      font-size: 16px;
      line-height: 1.45;
    }
    body[data-theme="light"] textarea,
    body[data-theme="light"] input,
    body[data-theme="light"] select { background: rgba(255,255,255,.70); }
    textarea { min-height: 96px; resize: vertical; }
    select option { color: #1d1528; background: #fff; }

    .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--muted);
      background: rgba(255,255,255,.045);
      font-weight: 800;
      font-size: 13px;
    }
    .pill.active { color: #fff; background: rgba(154,120,255,.84); border-color: rgba(255,255,255,.22); }
    body[data-theme="light"] .pill.active { color: #fff; }

    .result-card {
      position: relative;
      border: 1px solid rgba(241,195,109,.34);
      background:
        linear-gradient(145deg, rgba(241,195,109,.12), rgba(154,120,255,.10)),
        var(--panel-strong);
      border-radius: 26px;
      padding: clamp(16px, 4.4vw, 26px);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeUp .32s ease both;
    }
    .result-card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      right: -80px;
      top: -80px;
      background: radial-gradient(circle, rgba(241,195,109,.22), transparent 70%);
    }
    .result-card h3 { margin: 0 0 8px; font-size: 24px; position: relative; }
    .result-card .sub { margin: 0 0 14px; color: var(--muted); line-height: 1.55; position: relative; }
    .result-block { position: relative; border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }
    .result-block h4 { margin: 0 0 7px; color: var(--gold2); font-size: 15px; }
    .result-block p { margin: 0; line-height: 1.72; color: var(--text); }
    .result-list { display: grid; gap: 10px; margin-top: 12px; }
    .result-item {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.052);
      border-radius: 18px;
      padding: 12px;
    }
    .result-item b { color: var(--gold2); }
    .result-item p { margin: 6px 0 0; color: var(--muted); line-height: 1.62; }

    .meter {
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      overflow: hidden;
      margin: 9px 0 0;
    }
    .meter span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--violet), var(--gold));
      width: 0%;
      transition: width .55s ease;
    }

    .tarot-table {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .tarot-back,
    .tarot-reveal {
      aspect-ratio: 3/4.2;
      border-radius: 18px;
      border: 1px solid var(--line);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      min-height: 118px;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }
    .tarot-back {
      background:
        radial-gradient(circle at 50% 28%, rgba(241,195,109,.26), transparent 34%),
        linear-gradient(155deg, rgba(93,67,167,.92), rgba(19,17,43,.96));
      color: #fff;
      transition: transform .22s ease, filter .18s ease, opacity .2s ease, background .25s ease;
      transform-style: preserve-3d;
    }
    .tarot-back::before {
      content: "✦";
      font-size: 34px;
      color: rgba(255,240,183,.95);
      text-shadow: 0 0 18px rgba(241,195,109,.45);
    }
    .tarot-back::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 14px;
      pointer-events: none;
    }
    .tarot-back:hover { transform: translateY(-4px); filter: brightness(1.06); }
    .tarot-back.used:not(.flipped) { opacity: .22; pointer-events: none; }
    .tarot-back.flipped {
      pointer-events: none;
      color: var(--text);
      border-color: rgba(241,195,109,.46);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,240,183,.30), transparent 34%),
        linear-gradient(155deg, rgba(255,255,255,.16), rgba(255,255,255,.055));
      box-shadow: 0 14px 34px rgba(241,195,109,.10), inset 0 0 0 1px rgba(255,255,255,.08);
      animation: tarotFlip .42s ease both;
    }
    .tarot-back.flipped::before { content: none; }
    .tarot-table.done .tarot-back:not(.flipped) { display: none; }
    .tarot-card-label { font-size: 11px; color: var(--gold2); font-weight: 900; line-height: 1.2; }
    .tarot-card-face { font-size: 30px; line-height: 1.05; margin: 5px 0 3px; }
    .tarot-card-name { font-size: 13px; font-weight: 900; line-height: 1.22; }
    .tarot-card-key { margin-top: 4px; font-size: 11px; color: var(--muted); line-height: 1.25; }
    .tarot-reveal {
      background: linear-gradient(155deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
    }
    .tarot-reveal .face { font-size: 32px; }
    .tarot-reveal b { margin-top: 8px; font-size: 13px; }
    .tarot-reveal span { margin-top: 4px; color: var(--muted); font-size: 12px; }
    @keyframes tarotFlip {
      0% { transform: rotateY(0deg) scale(.98); filter: brightness(.9); }
      48% { transform: rotateY(88deg) scale(1.02); }
      100% { transform: rotateY(0deg) scale(1); filter: brightness(1); }
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .choice-card {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 20px;
      padding: 14px;
      cursor: pointer;
      min-height: 92px;
    }
    .choice-card:hover { background: var(--card2); border-color: rgba(241,195,109,.42); }
    .choice-card b { display: block; font-size: 16px; }
    .choice-card span { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .oracle-stage {
      display: grid;
      place-items: center;
      min-height: 230px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background:
        radial-gradient(circle at 50% 40%, rgba(154,120,255,.24), transparent 36%),
        rgba(255,255,255,.045);
      margin: 12px 0;
      overflow: hidden;
      position: relative;
    }
    .crystal {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, rgba(255,255,255,.85), transparent 16%),
        radial-gradient(circle at 50% 58%, rgba(131,217,255,.42), transparent 48%),
        linear-gradient(145deg, rgba(154,120,255,.76), rgba(241,195,109,.38));
      border: 1px solid rgba(255,255,255,.34);
      box-shadow: 0 0 48px rgba(154,120,255,.35), inset 0 0 32px rgba(255,255,255,.16);
      animation: float 3.4s ease-in-out infinite;
    }
    .lot-stick {
      width: 70px;
      height: 170px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(241,195,109,.92), rgba(135,76,34,.95));
      border: 1px solid rgba(255,255,255,.26);
      box-shadow: 0 22px 40px rgba(0,0,0,.20);
      transform: rotate(-8deg);
      display: grid;
      place-items: center;
      color: #321b08;
      font-size: 26px;
      font-weight: 900;
    }
    .shake { animation: shake .72s ease both; }
    .dice-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .dice {
      width: 82px;
      height: 82px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
      border: 1px solid var(--line);
      font-size: 31px;
      box-shadow: 0 14px 34px rgba(0,0,0,.12);
    }
    .rolling { animation: roll .74s ease both; }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes shake {
      0%,100% { transform: rotate(-8deg) translateX(0); }
      20% { transform: rotate(8deg) translateX(7px); }
      40% { transform: rotate(-14deg) translateX(-6px); }
      60% { transform: rotate(10deg) translateX(6px); }
      80% { transform: rotate(-10deg) translateX(-4px); }
    }
    @keyframes roll {
      0% { transform: rotate(0deg) scale(1); }
      45% { transform: rotate(18deg) scale(1.08); }
      75% { transform: rotate(-14deg) scale(.98); }
      100% { transform: rotate(0deg) scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .record-list { display: grid; gap: 10px; }
    .record-card {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      padding: 12px;
    }
    .record-card header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }
    .record-card h4 { margin: 0; font-size: 15px; }
    .record-card small { color: var(--soft); display: block; margin-top: 3px; }
    .record-card p { margin: 0; color: var(--muted); line-height: 1.55; font-size: 13px; }
    .record-actions { display: flex; gap: 7px; flex-shrink: 0; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: end;
      justify-content: center;
      padding: 14px;
      background: rgba(0,0,0,.48);
      backdrop-filter: blur(14px);
    }
    .modal.show { display: flex; }
    .modal-box {
      width: min(760px, 100%);
      max-height: min(84vh, 820px);
      overflow: auto;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      border-radius: 28px;
      box-shadow: var(--shadow);
      animation: fadeUp .22s ease both;
    }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-strong);
      backdrop-filter: blur(14px);
    }
    .modal-head h3 { margin: 0; font-size: 18px; }
    .modal-body { padding: 14px; }
    details {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 10px;
    }
    summary { cursor: pointer; font-weight: 900; color: var(--text); }
    details .inside { padding-top: 12px; }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .theme-tile {
      border: 1px solid var(--line);
      border-radius: 18px;
      min-height: 78px;
      padding: 10px;
      cursor: pointer;
      background: var(--card);
      display: flex;
      align-items: end;
      font-weight: 900;
      font-size: 12px;
    }
    .theme-tile.active { outline: 2px solid rgba(241,195,109,.75); }
    .tile-stars { background: linear-gradient(135deg, #111124, #4a328d); color:#fff; }
    .tile-forest { background: linear-gradient(135deg, #09231b, #3f557d); color:#fff; }
    .tile-table { background: linear-gradient(135deg, #1e0f0b, #563250); color:#fff; }
    .tile-crystal { background: linear-gradient(135deg, #0a2035, #5b4db7); color:#fff; }
    .tile-temple { background: linear-gradient(135deg, #2a0e12, #8a6330); color:#fff; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + var(--safe-bottom));
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      z-index: 300;
      background: rgba(20,18,32,.92);
      color: #fff;
      border: 1px solid rgba(255,255,255,.16);
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: 0 14px 38px rgba(0,0,0,.25);
      transition: opacity .2s ease, transform .2s ease;
      font-weight: 800;
      font-size: 13px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .gold-text { color: var(--gold2); }
    .danger-text { color: var(--danger); }
    .ok-text { color: var(--ok); }

    @media (max-width: 900px) {
      .mode-grid { grid-template-columns: repeat(2, 1fr); }
      .choice-grid { grid-template-columns: repeat(2, 1fr); }
      .theme-grid { grid-template-columns: repeat(2, 1fr); }
      .tarot-table { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .app-shell { padding-left: 10px; padding-right: 10px; }
      .topbar { align-items: flex-start; }
      .brand p { max-width: 220px; }

      .hero-stats { grid-template-columns: 1fr; }

      .mode-card { min-height: 124px; }
      .panel-head { align-items: flex-start; }
      .choice-grid { grid-template-columns: 1fr; }
      .tarot-table { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .tarot-back, .tarot-reveal { border-radius: 14px; min-height: 106px; padding: 7px; }
      .tarot-card-face { font-size: 26px; }
      .tarot-card-name { font-size: 12px; }
      .tarot-card-key { font-size: 10px; }
      .tarot-back::after { inset: 8px; border-radius: 10px; }
      .modal { align-items: end; padding: 9px; }
      .modal-box { border-radius: 24px; max-height: 88vh; }
      .dice { width: 72px; height: 72px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }

      const copy = [...arr];

      return out;
    }

      return items[items.length - 1];

    function startTarot(count) {
      const labels = count === 1 ? ['答案'] : count === 3 ? ['過去 / 原因','現在 / 狀態','未來 / 建議'] : ['現況','隱藏原因','內心狀態','外在影響','最終建議'];
      tarotSession = { count, labels, selected: [], used: [], finished: false };
      document.getElementById('tarotArea').innerHTML = `
        <div class="form-grid">
          <div class="field">
            <label>想問的問題</label>
            <textarea id="tarotQuestion" placeholder="例如：這件事接下來該怎麼做？可以不填。"></textarea>
          </div>
          <div class="pill-row">${labels.map((x,i)=>`<span class="pill" id="slot${i}">${i+1}. ${x}</span>`).join('')}</div>
          <p class="muted" style="margin:0">請直接點擊下方牌背，卡片會在原位置翻開，不會再把結果拉到很長。</p>
        </div>
        <div class="tarot-table" id="tarotDeck">
          ${Array.from({length: 18}).map((_,i)=>`<button class="tarot-back" id="back${i}" onclick="pickTarot(${i})" aria-label="選擇第 ${i+1} 張牌"></button>`).join('')}
        </div>
        <div id="tarotResult" style="margin-top:14px"></div>`;
    }

    function pickTarot(i) {
      if (!tarotSession || tarotSession.selected.length >= tarotSession.count || tarotSession.finished) return;
      const remain = tarotCards.map((_,idx)=>idx).filter(idx => !tarotSession.used.includes(idx));
      const cardIndex = pick(remain);
      tarotSession.used.push(cardIndex);
      const card = tarotCards[cardIndex];
      const reversed = Math.random() < .42;
      const pos = tarotSession.selected.length;
      tarotSession.selected.push({ card, reversed });
      const back = document.getElementById('back' + i);
      if (back) {
        back.classList.add('used', 'flipped');
        back.innerHTML = renderTarotCardFace(card, reversed, tarotSession.labels[pos]);
      }
      const slot = document.getElementById('slot' + pos);
      if (slot) slot.classList.add('active');
      if (tarotSession.selected.length >= tarotSession.count) finishTarot();
    }
    function renderTarotCardFace(card, reversed, label) {
      return `
        <span class="tarot-card-label">${label}</span>
        <span class="tarot-card-face">${card.emoji}</span>
        <span class="tarot-card-name">${card.name}</span>
        <span class="tarot-card-key">${reversed ? '逆位' : '正位'}｜${card.keywords.slice(0,2).join('、')}</span>
      `;
    }
    function renderPickedTarot() { /* 第一版保留函式名，現已改為卡片原位翻牌。 */ }
    function finishTarot() {
      if (!tarotSession || tarotSession.finished) return;
      tarotSession.finished = true;
      const deck = document.getElementById('tarotDeck');
      if (deck) deck.classList.add('done');
      const q = document.getElementById('tarotQuestion')?.value.trim() || '未填寫問題';
      const compact = tarotSession.selected.map((it, idx) => {
        const meaning = makeTarotDetail(it, idx);
        return `<div class="result-item"><b>${tarotSession.labels[idx]}｜${it.card.name}（${it.reversed ? '逆位' : '正位'}）</b><p>${meaning}</p></div>`;
      }).join('');
      const overall = makeTarotOverall(tarotSession.selected);
      const advice = pick(tarotActionAdvice);
      const body = `
        <div class="result-card">
          <h3>塔羅結果</h3>
          <p class="sub">問題：${escapeHTML(q)}｜已直接翻開於上方牌面</p>
          <div class="result-block"><h4>整體傾向</h4><p>${overall}</p></div>
          <details style="margin-top:12px" open>
            <summary>查看每張牌詳細解讀</summary>
            <div class="inside result-list">${compact}</div>
          </details>
          <div class="result-block"><h4>建議行動</h4><p>${advice}</p></div>
        </div>
        <div class="action-row"><button class="btn" onclick="renderTarot()">再占一次</button></div>`;
      document.getElementById('tarotResult').innerHTML = body;
      const detail = tarotSession.selected.map((it, idx)=>`${tarotSession.labels[idx]}：${it.card.name}${it.reversed?'逆位':'正位'}｜${makeTarotDetail(it, idx)}`).join('\\n');
      makeRecord('塔羅占卜', `塔羅占卜｜${tarotSession.count} 張牌`, `問題：${q}`, `整體傾向：${overall}\n${detail}\n建議：${advice}`);
      showToast('塔羅結果已存入紀錄');
    }
    function makeTarotDetail(it, idx) {
      const base = it.reversed ? it.card.rev : it.card.up;
      const label = tarotSession?.labels?.[idx] || '此牌';
      const context = pick(tarotContextLines);
      return `關鍵字：${it.card.keywords.join('、')}。${base}以「${label}」來看，${context}`;
    }
    function makeTarotOverall(cards) {
      const revCount = cards.filter(x => x.reversed).length;
      if (revCount === 0) return '整體能量順暢，適合主動推進，但仍要維持清楚的節奏。';
      if (revCount >= cards.length - 1) return '阻礙與內在拉扯較明顯，現在更適合調整策略，而不是硬推結果。';
      return '局勢有機會也有阻力，關鍵在於你能否看清真正卡住的地方。';
    }

        <article class="record-card">
          <header>
            <div><h4>${escapeHTML(r.title)}</h4><small>${escapeHTML(r.mode)}｜${escapeHTML(r.time)}</small></div>
            <div class="record-actions">
              <button class="btn small" onclick="toggleFav('${r.id}')">${r.favorite ? '★' : '☆'}</button>
              <button class="btn small danger" onclick="deleteRecord('${r.id}')">刪除</button>
            </div>
          </header>
          <p><b>${escapeHTML(r.summary)}</b></p>
          <p style="margin-top:8px; white-space:pre-line">${escapeHTML(r.detail)}</p>
        </article>`;
    }
    function toggleFav(id) {
      const rec = state.records.find(r => r.id === id);
      if (rec) rec.favorite = !rec.favorite;
      saveState();
      openRecords();
    }
    function deleteRecord(id) {
      state.records = state.records.filter(r => r.id !== id);
      saveState();
      openRecords();
      showToast('紀錄已刪除');
    }
    function clearAllRecords() {
      if (!confirm('確定要清空所有占卜紀錄嗎？')) return;
      state.records = [];
      saveState();
      openRecords();
      renderHome();
      showToast('紀錄已清空');
    }
    function exportRecords() {
      const data = JSON.stringify({ exportedAt: nowText(), records: state.records || [] }, null, 2);
      const blob = new Blob([data], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `占卜紀錄_${todayKey()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('已匯出紀錄');
    }

    function openModal(title, body) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modal').classList.add('show');
    }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    function modalBackdrop(e) { if (e.target.id === 'modal') closeModal(); }

    applyState();
    renderHome();
  </script>
</body>
</html>
