<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>記憶翻牌</title>
<style>
:root{
  --bg:#0d111a;--bg2:#151b28;--panel:rgba(255,255,255,.075);--panel2:rgba(255,255,255,.12);
  --text:#f6f8ff;--muted:#aab5cf;--line:rgba(255,255,255,.15);--accent:#76caff;--accent2:#a988ff;
  --good:#6ee7a8;--bad:#ff7187;--warn:#ffd36e;--cardA:#20283b;--cardB:#313b57;--front:#f8fbff;--frontText:#172033;
  --shadow:0 24px 70px rgba(0,0,0,.34);--radius:24px;--cols:4;--gap:8px;
}
body.light{
  --bg:#edf3fb;--bg2:#f8fbff;--panel:rgba(255,255,255,.72);--panel2:rgba(255,255,255,.92);
  --text:#182236;--muted:#5c6982;--line:rgba(38,54,82,.16);--accent:#1877c9;--accent2:#7659d8;
  --good:#188957;--bad:#ce344d;--warn:#a66800;--cardA:#d8e3f3;--cardB:#f4f8ff;--front:#ffffff;--frontText:#172033;
  --shadow:0 24px 58px rgba(39,58,94,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--text);background:linear-gradient(145deg,var(--bg),var(--bg2));touch-action:manipulation}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.38;background:radial-gradient(circle at 18% 10%, color-mix(in srgb,var(--accent) 34%, transparent), transparent 32%),radial-gradient(circle at 86% 14%, color-mix(in srgb,var(--accent2) 30%, transparent), transparent 30%),radial-gradient(circle at 50% 96%, rgba(255,255,255,.08), transparent 34%)}
body.theme-dots::after,body.theme-grid::after,body.theme-soft::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}body.theme-dots::after{background-image:radial-gradient(circle,rgba(255,255,255,.26) 1.2px,transparent 1.8px);background-size:28px 28px}body.light.theme-dots::after{background-image:radial-gradient(circle,rgba(20,35,60,.13) 1.2px,transparent 1.8px)}body.theme-grid::after{background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:34px 34px}body.light.theme-grid::after{background-image:linear-gradient(rgba(30,44,70,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(30,44,70,.08) 1px,transparent 1px)}body.theme-soft::after{background:radial-gradient(circle at 25% 30%,rgba(255,255,255,.08),transparent 18%),radial-gradient(circle at 75% 70%,rgba(255,255,255,.07),transparent 16%)}
button,select{font:inherit;color:inherit}button{border:0;cursor:pointer}select{cursor:pointer}.app{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom))}.shell{width:min(540px,100%);height:100%;max-height:920px;display:flex;flex-direction:column;gap:10px}.screen{display:none;height:100%;min-height:0}.screen.active{display:flex;flex-direction:column}.glass{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px);border-radius:var(--radius)}
.home{justify-content:center;gap:16px;text-align:center;padding:8px}.logo{width:92px;height:92px;margin:0 auto;border-radius:30px;background:linear-gradient(145deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:42px;box-shadow:0 18px 48px color-mix(in srgb,var(--accent) 28%,transparent);transform:rotate(-3deg)}h1{margin:0;font-size:34px;letter-spacing:.08em}.sub{margin:4px 0 0;color:var(--muted);font-size:14px;line-height:1.55}.homeCard{padding:18px;display:flex;flex-direction:column;gap:12px}.btn{min-height:48px;border-radius:16px;padding:0 16px;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:8px;font-weight:850;letter-spacing:.03em;box-shadow:0 10px 24px rgba(0,0,0,.12);transition:transform .12s ease,filter .12s ease}.btn:active{transform:scale(.97)}.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:0;text-shadow:0 1px 2px rgba(0,0,0,.28)}.btn.danger{background:color-mix(in srgb,var(--bad) 18%,var(--panel2));color:var(--text)}body.light .btn.danger{background:#fff2f4;color:#9d1f35;border-color:rgba(157,31,53,.25)}.btn:disabled{opacity:.55}.quickStats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{padding:11px 6px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid var(--line);min-width:0}body.light .stat{background:rgba(255,255,255,.68)}.stat b{display:block;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.stat span{font-size:12px;color:var(--muted)}
.topbar{flex:0 0 auto;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px}.gameTitle{display:flex;gap:8px;align-items:center;min-width:0}.roundBtn,.iconBtn{width:42px;height:42px;border-radius:15px;background:var(--panel2);border:1px solid var(--line);font-weight:900;display:grid;place-items:center}.iconBtn{font-size:18px}.gameTitleText{min-width:0}.gameTitleText b{font-size:16px}.gameTitleText div{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topActions{display:flex;gap:7px}.hud{flex:0 0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.hudBox{padding:8px 6px;text-align:center;border-radius:16px;background:var(--panel);border:1px solid var(--line)}.hudBox span{display:block;font-size:11px;color:var(--muted)}.hudBox b{font-size:18px;line-height:1.25}.progress{height:8px;border-radius:99px;background:rgba(255,255,255,.12);border:1px solid var(--line);overflow:hidden}.progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--good));transition:width .25s ease}.boardArea{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px 0}.boardFrame{width:100%;height:100%;display:flex;align-items:center;justify-content:center}.board{display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:var(--gap);width:min(100%,calc(var(--boardSize, 420px)));height:min(100%,calc(var(--boardSize, 420px)));aspect-ratio:1/1}.card{position:relative;border-radius:16px;min-width:0;min-height:0;perspective:900px;background:transparent}.cardInner{position:absolute;inset:0;border-radius:inherit;transform-style:preserve-3d;transition:transform .28s cubic-bezier(.2,.8,.2,1)}.card.flipped .cardInner,.card.matched .cardInner{transform:rotateY(180deg)}.face{position:absolute;inset:0;border-radius:inherit;backface-visibility:hidden;display:grid;place-items:center;border:1px solid var(--line);box-shadow:0 9px 20px rgba(0,0,0,.2);overflow:hidden}.back{background:linear-gradient(145deg,var(--cardA),var(--cardB))}.back::before{content:"";width:48%;height:48%;border-radius:14px;border:2px solid color-mix(in srgb,var(--accent) 72%,white 8%);box-shadow:inset 0 0 18px color-mix(in srgb,var(--accent) 25%,transparent),0 0 16px color-mix(in srgb,var(--accent) 18%,transparent);transform:rotate(45deg)}.front{transform:rotateY(180deg);background:linear-gradient(145deg,var(--front),color-mix(in srgb,var(--front) 78%,var(--accent) 9%));color:var(--frontText);font-size:clamp(22px,8.2vw,42px);font-weight:900}.card.matched .front{outline:2px solid color-mix(in srgb,var(--good) 70%,white 5%)}.card.justMatched .front{animation:matchPop .34s ease}.card.wrong .cardInner{animation:shake .28s ease}@keyframes matchPop{50%{transform:rotateY(180deg) scale(1.045)}}@keyframes shake{25%{transform:translateX(-3px) rotateY(180deg)}75%{transform:translateX(3px) rotateY(180deg)}}
.modalLayer{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(0,0,0,.52)}.modalLayer.show{display:flex}.modal{width:min(470px,100%);max-height:min(760px,92dvh);display:flex;flex-direction:column;background:color-mix(in srgb,var(--bg2) 92%,black 0%);border:1px solid var(--line);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.45);overflow:hidden}body.light .modal{background:#fbfdff;color:#172033}.modalHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 16px;border-bottom:1px solid var(--line)}.modalHead b{font-size:18px}.modalBody{padding:16px;overflow:auto}.modalFoot{display:flex;gap:10px;padding:13px 16px;border-top:1px solid var(--line)}.modalFoot .btn{flex:1}.close{width:38px;height:38px;border-radius:13px;background:var(--panel2);border:1px solid var(--line)}.formGrid{display:grid;gap:12px}.field{display:grid;gap:7px}.field label{font-size:13px;color:var(--muted);font-weight:850}.select,.switchRow{height:46px;border-radius:15px;padding:0 13px;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.select{width:100%;appearance:none;color:var(--text);background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 18px) 19px,calc(100% - 12px) 19px;background-size:6px 6px,6px 6px;background-repeat:no-repeat}.select option{color:#172033;background:#fff}.hint{font-size:12px;color:var(--muted);line-height:1.5}.switchRow button{width:52px;height:28px;border-radius:99px;background:rgba(255,255,255,.18);border:1px solid var(--line);position:relative}.switchRow button::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--text);transition:.2s}body.light .switchRow button{background:#edf3fb}body.light .switchRow button::after{background:#172033}.switchRow.on button{background:linear-gradient(135deg,var(--accent),var(--accent2))}.switchRow.on button::after{left:27px;background:white}.rankTabs{display:flex;gap:8px;margin-bottom:10px}.rankTabs .btn{min-height:40px;flex:1;font-size:13px}.list{display:grid;gap:9px}.rankItem{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;padding:10px;border-radius:15px;background:var(--panel);border:1px solid var(--line);color:var(--text)}body.light .rankItem{background:#fff;color:#172033}.rankItem .num{font-weight:950;color:var(--accent)}.rankItem small{color:var(--muted)}.resultBig{text-align:center;font-size:44px;margin:4px 0}.resultTitle{text-align:center;font-size:24px;font-weight:950}.resultStats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.toast{position:fixed;z-index:20;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(18px);opacity:0;transition:.22s;background:rgba(0,0,0,.82);color:#fff;padding:10px 14px;border-radius:99px;font-size:13px;pointer-events:none;max-width:92%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:430px){.app{padding:calc(8px + env(safe-area-inset-top)) 8px calc(8px + env(safe-area-inset-bottom))}.shell{gap:8px}.home{gap:11px}.logo{width:78px;height:78px;border-radius:24px;font-size:34px}h1{font-size:28px}.homeCard{padding:15px;gap:10px}.btn{min-height:46px}.topbar{padding:7px}.roundBtn,.iconBtn{width:40px;height:40px}.hud{gap:6px}.hudBox{padding:7px 4px}.hudBox b{font-size:16px}.board{--gap:6px}.card{border-radius:12px}.front{font-size:clamp(19px,7.3vw,34px)}.modalLayer{padding:10px}.modalFoot{gap:8px}.resultStats{gap:6px}.stat b{font-size:15px}.quickStats .stat{padding:9px 4px}}
@media (max-height:700px){.home{gap:9px}.logo{width:68px;height:68px;font-size:30px}.sub{font-size:13px}.homeCard{gap:9px}.btn{min-height:43px}.hudBox{padding:6px 4px}.progress{height:7px}.boardArea{padding:2px 0}.topbar{padding:6px}}
@media (max-width:360px){.quickStats{gap:6px}.hudBox b{font-size:15px}.gameTitleText b{font-size:15px}.gameTitleText div{font-size:11px}.roundBtn,.iconBtn{width:38px;height:38px}.board{--gap:5px}.card{border-radius:10px}.front{font-size:clamp(17px,7vw,30px)}}
</style>
</head>
<body class="theme-dots">
<div class="app">
  <main class="shell">
    <section id="home" class="screen active home">
      <div class="logo">🧠</div>
      <div><h1>記憶翻牌</h1><p class="sub">找出相同圖案。設定、排行榜、結算皆改為彈窗，不佔用遊戲畫面。</p></div>
      <div class="homeCard glass">
        <button class="btn primary" id="startBtn">開始遊戲</button>
        <button class="btn" id="openSettingsBtn">設定</button>
        <button class="btn" id="openRanksBtn">排行榜</button>
        <div class="quickStats">
          <div class="stat"><b id="homeBest">--</b><span>最佳</span></div>
          <div class="stat"><b id="homeMode">經典</b><span>模式</span></div>
          <div class="stat"><b id="homeDiff">4×4</b><span>難度</span></div>
        </div>
      </div>
    </section>
    <section id="game" class="screen">
      <div class="topbar glass">
        <div class="gameTitle"><button class="roundBtn" id="backHomeBtn" aria-label="返回主畫面">‹</button><div class="gameTitleText"><b>記憶翻牌</b><div id="modeLine">經典模式 · 4×4</div></div></div>
        <div class="topActions"><button class="iconBtn" id="restartBtn" aria-label="重新開始">↻</button><button class="iconBtn" id="gameSettingsBtn" aria-label="設定">⚙</button></div>
      </div>
      <div class="hud">
        <div class="hudBox"><span id="timeLabel">時間</span><b id="timeText">00:00</b></div>
        <div class="hudBox"><span>步數</span><b id="movesText">0</b></div>
        <div class="hudBox"><span>配對</span><b id="matchText">0/8</b></div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <div class="boardArea"><div class="boardFrame"><div id="board" class="board"></div></div></div>
    </section>
  </main>
</div>
<div id="modalLayer" class="modalLayer" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modalHead"><b id="modalTitle">設定</b><button class="close" id="closeModalBtn" aria-label="關閉">✕</button></div>
    <div class="modalBody" id="modalBody"></div>
    <div class="modalFoot" id="modalFoot"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const $=s=>document.querySelector(s);
const storeKey='memory_match_reviewed_v2';
const symbols={
  animals:['🐶','🐱','🐼','🦊','🐸','🐵','🐯','🐰','🐻','🐨','🦁','🐮','🐷','🐙','🐢','🦉','🦄','🐺','🦋','🐳','🦖','🦕','🐬','🦀','🐝','🐞','🦆','🐧','🦭','🦦','🦥','🦔','🐿️','🦜','🦩','🦚','🦝','🦡','🦇','🐲','🐉','🦂','🦑','🦞','🐠','🐡','🦓','🦒','🐘','🦏'],
  food:['🍎','🍌','🍒','🍓','🍇','🍉','🍔','🍟','🍕','🌭','🍿','🍩','🍪','🍰','🍫','🍭','🍜','🍙','🍣','🍤','🥐','🥨','🥞','🧇','🥑','🥝','🍋','🍑','🥥','🥭','🥯','🧀','🥩','🍗','🥟','🥠','🍡','🍦','🧁','🥧','☕','🧋','🍵','🥤','🫐','🥕','🌽','🥔','🍄','🥜'],
  tech:['⌚','📱','💻','🖥️','🕹️','🎧','📷','🎮','💾','💿','📡','🔋','🔌','💡','⚙️','🧲','🔭','🔬','📟','🖨️','🛰️','🚀','🛸','🤖','📦','🧪','🧬','📊','📈','🧰','🔧','🔨','🪛','🧯','🧱','🔒','🔑','📍','📎','🗂️','🧮','🎛️','🎚️','📺','📻','⏱️','⏲️','🧭','🪐','🌐']
};
const defaults={difficulty:'4',mode:'classic',theme:'animals',appearance:'dark',pattern:'dots',sound:false};
function loadData(){try{return JSON.parse(localStorage.getItem(storeKey))||{}}catch(e){return {}}}
let data=loadData();
let settings={...defaults,...(data.settings||{})};
let ranks=Array.isArray(data.ranks)?data.ranks:[];
let state={cards:[],first:null,second:null,lock:false,moves:0,matched:0,totalPairs:8,startTime:0,elapsed:0,timer:null,previewTimer:null,playing:false,failed:false};
function save(){localStorage.setItem(storeKey,JSON.stringify({settings,ranks}))}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._id);t._id=setTimeout(()=>t.classList.remove('show'),1500)}
function fmt(sec){sec=Math.max(0,Math.floor(sec));return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0')}
function modeName(m=settings.mode){return {classic:'經典',time:'計時',preview:'記憶',chaos:'干擾'}[m]||'經典'}
function diffName(d=settings.difficulty){return d+'×'+d}
function timeLimit(){const n=+settings.difficulty;return n===4?90:n===6?190:420}
function applyTheme(){document.body.className=(settings.appearance==='light'?'light ':'')+'theme-'+settings.pattern;$('#homeMode').textContent=modeName();$('#homeDiff').textContent=diffName();updateHomeBest();save()}
function updateHomeBest(){const key=settings.mode+'-'+settings.difficulty;const best=ranks.filter(r=>r.key===key).sort((a,b)=>a.seconds-b.seconds||a.moves-b.moves)[0];$('#homeBest').textContent=best?fmt(best.seconds):'--'}
function show(screen){$('#home').classList.toggle('active',screen==='home');$('#game').classList.toggle('active',screen==='game')}
function openModal(title,body,foot){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=body;$('#modalFoot').innerHTML=foot||'';$('#modalLayer').classList.add('show')}
function closeModal(){$('#modalLayer').classList.remove('show')}
function settingsBody(){return `<div class="formGrid">
<div class="field"><label>難度</label><select class="select" id="setDifficulty"><option value="4">簡單 4×4</option><option value="6">普通 6×6</option><option value="8">困難 8×8</option></select><div class="hint">手機建議 4×4 或 6×6；8×8 會自動縮小卡片。</div></div>
<div class="field"><label>模式</label><select class="select" id="setMode"><option value="classic">經典模式</option><option value="time">計時模式</option><option value="preview">記憶模式</option><option value="chaos">干擾模式</option></select></div>
<div class="field"><label>卡片主題</label><select class="select" id="setTheme"><option value="animals">動物</option><option value="food">食物</option><option value="tech">科技</option></select></div>
<div class="field"><label>背景樣式</label><select class="select" id="setPattern"><option value="dots">質感圓點</option><option value="grid">細格紋理</option><option value="soft">柔光背景</option></select></div>
<div class="switchRow ${settings.appearance==='light'?'on':''}" id="appearanceSwitch"><span>亮色模式</span><button aria-label="亮色模式"></button></div>
<div class="switchRow ${settings.sound?'on':''}" id="soundSwitch"><span>音效</span><button aria-label="音效"></button></div>
</div>`}
function openSettings(){const wasPlaying=state.playing;openModal('設定',settingsBody(),'<button class="btn" id="cancelSet">關閉</button><button class="btn primary" id="applySet">套用</button>');
$('#setDifficulty').value=settings.difficulty;$('#setMode').value=settings.mode;$('#setTheme').value=settings.theme;$('#setPattern').value=settings.pattern;
$('#appearanceSwitch').onclick=()=>{settings.appearance=settings.appearance==='light'?'dark':'light';$('#appearanceSwitch').classList.toggle('on');applyTheme()};
$('#soundSwitch').onclick=()=>{settings.sound=!settings.sound;$('#soundSwitch').classList.toggle('on');save()};
$('#cancelSet').onclick=closeModal;
$('#applySet').onclick=()=>{const changed=settings.difficulty!==$('#setDifficulty').value||settings.mode!==$('#setMode').value||settings.theme!==$('#setTheme').value;settings.difficulty=$('#setDifficulty').value;settings.mode=$('#setMode').value;settings.theme=$('#setTheme').value;settings.pattern=$('#setPattern').value;applyTheme();closeModal();if(wasPlaying&&changed){startGame(true);toast('設定已套用，已重新開始')}else{toast('設定已套用');if(wasPlaying) updateHud()}};
}
function openRanks(){let html='<div class="list">';const sorted=[...ranks].sort((a,b)=>a.key.localeCompare(b.key)||a.seconds-b.seconds||a.moves-b.moves).slice(0,40);if(!sorted.length){html+='<p class="sub" style="text-align:center">目前沒有紀錄，完成一局後會自動保存。</p>'}else{sorted.forEach((r,i)=>{html+=`<div class="rankItem"><div class="num">${i+1}</div><div><b>${r.mode} · ${r.diff}</b><br><small>${new Date(r.date).toLocaleDateString()}</small></div><div><b>${fmt(r.seconds)}</b><br><small>${r.moves}步</small></div></div>`})}html+='</div>';openModal('排行榜',html,'<button class="btn danger" id="clearRanks">清除</button><button class="btn primary" id="rankClose">關閉</button>');$('#rankClose').onclick=closeModal;$('#clearRanks').onclick=()=>{ranks=[];save();updateHomeBest();closeModal();toast('排行榜已清除')}}
function beep(type){if(!settings.sound)return;try{const ac=new (window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=type==='good'?760:type==='bad'?190:430;g.gain.value=.045;o.start();setTimeout(()=>{o.stop();ac.close()},80)}catch(e){}}
function buildDeck(){const n=+settings.difficulty;const pairs=n*n/2;let pool=[...symbols[settings.theme]].slice(0,pairs);let deck=[...pool,...pool].map((value,id)=>({id,value,flipped:false,matched:false,wrong:false,justMatched:false}));for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]}return deck}
function startGame(restart=false){clearInterval(state.timer);clearTimeout(state.previewTimer);const n=+settings.difficulty;state={cards:buildDeck(),first:null,second:null,lock:false,moves:0,matched:0,totalPairs:n*n/2,startTime:Date.now(),elapsed:0,timer:null,previewTimer:null,playing:true,failed:false};show('game');$('#modeLine').textContent=modeName()+'模式 · '+diffName();$('#timeLabel').textContent=settings.mode==='time'?'剩餘':'時間';renderBoard();updateHud();state.timer=setInterval(tick,250);if(settings.mode==='preview'){state.lock=true;state.cards.forEach(c=>c.flipped=true);renderBoard();toast('記住位置');state.previewTimer=setTimeout(()=>{state.cards.forEach(c=>c.flipped=false);state.lock=false;state.startTime=Date.now();renderBoard();updateHud()},2600)}else{toast(restart?'已重新開始':'遊戲開始')}}
function boardSize(){const boardArea=$('.boardArea').getBoundingClientRect();const n=+settings.difficulty;const gap=window.innerWidth<=360?5:window.innerWidth<=430?6:8;document.documentElement.style.setProperty('--gap',gap+'px');const safeW=Math.max(220,boardArea.width);const safeH=Math.max(220,boardArea.height);let size=Math.floor(Math.min(safeW,safeH));const minCell=n===8?34:n===6?44:60;size=Math.max(Math.min(size, safeW), minCell*n+gap*(n-1));size=Math.min(size,safeW,safeH);return Math.floor(size)}
function renderBoard(){const n=+settings.difficulty;const board=$('#board');board.style.setProperty('--cols',n);board.style.setProperty('--boardSize',boardSize()+'px');board.innerHTML=state.cards.map((c,i)=>`<button class="card ${c.flipped?'flipped':''} ${c.matched?'matched':''} ${c.justMatched?'justMatched':''} ${c.wrong?'wrong':''}" data-i="${i}" aria-label="卡片"><span class="cardInner"><span class="face back"></span><span class="face front">${c.value}</span></span></button>`).join('');board.querySelectorAll('.card').forEach(el=>el.addEventListener('click',()=>flip(+el.dataset.i),{passive:true}))}
function flip(i){if(state.lock||!state.playing)return;const c=state.cards[i];if(!c||c.flipped||c.matched)return;beep('flip');c.flipped=true;c.wrong=false;if(state.first===null){state.first=i;renderBoard();return}state.second=i;state.moves++;state.lock=true;renderBoard();const a=state.cards[state.first],b=state.cards[state.second];if(a.value===b.value){setTimeout(()=>{a.matched=b.matched=true;a.justMatched=b.justMatched=true;state.matched++;state.first=state.second=null;state.lock=false;beep('good');updateHud();renderBoard();setTimeout(()=>{a.justMatched=b.justMatched=false;renderBoard()},380);if(state.matched===state.totalPairs)finish(true)},250)}else{setTimeout(()=>{a.wrong=b.wrong=true;renderBoard();setTimeout(()=>{a.flipped=b.flipped=false;a.wrong=b.wrong=false;state.first=state.second=null;state.lock=false;beep('bad');updateHud();renderBoard();if(settings.mode==='chaos'&&state.moves%5===0)chaosShuffle()},250)},380)}updateHud()}
function chaosShuffle(){let remain=state.cards.filter(c=>!c.matched).map(c=>({...c,flipped:false,wrong:false,justMatched:false}));for(let i=remain.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[remain[i],remain[j]]=[remain[j],remain[i]]}let k=0;state.cards=state.cards.map(c=>c.matched?c:remain[k++]);state.first=state.second=null;renderBoard();toast('未配對卡片已重排')}
function tick(){if(!state.playing)return;state.elapsed=Math.floor((Date.now()-state.startTime)/1000);if(settings.mode==='time'&&state.elapsed>=timeLimit()&&!state.failed)finish(false);updateHud()}
function updateHud(){let show=state.elapsed;if(settings.mode==='time')show=Math.max(0,timeLimit()-state.elapsed);$('#timeText').textContent=fmt(show);$('#movesText').textContent=state.moves;$('#matchText').textContent=state.matched+'/'+state.totalPairs;$('#progressBar').style.width=(state.matched/state.totalPairs*100)+'%'}
function finish(win){state.playing=false;state.failed=!win;clearInterval(state.timer);clearTimeout(state.previewTimer);const sec=state.elapsed;let grade='★';if(win){if(sec<=state.totalPairs*4.5&&state.moves<=Math.ceil(state.totalPairs*1.7))grade='★★★';else if(sec<=state.totalPairs*7.5&&state.moves<=Math.ceil(state.totalPairs*2.4))grade='★★';ranks.push({key:settings.mode+'-'+settings.difficulty,mode:modeName(),diff:diffName(),seconds:sec,moves:state.moves,date:Date.now()});ranks=ranks.sort((a,b)=>a.seconds-b.seconds||a.moves-b.moves).slice(0,100);save();updateHomeBest()}openModal('結算',`<div class="resultBig">${win?'🏆':'⏳'}</div><div class="resultTitle">${win?'完成配對':'時間到'}</div><p class="sub" style="text-align:center">${grade}</p><div class="resultStats"><div class="stat"><b>${fmt(sec)}</b><span>用時</span></div><div class="stat"><b>${state.moves}</b><span>步數</span></div><div class="stat"><b>${state.matched}/${state.totalPairs}</b><span>配對</span></div></div>`,`<button class="btn" id="resultHome">回主畫面</button><button class="btn primary" id="resultAgain">再玩一次</button>`);$('#resultHome').onclick=()=>{closeModal();show('home')};$('#resultAgain').onclick=()=>{closeModal();startGame(true)}}
function leaveGame(){clearInterval(state.timer);clearTimeout(state.previewTimer);state.playing=false;show('home');updateHomeBest()}
$('#startBtn').onclick=()=>startGame();$('#openSettingsBtn').onclick=openSettings;$('#gameSettingsBtn').onclick=openSettings;$('#openRanksBtn').onclick=openRanks;$('#restartBtn').onclick=()=>startGame(true);$('#backHomeBtn').onclick=leaveGame;$('#closeModalBtn').onclick=closeModal;$('#modalLayer').addEventListener('click',e=>{if(e.target.id==='modalLayer')closeModal()});window.addEventListener('resize',()=>{if($('#game').classList.contains('active'))requestAnimationFrame(renderBoard)});applyTheme();
</script>
</body>
