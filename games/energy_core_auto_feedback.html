{id:'genesis',tier:7,name:'創生核心環',desc:'重啟多輪後的終局增幅模組。',base:180000000000000,grow:1.45,eps:220000000000,click:8000000,maxShow:2,step:8,cls:'module-genesis',layer:'crown',unlock:{prestige:6}}
];

let state={energy:0,totalEarned:0,lifetimeEarned:0,clicks:0,overload:0,overloadActiveUntil:0,overloadCooldownUntil:0,overloads:0,completedTasks:[],upgrades:Object.fromEntries(upgrades.map(u=>[u.id,0])),palette:'cyan',showModules:true,lowFx:isMobile(),lastSave:Date.now(),prestige:0,shards:0};
function fmt(n){n=Math.max(0,Number(n)||0);if(n<1000)return Math.floor(n).toString();const u=['K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];let i=-1;while(n>=1000&&i<u.length-1){n/=1000;i++}return (n>=100?n.toFixed(0):n>=10?n.toFixed(1):n.toFixed(2))+u[i]}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),1700)}
function totalLevels(){return Object.values(state.upgrades).reduce((a,b)=>a+b,0)}function prestigeMult(){return 1+state.shards*.15+state.prestige*.05}function isOverloading(){return Date.now()<state.overloadActiveUntil}function upgradeCost(u){return Math.floor(u.base*Math.pow(u.grow,state.upgrades[u.id]))}function isUnlocked(u){const x=u.unlock||{};if(x.energy&&state.totalEarned<x.energy)return false;if(x.level&&totalLevels()<x.level)return false;if(x.shards&&state.shards<x.shards)return false;if(x.prestige&&state.prestige<x.prestige)return false;return true}
function unlockText(u){const x=u.unlock||{};if(x.energy)return `累積 ${fmt(x.energy)} EN 解鎖`;if(x.level)return `模組總等級 ${x.level} 解鎖`;if(x.shards)return `核心碎片 ${x.shards} 解鎖`;if(x.prestige)return `重啟 ${x.prestige} 次解鎖`;return '已解鎖'}
function rawEps(){let e=0;for(const u of upgrades)e+=(state.upgrades[u.id]||0)*u.eps;e*=prestigeMult();if(isOverloading())e*=5;return e}function clickPower(){let p=1;for(const u of upgrades)p+=(state.upgrades[u.id]||0)*u.click;p*=prestigeMult();if(isOverloading())p*=3;return p}function addEnergy(a){state.energy+=a;state.totalEarned+=a;state.lifetimeEarned+=a}function gainOverload(a){state.overload=Math.min(100,state.overload+a*(1+(state.upgrades.coil||0)*.035+(state.upgrades.chronos||0)*.02))}
function prestigeNeed(){return 10000000*Math.pow(12,Math.max(0,state.prestige))}function prestigeGain(){if(state.totalEarned<prestigeNeed())return 0;return Math.max(1,Math.floor(Math.sqrt(state.totalEarned/prestigeNeed())*(1+state.prestige*.18)))}
function applyAppearance(){document.body.classList.remove(...palettes.map(p=>'palette-'+p.id),'hide-modules','low-fx','mobile-perf');if(!palettes.some(p=>p.id===state.palette))state.palette='cyan';document.body.classList.add('palette-'+state.palette);document.body.classList.toggle('hide-modules',!state.showModules);document.body.classList.toggle('low-fx',!!state.lowFx);document.body.classList.toggle('mobile-perf',isMobile())}
function renderSettings(){const box=$('paletteChoices');box.innerHTML=palettes.map(p=>`<button class="choiceBtn ${state.palette===p.id?'active':''}" data-palette="${p.id}"><i class="paletteDot" style="--p1:${p.colors[0]};--p2:${p.colors[1]};--p3:${p.colors[2]}"></i>${p.name}<span>${p.desc}</span></button>`).join('');$('moduleToggle').classList.toggle('on',state.showModules);$('fxToggle').classList.toggle('on',state.lowFx)}
function renderUpgrades(){$('upgradeList').innerHTML=upgrades.map(u=>{const lv=state.upgrades[u.id]||0, unlocked=isUnlocked(u), cost=upgradeCost(u), afford=state.energy>=cost&&unlocked;return `<div class="upgrade ${unlocked?'':'locked'}"><div><h3>${u.name}</h3><p>${u.desc}</p><div class="lvl"><span class="tag">T${u.tier}</span><span class="tag">等級 ${lv}</span>${unlocked?`<span class="tag">${u.eps?`+${fmt(u.eps)}/秒`:''}${u.click?` 點擊+${fmt(u.click)}`:''}</span>`:`<span class="tag">${unlockText(u)}</span>`}</div></div><button class="buyBtn ${afford?'afford':''}" data-buy="${u.id}" ${unlocked?'':'disabled'}>${unlocked?fmt(cost)+' EN':'未解鎖'}</button></div>`}).join('')}
function taskValue(t){if(t.type==='earned')return state.totalEarned;if(t.type==='clicks')return state.clicks;if(t.type==='levels')return totalLevels();if(t.type==='overloads')return state.overloads;if(t.type==='eps')return rawEps();if(t.type==='prestige')return state.prestige;return 0}
function renderTasks(){$('taskList').innerHTML=tasks.map(t=>{const done=state.completedTasks.includes(t.id),v=taskValue(t),pct=Math.min(100,v/t.target*100),ready=!done&&v>=t.target;return `<div class="task"><div class="taskTop"><div><h3>${t.title}</h3><p>獎勵 ${fmt(t.reward)} EN　進度 ${fmt(v)} / ${fmt(t.target)}</p></div><button class="claimBtn ${ready?'ready':''}" data-claim="${t.id}" ${ready?'':'disabled'}>${done?'已完成':'領取'}</button></div><div class="progress"><span style="width:${done?100:pct}%"></span></div></div>`}).join('')}
function renderModules(force=false){

    lens:[-45,45,135,225,-90,90,0,180],

    resonance:[0,60,120,180,240,300],
    orbiter:[0,30,60,90,120,150,180,210,240,270,300,330],
    reactor:[-90,30,150,210,330],
    anchor:[-135,-45,45,135,180,0,-90,90],
    prism:[-90,-20,70,160,250,340],
    gate:[-90,0,180,90,-45,45],
    quantum:[-150,-30,30,150,-90,90],
    dimension:[-120,-60,60,120,180,0],
    chronos:[-160,-20,80,200,260,20],
    aether:[-90,0,90,180,45,135],
    crown:[-90,-65,-115,-40,-140],
    singularity:[-90,-125,-55,180,0],
    genesis:[-90,-45,45]
  };
  const mountClass={stabilizer:'socket stabilizerMount',pulse:'socket pulseMount',compressor:'socket compressorMount',battery:'socket batteryMount',archive:'socket archiveMount',lens:'dock lensMount',coil:'dock coilMount',resonance:'dock resonanceMount',anchor:'bridge anchorMount',prism:'bridge prismMount',quantum:'bridge quantumMount',dimension:'bridge dimensionMount',reactor:'dock reactorMount',chronos:'bridge chronosMount',aether:'bridge aetherMount',gate:'bridge gateMount',crown:'crownDock crownMount',singularity:'crownDock singularityMount',genesis:'crownDock genesisMount'};

      if(u.layer==='outer') c=Math.min(c,4);

  let html='';

    const d=clamp(coreRadius*2*ratio,coreRadius*2+18,Math.min(wrapRect.width,wrapRect.height)-26);

  function stablePoint(u,index){

      const line=clamp(pt.rr-coreRadius+4,12,small?54:74);
      const ms=clamp(sizeScale*(sizeMul[u.id]||1),.54,small?.88:1.08);
      html+=`<span class="moduleMount positioned ${mountClass[u.id]||'dock'} ${anim}" style="--x:${pt.x}px;--y:${pt.y}px;--rot:${rot}deg;--line:${line}px;--ms:${ms};--d:${(i%6)*-.18}s"><span class="moduleItem ${u.cls}"></span></span>`;
      if(['anchor','gate','quantum','dimension','aether','chronos'].includes(u.id)&&i<3) beam(pt.a,pt.rr-coreRadius+12);
    }
  }
  function emitOrbit(u,count){
    const slotList=slots[u.id]||slots.orbiter;
    const rr=clamp(coreRadius*(u.id==='orbiter'?1.50:1.40),coreRadius+28,stageLimit-14);
    const ms=clamp(sizeScale*(u.id==='orbiter'?.82:.88),.52,small?.80:.92);
    for(let i=0;i<count;i++){
      const a=slotList[i%slotList.length];
      const dur=(u.id==='orbiter'?18:42)+(i%3)*5;
      const anim=(!state.lowFx && !small)?'animated':'';
      html+=`<span class="moduleMount orbit ${u.id}Mount ${anim}" style="--a:${a}deg;--r:${rr}px;--dur:${dur}s;--ms:${ms}"><span class="moduleItem ${u.cls}"></span></span>`;
    }
  }

  for(const u of upgrades){
    const count=displayCount(u);
    if(!count)continue;
    if(u.id==='orbiter') emitOrbit(u,count);
    else emitFixed(u,count);
  }
  layer.innerHTML=html;
}
function render(){applyAppearance();const eps=rawEps(),cp=clickPower(),need=prestigeNeed(),gain=prestigeGain();$('energyText').textContent=fmt(state.energy);$('epsText').textContent=fmt(eps);$('clickText').textContent='+'+fmt(cp);$('prestigeText').textContent='+'+Math.round((prestigeMult()-1)*100)+'%';$('overloadFill').style.width=state.overload+'%';const can=state.overload>=100&&Date.now()>=state.overloadCooldownUntil&&!isOverloading();$('overloadBtn').disabled=!can;document.body.classList.toggle('overloading',isOverloading());$('totalClicks').textContent=fmt(state.clicks);$('totalEarned').textContent=fmt(state.totalEarned);$('lifetimeEarned').textContent=fmt(state.lifetimeEarned);$('overloadCount').textContent=fmt(state.overloads);$('prestigeCount').textContent=fmt(state.prestige);$('shardCount').textContent=fmt(state.shards);$('prestigeProgress').style.width=Math.min(100,state.totalEarned/need*100)+'%';$('prestigeDesc').textContent=`需求 ${fmt(need)} EN，目前重啟可獲得 ${fmt(gain)} 核心碎片。每個碎片永久提升 15% 全收益。`;$('prestigeBtn').disabled=gain<=0;renderUpgrades();renderTasks();renderModules();renderSettings()}
function renderLight(){const c=$('bgCanvas'),ctx=c.getContext('2d');ctx.clearRect(0,0,innerWidth,innerHeight);const active=isOverloading();for(const p of particles){p.x+=p.vx*(active?2.4:1);p.y+=p.vy*(active?2.4:1);if(p.x<0)p.x=innerWidth;if(p.x>innerWidth)p.x=0;if(p.y<0)p.y=innerHeight;if(p.y>innerHeight)p.y=0;p.tw+=.018;const t=.7+Math.sin(p.tw)*.3;ctx.beginPath();ctx.arc(p.x,p.y,p.r*(active?1.35:1)*t,0,Math.PI*2);ctx.fillStyle=`rgba(220,245,255,${p.a*t*(active?1.25:1)})`;ctx.fill()} }
function resize(){const c=$('bgCanvas'),ctx=c.getContext('2d'),dpr=Math.min(1.5,devicePixelRatio||1);c.width=Math.floor(innerWidth*dpr);c.height=Math.floor(innerHeight*dpr);c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);const count=isMobile()?55:100;particles=Array.from({length:count},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.3+.25,vx:(Math.random()-.5)*.13,vy:(Math.random()-.5)*.13,a:Math.random()*.45+.08,tw:Math.random()*6.28}));renderModules(true)}
function switchSection(id){document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.section===id))}
function effect(x,y,amount,auto=false){const wrap=$('coreWrap'),rect=wrap.getBoundingClientRect();const p=document.createElement('span');p.className=auto?'autoPulse':'pulse';p.style.left=x-20+'px';p.style.top=y-20+'px';wrap.appendChild(p);setTimeout(()=>p.remove(),760);const showFloat=!auto||(!state.lowFx&&!isMobile());if(showFloat){const f=document.createElement('span');f.className=auto?'autoGain':'floatGain';f.textContent='+'+fmt(amount);f.style.left=Math.min(rect.width-76,Math.max(20,x-22))+'px';f.style.top=Math.max(40,y-10)+'px';wrap.appendChild(f);setTimeout(()=>f.remove(),950)} }
function clickCore(e){const wrap=$('coreWrap'),r=wrap.getBoundingClientRect(),x=(e.clientX||r.left+r.width/2)-r.left,y=(e.clientY||r.top+r.height/2)-r.top,a=clickPower();addEnergy(a);state.clicks++;gainOverload(.9);effect(x,y,a,false);render()}
function moduleGainFeedback(){const epsBase=rawEps();if(epsBase<1)return;const now=Date.now();const interval=isMobile()?1450:1050;if(now-lastModuleGainFx<interval)return;const active=upgrades.filter(u=>(state.upgrades[u.id]||0)>0&&u.eps>0);if(!active.length)return;lastModuleGainFx=now;const u=active[moduleGainIndex++%active.length];const mult=prestigeMult()*(isOverloading()?5:1);const amount=(state.upgrades[u.id]||0)*u.eps*mult;if(amount<1)return;const wrap=$('coreWrap'),rect=wrap.getBoundingClientRect();const slots=[[-.36,-.18],[.34,-.20],[-.30,.18],[.32,.18],[0,-.34],[0,.30]];const slot=slots[moduleGainIndex%slots.length];const f=document.createElement('span');f.className='moduleGainTick';f.textContent='+'+fmt(amount)+'/秒';f.style.left=(rect.width/2+rect.width*slot[0])+'px';f.style.top=(rect.height/2+rect.height*slot[1])+'px';wrap.appendChild(f);setTimeout(()=>f.remove(),1250)}
function autoFeedback(){if(state.lowFx||rawEps()<1)return;const now=Date.now();if(now-lastFx<(isMobile()?1900:900))return;lastFx=now;const wrap=$('coreWrap'),rect=wrap.getBoundingClientRect(),ang=Math.random()*Math.PI*2,rad=Math.min(rect.width,rect.height)*(.27+Math.random()*.12),x=rect.width/2+Math.cos(ang)*rad,y=rect.height/2+Math.sin(ang)*rad;effect(x,y,rawEps()/4,true);$('coreBtn').classList.add('autoHit');setTimeout(()=>$('coreBtn').classList.remove('autoHit'),150)}
function startOverload(){if(state.overload<100||Date.now()<state.overloadCooldownUntil||isOverloading())return;state.overload=0;state.overloads++;state.overloadActiveUntil=Date.now()+10000;state.overloadCooldownUntil=Date.now()+24000;toast('過載啟動');render();save()}
function doPrestige(){const gain=prestigeGain();if(gain<=0){toast('能量不足，尚無法重啟');return}if(!confirm(`確定重啟核心？將獲得 ${gain} 核心碎片，模組與本輪能量會歸零。`))return;state.shards+=gain;state.prestige++;state.energy=0;state.totalEarned=0;state.clicks=0;state.overload=0;state.overloadActiveUntil=0;state.overloadCooldownUntil=0;state.overloads=0;state.upgrades=Object.fromEntries(upgrades.map(u=>[u.id,0]));state.completedTasks=state.completedTasks.filter(id=>id.startsWith('p'));moduleRenderKey='';document.body.appendChild(Object.assign(document.createElement('div'),{className:'prestigeFlash'}));setTimeout(()=>document.querySelector('.prestigeFlash')?.remove(),1300);toast('核心已重啟，永久加成提升');save();render();scrollTo({top:0,behavior:'smooth'})}
function save(){state.lastSave=Date.now();localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const data=JSON.parse(raw);state={...state,...data,upgrades:{...state.upgrades,...(data.upgrades||{})}};if(typeof state.lifetimeEarned!=='number')state.lifetimeEarned=state.totalEarned||0;if(typeof state.shards!=='number')state.shards=0;if(typeof state.prestige!=='number')state.prestige=0;const away=Math.max(0,Date.now()-(state.lastSave||Date.now())),cap=Math.min(away,8*3600*1000),gain=rawEps()*cap/1000;if(gain>=10){addEnergy(gain);$('offlineText').textContent=`核心離線運轉 ${Math.floor(cap/3600000)} 小時 ${Math.floor(cap%3600000/60000)} 分，獲得 ${fmt(gain)} EN。`;$('offlineModal').classList.add('show')}}catch(e){console.warn(e)}}
document.addEventListener('click',e=>{const p=e.target.closest('[data-palette]');if(p){state.palette=p.dataset.palette;render();save();toast('顏色樣式已套用');return}const b=e.target.closest('[data-buy]');if(b){const u=upgrades.find(x=>x.id===b.dataset.buy),cost=upgradeCost(u);if(isUnlocked(u)&&state.energy>=cost){state.energy-=cost;state.upgrades[u.id]++;gainOverload(2.2);moduleRenderKey='';render();save()}return}const c=e.target.closest('[data-claim]');if(c){const t=tasks.find(x=>x.id===c.dataset.claim);if(t&&!state.completedTasks.includes(t.id)&&taskValue(t)>=t.target){state.completedTasks.push(t.id);addEnergy(t.reward);toast('任務完成，能量已注入');render();save()}return}const sec=e.target.closest('[data-section]');if(sec)switchSection(sec.dataset.section)});
$('coreBtn').addEventListener('click',clickCore);$('overloadBtn').addEventListener('click',startOverload);$('settingsBtn').addEventListener('click',()=>$('settingsModal').classList.add('show'));$('closeSettings').addEventListener('click',()=>$('settingsModal').classList.remove('show'));$('offlineClose').addEventListener('click',()=>$('offlineModal').classList.remove('show'));$('saveBtn').addEventListener('click',()=>{save();toast('核心資料已儲存')});$('manualSaveBtn').addEventListener('click',()=>{save();toast('已立即儲存')});$('moduleToggle').addEventListener('click',()=>{state.showModules=!state.showModules;render();save()});$('fxToggle').addEventListener('click',()=>{state.lowFx=!state.lowFx;render();save()});$('exportBtn').addEventListener('click',()=>{$('saveData').value=btoa(unescape(encodeURIComponent(JSON.stringify(state))));toast('存檔已匯出')});$('importBtn').addEventListener('click',()=>{try{const data=JSON.parse(decodeURIComponent(escape(atob($('saveData').value.trim()))));state={...state,...data,upgrades:{...state.upgrades,...(data.upgrades||{})}};moduleRenderKey='';save();render();toast('存檔已匯入')}catch(e){toast('存檔格式無法讀取')}});$('resetBtn').addEventListener('click',()=>{if(confirm('確定完全重置？')){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem('energy_core_save_v1');localStorage.removeItem('energy_core_save_v2');location.reload()}});$('prestigeBtn').addEventListener('click',doPrestige);$('topBtn').addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));$('topFromStatus').addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));addEventListener('scroll',()=>$('topBtn').classList.toggle('show',scrollY>420));
let last=performance.now();function loop(now){const dt=Math.min(.25,(now-last)/1000);last=now;const g=rawEps()*dt;if(g>0){addEnergy(g);gainOverload(.028*dt*(1+rawEps()/420))}if(now-lastUi>650){render();lastUi=now}moduleGainFeedback();autoFeedback();renderLight();requestAnimationFrame(loop)}setInterval(save,8000);addEventListener('beforeunload',save);addEventListener('resize',resize);resize();load();render();requestAnimationFrame(loop);
