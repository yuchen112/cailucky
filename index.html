  <!-- 全域樣式 -->

        radial-gradient(at 20% 0%, rgba(20,184,166,.08), transparent 35%),
        radial-gradient(at 80% 10%, rgba(245,158,11,.08), transparent 35%),
        radial-gradient(at 50% 100%, rgba(15,118,110,.08), transparent 35%);

    /* 行動端觸控目標：更穩健的 hit area（≥44px） */
    .tap-target { padding: 12px 14px; min-width: 44px; min-height: 44px; }

    /* 自訂捲軸隱藏（保留） */
    .no-scrollbar::-webkit-scrollbar{display:none}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

    /* === 背景圖片（整站） ================================== */
    html, body { min-height: 100%; }
    body::before{
      content:"";
      position: fixed; inset: 0; z-index:-1;
      background-image:
        linear-gradient(var(--bg-tint, rgba(255,255,255,0.0)), var(--bg-tint, rgba(255,255,255,0.0))),
        var(--bg-img, none);
      background-size: var(--bg-size, cover);
      background-position: var(--bg-pos, center);
      background-repeat: no-repeat;
      filter: brightness(var(--bg-brightness,1)) blur(var(--bg-blur,0px));
      opacity: var(--bg-opacity,1);
      transition: filter .25s ease, opacity .25s ease, background .25s ease;
    }

    /* === 漢堡選單背景 ======================= */
    .menu-pane{
      position: relative;
      overflow: hidden;
      background: var(--menu-fallback, rgba(255,255,255,.92));
      border-right: 1px solid rgba(15,23,42,.08);
    }
    .menu-pane::before{
      content:"";
      position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--menu-tint, rgba(255,255,255,0.0)), var(--menu-tint, rgba(255,255,255,0.0))),
        var(--menu-bg-img, none);
      background-size: var(--menu-bg-size, cover);
      background-position: var(--menu-bg-pos, center);
      background-repeat: no-repeat;
      filter: brightness(var(--menu-brightness,1)) blur(var(--menu-blur,0px));
      opacity: var(--menu-opacity,1);

  <style id="kjs-unified-ui-patch">

    .kjs-unified :where(input:not([type="checkbox"]):not([type="radio"]),select,textarea){

      border:1px solid var(--kjs-line) !important;

    }

    .kjs-unified :where([role="dialog"],.fixed.inset-0.z-\[999\],.fixed.inset-0.z-\[998\],.fixed.inset-0.z-\[1000\]) > :where(div){
      border:1px solid var(--kjs-line);
    }
    .kjs-unified :where(.modal-scroll){

    }

    /* 漢堡選單：前台導覽與管理工具分區更清楚 */
    .kjs-unified .menu-pane{

    }

    /* 圖片牆與商品圖，避免變形、閃動 */
    .kjs-unified :where(img){

    }
    .kjs-unified :where(.aspect-square img){
      transform:translateZ(0);

    /* Toast */
    #kjs-toast-root{
      position:fixed;
      right:14px;

    @keyframes kjsToastIn{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }

    @media (max-width:640px){

      }
      .kjs-toast{ max-width:100%; }

    enhanceLegacyTagInputs(root);
  }

  function boot(){
    enhance(document);
    const obs = new MutationObserver(muts => {
      let need = false;
      for (const m of muts) {
        if (m.addedNodes && m.addedNodes.length) { need = true; break; }
      }
      if (need) window.requestAnimationFrame(() => enhance(document));
    });
    obs.observe(document.body, {childList:true, subtree:true});

    // 快捷：Esc 關閉目前展開的管理工具列（不影響既有彈窗 Esc）
    document.addEventListener('keydown', function(e){
      if (e.key !== 'Escape') return;
      document.querySelectorAll('.kjs-admin-bulkbar.kjs-ux-bulkbar:not(.kjs-ux-collapsed)').forEach(el => {
        const key = el.dataset.kjsUxKey;
        el.classList.add('kjs-ux-collapsed');
        const btn = el.querySelector('.kjs-ux-bulk-toggle');
        if (btn) { btn.setAttribute('aria-expanded','false'); btn.innerHTML = '展開管理工具 ▼'; }
        if (key) opened.delete(key);
      });
      saveOpened();
    }, true);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
<!-- [KJS DISPLAY UX OPTIMIZE JS END] -->



<!-- [KJS STRICT COLLAPSE UX JS START]
     輔助保險：每次 DOM 更新後，替收合項目加上狀態 class，並清掉可能殘留的可視高度。
-->
<script>
(function(){
  function syncCollapsed(root=document){
    root.querySelectorAll('.kjs-strict-collapse').forEach(box => {
      const btn = box.querySelector('button[aria-expanded]');
      const open = btn && btn.getAttribute('aria-expanded') === 'true';
      box.classList.toggle('is-open', !!open);
      box.classList.toggle('is-closed', !open);
    });

    root.querySelectorAll('button[aria-expanded="false"]').forEach(btn => {
      const next = btn.nextElementSibling;
      if (!next) return;
      const parent = btn.parentElement;
      const likelyPanel = parent && (parent.classList.contains('overflow-hidden') || parent.classList.contains('rounded-xl') || parent.classList.contains('rounded-2xl'));
      if (!likelyPanel) return;
      next.setAttribute('aria-hidden','true');
      next.dataset.kjsCollapsedHard = '1';
    });

    root.querySelectorAll('button[aria-expanded="true"]').forEach(btn => {
      const next = btn.nextElementSibling;
      if (!next) return;
      if (next.dataset.kjsCollapsedHard === '1') {
        next.removeAttribute('aria-hidden');
        delete next.dataset.kjsCollapsedHard;
      }
    });
  }

  function boot(){
    syncCollapsed(document);
    const obs = new MutationObserver(() => requestAnimationFrame(() => syncCollapsed(document)));
    obs.observe(document.body, {childList:true, subtree:true, attributes:true, attributeFilter:['aria-expanded','style','open']});
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
<!-- [KJS STRICT COLLAPSE UX JS END] -->
