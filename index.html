/* ============================
 * 等待開獎（清單 + 跳出式資訊 + 抽獎展示）
 * - 保留原功能：搜尋/分頁/9或16宮格/新增/編輯/刪除/三種轉歷史
 * - 內建「勾選名單 → 轉歷史」完整串接（含彈窗內勾選 UI）
 * - ★ 新增：同一視窗「逐卡貼名單」批次面板（追加/覆蓋、清雜訊、去重）
 * ============================ */
function Pending({ data, admin, setData, query = "" }) {
  const React = window.React || globalThis.React;
  const nidSafe = (typeof nid === "function") ? nid : () => Math.random().toString(36).slice(2);

  // 偏好
  const prefKey = "pending_prefs_v2";
  const loadPrefs = () => { try { return JSON.parse(localStorage.getItem(prefKey) || "{}"); } catch { return {}; } };
  const savePrefs = (p) => { try { localStorage.setItem(prefKey, JSON.stringify({ ...loadPrefs(), ...p })); } catch {} };

  const [view, setView] = React.useState(loadPrefs().view || "grid9"); // grid9 / grid16
  const [pageSize, setPageSize] = React.useState(loadPrefs().pageSize || 20);
  const [page, setPage] = React.useState(1);
  React.useEffect(()=>savePrefs({view}),[view]);
  React.useEffect(()=>savePrefs({pageSize}),[pageSize]);

  // 兼容資料來源
  const raw = Array.isArray(data?.pending?.items) ? data.pending.items :
              (Array.isArray(data?.pending) ? data.pending : []);

  const parseLinesClean = (txt) => String(txt||"").split(/\r?\n|,|、|\s+/).map(s=>s.trim()).filter(Boolean);

  const normalizeItem = (it) => {
    const images = Array.isArray(it?.images) ? it.images : (it?.image ? [String(it.image)] : []);
    const tags   = Array.isArray(it?.tags) ? it.tags   : (typeof it?.tags === "string" ? it.tags.split(",").map(s=>s.trim()).filter(Boolean) : []);
    let candidates = [];
    if (Array.isArray(it?.participants)) candidates = it.participants;
    else if (Array.isArray(it?.members)) candidates = it.members;
    else if (Array.isArray(it?.list)) candidates = it.list;
    else if (Array.isArray(it?.candidates)) candidates = it.candidates;
    else if (typeof it?.listText === "string") candidates = String(it.listText).split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    const planned = Number.isFinite(+it?.plannedWinners) ? +it.plannedWinners : 1;
    return { ...it, _images: images, _tags: tags, _candidates: candidates.map(String).filter(Boolean), _planned: planned };
  };

  const allItems = React.useMemo(()=> raw.map(normalizeItem), [raw]);

  // 我的名字 / 我是否有參與
  const [myName, setMyName] = React.useState("");
  const [mineFilter, setMineFilter] = React.useState("all"); // all / joined / notJoined

  // 搜尋
  const [search, setSearch] = React.useState(query || "");
  const filteredBySearch = React.useMemo(()=>{
    const kw = String(search||"").trim().toLowerCase();
    return allItems.filter(x=>{
      const hay = [x?.title, x?.name, x?.desc, x?.intro, x?._tags?.join(" ")].map(s=>String(s||"").toLowerCase()).join(" ");
      return !kw || hay.includes(kw);
    });
  }, [allItems, search]);

  const filtered = React.useMemo(()=>{
    const name = myName.trim();
    if (!name) return filteredBySearch;
    const joinedSet = new Set(
      filteredBySearch
        .filter(x => Array.isArray(x._candidates) && x._candidates.includes(name))
        .map(x => x.id ?? x)
    );
    if (mineFilter === "joined") return filteredBySearch.filter(x => joinedSet.has(x.id ?? x));
    if (mineFilter === "notJoined") return filteredBySearch.filter(x => !joinedSet.has(x.id ?? x));
    return filteredBySearch;
  }, [filteredBySearch, myName, mineFilter]);

  // 排序
  const sorted = React.useMemo(()=>{
    const arr = [...filtered];
    arr.sort((a,b)=> (new Date(b?.updatedAt||b?.createdAt||0) - new Date(a?.updatedAt||a?.createdAt||0)));
    return arr;
  }, [filtered]);

  // 分頁
  const total = sorted.length;
  const maxPage = Math.max(1, Math.ceil(total / pageSize));
  React.useEffect(()=>{ if (page>maxPage) setPage(maxPage); }, [maxPage, page]);
  React.useEffect(()=>{ setPage(1); }, [search, view, pageSize, myName, mineFilter]);

  const start = (page-1)*pageSize;
  const end   = Math.min(start + pageSize, total);
  const windowSize = 5;
  const startPage = Math.max(1, Math.min(page - Math.floor(windowSize/2), maxPage - windowSize + 1));
  const endPage   = Math.min(maxPage, startPage + windowSize - 1);
  const pageItems = sorted.slice(start, end);

  // Viewer
  const [viewer, setViewer] = React.useState({ open:false, images:[], index:0, title:"" });
  React.useEffect(()=>{
    if (!viewer.open) return;
    const onKey = (e)=>{
      if (e.key==="Escape") setViewer(v=>({ ...v, open:false }));
      if (e.key==="ArrowLeft") setViewer(v=>({ ...v, index:(v.index-1+v.images.length)%v.images.length }));
      if (e.key==="ArrowRight") setViewer(v=>({ ...v, index:(v.index+1)%v.images.length }));
    };
    document.addEventListener("keydown", onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return ()=>{ document.removeEventListener("keydown", onKey); document.body.style.overflow = prev; };
  }, [viewer.open, viewer.images.length]);
  const openViewer = (images, index, title="")=>{
    const list = Array.isArray(images) ? images.filter(Boolean) : (images ? [images] : []);
    if (!list.length) return;
    setViewer({ open:true, images:list, index: Math.max(0, Math.min(index||0, list.length-1)), title });
  };

  // 表單（新增/編輯）
  const [draft, setDraft] = React.useState({ date:"", title:"", image:"", participantsText:"", plannedWinners:"" });
  const [editingId, setEditingId] = React.useState(null);

  function upsertFromDraft() {
    if (!admin) return alert("請先登入管理模式");
    const title = (draft.title || "").trim();
    if (!title) return alert("請填寫【獎項名稱】");
    const planned = draft.plannedWinners !== "" ? Number(draft.plannedWinners) : 1;
    if (draft.plannedWinners !== "" && !Number.isFinite(planned)) return alert("抽出名額需為數字");
    const rec = {
      id: editingId || nidSafe(),
      title,
      date: draft.date || "",
      image: (draft.image || "").trim(),
      participants: parseLinesClean(draft.participantsText),
      plannedWinners: planned
    };
    if (editingId) {
      const next = raw.map(x => x.id === editingId ? rec : x);
      const nextP = Array.isArray(data?.pending?.items) ? { ...data.pending, items: next } : next;
      setData(s => ({ ...s, pending: nextP })); setEditingId(null); alert("已儲存修改");
    } else {
      const next = [rec, ...raw];
      const nextP = Array.isArray(data?.pending?.items) ? { ...data.pending, items: next } : next;
      setData(s => ({ ...s, pending: nextP })); alert("已新增活動");
    }
    setDraft({ date:"", title:"", image:"", participantsText:"", plannedWinners:"" });
  }
  function editItem(x) {
    if (!admin) return;
    setEditingId(x?.id || null);
    setDraft({
      date: x?.date || "",
      title: x?.title || "",
      image: x?.image || (Array.isArray(x?._images)&&x._images[0]) || "",
      participantsText: Array.isArray(x?._candidates) ? x._candidates.join("\n") : (Array.isArray(x?.participants) ? x.participants.join("\n") : ""),
      plannedWinners: Number.isFinite(+x?._planned) ? String(x._planned) : (x?.plannedWinners ?? "")
    });
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
  function cancelEdit(){
    setEditingId(null);
    setDraft({ date:"", title:"", image:"", participantsText:"", plannedWinners:"" });
  }
  function removeItemObj(x){
    if (!admin) return;
    if (!confirm("確定刪除此活動？")) return;
    const next = raw.filter(it => (it.id ?? it) !== (x.id ?? x));
    const nextP = Array.isArray(data?.pending?.items) ? { ...data.pending, items: next } : next;
    setData(s => ({ ...s, pending: nextP }));
  }

  // ===== 勾選名單（每個活動一份 map） =====
  const [checkedMaps, setCheckedMaps] = React.useState({}); // { [id]: { [name]: boolean } }
  function getCheckedMap(id) { return (checkedMaps && checkedMaps[id]) ? checkedMaps[id] : {}; }
  function makeToggleCheck(id) {
    return function toggleCheck(name, next){
      setCheckedMaps(prev => {
        const curr = prev[id] || {};
        const val = (typeof next === 'boolean') ? next : !curr[name];
        return { ...prev, [id]: { ...curr, [name]: !!val } };
      });
    };
  }

  // 清理勾選殘留
  function pruneCheckedMap(itemId, keepSet) {
    try {
      const id = String(itemId || "");
      const keep = keepSet instanceof Set ? keepSet : new Set();
      const current = getCheckedMap ? (getCheckedMap(id) || {}) : {};
      const toggle = makeToggleCheck ? makeToggleCheck(id) : null;
      for (const [name, checked] of Object.entries(current)) {
        if (checked && !keep.has(name)) {
          if (typeof toggle === "function") toggle(name, false);
          else current[name] = false;
        }
      }
    } catch (err) { console.warn("[pruneCheckedMap] 例外：", err); }
  }

  // 小卡「套用刪除」→ 真正回寫資料 + 同步編輯草稿（修正版：直接持久化）
function updateItemParticipants(payload) {
  const { id, item, lines, text } = (payload || {});
  const itemId = String(item?.id ?? id ?? "");
  if (!itemId) return;

  // 來源行列：優先 lines，其次 text
  const srcLines = Array.isArray(lines) ? lines : String(text || "").split(/\r?\n/);

  // participants：用於顯示/抽獎；trim 後去空行（批次面板已去重，這裡不再去重）
  const participants = srcLines
    .map(s => String(s ?? "").trim())
    .filter(Boolean);

  // listText：編輯用原樣字串（保留小卡/批次面板套用後的樣子）
  const nextListText = (typeof text === "string") ? text : srcLines.join("\n");

  // 1) 清理勾選殘留（避免名單變更後，勾選還留在已刪名字上）
  pruneCheckedMap(itemId, new Set(participants));

  // 2) 直接持久化到 pending（相容 {pending:{items:[]}} 與 pending 為陣列）
  try {
    if (typeof setData === "function") {
      setData(prev => {
        const prevPending = prev?.pending;
        const items = Array.isArray(prevPending?.items)
          ? prevPending.items
          : (Array.isArray(prevPending) ? prevPending : []);

        const idx = items.findIndex(x => String(x?.id ?? x) === itemId);
        const base = idx >= 0 ? items[idx] : (item || { id: itemId });

        // 只覆蓋需要的欄位，其餘維持原樣
        const updated = {
          ...base,
          id: itemId,
          listText: nextListText,
          participants
        };

        const nextItems = idx >= 0
          ? [...items.slice(0, idx), updated, ...items.slice(idx + 1)]
          : [updated, ...items];

        // 回寫時保留原結構型態
        const nextPending = Array.isArray(prevPending?.items)
          ? { ...prevPending, items: nextItems }
          : nextItems;

        return { ...prev, pending: nextPending };
      });
    } else {
      // 若你的環境沒有 setData，仍退回舊邏輯（不建議、但保底）
      if (typeof editItem === "function") {
        const nextItem = { ...(item || {}), id: itemId, listText: nextListText, participants };
        editItem(nextItem);
      } else {
        console.warn("[updateItemParticipants] setData 不存在，且找不到 editItem 可用。");
      }
    }
  } catch (e) {
    console.warn("[updateItemParticipants] 寫回資料例外：", e);
  }

  // 3) 若此時正在編輯同一筆活動 → 讓編輯視窗的 textarea 也立刻同步
  try {
    if (sheet?.item && String(sheet.item.id) === itemId && typeof setDraft === "function") {
      setDraft(d => ({ ...d, participantsText: nextListText }));
    }
  } catch (e) {
    // ignore
  }

  // （可選）發出事件，若外層有監聽可同步
  try {
    const evtPayload = {
      id: itemId,
      item,
      lines: participants,
      text: nextListText
    };
    window.dispatchEvent(new CustomEvent("kjs:pending:updateParticipants", { detail: evtPayload }));
  } catch {}
}


  // ===== 轉歷史（保留原流程） =====
  function convertByChecked(x, checkedMap){
    const picked = [];
    const m = checkedMap || {};
    for (const k in m) if (m[k]) picked.push(String(k));
    if (!picked.length) { alert("請先勾選至少一位得獎者"); return; }

    const pool = Array.isArray(x?._candidates) ? x._candidates.map(String) : [];
    const allow = new Set(pool);
    const winners = picked.filter(n => allow.has(n));
    if (!winners.length) { alert("勾選的名字不在此活動的參與名單中"); return; }

    convertToHistoryByWinners(x.id, winners);
  }

  function convertToHistoryByWinners(id, winners) {
    if (!admin) return;
    const now = raw.find(x => x.id === id);
    if (!now) return;
    const rest = raw.filter(x => x.id !== id);
    const history = Array.isArray(data?.history) ? data.history : [];

    const num = (v)=> (v===""||v==null) ? null : (Number.isFinite(+v) ? +v : null);

    const deriveCandidates = (it)=>{
      if (!it) return [];
      if (Array.isArray(it._candidates)) return it._candidates;
      if (Array.isArray(it.participants)) return it.participants;
      if (Array.isArray(it.members)) return it.members;
      if (Array.isArray(it.list)) return it.list;
      if (Array.isArray(it.candidates)) return it.candidates;
      if (typeof it.listText === "string") return it.listText.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
      return [];
    };
    const totalParticipants = deriveCandidates(now).length;

    const plannedCount =
        num(now?._planned) ??
        num(now?.planned) ??
        num(now?.plannedCount) ??
        num(now?.winnersPlanned) ??
        num(now?.winnerPlan) ?? null;

    const rec = {
      id: nidSafe(),
      date: now.date || "",
      title: now.title || "",
      winners: Array.isArray(winners) ? winners : [],
      winnerCount: Array.isArray(winners) ? winners.length : 0,
      totalParticipants,
      plannedCount: plannedCount != null ? plannedCount : undefined,
      status: "已抽出",
      note: ""
    };

    const nextP = Array.isArray(data?.pending?.items) ? { ...data.pending, items: rest } : rest;
    setData(s => ({ ...s, pending: nextP, history: [rec, ...history] }));
    alert("已轉入歷史");
  }

  // 管理用：一次性模擬（保留）
  function simulateOnce(list, count){
    const names = Array.isArray(list) ? list.slice() : [];
    const n = Math.max(1, Math.min(count || 1, names.length));
    for (let k = names.length-1; k > 0; k--) {
      const j = Math.floor(Math.random()*(k+1));
      [names[k], names[j]] = [names[j], names[k]];
    }
    return names.slice(0, n);
  }
  function convertBySimulation(x){
    const store = (window.__LAST_SIM_RESULTS__ || {});
    const direct = store[x.id];
    const last = store.__LAST__;
    const winners = (direct && Array.isArray(direct.winners) && direct.winners.length>0)
      ? direct.winners
      : (last && Array.isArray(last.winners) && last.winners.length>0 ? last.winners : null);
    if (!winners) {
      alert("尚未執行抽獎模擬，請先按「模擬抽獎（展示）」跑一次。");
      return;
    }
    convertToHistoryByWinners(x.id, winners);
  }

  function convertByInput(x){
    const txt = prompt("請貼上得獎名單（每行一名）",""); 
    if (txt==null) return;
    const names = parseLinesClean(txt);
    if (!names.length) return alert("沒有有效人名");
    convertToHistoryByWinners(x.id, names);
  }

  // 一鍵複製抽獎貼文（保留）
  function copyAdText(x){
    const planned = Number.isFinite(+x?._planned) ? +x._planned : 1;
    const dateStr = String(x?.date || "").trim();
    const weekday = (s) => {
      if (!s) return "";
      const d = new Date(s + "T00:00:00");
      const zh = ["日","一","二","三","四","五","六"];
      return zh[d.getDay()] || "";
    };
    const endW = weekday(dateStr);
    let announceDate = "";
    let announceW = "";
    if (dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      d.setDate(d.getDate()+1);
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), dd = String(d.getDate()).padStart(2,"0");
      announceDate = `${y}-${m}-${dd}`;
      announceW = weekday(announceDate);
    }
    const perCount = 1;
    const howTo = "直接在這篇留言「我要參加」即可！";

    const text = [
      "🎉【限時抽獎來啦！】🎉",
      "這次要送出的獎品是 👇",
      "",
      `🎁 ${x?.title || "（獎品名稱）"}`,
      `共抽 ${planned} 名，每人 ${perCount} ！`,
      "",
      `📌 抽出名額：${planned} 位幸運兒`,
      `📅 截止時間：${dateStr ? `${dateStr}（星期${endW}）` : "（自選/填日期）"} 晚上 23:59 前`,
      `🕰 開獎公告：${announceDate ? `${announceDate}（星期${announceW}）` : "（截止翌日）"} 晚間公布於群組`,
      "",
      "📣 參加方式：（可自填）",
      howTo,
      "",
      "✅ 完全免費參加",
      "✅ 得獎只需自付運費（可選貨到付款）",
    ].join("\n");

    navigator.clipboard?.writeText(text)
      .then(()=>alert("已複製抽獎貼文"))
      .catch(()=>alert("無法自動複製，請手動選取"));
  }

  // 跳出式資訊面板 / 抽獎展示（保留）
  const [sheet, setSheet] = React.useState({ open:false, item:null });
  const [draw, setDraw] = React.useState({ open:false, item:null });

  const gridCols = view === "grid16" ? "grid-cols-4" : "grid-cols-3";

  // 分頁器（保留）
  const Paginator = () => (
    <div className="mt-3 flex items-center justify-center gap-1 select-none">
      <button className="rounded-lg border px-3 py-1.5 text-sm" disabled={page<=1} onClick={()=>setPage(p=>Math.max(1,p-1))}>上一頁</button>
      {Array.from({length:(endPage-startPage+1)},(_,i)=>startPage+i).map(p => (
        <button key={p} className={`rounded-lg border px-3 py-1.5 text-sm ${p===page ? 'bg-brand text-white border-brand' : ''}`} onClick={()=>setPage(p)}>{p}</button>
      ))}
      <button className="rounded-lg border px-3 py-1.5 text-sm" disabled={page>=maxPage} onClick={()=>setPage(p=>Math.min(maxPage,p+1))}>下一頁</button>
    </div>
  );

  // ★ 新增：批次面板開關
  const [batchOpen, setBatchOpen] = React.useState(false);

  // 穩定 Toolbar（加上新按鈕：批次編輯參加名單）
  const [toolbarFocus, setToolbarFocus] = React.useState(false);
  const ToolbarStable = React.useRef(null);
  if (!ToolbarStable.current) {
    ToolbarStable.current = function ToolbarStableComp({
      search, setSearch,
      myName, setMyName,
      mineFilter, setMineFilter,
      view, setView,
      pageSize, setPageSize,
      admin,
      toolbarFocus, setToolbarFocus,
      onOpenBatchEditor, // ★ 新增
    }) {
      return (
        <div
          className="sticky top-0 z-10 -mx-2 px-2 py-2 bg-white/70 dark:bg-slate-900/60 backdrop-blur border-b border-slate-200 dark:border-slate-700"
          style={toolbarFocus ? { backdropFilter: 'none', WebkitBackdropFilter: 'none' } : undefined}
          onFocusCapture={() => setToolbarFocus(true)}
          onBlurCapture={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setToolbarFocus(false); }}
        >
          <div className="flex flex-wrap items-center gap-2">
            <input
              className="min-h-[44px] flex-1 rounded border px-3 py-2"
              placeholder="搜尋活動..."
              value={search}
              onChange={(e)=>setSearch(e.target.value)}
              inputMode="search"
              enterKeyHint="search"
              onKeyDownCapture={(e)=>{ e.stopPropagation?.(); }}
            />
            <input
              className="min-h-[44px] rounded border px-3 py-2"
              style={{minWidth:220}}
              placeholder="輸入你的名字（精確比對）"
              value={myName}
              onChange={(e)=>setMyName(e.target.value)}
              inputMode="text"
              enterKeyHint="done"
              onKeyDownCapture={(e)=>{ e.stopPropagation?.(); }}
            />
            <div className="inline-flex rounded-lg overflow-hidden border">
              <button className={`px-3 py-2 text-sm ${mineFilter==='all'?'bg-brand text-white':'bg-white dark:bg-slate-900'}`} onClick={()=>setMineFilter('all')}>全部</button>
              <button className={`px-3 py-2 text-sm ${mineFilter==='joined'?'bg-brand text-white':'bg-white dark:bg-slate-900'}`} onClick={()=>setMineFilter('joined')}>我已參加</button>
              <button className={`px-3 py-2 text-sm ${mineFilter==='notJoined'?'bg-brand text-white':'bg-white dark:bg-slate-900'}`} onClick={()=>setMineFilter('notJoined')}>我未參加</button>
            </div>
            <label className="flex items-center gap-1">
              版面
              <select className="min-h-[44px] rounded border px-2 py-1" value={view} onChange={e=>setView(e.target.value)}>
                <option value="grid9">9 宮格</option><option value="grid16">16 宮格</option>
              </select>
            </label>
            <label className="flex items-center gap-1">
              每頁
              <select className="min-h-[44px] rounded border px-2 py-1" value={pageSize} onChange={e=>setPageSize(+e.target.value || 20)}>
                <option value="20">20</option><option value="40">40</option><option value="80">80</option>
              </select>
            </label>
            {admin && (
              <div className="ml-auto flex items-center gap-2">
                <button className="rounded-lg border px-3 py-1.5" onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}>新增/編輯</button>
                {/* ★ 新增：批次編輯參加名單 */}
                <button className="rounded-lg border px-3 py-1.5" onClick={onOpenBatchEditor} title="同一視窗，逐卡貼入不同名單">批次編輯參加名單</button>
              </div>
            )}
          </div>
        </div>
      );
    };
  }

  // 卡片（保留）
  const Card = ({ x, i }) => {
    const title = x?.title || x?.name || '（未命名）';
    const cover = Array.isArray(x?._images) && x._images.length>0 ? x._images[0] : (x?.image || "");
    const images = x._images || (cover ? [cover] : []);
    const count  = Array.isArray(x._candidates) ? x._candidates.length : 0;

    const [checkedMap, setCheckedMap] = React.useState({});
    const toggleCheck = (name) => setCheckedMap(m => ({...m, [name]: !m[name]}));

    return (
      <details key={x.id || i} className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/70 dark:bg-slate-900/60 backdrop-blur overflow-hidden">
        <summary className="list-none cursor-pointer p-3" onClick={(e)=>{ e.preventDefault(); setSheet({ open:true, item:x }); }}>
          <div className="flex flex-col">
            <div className="relative aspect-[4/3] overflow-hidden rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200/70 dark:border-slate-700/70 grid place-content-center">
              {cover ? <img src={cover} alt="" className="w-full h-full object-contain" loading="lazy" /> : <div className="text-slate-400 text-sm">無圖片</div>}
              <div className="absolute left-2 top-2 rounded bg-black/60 text-white text-xs px-2 py-1">候選 {count} 人</div>
            </div>
            <div className="mt-2 text-[13px] font-medium truncate" title={title}>{title}</div>
            {x.date && <div className="text-xs text-slate-500">日期：{x.date}</div>}
          </div>
        </summary>

        <div className="px-3 pb-3">
          {Array.isArray(images) && images.length>0 && (
            <div className="mt-2 -mx-1 px-1 flex overflow-x-auto gap-2 snap-x snap-mandatory">
              {images.map((src,idx)=>(
                <button key={idx} className="shrink-0 w-24 aspect-square rounded-lg overflow-hidden border snap-start bg-white/60 dark:bg-slate-900/50" title={`圖片 ${idx+1}`} onClick={(e)=>{ e.preventDefault(); openViewer(images, idx, title); }}>
                  <img src={src} alt="" className="w-full h-full object-contain" loading="lazy" />
                </button>
              ))}
            </div>
          )}

          {admin && (
            <div className="mt-3 space-y-2">
              <div>
                <div className="mb-1 text-sm font-medium">已報名（{x._candidates.length} 人）</div>
                {x._candidates.length===0 ? <div className="text-slate-500">尚無名單</div> : (
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-1">
                    {x._candidates.map((n,ii)=>(
                      <label key={ii} className="rounded border px-2 py-1 flex items-center gap-2">
                        <input type="checkbox" checked={!!checkedMap[n]} onChange={()=>toggleCheck(n)} />
                        <span>{n}</span>
                      </label>
                    ))}
                  </div>
                )}
              </div>

              <div className="flex flex-wrap gap-2 justify-end">
                <button className="rounded-lg border px-3 py-1.5" onClick={()=>editItem(x)}>編輯</button>
                <button className="rounded-lg border px-3 py-1.5" onClick={()=>copyAdText(x)}>一鍵複製抽獎貼文</button>
                <button className="rounded-lg border px-3 py-1.5" onClick={()=>convertBySimulation(x)}>以模擬結果轉歷史</button>
                <button className="rounded-lg border px-3 py-1.5" onClick={()=>convertByChecked(x, checkedMap)}>以勾選名單轉歷史</button>
                <button className="rounded-lg border px-3 py-1.5" onClick={()=>convertByInput(x)}>直接輸入名單轉歷史</button>
                <button className="rounded-lg bg-rose-500 text-white px-3 py-1.5" onClick={()=>removeItemObj(x)}>刪除</button>
              </div>
            </div>
          )}
        </div>
      </details>
    );
  };

  // ★ 新增：逐卡貼名單（批次）面板
  function BatchParticipantsDialog({ open, onClose }) {
    const [modeMap, setModeMap] = React.useState({});     // { [id]: 'append' | 'replace' }
    const [textMap, setTextMap] = React.useState({});     // { [id]: '...\n...' }

    const norm = (s) => String(s ?? "")
      .replace(/[\u200B-\u200D\uFEFF]/g, "") // 零寬
      .replace(/\u3000/g, " ")               // 全形空白→半形
      .replace(/[ \t]+/g, " ")
      .trim();

    const dedupeLines = (arr=[]) => {
      const seen = new Set(); const out = [];
      for (const line of arr) {
        const n = norm(line);
        if (!n) continue;
        const key = n.toLowerCase();
        if (!seen.has(key)) { seen.add(key); out.push(n); }
      }
      return out;
    };

    const handleClean = (id) => {
      const raw = String(textMap[id] || "");
      const cleaned = raw.split(/\r?\n|,|、|\s+/).map(s=>s.trim()).filter(Boolean).join("\n");
      setTextMap(m => ({ ...m, [id]: cleaned }));
    };
    const handleDedupe = (id) => {
      const raw = String(textMap[id] || "");
      const out = dedupeLines(raw.split(/\r?\n/));
      setTextMap(m => ({ ...m, [id]: out.join("\n") }));
      // 可選提示
      // alert(`已去除重複 ${Math.max(0, raw.split(/\r?\n/).filter(Boolean).length - out.length)} 筆`);
    };

    const applyToItem = (item) => {
      const id = String(item.id);
      const incoming = dedupeLines(String(textMap[id] || "").split(/\r?\n/));
      const mode = modeMap[id] || "append";
      const current = Array.isArray(item._candidates) ? item._candidates.slice() : [];

      let merged = current.slice();
      if (mode === "replace") {
        merged = incoming.slice();
      } else {
        // 追加：保留現有樣貌，僅把不存在的（忽略大小寫/空白差異）加入尾端
        const exist = new Set(current.map(c => norm(c).toLowerCase()));
        for (const n of incoming) {
          const key = n.toLowerCase();
          if (!exist.has(key)) { merged.push(n); exist.add(key); }
        }
      }
      updateItemParticipants({
        id,
        item,
        lines: merged,
        text: merged.join("\n"),
      });
    };

    if (!open) return null;
    return (
      <div className="fixed inset-0 z-[1000] bg-black/50 backdrop-blur-sm flex">
        <div className="m-auto w-[min(1000px,96vw)] max-h-[92vh] overflow-hidden rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-xl flex flex-col">
          <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
            <div className="font-semibold">批次編輯參加名單（逐卡各貼各的）</div>
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={onClose}>關閉</button>
          </div>

          <div className="flex-1 overflow-y-auto p-3 grid gap-3">
            {allItems.length === 0 && <div className="text-sm text-slate-500">目前沒有【等待開獎】活動</div>}

            {allItems.map((it) => (
              <div key={it.id} className="rounded-xl border border-slate-200 dark:border-slate-700 p-3 bg-white/70 dark:bg-slate-900/60">
                <div className="flex items-center justify-between gap-2">
                  <div className="font-medium truncate" title={it.title || "（未命名）"}>🎁 {it.title || "（未命名）"}</div>
                  <div className="text-xs text-slate-500">目前：{it._candidates.length} 位</div>
                </div>

                <textarea
                  className="mt-2 w-full rounded-lg border p-2 h-28 font-mono text-sm"
                  placeholder="一行一位，可貼 @name 或以空白/逗號分隔；此區僅影響本卡"
                  value={textMap[it.id] ?? ""}
                  onChange={(e)=>setTextMap(m => ({ ...m, [it.id]: e.target.value }))}
                />

                <div className="mt-2 flex flex-wrap items-center gap-2">
                  <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>handleClean(it.id)} title="移除空白行、修剪兩側空白、逗號/空白也會分行">✨ 清除空白行/雜訊</button>
                  <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>handleDedupe(it.id)} title="忽略大小寫/多空白 → 去重；保留第一筆樣式">🧹 去除重複</button>

                  <label className="ml-auto text-sm flex items-center gap-1">
                    套用模式
                    <select
                      className="rounded border px-2 py-1"
                      value={modeMap[it.id] || "append"}
                      onChange={(e)=>setModeMap(m => ({ ...m, [it.id]: e.target.value }))}
                    >
                      <option value="append">追加（保留原名單）</option>
                      <option value="replace">覆蓋（以此為新名單）</option>
                    </select>
                  </label>
                  <button className="rounded-lg bg-brand text-white px-3 py-1.5 text-sm" onClick={()=>applyToItem(it)}>套用到此卡</button>
                </div>
              </div>
            ))}
          </div>

          <div className="p-3 border-t border-slate-200 dark:border-slate-700 text-xs text-slate-500">
            貼心提醒：只有按下「套用到此卡」的活動才會寫入；關閉視窗不會自動套用。
          </div>
        </div>
      </div>
    );
  }

  return (
    <section className="space-y-3">
      {/* 新增/編輯表單（管理員可見） */}
      {admin && (
        <div className="rounded-xl border p-4 grid gap-3">
          <div className="grid sm:grid-cols-2 gap-3">
            <input className="min-h-[44px] rounded-lg border px-3 py-2" type="date" value={draft.date} onChange={e => setDraft(d => ({ ...d, date: e.target.value }))} placeholder="開獎/截止日期" />
            <input className="min-h-[44px] rounded-lg border px-3 py-2" value={draft.title} onChange={e => setDraft(d => ({ ...d, title: e.target.value }))} placeholder="獎項名稱" />
            <input className="min-h-[44px] rounded-lg border px-3 py-2" value={draft.plannedWinners} onChange={e => setDraft(d => ({ ...d, plannedWinners: e.target.value }))} placeholder="抽出名額（可空，預設1）" />
            <input className="min-h-[44px] rounded-lg border px-3 py-2" value={draft.image} onChange={e => setDraft(d => ({ ...d, image: e.target.value }))} placeholder="封面圖片 URL（可空）" />
          </div>

          {/* 名單輸入區（保留） */}
          <div>
            <label className="text-sm text-slate-500">已報名名單（每行一位）</label>
            <textarea className="mt-1 w-full rounded-lg border p-2 h-28 font-mono text-sm" value={draft.participantsText} onChange={e => setDraft(d => ({ ...d, participantsText: e.target.value }))} placeholder="@name1\n@name2\n@name3" />
            <div className="mt-2 flex flex-wrap items-center gap-2">
              <button type="button" className="rounded-lg border px-3 py-1.5 text-sm" title="忽略大小寫、移除零寬字元、全形空白→半形、多重空白折成一格" onClick={() => {
                const src = String(draft?.participantsText || "").split(/\r?\n/);
                const norm = (s) => String(s ?? "").replace(/[\u200B-\u200D\uFEFF]/g, "").replace(/\u3000/g, " ").replace(/[ \t]+/g, " ").trim();
                const seen = new Set(); const out = [];
                for (const line of src) { const n = norm(line); if (!n) continue; const key = n.toLowerCase(); if (!seen.has(key)) { seen.add(key); out.push(n); } }
                const before = src.map(norm).filter(Boolean).length; const after  = out.length; const removed = Math.max(0, before - after);
                setDraft(d => ({ ...d, participantsText: out.join("\n") }));
                if (removed > 0) { try { alert(`已去除重複 ${removed} 筆`); } catch {} }
              }}>🧹 去除重複（建議）</button>

              <button type="button" className="rounded-lg border px-3 py-1.5 text-sm" title="移除空白行、修剪每行兩側空白" onClick={() => {
                const cleaned = String(draft.participantsText || "").split(/\r?\n/).map(s => s.trim()).filter(Boolean).join("\n");
                setDraft(d => ({ ...d, participantsText: cleaned }));
              }}>✨ 清除空白行/雜訊</button>

              <span className="ml-auto text-sm text-slate-500">
                目前共 {String(draft.participantsText || "").split(/\r?\n/).map(s => s.trim()).filter(Boolean).length} 位
              </span>
            </div>
          </div>

          <div className="flex gap-2 justify-end">
            {editingId && (<button onClick={cancelEdit} className="rounded-lg border px-3 py-1.5">取消</button>)}
            <button onClick={upsertFromDraft} className="rounded-lg bg-brand text-white px-3 py-1.5">{editingId ? "儲存修改" : "新增活動"}</button>
          </div>
        </div>
      )}

      {/* 工具列 + 分頁器 */}
      <div className="sticky top-0 z-10">
        <ToolbarStable.current
          search={search} setSearch={setSearch}
          myName={myName} setMyName={setMyName}
          mineFilter={mineFilter} setMineFilter={setMineFilter}
          view={view} setView={setView}
          pageSize={pageSize} setPageSize={setPageSize}
          admin={admin}
          toolbarFocus={toolbarFocus} setToolbarFocus={setToolbarFocus}
          onOpenBatchEditor={()=>setBatchOpen(true)} // ★
        />
      </div>

      <div className="sm:flex"><Paginator /></div>

      {/* 清單 */}
      <div className={`grid ${gridCols} gap-3`} aria-label="等待開獎清單">
        {pageItems.map((x, i) => <Card key={x.id || i} x={x} i={i} />)}
      </div>

      <Paginator />

      {/* 內建 Viewer（共用） */}
      <Viewer state={viewer} setState={setViewer} />

      {/* 跳出式資訊面板（等待開獎） */}
      <ProductSheet
        open={sheet.open}
        item={sheet.item}
        context="pending"
        admin={!!admin}
        onClose={()=>setSheet({ open:false, item:null })}
        onOpenViewer={(images, idx, title)=>openViewer(images, idx, title)}
        onStartDraw={(it)=>setDraw({ open:true, item:it })}
        onAdmin={{
          onEdit:(it)=>editItem(it),
          onDelete:(it)=>removeItemObj(it),
          onCopyAd:(it)=>copyAdText(it),
          onConvertBySim:(it)=>convertBySimulation(it),
          onConvertByChecked:(it, map)=>convertByChecked(it, map ?? getCheckedMap(it.id)),
          onConvertByInput:(it)=>convertByInput(it),
          checkedMap: sheet.item ? getCheckedMap(sheet.item.id) : {},
          toggleCheck: sheet.item ? makeToggleCheck(sheet.item.id) : ()=>{},
          // ★ 保留：小卡「套用刪除」回寫
          onUpdateParticipants: updateItemParticipants,
        }}
      />

      {/* 抽獎展示（全螢幕覆蓋） */}
      <DrawSimulator
        open={draw.open}
        onClose={()=>setDraw({ open:false, item:null })}
        participants={draw.item ? normalizeItem(draw.item)._candidates : []}
        defaultCount={draw.item ? normalizeItem(draw.item)._planned || 1 : 1}
      />

      {/* ★ 新增：同一視窗逐卡貼名單（批次） */}
      <BatchParticipantsDialog open={!!batchOpen} onClose={()=>setBatchOpen(false)} />
    </section>
  );
}



/* ============================
 * 抽獎模擬器（展示用）
 * - 只顯示動畫與結果，不寫回資料、不提供複製/套用
 * props:
 *   open, onClose, participants (string[]), defaultCount (number)
 *   itemId?: string  // 用於暫存最近一次模擬結果
 * ============================ */
function DrawSimulator({ open=false, onClose=()=>{}, participants=[], defaultCount=1, itemId=null }) {
  const React = window.React || globalThis.React;
  const overlayRef = React.useRef(null);

  const [count, setCount] = React.useState(Math.max(1, defaultCount||1));
  const [duration, setDuration] = React.useState(2200); // 2.2s
  const [running, setRunning] = React.useState(false);
  const [displayName, setDisplayName] = React.useState("");
  const [results, setResults] = React.useState([]);

  React.useEffect(()=>{
    if (!open) return;
    const onKey = (e)=>{ if (e.key==="Escape") onClose(); };
    const onPop = ()=> onClose();
    document.addEventListener("keydown", onKey);
    window.addEventListener("popstate", onPop);
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    try { history.pushState({ draw:true }, "", location.href); } catch {}
    return ()=> {
      document.removeEventListener("keydown", onKey);
      window.removeEventListener("popstate", onPop);
      document.body.style.overflow = prev;
    };
  }, [open, onClose]);

  const handleOverlayClick = (e)=>{ if (e.target === overlayRef.current && !running) onClose(); };

  const pickWinners = (arr, k) => {
    const list = [...arr];
    for (let i=list.length-1;i>0;i--) {
      const j = Math.floor(Math.random()*(i+1));
      [list[i], list[j]] = [list[j], list[i]];
    }
    return list.slice(0, Math.max(1, Math.min(k, list.length)));
  };

  const start = ()=>{
    if (!Array.isArray(participants) || participants.length===0) { alert("沒有候選名單"); return; }
    setResults([]);
    setRunning(true);
    const startTime = performance.now();
    const total = participants.length;
    let acc = 0, last = startTime;
    const loop = (t)=>{
      const dt = t - last; last = t;
      const p = Math.min(1, (t - startTime) / Math.max(800, duration));
      const ease = 1 - Math.pow(1 - p, 3); // easeOutCubic
      const speed = 30 + (180 - 30) * (1 - ease);
      acc += dt * (speed / 1000) * 20;
      const idx = Math.floor(acc) % total;
      setDisplayName(participants[idx] || "");
      if (p < 1) requestAnimationFrame(loop);
      else { setResults(pickWinners(participants, Math.max(1, +count||1))); setRunning(false); }
    };
    requestAnimationFrame(loop);
  };

  // 快取最近一次模擬結果（依 itemId；並提供 __LAST__ 後備）
  React.useEffect(() => {
    if (!open) return;
    if (!Array.isArray(results) || results.length === 0) return;
    window.__LAST_SIM_RESULTS__ = window.__LAST_SIM_RESULTS__ || {};
    if (itemId) window.__LAST_SIM_RESULTS__[itemId] = { winners: results, time: Date.now(), itemId };
    window.__LAST_SIM_RESULTS__.__LAST__ = { winners: results, time: Date.now(), itemId: itemId || null };
  }, [open, itemId, results]);

  if (!open) return null;

  return (
    <div
      ref={overlayRef}
      className="fixed inset-0 z-[1000] bg-black/70 backdrop-blur flex items-center justify-center"
      role="dialog" aria-modal="true"
      onMouseDown={handleOverlayClick}
    >
      <div className="w-[min(96vw,50rem)] max-h-[92vh] rounded-2xl bg-white dark:bg-slate-900 shadow-elevate overflow-hidden flex flex-col">
        <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
          <div className="font-semibold">抽獎模擬（展示）</div>
          <button className="rounded-full border px-3 py-1.5 text-sm" onClick={onClose} disabled={running}>關閉</button>
        </div>

        <div className="flex-1 overflow-y-auto p-4 space-y-4">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <label className="flex items-center gap-2">
              <span className="text-sm whitespace-nowrap">抽出人數</span>
              <input type="number" min="1" max={Math.max(1, participants.length)} value={count} onChange={e=>setCount(Math.max(1, Math.min(+e.target.value||1, participants.length||1)))} className="w-20 rounded border px-2 py-1" />
            </label>
            <label className="flex items-center gap-2">
              <span className="text-sm whitespace-nowrap">動畫時長(ms)</span>
              <input type="number" min="800" step="100" value={duration} onChange={e=>setDuration(Math.max(800, +e.target.value||2200))} className="w-28 rounded border px-2 py-1" />
            </label>
          </div>

          <div className="rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 p-6 min-h-[140px] grid place-content-center">
            <div className="text-2xl md:text-3xl font-semibold text-slate-800 dark:text-white tracking-wide animate-pulse select-none">
              {running ? (displayName || "抽選中...") : (results.length ? "抽選完成" : "準備開始")}
            </div>
            {!running && !results.length && (
              <div className="mt-2 text-xs text-slate-500">名單數：{participants.length}</div>
            )}
          </div>

          {!!results.length && (
            <div className="space-y-2">
              <div className="text-sm text-slate-600">中獎名單（{results.length}）</div>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                {results.map((name, i)=>(
                  <div key={name+i} className="rounded-lg border border-emerald-300/70 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-800 dark:text-emerald-200 px-3 py-2 text-sm animate-[fadeIn_.6s_ease-out]">
                    <span className="opacity-70 mr-1">#{i+1}</span>{name}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="p-3 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/90 backdrop-blur flex items-center gap-2">
          {!running && <button className="flex-1 rounded-lg bg-brand text-white px-4 py-2 text-sm" onClick={start}>開始抽獎</button>}
          {running && <button className="flex-1 rounded-lg border px-4 py-2 text-sm" disabled>抽選進行中...</button>}
          <button className="rounded-lg border px-3 py-2 text-sm" onClick={onClose} disabled={running}>關閉</button>
        </div>
      </div>
    </div>
  );
}

/* 小工具：hash/PRNG（for 種子重現） */
function xmur3(str) { let h = 1779033703 ^ str.length; for (let i=0;i<str.length;i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h<<13 | h>>>19; } return function() { h = Math.imul(h ^ (h>>>16), 2246822507); h = Math.imul(h ^ (h>>>13), 3266489909); return (h ^= h>>>16) >>> 0; }; }
function mulberry32(a) { return function() { let t = a += 0x6D2B79F5; t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; } }

// 取得商品剩餘數量（相容多種欄位命名）
function getRemain(x){
  const cand = [x?.stock, x?.qty, x?.quantity, x?.remaining];
  for (const v of cand){
    if (typeof v === 'number' && Number.isFinite(v)) return v;
    if (typeof v === 'string' && v.trim()!=='' && !Number.isNaN(+v)) return +v;
  }
  return null; // 沒有數量就不顯示
}

// 防呆刪除關鍵字確認（預設關鍵字：刪除）
function confirmKeyword({ label='', keyword='刪除' } = {}){
  const input = prompt(`為了防呆，請輸入「${keyword}」以確認：\n${label}`);
  return input === keyword;
}

// —— 空資料（全部留給你用 Admin 後續新增） ——

  history: [],     // 📚 歷史抽獎紀錄
  pending: [],     // ⏳ 等待開獎
  ongoing: [],     // 🔄 進行中活動

  // 🛍️ 點數商城（原本就有）
  shop: { items: [], people: [] },

  // images: [string]（圖片 URL 或 ImageIO key），會跟著 data 一起匯出

/* === Site Data Normalizer（單機完整整改版）===
 * 目的：修正缺欄位、匯入舊資料、局部 setData 時造成的資料形狀不一致。
 * 原則：不改使用者原資料、不改 LocalStorage key、不改功能，只補齊必要容器。
 */
function kjsDeepClone(obj){
  try { return structuredClone(obj); }
  catch { return JSON.parse(JSON.stringify(obj ?? {})); }
}
function kjsArray(v){ return Array.isArray(v) ? v : []; }
function kjsObj(v){ return (v && typeof v === 'object' && !Array.isArray(v)) ? v : {}; }
function kjsEnsureId(item, prefix='item'){
  if(!item || typeof item !== 'object') return item;
  if(!item.id) item.id = `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
  return item;
}
function normalizeSiteData(input){
  const source = kjsObj(input);
  const d = { ...kjsDeepClone(EMPTY), ...kjsDeepClone(source) };

  d.homepage = { ...(EMPTY.homepage || {}), ...kjsObj(source.homepage || d.homepage) };
  d.homepage.announcements = kjsArray(d.homepage.announcements);

  d.history = sortHistoryDesc(kjsArray(d.history).map(x => kjsEnsureId({ ...kjsObj(x) }, 'history')));
  d.pending = kjsArray(d.pending).map(x => kjsEnsureId({ ...kjsObj(x) }, 'pending'));
  d.ongoing = kjsArray(d.ongoing).map(x => kjsEnsureId({ ...kjsObj(x) }, 'ongoing'));

  d.shop = { items: [], people: [], logs: [], tagGroups: [], ...kjsObj(d.shop) };
  d.shop.items = kjsArray(d.shop.items).map(x => kjsEnsureId({ ...kjsObj(x) }, 'shop'));
  d.shop.people = kjsArray(d.shop.people).map(x => kjsEnsureId({ ...kjsObj(x) }, 'person'));
  d.shop.logs = kjsArray(d.shop.logs).map(x => kjsEnsureId({ ...kjsObj(x) }, 'log'));
  d.shop.tagGroups = kjsArray(d.shop.tagGroups);

  d.store = { items: [], tagGroups: [], ...kjsObj(d.store) };
  d.store.items = kjsArray(d.store.items).map(x => kjsEnsureId({ ...kjsObj(x) }, 'store'));
  d.store.tagGroups = kjsArray(d.store.tagGroups);

  d.others = { cards: [], ...kjsObj(d.others) };
  d.others.cards = kjsArray(d.others.cards).map(x => kjsEnsureId({ ...kjsObj(x) }, 'card'));

  d.gallery = { items: [], homepage_showcase: [], ...kjsObj(d.gallery) };
  d.gallery.items = kjsArray(d.gallery.items).map(x => kjsEnsureId({ ...kjsObj(x) }, 'gallery'));
  d.gallery.homepage_showcase = kjsArray(d.gallery.homepage_showcase);

  d.faq = { categories: [], ...kjsObj(d.faq) };

function buildMonthDaysUTC(y, mZeroBased) {
  // 以 UTC 計算月曆，避免時區偏移
  const first = new Date(Date.UTC(y, mZeroBased, 1));
  const startDow = first.getUTCDay(); // 0=Sun..6=Sat
  const daysInMonth = new Date(Date.UTC(y, mZeroBased + 1, 0)).getUTCDate();

  const days = [];
  for (let i = 0; i < startDow; i++) days.push(null); // 前導空格
  for (let d = 1; d <= daysInMonth; d++) {
    days.push(ymdStringUTC(y, mZeroBased, d));
  }
  return days;
}






// === Utils: 抽獎用（安全隨機 / 可選種子） ===
// 將字串變成 32-bit 整數種子
function hash32(str="") {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
// xorshift32 產生器（可重現）
function makePRNG(seedStr="") {
  if (!seedStr) return null; // 沒種子就用安全隨機
  let x = hash32(seedStr) || 1;
  return function next() {
    // 產 0..1 的浮點數
    x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
    // 轉成 0..1
    return ((x >>> 0) / 4294967296);
  };
}
// Fisher–Yates 洗牌；優先使用 prng，否則用 crypto 安全隨機
function shufflePick(arr, k, prng=null) {
  const a = arr.slice();
  const n = a.length;
  // 只洗到取到 k 個為止
  for (let i = 0; i < k; i++) {
    let r;
    if (prng) {
      r = i + Math.floor(prng() * (n - i));
    } else {
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      r = i + (buf[0] % (n - i));
    }
    [a[i], a[r]] = [a[r], a[i]];
  }
  return a.slice(0, k);
}

function plusDays(ymd, days){

  d.setDate(d.getDate() + (days||0));

// === Collapse（強化版，向下相容）===
// 保留原：header, children, defaultOpen=false, force=null
// 新增：group（同一群手風琴 id），uid（該項唯一 id）
function Collapse({ header, children, defaultOpen=false, force=null, group=null, uid=null }) {
  const { useState, useRef, useEffect } = React;
  const [open, setOpen] = useState(!!defaultOpen);
  const ref = useRef(null);
  const idRef = useRef(uid || Math.random().toString(36).slice(2,10));
  const grp = group || null;

  // force 覆寫（配合你的「全部展開／收合」）
  useEffect(() => {
    if (force === 'open') setOpen(true);
    else if (force === 'close') setOpen(false);
  }, [force]);

  // 高度動畫：依 open/children 重新計算
  useEffect(() => {
    if (!ref.current) return;
    ref.current.style.height = open ? ref.current.scrollHeight + 'px' : '0px';
  }, [open, children]);

  // 手風琴：同群有其它項目打開 → 關閉我
  useEffect(() => {
    if (!grp) return;
    const onOpen = (e) => {
      const { group, uid } = e.detail || {};
      if (group === grp && uid !== idRef.current) setOpen(false);
    };
    document.addEventListener('kjs:accordionOpen', onOpen);
    return () => document.removeEventListener('kjs:accordionOpen', onOpen);
  }, [grp]);

  const handleToggle = () => {
    if (force === 'open' || force === 'close') return;
    const next = !open;
    setOpen(next);
    if (next && grp) {
      const ev = new CustomEvent('kjs:accordionOpen', { detail: { group: grp, uid: idRef.current }});
      document.dispatchEvent(ev);
    }
  };

  return (
    <div className="rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden bg-white/70 dark:bg-slate-900/40">
      <button
        className="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-slate-50/80 dark:hover:bg-slate-800/60 transition"
        onClick={handleToggle}
        aria-expanded={open ? 'true' : 'false'}
        type="button"
      >
        <div className="font-medium">
          {typeof header === 'function' ? header(open) : header}
        </div>
        <svg className={"w-4 h-4 transition " + (open ? "rotate-180" : "")} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
      <div ref={ref} className="px-4 pb-4 transition-[height] duration-300 ease-in-out" style={{height: open?'auto':'0px'}}>
        <div className="pt-2">{children}</div>
      </div>
    </div>
  );
}


/***************************************************
 * useAccordionController：手風琴控制（一次只開一個）
 * 也支援「全部展開 / 全部收合」覆寫
 ***************************************************/
function useAccordionController() {
  const [activeId, setActiveId] = React.useState(null); // 正在展開的 id
  const [force, setForce] = React.useState(null);       // 'open' | 'close' | null

  const openAll  = () => setForce('open');
  const closeAll = () => { setForce('close'); setActiveId(null); };
  const clearForce = () => setForce(null);

  // 綁到每個 Collapse 用
  const bind = (id) => ({
    isOpen: force === 'open' ? true : force === 'close' ? false : activeId === id,
    force,
    onToggle: () => {
      if (force) setForce(null); // 只要手動切換，回歸手風琴模式
      setActiveId(prev => (prev === id ? null : id));
    }
  });

  return { activeId, setActiveId, force, setForce, openAll, closeAll, clearForce, bind };
}

 // 匯入/匯出（JSON，供你備份搬移）——【整段覆蓋版】
// 本版會把「站內資料 data」與「管理員名單 admins（只含雜湊，不含明文密碼）」一起匯出；
// 匯入時同時支援「新格式（含 data/admins）」與「舊格式（只有 data）」。

const exportJSON = () => {
  // 取出目前所有圖片路徑與調整（ImageIO 會回傳字串 JSON）
  const imagesStr = window.ImageIO ? window.ImageIO.exportImagesJSON() : null;
  const images = imagesStr ? JSON.parse(imagesStr) : null;

  const full = {
    _meta: {
      app: 'kjs',
      version: 2, // 升級一下版本號，方便之後辨識
      exportedAt: new Date().toISOString()
    },
    data: normalizeSiteData(data), // 站內資料（已補齊欄位）
    admins,          // 管理員名單（hash）
    images,          // ← 新增：全站圖片路徑與調整（images.v1 結構）
    bg               // ← 新增：背景設定（主畫面 / 漢堡選單）
  };

  const blob = new Blob([JSON.stringify(full, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kjs_full_export_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};

// （可選）僅匯出站內資料，不含管理員名單——如果要給一般成員備份，可以綁這顆
const exportDataOnly = () => {
  const blob = new Blob([JSON.stringify(normalizeSiteData(data), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kjs_data_only_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};

// 匯入支援兩種格式：
// 1) 新格式：{ _meta?, data: {...}, admins: [...] } —— 同時覆蓋站內資料與管理員名單
// 2) 舊格式：{ ...直接就是 data 內容... } —— 只覆蓋站內資料，保留本機 admins
const importJSON = (file) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const obj = JSON.parse(String(e.target.result || '{}'));

      const looksNew = obj && typeof obj === 'object' && ('data' in obj || 'admins' in obj);

      if (looksNew) {
        const nextData   = obj.data  ?? {};
        const nextAdmins = Array.isArray(obj.admins) ? obj.admins : null;

        if (Array.isArray(nextData.history)) nextData.history = sortHistoryDesc(nextData.history);
        setData(nextData);
        if (nextAdmins) setAdmins(nextAdmins);

        // ★ 新增：若包了 images（images.v1 結構），呼叫 ImageIO 立即套用
        if (obj.images && window.ImageIO && typeof window.ImageIO.importImagesJSON === 'function') {
          try { window.ImageIO.importImagesJSON(obj.images); } catch {}
        }

        // ★ 新增：若包了 bg（背景設定），直接寫回
        if (obj.bg) {
          try { setBg(obj.bg); } catch {}
        }

        alert(`匯入完成${nextAdmins ? '（含管理員名單）' : ''}，歷史已自動排序`);
      } else {
        // 舊格式：只有 data
        const nextData = obj;
        if (Array.isArray(nextData.history)) nextData.history = sortHistoryDesc(nextData.history);
        setData(nextData);
        alert('匯入完成（舊格式，已自動排序歷史）');
      }
    } catch {
      alert('匯入失敗：不是有效 JSON');
    }
  };
  reader.readAsText(file);
};

// === GameCenter：🎮 遊戲中心（依「空白邏輯」控制入口） ===
function GameCenter({ data, setData, admin }) {
  const { useEffect, useMemo, useState } = React;

  const games = useMemo(() => (Array.isArray(data?.games) ? data.games : []), [data]);

  // 只記住「上次玩哪個」：不存進 data，避免污染公開資料
  const [activeId, setActiveId] = useLocalState('kjs_game_active', '');
  const activeGame = useMemo(() => games.find(g => g.id === activeId) || games[0] || null, [games, activeId]);

  // 若清單變動導致 activeId 失效，自動切到第一個
  useEffect(() => {
    if (!games.length) {
      if (activeId) setActiveId('');
      return;
    }
    const ok = games.some(g => g.id === activeId);
    if (!ok) setActiveId(games[0].id);
  }, [games, activeId, setActiveId]);

  // Play Modal：點卡片才開啟，關閉時保留 iframe（不卸載），以保留進度
  const [playOpen, setPlayOpen] = useState(false);
  const [mountedIds, setMountedIds] = useState([]); // 已開啟過的遊戲 id（用於保留各遊戲 iframe 狀態）
  const [iframeRev, setIframeRev] = useState({});   // 重新開始用：id -> rev

  const openPlay = (id) => {
    if (!id) return;
    setActiveId(id);
    setMountedIds(prev => (prev.includes(id) ? prev : [...prev, id]));
    setPlayOpen(true);
  };

  const closePlay = () => setPlayOpen(false);

  const restartPlay = () => {
    if (!activeId) return;
    setMountedIds(prev => (prev.includes(activeId) ? prev : [...prev, activeId]));
    setIframeRev(prev => ({ ...(prev || {}), [activeId]: ((prev && prev[activeId]) || 0) + 1 }));
  };

  // 若遊戲清單清空，關閉遊玩視窗並清掉暫存 iframe
  useEffect(() => {
    if (!games.length) {
      setPlayOpen(false);
      setMountedIds([]);
    }
  }, [games.length]);

  // Admin：新增/編輯 Modal
  const [openEditor, setOpenEditor] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [title, setTitle] = useState('');
  const [url, setUrl] = useState('');
  const [note, setNote] = useState('');
  const [thumb, setThumb] = useState('');

  const resetEditor = () => {
    setEditingId(null);
    setTitle('');
    setUrl('');
    setNote('');
    setThumb('');
  };

  const openAdd = () => {
    resetEditor();
    setOpenEditor(true);
  };

  const openEdit = (g) => {
    setEditingId(g.id);
    setTitle(String(g.title || ''));
    setUrl(String(g.url || ''));
    setNote(String(g.note || ''));
    setThumb(String(g.thumb || ''));
    setOpenEditor(true);
  };

  const normalizeUrl = (u) => String(u || '').trim();

  const saveGame = () => {
    const t = String(title || '').trim();
    const u = normalizeUrl(url);
    const n = String(note || '').trim();
    const th = String(thumb || '').trim();

    if (!t) { alert('請輸入遊戲名稱'); return; }
    if (!u) { alert('請輸入遊戲網址（可填相對路徑或 https://...）'); return; }

    const now = Date.now();
    const makeId = () => (crypto?.randomUUID ? crypto.randomUUID() : ('g_' + now + '_' + Math.random().toString(16).slice(2)));

    const next = { id: editingId || makeId(), title: t, url: u, thumb: th, note: n, updatedAt: now, createdAt: editingId ? undefined : now };

    const nextGames = editingId
      ? games.map(g => g.id === editingId ? ({ ...g, ...next, createdAt: g.createdAt ?? now }) : g)
      : [...games, next];

    setData(prev => ({ ...(prev || {}), games: nextGames }));

    // 新增第一個遊戲時：自動切到它
    if (!editingId) setActiveId(next.id);

    setOpenEditor(false);
    resetEditor();
  };

  const removeGame = (id) => {
    const g = games.find(x => x.id === id);
    if (!g) return;
    if (!confirm(`確定刪除「${g.title}」？`)) return;

    const nextGames = games.filter(x => x.id !== id);
    setData(prev => ({ ...(prev || {}), games: nextGames }));

    if (activeId === id) {
      setActiveId(nextGames[0]?.id || '');
    }
  };

  // 非管理者且沒有遊戲：入口已隱藏，且上層會自動導回首頁；此處再做防呆
  if (!admin && games.length === 0) {
    return null;
  }

  return (
    <div className="space-y-4">
      <section className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/70 dark:bg-slate-900/60 backdrop-blur p-4">
        <div className="flex items-start justify-between gap-3">
          <div>
            <div className="text-lg font-semibold">🎮 遊戲中心</div>
            <div className="text-sm text-slate-500 mt-1">
              {games.length ? '從左側清單選擇遊戲，右側直接內嵌遊玩' : '尚未新增任何遊戲'}
            </div>
          </div>

          {admin && (
            <button
              onClick={openAdd}
              className="tap-target rounded-xl bg-brand text-white px-3 py-2 text-sm shadow-soft"
              title="新增遊戲"
            >
              新增遊戲
            </button>
          )}
        </div>
      </section>

      {games.length === 0 ? (
        <EmptyCard text="尚未新增任何遊戲" admin={true} />
      ) : (
        <>
          {/* 卡片清單：所有人可見（有遊戲時） */}
          <section className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/70 dark:bg-slate-900/60 backdrop-blur p-3">
            <div className="text-sm font-semibold mb-2">遊戲清單</div>

            <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
              {games.map(g => {
                const active = activeGame?.id === g.id;
                const thumbSrc = String(g.thumb || '').trim();
                return (
                  <div
                    key={g.id}
                    className={cx(
                      "rounded-2xl border overflow-hidden bg-white/70 dark:bg-slate-900/40",
                      active ? "border-brand/60 ring-2 ring-brand/20" : "border-slate-200/70 dark:border-slate-700"
                    )}
                  >
                    <button
                      className="w-full text-left"
                      onClick={() => openPlay(g.id)}
                      title={g.title}
                    >
                      <div className="aspect-[16/9] bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden">
                        {thumbSrc ? (
                          <img
                            src={thumbSrc}
                            alt={g.title}
                            className="w-full h-full object-cover"
                            loading="lazy"
                          />
                        ) : (
                          <div className="text-4xl opacity-70">🎮</div>
                        )}
                      </div>

                      <div className="p-3">
                        <div className="font-semibold line-clamp-1">{g.title}</div>
                        {!!g.note && <div className="text-xs text-slate-500 mt-1 line-clamp-2">{g.note}</div>}
                      </div>
                    </button>

                    <div className="px-3 pb-3 flex items-center justify-between gap-2">
                      <a
                        href={g.url}
                        target="_blank"
                        rel="noreferrer"
                        className="text-xs underline text-slate-500 hover:text-slate-700 dark:hover:text-slate-200"
                        title="新視窗開啟（可選）"
                      >
                        新視窗開啟
                      </a>

                      {admin && (
                        <div className="flex items-center gap-2">
                          <button
                            onClick={() => openEdit(g)}
                            className="rounded-lg border px-2 py-1 text-xs"
                            title="編輯"
                          >
                            編輯
                          </button>
                          <button
                            onClick={() => removeGame(g.id)}
                            className="rounded-lg border px-2 py-1 text-xs"
                            title="刪除"
                          >
                            刪除
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          {/* 遊玩視窗（點卡片才開啟；關閉時保留 iframe，不卸載） */}
          {mountedIds.length > 0 && (
            <div
              className={`fixed inset-0 z-50 ${playOpen ? '' : 'pointer-events-none'}`}
              aria-hidden={playOpen ? 'false' : 'true'}
            >
              <div
                className={`absolute inset-0 bg-black/50 transition-opacity duration-200 ${playOpen ? 'opacity-100' : 'opacity-0'}`}
                onClick={closePlay}
              />
              <div className="absolute inset-0 flex items-center justify-center p-4">
                <div
                  className={`w-full max-w-5xl rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-xl overflow-hidden transition-all duration-200 ${playOpen ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}
                  onClick={(e)=>e.stopPropagation()}
                >
                  <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between gap-3">
                    <div className="font-semibold line-clamp-1">
                      {activeGame ? `🎮 ${activeGame.title}` : '🎮 遊戲'}
                    </div>
                    <div className="flex items-center gap-2">
                      {activeGame?.url && (
                        <a
                          href={activeGame.url}
                          target="_blank"
                          rel="noreferrer"
                          className="rounded-lg border px-3 py-1.5 text-sm"
                          title="新分頁開啟"
                        >
                          新分頁
                        </a>
                      )}
                      <button
                        type="button"
                        onClick={restartPlay}
                        className="rounded-lg border px-3 py-1.5 text-sm"
                        title="重新開始（重新載入遊戲）"
                        disabled={!activeGame}
                      >
                        重新開始
                      </button>
                      <button
                        type="button"
                        onClick={closePlay}
                        className="rounded-lg border px-3 py-1.5 text-sm"
                        title="關閉（保留進度）"
                      >
                        關閉
                      </button>
                    </div>
                  </div>

                  <div className="p-3">
                    <div className="rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-black/5">
                      <div className="relative w-full" style={{ paddingTop: '56.25%' }}>
                        {mountedIds.map((id) => {
                          const g = games.find(x => x.id === id);
                          if (!g) return null;
                          const isActive = id === activeId;
                          const rev = (iframeRev && iframeRev[id]) || 0;
                          return (
                            <iframe
                              key={`${id}:${rev}`}
                              title={g.title}
                              src={g.url}
                              className={`absolute inset-0 w-full h-full bg-white ${isActive ? '' : 'hidden'}`}
                              loading="lazy"
                              allow="fullscreen; gamepad; autoplay"
                              sandbox="allow-same-origin allow-scripts allow-forms allow-pointer-lock allow-popups"
                            />
                          );
                        })}
                      </div>
                    </div>

                    {activeGame?.note && (
                      <div className="mt-3 text-sm text-slate-600 dark:text-slate-300">
                        {activeGame.note}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

        </>
      )}{openEditor && (
        <div className="fixed inset-0 z-50">
          <div className="absolute inset-0 bg-black/40" onClick={() => { setOpenEditor(false); resetEditor(); }} />
          <div className="absolute inset-0 flex items-center justify-center p-4">
            <div className="w-full max-w-lg rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-xl p-4 modal-scroll" onClick={(e)=>e.stopPropagation()}>
              <div className="text-base font-semibold">{editingId ? '編輯遊戲' : '新增遊戲'}</div>
              <div className="mt-3 grid gap-3">
                <div>
                  <label className="text-sm text-slate-600 dark:text-slate-300">遊戲名稱</label>
                  <input
                    value={title}
                    onChange={(e)=>setTitle(e.target.value)}
                    className="mt-1 w-full rounded-xl border border-slate-300 dark:border-slate-700 px-3 py-2 bg-white/70 dark:bg-slate-800/70"
                    placeholder="例如：Flappy Bird"
                  />
                </div>
                <div>
                  <label className="text-sm text-slate-600 dark:text-slate-300">遊戲網址</label>
                  <input
                    value={url}
                    onChange={(e)=>setUrl(e.target.value)}
                    className="mt-1 w-full rounded-xl border border-slate-300 dark:border-slate-700 px-3 py-2 bg-white/70 dark:bg-slate-800/70"
                    placeholder="例如：./games/flappy/index.html 或 https://..."
                  />
                  <div className="text-xs text-slate-500 mt-1">
                    建議使用同站相對路徑，才能符合「不聯機」的本機部署情境
                  </div>
                </div>
                <div>
                  <label className="text-sm text-slate-600 dark:text-slate-300">縮圖網址（可選）</label>
                  <input
                    value={thumb}
                    onChange={(e)=>setThumb(e.target.value)}
                    className="mt-1 w-full rounded-xl border border-slate-300 dark:border-slate-700 px-3 py-2 bg-white/70 dark:bg-slate-800/70"
                    placeholder="例如：./assets/games/flappy_thumb.png 或 https://..."
                  />
                  <div className="text-xs text-slate-500 mt-1">
                    若不填，卡片會顯示預設圖示；建議同站相對路徑
                  </div>
                </div>
                <div>
                  <label className="text-sm text-slate-600 dark:text-slate-300">備註（可選）</label>
                  <textarea
                    value={note}
                    onChange={(e)=>setNote(e.target.value)}
                    className="mt-1 w-full rounded-xl border border-slate-300 dark:border-slate-700 px-3 py-2 bg-white/70 dark:bg-slate-800/70"
                    rows={3}
                    placeholder="例如：操作方式、關卡說明等"
                  />
                </div>

                <div className="flex items-center justify-end gap-2 pt-2">
                  <button
                    onClick={() => { setOpenEditor(false); resetEditor(); }}
                    className="tap-target rounded-xl border px-3 py-2 text-sm"
                  >
                    取消
                  </button>
                  <button
                    onClick={saveGame}
                    className="tap-target rounded-xl bg-brand text-white px-3 py-2 text-sm shadow-soft"
                  >
                    儲存
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// === Home（Hero + 右側開箱/到貨實拍縮圖 + 4 顆重點按鈕 + FAQ） ===
function Home({ setTab, data, setData, admin }) {
  const { useState, useMemo, useEffect } = React;

  // 保障節點存在（延用你的初始化）
  useEffect(() => {
    try { kjsEnsureGallery(data); } catch {}
    try { kjsEnsureFaq(data); } catch {}
  }, [data]);

  // 系統連結（主頁按鈕使用，可由「管理員設定」調整）
  const settings = (data && data.settings) ? data.settings : DEFAULT_SETTINGS;
  const lineGroupUrl = String(settings.lineGroupUrl || "").trim() || "https://reurl.cc/ZNGdXV";
  const officialLineUrl = String(settings.contactUrl || "").trim();

  // /api/stats → 4 顆按鈕數字（失敗回退本地）
  const [stats, setStats] = useState(null);
  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const r = await fetch('/api/stats', { headers: { accept: 'application/json' } });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const j = await r.json();
        if (!alive) return;
        setStats({
          pending: Number(j.pending ?? 0),
          history: Number(j.history ?? 0),
          store:   Number(j.storeCount ?? j.store ?? 0),
          shop:    Number(j.shopCount  ?? j.mall  ?? 0),
        });
      } catch {
        if (!alive) return;
        setStats(null);
      }
    })();
    return () => { alive = false; };
  }, []);

  // 本地計數（fallback）
  const local = useMemo(() => ({
    pending: Array.isArray(data.pending) ? data.pending.length : 0,
    history: Array.isArray(data.history) ? data.history.length : 0,
    store:   Array.isArray(data.store?.items) ? data.store.items.length : 0,
    shop:    Array.isArray(data.shop?.items)  ? data.shop.items.length  : 0,
  }), [data]);
  const eff = {
    pending: stats?.pending ?? local.pending,
    history: stats?.history ?? local.history,
    store:   stats?.store   ?? local.store,
    shop:    stats?.shop    ?? local.shop,
  };

 // ★ 首頁開箱/到貨實拍：若已選擇（homepage_showcase）→ 完整依選擇順序顯示；否則回退取前 5 張
  const showcase = Array.isArray(data?.gallery?.homepage_showcase)
    ? data.gallery.homepage_showcase
    : [];

  const galleryImages = useMemo(() => {
    // 你有「已選清單」→ 首頁完整照你排序顯示（不再限制 5 張）
    if (Array.isArray(showcase) && showcase.length > 0) {
      return showcase.filter(Boolean);

    // 沒有選 → 用資料庫 items 回退顯示前 5 張（避免首頁過長）
    const items = Array.isArray(data.gallery?.items) ? data.gallery.items : [];
    return items
      .map(it => it.url || it.img || it.image || it.src || '')
      .filter(Boolean)

  // ★ 管理介面：編輯首頁回報

  useEffect(()=>{ setPick(showcase); }, [editOpen]); // 開啟時載入

    setPick(prev => prev.includes(url) ? prev.filter(u=>u!==url) : [...prev, url]);
  };

    setPick(prev => {
      const arr = prev.slice();
      const i = arr.indexOf(url);
      if (i<0) return prev;
      const j = i + (dir==='up'?-1:+1);
      if (j<0 || j>=arr.length) return prev;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return arr;
    });
  };
  const savePick = () => {
    setData(s => {
      const next = { ...(s||{}) };
      next.gallery = next.gallery || {};
      next.gallery.homepage_showcase = (pick||[]).filter(Boolean);
      return next;
    });

  return (

            </p>

            {/* 主行動 */}
            <div className="flex flex-wrap gap-3">
              <a
                href={lineGroupUrl}

                className="rounded-xl bg-brand text-white px-4 py-2.5 text-sm shadow-[0_10px_25px_-12px_rgba(0,0,0,0.28)] active:scale-[0.99] transition"

                >

                </a>
              )}
              {admin && (
                <button
                  onClick={()=>setEditOpen(true)}
                  className="rounded-xl bg-brand text-white px-4 py-2.5 text-sm shadow-[0_10px_25px_-12px_rgba(0,0,0,0.28)] active:scale-[0.99] transition"

              <ActionTile scheme="muted"  emphasis="muted" icon="📚" label="歷史紀錄" count={eff.history} onClick={() => setTab('history')} />
              <ActionTile scheme="brand"  emphasis="primary" icon="🛒" label="社群商店" count={eff.store}   onClick={() => setTab('store')} />
              <ActionTile scheme="cyan"   emphasis="secondary" icon="💎" label="點數商城" count={eff.shop}    onClick={() => setTab('shop')} />

      {/* 開箱/到貨實拍（證據牆） */}

        <section className="mx-auto max-w-6xl px-4 pb-10">

            <div className="flex items-start justify-between gap-3">
              <div>
                <div className="font-semibold text-base">開箱/到貨實拍</div>

              </div>
              <button
                className="shrink-0 rounded-xl border border-slate-200 dark:border-slate-700 px-3 py-2 text-sm hover:bg-white/60 dark:hover:bg-slate-800/60 active:scale-[0.99] transition"
                onClick={() => setTab('gallery')}

            <div className="mt-4 flex gap-3 overflow-x-auto pb-2 -mx-1 px-1 snap-x snap-mandatory">
