    .menu-pane{

    }
    .menu-pane::before{
      content:"";
      position: absolute; inset: 0; z-index: 0;

      background-position: var(--menu-bg-pos, center);

  <!-- [KJS UNIFIED UI PATCH START]
       版面整改：統一前台/後台卡片、彈窗、表單、按鈕、手機版間距。
       只改視覺與安全互動，不改資料結構、不改 LocalStorage 單機架構。
  -->
  <style id="kjs-unified-ui-patch">
    :root{
      --kjs-brand:#14b8a6;
      --kjs-brand-2:#0f766e;
      --kjs-warn:#f59e0b;
      --kjs-danger:#ef4444;
      --kjs-radius:18px;
      --kjs-radius-sm:12px;
      --kjs-line:rgba(148,163,184,.26);
      --kjs-surface:rgba(255,255,255,.78);
      --kjs-surface-strong:rgba(255,255,255,.94);
      --kjs-shadow:0 18px 42px -26px rgba(15,23,42,.55);
      --kjs-shadow-soft:0 12px 28px -22px rgba(15,23,42,.5);
    }
    @media (prefers-color-scheme: dark){
      :root{
        --kjs-line:rgba(148,163,184,.22);
        --kjs-surface:rgba(15,23,42,.66);
        --kjs-surface-strong:rgba(15,23,42,.92);
        --kjs-shadow:0 18px 42px -26px rgba(0,0,0,.72);
        --kjs-shadow-soft:0 12px 28px -22px rgba(0,0,0,.68);
      }
    }

    .kjs-unified{
      letter-spacing:.01em;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    .kjs-unified *{ box-sizing:border-box; }
    .kjs-unified ::selection{ background:rgba(20,184,166,.22); }

    /* 固定頂欄：更像正式平台 */
    .kjs-unified header.sticky{
      box-shadow:0 12px 28px -26px rgba(15,23,42,.65);
    }
    .kjs-unified header h1{ letter-spacing:.02em; }

    /* 統一可互動元件 */
    .kjs-unified :where(button,a,input,select,textarea){
      -webkit-tap-highlight-color:transparent;
    }
    .kjs-unified :where(button,a[href]){
      transition:transform .16s ease, box-shadow .16s ease, background-color .16s ease, border-color .16s ease, opacity .16s ease;
    }
    .kjs-unified :where(button:not(:disabled),a[href]):active{ transform:translateY(1px) scale(.992); }
    .kjs-unified :where(button:disabled){ opacity:.52; cursor:not-allowed; }
    .kjs-unified :where(button,a[href],input,select,textarea):focus-visible{
      outline:3px solid rgba(20,184,166,.28);
      outline-offset:2px;
    }

    /* 統一按鈕視覺，不硬改功能 */
    .kjs-unified :where(button).rounded-lg,
    .kjs-unified :where(button).rounded-xl,
    .kjs-unified :where(a).rounded-lg,
    .kjs-unified :where(a).rounded-xl{
      font-weight:650;
      border-color:var(--kjs-line);
    }
    .kjs-unified :where(.bg-brand){
      background:linear-gradient(135deg,var(--kjs-brand),var(--kjs-brand-2)) !important;
      box-shadow:0 10px 24px -16px rgba(20,184,166,.8);
    }
    .kjs-unified :where(.bg-rose-500,.bg-red-500){
      box-shadow:0 10px 24px -18px rgba(239,68,68,.85);
    }

    /* 表單統一：所有後台編輯區一致 */
    .kjs-unified :where(input:not([type="checkbox"]):not([type="radio"]),select,textarea){
      border-radius:14px !important;
      border:1px solid var(--kjs-line) !important;
      background:var(--kjs-surface-strong) !important;
      color:inherit;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }
    .kjs-unified :where(input:not([type="checkbox"]):not([type="radio"]),select){
      min-height:42px;
    }
    .kjs-unified :where(textarea){
      line-height:1.65;
      resize:vertical;
    }
    .kjs-unified :where(label){
      font-weight:650;
    }

    /* 卡片、管理面板、折疊區統一 */
    .kjs-unified :where(.rounded-2xl.border,.rounded-xl.border){
      border-color:var(--kjs-line) !important;
      box-shadow:var(--kjs-shadow-soft);
    }
    .kjs-unified :where(section.rounded-2xl,.rounded-2xl.bg-white\/70,.rounded-2xl.bg-white\/80,.rounded-2xl.bg-white\/90){
      backdrop-filter:blur(14px);
    }
    .kjs-unified :where(.shadow-soft,.shadow-elevate){
      box-shadow:var(--kjs-shadow) !important;
    }

    /* 彈窗統一：商品、抽獎、FAQ、實拍管理都同一組骨架 */
    .kjs-unified :where([role="dialog"],.fixed.inset-0.z-\[999\],.fixed.inset-0.z-\[998\],.fixed.inset-0.z-\[1000\]) > :where(div){
      border:1px solid var(--kjs-line);
    }
    .kjs-unified :where(.modal-scroll){
      scrollbar-gutter:stable both-edges;
    }

    /* 漢堡選單：前台導覽與管理工具分區更清楚 */
    .kjs-unified .menu-pane{
      box-shadow:18px 0 42px -28px rgba(15,23,42,.75);
    }
    .kjs-unified .menu-pane :where(button,a){
      border-radius:14px;
    }

    /* 狀態/標籤 chips */
    .kjs-unified :where(.rounded-full){
      letter-spacing:.01em;
    }

    /* 圖片牆與商品圖，避免變形、閃動 */
    .kjs-unified :where(img){
      image-rendering:auto;
    }
    .kjs-unified :where(.aspect-square img){
      transform:translateZ(0);
    }

    /* Toast */
    #kjs-toast-root{
      position:fixed;
      right:14px;
      bottom:calc(env(safe-area-inset-bottom) + 18px);
      z-index:2147483647;
      display:grid;
      gap:10px;
      pointer-events:none;
    }
    .kjs-toast{
      pointer-events:auto;
      max-width:min(92vw,360px);
      border:1px solid var(--kjs-line);
      border-radius:16px;
      padding:11px 14px;
      background:var(--kjs-surface-strong);
      color:inherit;
      box-shadow:var(--kjs-shadow);
      font-size:14px;
      line-height:1.45;
      animation:kjsToastIn .22s ease-out both;
      backdrop-filter:blur(14px);
    }
    .kjs-toast[data-type="success"]{ border-left:4px solid var(--kjs-brand); }
    .kjs-toast[data-type="warn"]{ border-left:4px solid var(--kjs-warn); }
    .kjs-toast[data-type="error"]{ border-left:4px solid var(--kjs-danger); }
    @keyframes kjsToastIn{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }

    /* 手機端：管理按鈕不擠壓，彈窗更穩 */
    @media (max-width:640px){
      .kjs-unified{ font-size:15px; }
      .kjs-unified :where(.max-w-5xl){ width:100%; }
      .kjs-unified :where(button,a).tap-target{ min-height:46px; }
      .kjs-unified :where(.fixed.inset-0) > :where(.rounded-2xl){
        width:min(96vw,44rem) !important;
        max-height:92dvh !important;
      }
      .kjs-unified :where(.grid){ gap:.75rem; }
      .kjs-unified :where(.p-4){ padding:1rem; }
      .kjs-unified :where(.flex.flex-wrap){ gap:.5rem; }
      #kjs-toast-root{
        left:12px; right:12px;
        bottom:calc(env(safe-area-inset-bottom) + 74px);
      }
      .kjs-toast{ max-width:100%; }
    }
  </style>
  <!-- [KJS UNIFIED UI PATCH END] -->

</head>

  <script type="text/babel">
    const { useEffect, useState } = React;

    const LS = { data: 'kjs_site_data_v1', admin: 'kjs_admin_pass' };

    // === Default Settings（可被管理面板覆寫） ===
    const DEFAULT_SETTINGS = {

    const HISTORY_STATUS_STYLE = {
      "已寄出":   { bg: "bg-emerald-100/70 dark:bg-emerald-300/15", text: "text-emerald-700 dark:text-emerald-300", ring:"ring-emerald-500/20" },
      "處理中":   { bg: "bg-sky-100/70 dark:bg-sky-300/15",         text: "text-sky-700 dark:text-sky-300",         ring:"ring-sky-500/20" },
      "未回覆":   { bg: "bg-rose-100/70 dark:bg-rose-300/15",       text: "text-rose-700 dark:text-rose-300",       ring:"ring-rose-500/20" },
      "再寄送中": { bg: "bg-indigo-100/70 dark:bg-indigo-300/15",   text: "text-indigo-700 dark:text-indigo-300",   ring:"ring-indigo-500/20" },
      "待寄送":   { bg: "bg-amber-100/70 dark:bg-amber-300/15",     text: "text-amber-800 dark:text-amber-300",     ring:"ring-amber-500/20" },
      "放棄領獎": { bg: "bg-slate-200/70 dark:bg-slate-300/15",     text: "text-slate-700 dark:text-slate-300",     ring:"ring-slate-400/20" },
    };

    /* =========================================
     * 全域捲動鎖：避免彈窗/檢視器異常造成整站卡住
     * ========================================= */
    (function(){
      const lockKey = "__BODY_SCROLL_LOCK_COUNT__";
      if (!window[lockKey]) window[lockKey] = 0;
      function apply() {
        if (window[lockKey] > 0) {
          document.documentElement.style.overflow = "hidden";
          document.body.style.overflow = "hidden";
          document.body.style.touchAction = "none";
        } else {
          document.documentElement.style.overflow = "";
          document.body.style.overflow = "";
          document.body.style.touchAction = "";
        }
      }
      window.BodyScrollLock = {
        lock() { window[lockKey] = Math.max(0, (window[lockKey]||0)) + 1; apply(); },
        unlock() { window[lockKey] = Math.max(0, (window[lockKey]||0) - 1); apply(); },
        reset() { window[lockKey] = 0; apply(); }
      };
      // 保險機制：頁面隱藏/離開時自動還原
      window.addEventListener("pagehide", ()=>window.BodyScrollLock.reset());
      document.addEventListener("visibilitychange", ()=>{ if (document.visibilityState !== "visible") window.BodyScrollLock.reset(); });
    })();



// === 列頭：日期 / 獎品名稱(截斷) / 狀態（靠右不換行） ===
function HistoryHeaderRow({ rec }) {

/*** =========================
 * 共用：標籤彙整、標籤勾選條、選購清單（離線剪貼簿）
 * ========================== */

// 從 item 陣列自動彙整唯一標籤（跳過空字串）
function collectUniqueTags(items, tagField='tags') {
  const set = new Set();
  for (const it of (items||[])) {
    const tags = Array.isArray(it?.[tagField]) ? it[tagField] :
                 typeof it?.[tagField] === 'string' ? it[tagField].split(',') : [];
    for (const t of tags) {
      const v = String(t||'').trim();
      if (v) set.add(v);
    }
  }
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'zh-Hant'));
}

// HOOK：多選標籤（增：setPicked 以支援彈窗一次套用）
function useTagFilter(allTags = []) {
  const [picked, setPicked] = React.useState([]);
  const toggle = (t) =>
    setPicked((list) => (list.includes(t) ? list.filter((x) => x !== t) : [...list, t]));
  const clear = () => setPicked([]);
  return { picked, toggle, clear, setPicked, allTags };
}

// 依 tagGroups 的群組順序 + 群內順序來產生扁平的標籤清單（可直接覆蓋）
function orderTagsByGroups(allTags = [], groups = []) {
  const seen = new Set();
  const out = [];

  // 1) 先依群組定義的順序，將群組中的標籤依序推入
  (Array.isArray(groups) ? groups : []).forEach((g) => {
    const tags = Array.isArray(g?.tags) ? g.tags : [];
    tags.forEach((t) => {
      const tag = String(t || '').trim();
      if (!tag) return;
      if (allTags.includes(tag) && !seen.has(tag)) {
        seen.add(tag);
        out.push(tag);
      }
    });
  });

  // 2) 再把未分組 / 未涵蓋的標籤補上（維持 allTags 原本排序）
  (Array.isArray(allTags) ? allTags : []).forEach((t) => {
    const tag = String(t || '').trim();
    if (!tag) return;
    if (!seen.has(tag)) out.push(tag);
  });

  return out;
}

// 元件：標籤 Chips（可多選）
function TagChips({ tags = [], picked = [], onToggle, onClear }) {
  if (!tags.length) return (
    <div className="text-xs text-slate-500">目前沒有標籤</div>
  );
  return (
    <div className="flex items-center gap-2.5 overflow-x-auto no-scrollbar py-1.5">
      {tags.map(t => {
        const active = picked.includes(t);
        return (
          <button
            key={t}
            onClick={() => onToggle(t)}
            className={
              "tap-target rounded-full border px-3.5 py-1.5 text-sm whitespace-nowrap min-h-[44px] " +
              (active ? "bg-brand text-white border-brand" : "bg-white/70 dark:bg-slate-900/60")
            }
            title={active ? "取消此標籤" : "選取此標籤"}
          >
            {t}
          </button>
        );
      })}
      {picked.length > 0 && (
        <button
          onClick={onClear}
          className="tap-target rounded-full border px-3.5 py-1.5 text-sm whitespace-nowrap min-h-[44px]"
        >
          清除標籤
        </button>
      )}
    </div>
  );
}

function ProductSheet({
  open = false,
  item = null,
  context = "store",
  onClose = () => {},
  onOpenViewer = () => {},
  contactUrl = "",
  onCopyTemplate = () => {},     // 仍保留參數相容，不在 shop 顯示
  onStartDraw = () => {},        // for pending：開展示動畫
  admin = false,                 // for pending：是否顯示管理區塊
  // onAdmin：for pending
  // - onEdit                (既有：舊版可能拿來開編輯器，不保證落盤)
  // - onDelete              (既有)
  // - onConvertBySim        (既有)
  // - onConvertByChecked    (既有)
  // - onConvertByInput      (既有)
  // - onCopyAd              (既有)
  // - checkedMap, toggleCheck (既有)
  // ★新增：onUpdateParticipants(payload)
  //   payload: { id, item, lines, text }
  //   父層請用它把 listText 與 participants 一起寫回、持久化、並觸發重渲染
  onAdmin = {}
}) {
  const React = window.React || globalThis.React;

  const overlayRef = React.useRef(null);
  const [index, setIndex] = React.useState(0);

  // === 重複檢查（只修空白）相關的本地狀態 ===
  const [dupOpen, setDupOpen] = React.useState(false);           // 是否顯示檢查彈窗
  const [dupGroups, setDupGroups] = React.useState([]);          // 檢查得到的群組
  const [dupMeta, setDupMeta] = React.useState({ groups: 0, dups: 0 }); // 統計：組數／重複筆數
  const [lastActionMsg, setLastActionMsg] = React.useState("");  // 套用後的小提示（例如：已移除 X 筆重複）

  // === 本地覆寫：為了「套用刪除」後小卡立即更新（即使父層還沒回寫） ===
  // 若為 null 表示沿用 props.item 的原始資料；一旦使用者在小卡「套用刪除」，就改由這份本地文字驅動畫面。
  const [localListText, setLocalListText] = React.useState(null);

  // 規格選擇
  const [sel1, setSel1] = React.useState(null);
  const [sel2, setSel2] = React.useState(null);

  // 鎖捲動 / ESC / 返回鍵
  React.useEffect(() => {
    if (!open) return;
    BodyScrollLock.lock();
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    const onPop = () => onClose();
    document.addEventListener("keydown", onKey);
    window.addEventListener("popstate", onPop);
    try { history.pushState({ sheet: true }, "", location.href); } catch {}
    return () => {
      document.removeEventListener("keydown", onKey);
      window.removeEventListener("popstate", onPop);
      BodyScrollLock.unlock();
    };
  }, [open, onClose]);

  // 換商品時重置
  React.useEffect(() => {
    setIndex(0);
    setSel1(null);
    setSel2(null);
    setLastActionMsg("");
    setLocalListText(null); // 換 item 就回到以 props 為準
  }, [item]);

  // ---- 派生資料 ----
  const title  = (item?.title || item?.name || "（未命名）");
  const baseId = String(item?.id ?? (item?.name ?? "item"));

  const images = (() => {
    const arr = Array.isArray(item?.images) ? item.images : (item?.image ? [String(item.image)] : []);
    return (arr || []).filter(Boolean);
  })();
  const tags = (() => {
    if (Array.isArray(item?.tags)) return item.tags;
    if (typeof item?.tags === "string") return item.tags.split(",").map(s => s.trim()).filter(Boolean);
    return [];
  })();
  const buyUrl = item?.buyUrl || item?.url || "";
  const price  = (item?.price ?? "") !== "" ? item?.price : null;
  const needPoints = (() => {
    const p = item?.points ?? item?.point ?? item?.needPoints ?? item?.need_point;
    const n = (typeof p === "string" ? +p : p);
    return Number.isFinite(n) ? n : null;
  })();
  const remain = item?.stock ?? item?.qty ?? item?.quantity ?? item?.remaining ?? null;

  // pending：候選名單（原樣分行，用於顯示；不在此步驟自動去重）
  const splitLinesRaw = (txt) => {
    if (typeof txt !== "string") return [];
    return txt.split(/\r?\n/); // 保留原樣（包含空白），讓檢查流程能對上索引
  };

  // 來源 listText：若有本地覆寫就用覆寫，否則用 props.item
  const sourceListText = (
    localListText != null
      ? localListText
      : (typeof item?.listText === "string" ? item.listText : null)
  );

  // rawLines：優先來自 sourceListText；若沒有，再從陣列欄位轉
  const rawLines = React.useMemo(() => {
    if (typeof sourceListText === "string") return splitLinesRaw(sourceListText);
    const list = Array.isArray(item?.participants) ? item.participants
      : Array.isArray(item?.members) ? item.members
      : Array.isArray(item?.list) ? item.list
      : Array.isArray(item?.candidates) ? item.candidates
      : [];
    return (list || []).map(v => String(v ?? ""));
  }, [sourceListText, item]);

  const candidates = (() => {
    // 顯示用：過濾掉完全空白的行（但檢查功能會用 rawLines 做判定）
    return rawLines
      .map(s => String(s ?? ""))
      .map(s => s.trim())
      .filter(Boolean);
  })();
  const candidateCount = candidates.length;

  // 觸控換圖（門檻 80 -> 40，更好滑）
  let sx = 0, sy = 0, dragging = false;
  const onTouchStart = (e) => { if (e.touches.length === 1) { sx = e.touches[0].clientX; sy = e.touches[0].clientY; dragging = true; } };
  const onTouchEnd   = (e) => {
    if (!dragging) return; dragging = false;
    const ex = e.changedTouches?.[0]?.clientX ?? sx; const ey = e.changedTouches?.[0]?.clientY ?? sy;
    const dx = ex - sx, dy = ey - sy;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) && images.length > 1) {
      setIndex(i => (dx > 0 ? (i - 1 + images.length) : (i + 1)) % images.length);
    }
  };

  const gotoPrev = () => setIndex(i => (i - 1 + images.length) % images.length);
  const gotoNext = () => setIndex(i => (i + 1) % images.length);

  // 聯絡連結
  const effectiveContactUrl =
    contactUrl ||
    item?.contactUrl ||
    window.__CONTACT_URL__ || "";

  // ---------- 規格工具 ----------
  const normalizeVariants = (it) => {
    const v = it?.variants;
    if (!v || !v.mode || v.mode === "none") return { mode: "none", attrs: [], items: [] };
    const mode  = (v.mode === "double" ? "double" : "single");
    const attrs = Array.isArray(v.attrs)
      ? v.attrs.slice(0, mode === "double" ? 2 : 1).map(a => ({
          name: a?.name || "",
          values: Array.isArray(a?.values) ? a.values.filter(Boolean) : []
        }))
      : [];
    const items = Array.isArray(v.items)
      ? v.items.map(s => ({
          key: String(s?.key || ""),
          stock: (s?.stock ?? s?.qty ?? s?.quantity ?? s?.remaining ?? ""),
          price: (s?.price ?? ""),
          points: (s?.points ?? s?.needPoints ?? ""),
          image: s?.image || "",
          enabled: (s?.enabled !== false)
        }))
      : [];
    return { mode, attrs, items };
  };
  const V = normalizeVariants(item);

  const buildKey = (a, b) => (V.mode === "double" ? `${a||""}|${b||""}` : `${a||""}`);
  const skuMap = (() => {
    const m = new Map();
    for (const s of (V.items || [])) m.set(String(s.key || ""), s);
    return m;
  })();
  const selectedDone = (V.mode === "none")
    || (V.mode === "single" && !!sel1)
    || (V.mode === "double" && !!sel1 && !!sel2);
  const selectedKey = selectedDone ? buildKey(sel1, sel2) : "";
  const selSku      = selectedDone ? (skuMap.get(selectedKey) || null) : null;

  const num = (v) => { if (v === "" || v == null) return null; const n = +v; return Number.isFinite(n) ? n : null; };
  const effStock = (() => {
    if (selSku && selSku.enabled !== false && num(selSku.stock) != null) return num(selSku.stock);
    return num(remain);
  })();
  const effPriceOrPts = (() => {
    if (context === "store") {
      if (selSku && selSku.enabled !== false && num(selSku.price) != null)  return num(selSku.price);
      return num(price);
    } else if (context === "shop") {
      if (selSku && selSku.enabled !== false && num(selSku.points) != null) return num(selSku.points);
      return num(needPoints);
    }
    return null;
  })();
  const specSuffix = (() => {
    const parts = V.mode === "none" ? [] : (V.mode === "single" ? [sel1].filter(Boolean) : [sel1, sel2].filter(Boolean));
    return parts.length ? `（${parts.join("／")}）` : "";
  })();

  // 廣播規格變更（與外部控制列橋接）
  const publishPick = (s1, s2) => {
    const key = String(item?.id ?? item?._id ?? item?.name ?? "item");
    window.__VARIANT_PICKED__ = window.__VARIANT_PICKED__ || {};
    window.__VARIANT_PICKED__[key] = { sel1: s1 || "", sel2: s2 || "" };
    try {
      window.dispatchEvent(new CustomEvent("kjs:variant:picked", {
        detail: { id: key, sel1: s1 || "", sel2: s2 || "" }
      }));
    } catch {}
  };
  React.useEffect(() => {
    if (!open) return;
    publishPick(null, null);
  }, [open, item?.id]);

  // 傳給步進器的派生 item（含所選規格；無規格直接沿用）
  const controlsItem = (() => {
    if (context !== "store" && context !== "shop") return item;
    if (V.mode === "none") return { ...item, __baseId: baseId };
    if (!selectedDone) return null;

    const composedId   = `${baseId}::${selectedKey}`;
    const composedName = `${title}${specSuffix}`;
    const merged = { ...item };
    merged.id = composedId;
    merged.name = merged.title = composedName;
    merged.__baseId = baseId;
    if (context === "store") {
      if (effPriceOrPts != null)  merged.price  = effPriceOrPts;
    } else {
      if (effPriceOrPts != null)  merged.points = effPriceOrPts;
    }
    if (effStock != null) {
      merged.stock = merged.remaining = merged.qty = effStock;
    }
    merged._variant = { mode: V.mode, key: selectedKey, sel1, sel2, attrs: V.attrs };
    return merged;
  })();

  // ======「只修空白」標準化：不動大小寫、不動 @，連續空白折成 1 個 ======
  const normalizeNameSafe = (str) => {
    if (typeof str !== "string") return "";
    // 去除前後空白（含全形）
    let s = str.replace(/^[\s\u3000]+|[\s\u3000]+$/g, "");
    // 連續空白（含全形空格）折疊成 1 個半形空格
    s = s.replace(/[\s\u3000]+/g, " ");
    return s;
  };

  // ====== 以「只修空白」為口徑分組，並提供索引，方便精準刪除 ======
  const groupDuplicatesSafe = (lines) => {
    // lines：rawLines（保留原樣），我們用 index 來刪除，避免同字串難分
    const map = new Map(); // key -> { firstIndex, firstText, others: Array<{index, text}> }
    for (let i = 0; i < lines.length; i++) {
      const raw = String(lines[i] ?? "");
      const key = normalizeNameSafe(raw);
      if (!key) continue; // 忽略空白行
      if (!map.has(key)) {
        map.set(key, { key, firstIndex: i, firstText: raw, others: [] });
      } else {
        map.get(key).others.push({ index: i, text: raw });
      }
    }
    const groups = [];
    let dupCount = 0;
    for (const g of map.values()) {
      if (g.others.length > 0) {
        groups.push(g);
        dupCount += g.others.length;
      }
    }
    // 依第一個出現的順序排序，呈現更直覺
    groups.sort((a,b) => a.firstIndex - b.firstIndex);
    return { groups, dupCount };
  };

  // ====== 重複檢查彈窗（白話 UI） ======
  const DuplicateCheckDialog = ({ open, groups, onCancel, onApply }) => {
    const [checks, setChecks] = React.useState(() => {
      // 預設：每組的 others 都建議刪除（true）
      const init = new Map();
      groups.forEach((g) => {
        const m = new Map();
        g.others.forEach(o => m.set(o.index, true));
        init.set(g.key, m);
      });
      return init;
    });

    const toggleOne = (gkey, idx, val) => {
      setChecks(prev => {
        const next = new Map(prev);
        const m = new Map(next.get(gkey));
        m.set(idx, val);
        next.set(gkey, m);
        return next;
      });
    };

    const checkAllOthers = (gkey, v) => {
      setChecks(prev => {
        const next = new Map(prev);
        const m = new Map(next.get(gkey));
        for (const k of m.keys()) m.set(k, v);
        next.set(gkey, m);
        return next;
      });
    };

    if (!open) return null;
    return (
      <div className="fixed inset-0 z-[1000] bg-black/50 flex items-center justify-center p-4">
        <div className="w-[min(92vw,44rem)] max-h-[86vh] overflow-hidden rounded-2xl bg-white dark:bg-slate-900 shadow-elevate flex flex-col">
          <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
            <div className="min-w-0">
              <div className="font-semibold truncate">重複檢查（只修空白・最安全）</div>
              <div className="text-xs text-slate-500 mt-0.5">
                只處理前後空白與連續空白；不動大小寫、不動 @。請勾選要刪除的項目。
              </div>
            </div>
            <button className="rounded-full border px-3 py-1.5 text-sm" onClick={onCancel}>關閉</button>
          </div>

          <div className="px-4 py-2 text-sm text-slate-600">
            找到 <b>{groups.length}</b> 組疑似重複，共 <b>{
              groups.reduce((acc,g)=>acc+g.others.length,0)
            }</b> 筆可能重複。
          </div>

          <div className="flex-1 overflow-auto px-4 pb-4">
            {groups.length === 0 ? (
              <div className="text-sm text-slate-500 py-8 text-center">未發現重複（只修空白）</div>
            ) : (
              <ul className="space-y-3">
                {groups.map((g, i) => {
                  const m = checks.get(g.key);
                  const allChecked = m && Array.from(m.values()).every(Boolean);
                  const anyChecked = m && Array.from(m.values()).some(Boolean);
                  return (
                    <li key={g.key} className="rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                      <div className="px-3 py-2 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex items-center justify-between">
                        <div className="text-sm">
                          第 {i+1} 組　<span className="text-slate-500">（正本 + {g.others.length} 筆重複）</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <button
                            type="button"
                            className="text-xs rounded border px-2 py-1"
                            title="只留第一筆（勾選其餘）"
                            onClick={()=>checkAllOthers(g.key, true)}
                          >只留第一筆</button>
                          <button
                            type="button"
                            className="text-xs rounded border px-2 py-1"
                            title="全部保留（清除勾選）"
                            onClick={()=>checkAllOthers(g.key, false)}
                          >全部保留</button>
                          <span className={"text-xs px-2 py-1 rounded " + (anyChecked ? "bg-rose-50 text-rose-600 border border-rose-200" : "text-slate-400 border border-slate-200")}>
                            {anyChecked ? "將刪除部分" : "不刪除"}
                          </span>
                        </div>
                      </div>
                      <div className="p-3 text-sm">
                        <div className="mb-2">
                          <span className="inline-block min-w-[4em] text-slate-500">正本</span>
                          <span className="font-medium break-all">{normalizeNameSafe(g.firstText) || g.firstText}</span>
                          <span className="ml-2 text-xs text-slate-400">(原樣：<span className="break-all">{g.firstText || "（空行）"}</span>)</span>
                        </div>
                        {g.others.length > 0 && (
                          <ul className="space-y-1">
                            {g.others.map(o => {
                              const checked = m ? !!m.get(o.index) : true;
                              return (
                                <li key={o.index} className="flex items-start gap-2">
                                  <input
                                    type="checkbox"
                                    className="mt-0.5 h-4 w-4"
                                    checked={checked}
                                    onChange={(e)=>toggleOne(g.key, o.index, e.target.checked)}
                                  />
                                  <div className="flex-1">
                                    <div className="break-all">{normalizeNameSafe(o.text) || o.text}</div>
                                    <div className="text-xs text-slate-400">原樣：{o.text || "（空行）"}</div>
                                  </div>
                                </li>
                              );
                            })}
                          </ul>
                        )}
                      </div>
                    </li>
                  );
                })}
              </ul>
            )}
          </div>

          <div className="p-3 border-t border-slate-200 dark:border-slate-700 bg-white/95 dark:bg-slate-900/90 backdrop-blur flex items-center justify-between">
            <div className="text-xs text-slate-500">套用後會回寫名單，仍可再編輯或再次檢查。</div>
            <div className="flex items-center gap-2">
              <button className="rounded-lg border px-3 py-2 text-sm" onClick={onCancel}>取消</button>
              <button
                className="rounded-lg bg-brand text-white px-4 py-2 text-sm"
                onClick={()=>{
                  // 彙整要刪除的 index
                  const toDelete = new Set();
                  for (const g of groups) {
                    const m = checks.get(g.key);
                    if (!m) continue;
                    for (const [idx, v] of m.entries()) {
                      if (v) toDelete.add(idx);
                    }
                  }
                  onApply(toDelete);
                }}
              >套用刪除</button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  if (!open) return null;
  const handleOverlayClick = (e) => { if (e.target === overlayRef.current) onClose(); };

  // 觸發檢查重複（只修空白）
  const openDuplicateCheck = () => {
    const { groups, dupCount } = groupDuplicatesSafe(rawLines);
    if (groups.length === 0) {
      alert("未發現重複（只修空白）。");
      return;
    }
    setDupGroups(groups);
    setDupMeta({ groups: groups.length, dups: dupCount });
    setDupOpen(true);
  };

  // 套用刪除回寫（★已修正：本地立即更新 + 對外回寫/事件）
  const applyDuplicateDeletion = (toDeleteSet) => {
    setDupOpen(false);

    // 1) 計算刪除後的新行列
    const nextLines = rawLines.filter((_, idx) => !toDeleteSet.has(idx));
    const nextText  = nextLines.join("\n");

    // 2) 小卡本地立刻反映（不等父層）：讓畫面的人數與列表即時變少
    setLocalListText(nextText);

    // 3) 準備對外回寫 payload（父層可持久化）
    const payload = {
      id: (item?.id ?? baseId),
      item,
      lines: nextLines,
      text: nextText
    };

    // 3a) 優先：父層明確提供的回寫接口
    if (typeof onAdmin?.onUpdateParticipants === "function") {
      try { onAdmin.onUpdateParticipants(payload); } catch (e) { /* ignore */ }
    }

    // 3b) 事件制：父層若有監聽也能收到
    try {
      window.dispatchEvent(new CustomEvent("kjs:pending:updateParticipants", { detail: payload }));
    } catch {}

    // 3c) 兼容：若只有 onEdit（舊流程），盡力把新 list 寫進去交給它
    if (typeof onAdmin?.onEdit === "function") {
      const nextItem = {
        ...item,
        listText: nextText,
        participants: nextLines.map(s => String(s).trim()).filter(Boolean)
      };
      try { onAdmin.onEdit(nextItem); } catch {}
    } else if (!onAdmin?.onUpdateParticipants) {
      // 3d) 最後無奈：直接改 props 參考（不保證持久化，但至少資料在父層不接時也能暫時保留）
      try {
        item.listText = nextText;
        item.participants = nextLines.map(s => String(s).trim()).filter(Boolean);
      } catch {}
    }

    // 4) 成功提示（UI）
    const removed = toDeleteSet.size;
    setLastActionMsg(removed > 0 ? `✅ 已移除 ${removed} 筆重複（只修空白）` : "未移除任何項目");
    setTimeout(()=>setLastActionMsg(""), 4000);
  };

  return (
    <div
      ref={overlayRef}
      className="fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm flex items-center justify-center"
      role="dialog"
      aria-modal="true"
      onMouseDown={handleOverlayClick}
    >
      <div className="w-[min(96vw,44rem)] max-h-[92vh] rounded-2xl bg-white dark:bg-slate-900 shadow-elevate overflow-hidden flex flex-col">
        {/* header */}
        <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
          <div className="min-w-0">
            <div className="font-semibold truncate">{title}{specSuffix}</div>
            {context==="store"   && price!=null      && <div className="text-sm text-slate-500">售價：{price}</div>}
            {context==="shop"    && needPoints!=null && <div className="text-sm text-slate-500">需求點數：{needPoints}</div>}
            {context==="pending" && (
              <div className="text-sm text-slate-500 flex items-center gap-2">
                <span>候選人數：{candidateCount}</span>
                {lastActionMsg && <span className="text-emerald-600 text-xs">（{lastActionMsg}）</span>}
              </div>
            )}
          </div>
          <button className="rounded-full border px-3 py-1.5 text-sm" onClick={onClose}>關閉</button>
        </div>

        {/* body：改用共用 .modal-scroll class */}
        <div className="flex-1 overflow-y-auto modal-scroll">

          {/* 主圖 */}
          <div className="relative bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
            <div
              className="aspect-square w-full grid place-content-center select-none"
              onTouchStart={onTouchStart}
              onTouchEnd={onTouchEnd}
            >
              {images.length ? (
                <img src={images[index]} alt="" className="w-full h-full object-contain select-none" />
              ) : <div className="text-slate-400 text-sm">無圖片</div>}
            </div>

            {/* 圖片圓點 */}
            {images.length>1 && (
              <div className="absolute bottom-2 inset-x-0 flex items-center justify-center gap-1">
                {images.map((_, i) => (
                  <span key={i} className={"h-1.5 w-1.5 rounded-full " + (i===index ? "bg-slate-900 dark:bg-white" : "bg-slate-300 dark:bg-slate-600")}/>
                ))}
              </div>
            )}

            {/* 左右箭頭（行動端加大點擊區） */}
            {images.length>1 && (
              <>
                <button
                  type="button"
                  onClick={gotoPrev}
                  className="absolute left-2 top-1/2 -translate-y-1/2 tap-target rounded-full bg-white/80 dark:bg-slate-900/70 border border-slate-200 dark:border-slate-700 shadow-soft px-3"
                  title="上一張"
                >‹</button>
                <button
                  type="button"
                  onClick={gotoNext}
                  className="absolute right-2 top-1/2 -translate-y-1/2 tap-target rounded-full bg-white/80 dark:bg-slate-900/70 border border-slate-200 dark:border-slate-700 shadow-soft px-3"
                  title="下一張"
                >›</button>
              </>
            )}
          </div>

          {/* 文字與規格 */}
          <div className="px-4 pb-4 space-y-2 text-sm">
            {context==="store" && remain!=null && <div className="text-slate-600">剩餘數量：{remain}</div>}
            {Array.isArray(tags) && tags.length>0 && <div className="text-slate-500">標籤：{tags.join(" / ")}</div>}
            {item?.desc  && <div className="whitespace-pre-wrap">{item.desc}</div>}
            {item?.intro && <div className="whitespace-pre-wrap">{item.intro}</div>}
            {item?.extra && <div className="whitespace-pre-wrap">{String(item.extra)}</div>}

            {(context==="store" || context==="shop") && V.mode !== "none" && (
              <div className="mt-3 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div className="px-3 py-2 border-b border-slate-200 dark:border-slate-700 text-sm font-medium">選擇規格</div>
                <div className="p-3 space-y-2">
                  {/* 規格1 */}
                  {V.attrs[0] && (
                    <div className="flex items-start gap-2">
                      <div className="w-16 shrink-0 text-slate-500">{V.attrs[0].name || "規格1"}</div>
                      <div className="flex flex-wrap gap-2">
                        {(V.attrs[0].values||[]).map(v => (
                          <button
                            key={"v1-"+v}
                            type="button"
                            onClick={() => {
                              const next = (v === sel1 ? null : v);
                              setSel1(next);
                              if (V.mode === "double") setSel2(null);
                              try {
                                window.dispatchEvent(new CustomEvent('kjs:variant:picked', {
                                  detail: { id: baseId, sel1: next || '', sel2: sel2 || '' }
                                }));
                              } catch {}
                            }}
                            className={"tap-target px-3.5 py-1.5 rounded-full border text-sm " + (v===sel1 ? "bg-brand text-white border-brand" : "")}
                            title={v}
                          >{v}</button>
                        ))}
                      </div>
                    </div>
                  )}
                  {/* 規格2 */}
                  {V.mode === "double" && V.attrs[1] && (
                    <div className="flex items-start gap-2">
                      <div className="w-16 shrink-0 text-slate-500">{V.attrs[1].name || "規格2"}</div>
                      <div className="flex flex-wrap gap-2">
                        {(V.attrs[1].values||[]).map(v => (
                          <button
                            key={"v2-"+v}
                            type="button"
                            onClick={() => {
                              const next = (v === sel2 ? null : v);
                              setSel2(next);
                              try {
                                window.dispatchEvent(new CustomEvent('kjs:variant:picked', {
                                  detail: { id: baseId, sel1: sel1 || '', sel2: next || '' }
                                }));
                              } catch {}
                            }}
                            className={"tap-target px-3.5 py-1.5 rounded-full border text-sm " + (v===sel2 ? "bg-brand text-white border-brand" : "")}
                            title={v}
                          >{v}</button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* 即時顯示有效單價/點數與庫存 */}
                  <div className="text-sm text-slate-600">
                    {selectedDone ? (
                      <>
                        {context==="store" && <span>單價：{effPriceOrPts!=null ? `NT$ ${effPriceOrPts}` : "—"}　</span>}
                        {context==="shop"  && <span>點數：{effPriceOrPts!=null ? `${effPriceOrPts} 點` : "—"}　</span>}
                        <span>剩餘：{effStock!=null ? effStock : "—"}</span>
                      </>
                    ) : (
                      <span className="text-slate-500">請先選擇完整規格</span>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* pending：參與名單與勾選（維持原邏輯 + 新增「檢查重複」） */}
          {context==="pending" && (
            <div className="px-4 pb-4">
              <div className="mb-2 text-sm font-medium flex items-center justify-between">
                <span>參與人員（{candidateCount}）</span>
                <div className="flex items-center gap-2">
                  {admin && (
                    <button
                      type="button"
                      className="text-xs rounded border px-2 py-1"
                      onClick={openDuplicateCheck}
                      title="檢查重複（只修空白）"
                    >檢查重複</button>
                  )}
                  {admin && (
                    <span className="text-xs text-slate-500">
                      已勾選 {Object.values(onAdmin?.checkedMap||{}).filter(Boolean).length} 人
                    </span>
                  )}
                </div>
              </div>

              {!admin ? (
                <ul className="space-y-1 text-sm text-slate-700 dark:text-slate-300">
                  {candidates.map((name, i) => (<li key={i}>• {name}</li>))}
                </ul>
              ) : (
                <div className="rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                  <div className="px-3 py-2 border-b border-slate-200 dark:border-slate-700 text-sm bg-slate-50 dark:bg-slate-800 flex items-center justify-between">
                    <div>勾選得獎者</div>
                    <div className="flex items-center gap-2">
                      <button
                        type="button"
                        className="text-xs rounded border px-2 py-1"
                        onClick={()=>{
                          if (typeof onAdmin?.toggleCheck === 'function') {
                            candidates.forEach(n => onAdmin.toggleCheck(n, true));
                          }
                        }}
                        title="全選"
                      >全選</button>
                      <button
                        type="button"
                        className="text-xs rounded border px-2 py-1"
                        onClick={()=>{
                          if (typeof onAdmin?.toggleCheck === 'function') {
                            candidates.forEach(n => onAdmin.toggleCheck(n, false));
                          }
                        }}
                        title="全不選"
                      >全不選</button>
                    </div>
                  </div>
                  <ul className="max-h-[40vh] overflow-auto divide-y divide-slate-200 dark:divide-slate-700">
                    {candidates.map((name, i) => {
                      const checked = !!(onAdmin?.checkedMap && onAdmin.checkedMap[name]);
                      return (
                        <li key={i} className="flex items-center gap-3 px-3 py-2 text-sm">
                          <input
                            type="checkbox"
                            className="h-4 w-4"
                            checked={checked}
                            onChange={(e)=>{
                              const next = e.target.checked;
                              if (typeof onAdmin?.toggleCheck === 'function') onAdmin.toggleCheck(name, next);
                            }}
                          />
                          <span className="truncate">{name}</span>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              )}
            </div>
          )}

          {/* ★★★ 商店/點數商城的「加入清單」控制（維持原邏輯） ★★★ */}
          {item && (context === "store" || context === "shop") ? (
            (V.mode !== "none" && !selectedDone)
              ? (
                <div className="p-3 border-t border-slate-200 dark:border-slate-700 bg-white/95 dark:bg-slate-900/90 backdrop-blur flex items-center justify-between">
                  <div className="text-sm text-amber-600">請先在上方「選擇規格」區塊完成規格選擇</div>
                  <button className="rounded-lg border px-4 py-2 text-sm text-slate-400" disabled>加入清單</button>
                </div>
              )
              : (
                context === "shop"
                  ? <SheetPickControls item={controlsItem || { ...item, __baseId: baseId }} mode="pts" />
                  : <SheetPickControls item={controlsItem || { ...item, __baseId: baseId }} mode="cash" />
              )
          ) : null}
        </div>

        {/* footer */}
        <div className="p-3 border-t border-slate-200 dark:border-slate-700 bg-white/95 dark:bg-slate-900/90 backdrop-blur flex items-center gap-2">
          {context==="store" ? (
            <>
              {buyUrl
                ? <a href={buyUrl} target="_blank" rel="noopener noreferrer" className="flex-1 rounded-lg bg-brand text-white px-4 py-2 text-sm text-center">前往購買</a>
                : <button className="flex-1 rounded-lg border px-4 py-2 text-sm text-slate-400" disabled>尚未提供購買連結</button>}
              <button className="rounded-lg border px-3 py-2 text-sm" onClick={onClose}>關閉</button>
            </>
          ) : context==="shop" ? (
            <>
              <button
                className="flex-1 rounded-lg bg-brand text-white px-4 py-2 text-sm"
                onClick={() => {
                  const url = effectiveContactUrl;
                  if (url) window.open(url, "_blank", "noopener,noreferrer");
                  else alert("尚未設定『聯絡管理員』連結：可在商品 data 加上 contactUrl，或在全域設置 window.__CONTACT_URL__。");
                }}
              >
                💬 聯絡管理員
              </button>
              <button className="rounded-lg border px-3 py-2 text-sm" onClick={onClose}>關閉</button>
            </>
          ) : (
            // pending
            <>
              <button className="flex-1 rounded-lg bg-brand text-white px-4 py-2 text-sm" onClick={() => onStartDraw(item)}>🎰 模擬抽獎（展示）</button>
              {admin && (
                <div className="flex-1 flex flex-wrap gap-2 justify-end">
                  <button className="rounded-lg border px-3 py-2 text-sm" onClick={()=>onAdmin?.onEdit?.(item)}>編輯</button>
                  <button className="rounded-lg border px-3 py-2 text-sm" onClick={()=>onAdmin?.onCopyAd?.(item)}>一鍵複製抽獎貼文</button>
                  <button className="rounded-lg border px-3 py-2 text-sm" onClick={()=>onAdmin?.onConvertBySim?.(item)}>以模擬結果轉歷史</button>
                  <button
                    className="rounded-lg border px-3 py-2 text-sm"
                    onClick={()=>{
                      const map = (onAdmin && typeof onAdmin.checkedMap === 'object') ? onAdmin.checkedMap : {};
                      onAdmin?.onConvertByChecked?.(item, map);
                    }}
                  >
                    以勾選名單轉歷史
                  </button>
                  <button className="rounded-lg border px-3 py-2 text-sm" onClick={()=>onAdmin?.onConvertByInput?.(item)}>直接輸入名單轉歷史</button>
                  <button className="rounded-lg bg-rose-500 text-white px-3 py-2 text-sm" onClick={()=>onAdmin?.onDelete?.(item)}>刪除</button>
                </div>
              )}
              <button className="rounded-lg border px-3 py-2 text-sm" onClick={onClose}>關閉</button>
            </>
          )}
        </div>
      </div>

      {/* 重複檢查彈窗 */}
      <DuplicateCheckDialog
        open={dupOpen}
        groups={dupGroups}
        onCancel={()=>setDupOpen(false)}
        onApply={applyDuplicateDeletion}
      />
    </div>
  );
}


/***** ========= 共用工具（ID / 初始化 / 保存）========= *****/
function kjsNid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

const KJS_LS_KEY = 'kjs_site_data_v1'; // 與你現有資料流一致
function kjsSaveData(data) {
  try {
    const next = (typeof normalizeSiteData === 'function') ? normalizeSiteData(data) : data;
    localStorage.setItem(KJS_LS_KEY, JSON.stringify(next));
    return true;
  } catch (err) {
    console.error('kjsSaveData failed:', err);
    if (typeof kjsToast === 'function') kjsToast('儲存失敗：瀏覽器儲存空間可能不足，請先匯出備份。', 'error', 5200);
    return false;
  }
}

/* --- Gallery 初始化 --- */
function kjsEnsureGallery(data) {
  const d = data || {};
  if (!d.gallery) d.gallery = {};
  if (!Array.isArray(d.gallery.items)) d.gallery.items = [];
  // ★ 新增：首頁開箱/到貨實拍選擇清單（僅影響首頁）
  if (!Array.isArray(d.gallery.homepage_showcase)) d.gallery.homepage_showcase = [];
  return d;
}

/* --- FAQ 初始化 --- */
function kjsEnsureFaq(data) {
  const d = data || {};
  if (!d.faq) d.faq = {};
  if (!Array.isArray(d.faq.categories)) d.faq.categories = [];
  return d;
}

/* 小工具：安全 clone（UMD 環境） */
function kjsClone(x){ return window.structuredClone ? structuredClone(x) : JSON.parse(JSON.stringify(x||{})); }

/***** ========= Gallery Lightbox ========= *****/
function GalleryLightbox({ open, items = [], index = 0, onClose = ()=>{}, onStep = ()=>{} }) {
  const React = window.React || globalThis.React;

  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') onStep(-1);
      if (e.key === 'ArrowRight') onStep(+1);
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose, onStep]);

  if (!open) return null;
  const item = items[index] || null;

  return (
    <div className="fixed inset-0 z-[998] bg-black/70 backdrop-blur-sm flex items-center justify-center p-3" onClick={onClose}>
      <div className="relative w-[min(92vw,960px)]" onClick={(e)=>e.stopPropagation()}>
        <div className="relative bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-elevate">
          <div className="w-full max-h-[80vh] grid place-content-center bg-slate-50 dark:bg-slate-800 p-2">
            {item?.src
              ? <img src={item.src} alt="" className="max-h-[78vh] w-auto h-auto object-contain select-none"/>
              : <div className="text-slate-400">無圖片</div>}
          </div>
          <div className="flex items-center justify-between px-3 py-2 border-t border-slate-200 dark:border-slate-700 text-sm">
            <div className="truncate">
              {item?.prize ? <span className="text-slate-700 dark:text-slate-200">{item.prize}</span> : <span className="text-slate-400">未填品名</span>}
              {item?.at ? <span className="ml-2 text-slate-400">{item.at}</span> : null}
            </div>
            <button className="rounded-lg border px-3 py-1.5" onClick={onClose}>關閉</button>
          </div>
        </div>

        <button className="absolute left-0 top-1/2 -translate-y-1/2 tap-target rounded-full bg-white/80 dark:bg-slate-900/70 border shadow-soft px-3" onClick={()=>onStep(-1)} title="上一張">‹</button>
        <button className="absolute right-0 top-1/2 -translate-y-1/2 tap-target rounded-full bg-white/80 dark:bg-slate-900/70 border shadow-soft px-3" onClick={()=>onStep(+1)} title="下一張">›</button>
      </div>
    </div>
  );
}

/***** ========= Gallery 前台 ========= *****/
function GalleryWall({ data, admin=false, onOpenAdmin=()=>{} }) {
  const React = window.React || globalThis.React;
  const items = (data?.gallery?.items || [])
    .filter(x => x?.visible)
    .sort((a,b) => {
      if ((b?.pin|0)!==(a?.pin|0)) return (b?.pin|0)-(a?.pin|0);
      return String(b?.at||'').localeCompare(String(a?.at||''));
    });

  const [open, setOpen] = React.useState(false);
  const [idx, setIdx] = React.useState(0);
  const openAt = (i) => { setIdx(i); setOpen(true); };
  const step = (d) => setIdx(i => (i + d + items.length) % items.length);

  if (!items.length && !admin) return null;

  return (
  <section id="gallery" className="my-10">

      <div className="flex items-center justify-between mb-3">
        <h2 className="text-lg font-semibold">🖼 開箱/到貨實拍</h2>
        {admin && (
          <button className="tap-target rounded-lg bg-brand text-white px-3 py-2 text-sm" onClick={onOpenAdmin}>
            ＋ 新增截圖
          </button>
        )}
      </div>

      {!items.length ? (
        <div className="text-sm text-slate-500">目前沒有公開的截圖</div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
          {items.map((it, i) => (
            <button key={it.id || i} className="group relative rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 border" onClick={()=>openAt(i)} title={it?.prize||''}>
              <div className="aspect-square w-full grid place-content-center">
                {it.src ? <img src={it.src} alt="" className="w-full h-full object-cover select-none"/> : <div className="text-slate-400">無圖片</div>}
              </div>
              {it.prize && (
                <div className="absolute bottom-0 inset-x-0 bg-black/40 text-white px-2 py-1 text-xs truncate">
                  {it.prize}
                </div>
              )}
              {it.pin ? <span className="absolute top-2 left-2 text-xs bg-amber-500 text-white px-1.5 py-0.5 rounded">置頂</span> : null}
            </button>
          ))}
        </div>
      )}

      <GalleryLightbox open={open} items={items} index={idx} onClose={()=>setOpen(false)} onStep={step}/>
    </section>
  );
}

/***** ========= Gallery 後台（新增/刪除/編輯/排序） ========= *****/
function GalleryAdmin({ data, setData, onClose=()=>{} }) {
  const React = window.React || globalThis.React;
  const [draft, setDraft] = React.useState(() => kjsEnsureGallery(kjsClone(data)));
  const items = draft.gallery.items;

  const [bulk, setBulk] = React.useState("");
  const addFromBulk = () => {
    const lines = (bulk || "").split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    if (!lines.length) return;
    const existed = new Set(items.map(x => x.src));
    const added = [];
    for (const src of lines) {
      if (existed.has(src)) continue;
      existed.add(src);
      added.push({
        id: kjsNid(),
        src,
        prize: "",
        at: new Date().toISOString().slice(0,10),
        visible: false,
        pin: false,
        tags: []
      });
    }
    if (added.length) {
      setDraft(prev => ({ ...prev, gallery: { ...prev.gallery, items: [...prev.gallery.items, ...added] }}));
      setBulk("");
    } else {
      alert("沒有可新增的網址（可能都重複）");
    }
  };

  const updateItem = (id, patch) => {
    setDraft(prev => ({ ...prev, gallery: { ...prev.gallery, items: prev.gallery.items.map(it => it.id===id ? { ...it, ...patch } : it) }}));
  };

  const removeItem = (id) => {
    setDraft(prev => ({ ...prev, gallery: { ...prev.gallery, items: prev.gallery.items.filter(it => it.id!==id) }}));
  };

  const moveItem = (id, dir) => {
    const arr = items.slice();
    const i = arr.findIndex(x => x.id===id);
    if (i<0) return;
    const j = i + dir;
    if (j<0 || j>=arr.length) return;
    const tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    setDraft(prev => ({ ...prev, gallery: { ...prev.gallery, items: arr }}));
  };

  const bulkVisible = (v) => {
    setDraft(prev => ({ ...prev, gallery: { ...prev.gallery, items: prev.gallery.items.map(it => ({ ...it, visible: !!v })) }}));
  };

  const saveAll = () => {
    setData(draft);
    kjsSaveData(draft);
    onClose();
  };

  const view = items.slice().sort((a,b)=>{
    if ((b?.pin|0)!==(a?.pin|0)) return (b?.pin|0)-(a?.pin|0);
    return String(b?.at||'').localeCompare(String(a?.at||''));
  });

  return (
    <div className="fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
      <div className="w-[min(96vw,1000px)] max-h-[92vh] bg-white dark:bg-slate-900 rounded-2xl shadow-elevate overflow-hidden flex flex-col">
        <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
          <div className="font-semibold">📁 開箱/到貨實拍管理</div>
          <div className="flex items-center gap-2">
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>bulkVisible(false)}>全部隱藏</button>
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>bulkVisible(true)}>全部公開</button>

            <div className="text-sm font-medium mb-2">批次新增圖片網址（每行一個）</div>

            {!view.length && <div className="text-sm text-slate-500">目前沒有項目</div>}

        </div>

    </div>
  );
}

/***** ========= FAQ 前台（只展開一個分類＋搜尋） ========= *****/
function FaqSection({ data, admin=false, onOpenAdmin=()=>{} }) {
  const React = window.React || globalThis.React;
  const [q, setQ] = React.useState("");
  const [openCatId, setOpenCatId] = React.useState(null); // ← 只開一個分類

  const cats = (data?.faq?.categories || [])
    .filter(c => c?.visible !== false)
    .sort((a, b) => (a?.order|0) - (b?.order|0));

  const filter = (text) => String(text||'').toLowerCase().includes(q.toLowerCase());

  const view = cats.map(cat => {
    const items = (cat.items||[])
      .filter(it => it?.visible !== false && (filter(it.q) || filter(it.a)))
      .sort((a,b) => (a?.order|0) - (b?.order|0));
    return { cat, items };
  }).filter(x => x.items.length);

  return (
    <section id="faq" className="my-10">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-xl font-semibold tracking-tight">❓ FAQ 常見問題</h2>
        {admin && (
          <button
            className="tap-target rounded-lg border px-3 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-800"
            onClick={onOpenAdmin}
          >
            管理 FAQ
          </button>
        )}
      </div>

      <div className="mb-5">
        <input
          className="w-full rounded-xl border bg-white/70 dark:bg-slate-900/60 px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-brand/40"
          placeholder="輸入關鍵字搜尋（問題 / 答案）"
          value={q}
          onChange={e=>setQ(e.target.value)}
        />
      </div>

      {!view.length ? (
        <div className="text-sm text-slate-500">尚無符合的問題</div>
      ) : (
        <div className="space-y-3">
          {view.map(({cat, items}) => (
            <FaqCategoryAccordion
              key={cat.id}
              cat={cat}
              items={items}
              isOpen={openCatId===cat.id}                       // ← 是否展開此分類
              onToggle={() => setOpenCatId(openCatId===cat.id ? null : cat.id)}  // ← 切換只留一個
            />
          ))}
        </div>
      )}
    </section>
  );
}


/***** ========= FAQ 分類（只展開一個問題＋平滑動畫） ========= *****/
function FaqCategoryAccordion({ cat, items, isOpen, onToggle }) {
  const React = window.React || globalThis.React;
  const bodyRef = React.useRef(null);
  const [h, setH] = React.useState(0);

  // 同一分類內：只展開一個問題
  const [openItemId, setOpenItemId] = React.useState(null);

  // 分類開合 → 量測高度
  React.useEffect(() => {
    if (!bodyRef.current) return;
    setH(isOpen ? bodyRef.current.scrollHeight : 0);
  }, [isOpen, items, openItemId]);

  // 觀察內容尺寸（問題展開/收合時，分類容器高度要跟著更新）
  React.useEffect(() => {
    const recalc = () => {
      if (!bodyRef.current) return;
      setH(isOpen ? bodyRef.current.scrollHeight : 0);
    };
    const ro = new ResizeObserver(recalc);
    if (bodyRef.current) ro.observe(bodyRef.current);
    window.addEventListener('resize', recalc);
    return () => { ro.disconnect(); window.removeEventListener('resize', recalc); };
  }, [isOpen]);

  // 點某一題 → 只開該題，其餘自動關
  const handleItemToggle = (id) => {
    setOpenItemId(prev => (prev === id ? null : id));
  };

  return (
    <div
      className="
        rounded-2xl border border-slate-200 dark:border-slate-700
        bg-white/70 dark:bg-slate-900/60 backdrop-blur
        shadow-[0_6px_18px_-10px_rgba(0,0,0,0.25)]
      "
    >
      {/* 分類標題（只開一個分類） */}
      <button
        className="w-full px-4 py-3 text-left flex items-center justify-between gap-3 hover:bg-slate-50/70 dark:hover:bg-slate-800/60 transition rounded-2xl focus:outline-none focus-visible:ring-2 focus-visible:ring-brand/40"
        onClick={onToggle}
        aria-expanded={isOpen}
        aria-controls={`faqc-${cat.id}`}
        title={isOpen ? '收合分類' : '展開分類'}
      >
        <div className="flex items-center gap-2">
          <span className="h-5 w-1.5 rounded-full bg-brand/70"></span>
          <div className="font-semibold">{cat.name || '未命名分類'}</div>
          <span className="text-xs text-slate-500">（{items.length}）</span>
        </div>
        <svg
          className={`h-4 w-4 text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`}
          viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"
        >
          <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.06l3.71-3.83a.75.75 0 111.08 1.04l-4.24 4.38a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z" clipRule="evenodd" />
        </svg>
      </button>

      {/* 題目列表容器（分類高度動畫） */}
      <div id={`faqc-${cat.id}`} style={{height: h, transition:'height 240ms ease'}} className="overflow-hidden">
        <div ref={bodyRef} className="px-4 pb-4 pt-0">
          <ul className="grid gap-2">
            {items.map(it => (
              <FaqAccordionItem
                key={it.id}
                item={it}
                isOpen={openItemId===it.id}          // ← 是否展開該題
                onToggle={() => handleItemToggle(it.id)} // ← 切換只留一題
              />
            ))}
          </ul>
        </div>
      </div>
    </div>
  );
}


/***** ========= FAQ 單題（受控式＋平滑高度） ========= *****/

          <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.06l3.71-3.83a.75.75 0 111.08 1.04l-4.24 4.38a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z" clipRule="evenodd" />

      {/* 答案（高度動畫，長文完整展開） */}

/***** ========= FAQ 後台（分類＋題目：新增/刪除/排序/顯示） ========= *****/
function FaqAdmin({ data, setData, onClose=()=>{} }) {
  const React = window.React || globalThis.React;
  const [draft, setDraft] = React.useState(() => kjsEnsureFaq(kjsClone(data)));

  const cats = draft.faq.categories;

  const addCategory = () => {
    const next = { id: kjsNid(), name: "未命名分類", visible: true, order: (cats?.length||0)+1, items: [] };
    setDraft(prev => ({ ...prev, faq: { ...prev.faq, categories: [...prev.faq.categories, next] }}));
  };

  const renameCategory = (id, name) => {
    setDraft(prev => ({ ...prev, faq: { ...prev.faq, categories: prev.faq.categories.map(c => c.id===id? { ...c, name } : c) }}));
  };

  const removeCategory = (id) => {
    setDraft(prev => ({ ...prev, faq: { ...prev.faq, categories: prev.faq.categories.filter(c => c.id!==id) }}));
  };

  const moveCategory = (id, dir) => {
    const arr = cats.slice();
    const i = arr.findIndex(x => x.id===id);
    if (i<0) return;
    const j = i + dir;
    if (j<0 || j>=arr.length) return;
    const tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    // 重排 order
    arr.forEach((c,idx)=>c.order = idx+1);
    setDraft(prev => ({ ...prev, faq: { ...prev.faq, categories: arr }}));
  };

  const toggleCategoryVisible = (id, v) => {
    setDraft(prev => ({ ...prev, faq: { ...prev.faq, categories: prev.faq.categories.map(c => c.id===id? { ...c, visible: !!v } : c) }}));
  };

  const addFaqItem = (catId) => {
    setDraft(prev => ({
      ...prev,
      faq: {
        ...prev.faq,
        categories: prev.faq.categories.map(c => c.id!==catId ? c : {
          ...c,
          items: [...(c.items||[]), { id: kjsNid(), q: "新問題", a: "", visible: true, order: (c.items?.length||0)+1 }]
        })
      }
    }));
  };

  const updateFaqItem = (catId, itemId, patch) => {
    setDraft(prev => ({
      ...prev,
      faq: {
        ...prev.faq,
        categories: prev.faq.categories.map(c => c.id!==catId ? c : {
          ...c,
          items: (c.items||[]).map(it => it.id===itemId ? { ...it, ...patch } : it)
        })
      }
    }));
  };

  const removeFaqItem = (catId, itemId) => {
    setDraft(prev => ({
      ...prev,
      faq: {
        ...prev.faq,
        categories: prev.faq.categories.map(c => c.id!==catId ? c : {
          ...c,
          items: (c.items||[]).filter(it => it.id!==itemId).map((it,idx)=>({ ...it, order: idx+1 }))
        })
      }
    }));
  };

  const moveFaqItem = (catId, itemId, dir) => {
    const cat = cats.find(c => c.id===catId);
    if (!cat) return;
    const arr = (cat.items||[]).slice();
    const i = arr.findIndex(x => x.id===itemId);
    if (i<0) return;
    const j = i + dir;
    if (j<0 || j>=arr.length) return;
    const tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    arr.forEach((it,idx)=>it.order = idx+1);
    setDraft(prev => ({
      ...prev,
      faq: { ...prev.faq, categories: prev.faq.categories.map(c => c.id===catId ? { ...c, items: arr } : c) }
    }));
  };

  const bulkSetVisible = (level, v) => {
    if (level === 'category') {
      setDraft(prev => ({ ...prev, faq: { ...prev.faq, categories: prev.faq.categories.map(c => ({ ...c, visible: !!v })) }}));
    } else {
      setDraft(prev => ({ ...prev, faq: { ...prev.faq, categories: prev.faq.categories.map(c => ({ ...c, items: (c.items||[]).map(it => ({ ...it, visible: !!v })) })) }}));
    }
  };

  const saveAll = () => {
    setData(draft);
    kjsSaveData(draft);
    onClose();
  };

  const view = cats.slice().sort((a,b)=>(a?.order|0)-(b?.order|0));

  return (
    <div className="fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
      <div className="w-[min(96vw,1000px)] max-h-[92vh] bg-white dark:bg-slate-900 rounded-2xl shadow-elevate overflow-hidden flex flex-col">
        <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
          <div className="font-semibold">📚 FAQ 管理</div>
          <div className="flex items-center gap-2">
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>bulkSetVisible('category', true)}>全部分類顯示</button>
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>bulkSetVisible('category', false)}>全部分類隱藏</button>
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>bulkSetVisible('item', true)}>全部題目顯示</button>
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={()=>bulkSetVisible('item', false)}>全部題目隱藏</button>
            <button className="rounded-lg border px-3 py-1.5 text-sm" onClick={onClose}>關閉</button>
            <button className="rounded-lg bg-brand text-white px-3 py-1.5 text-sm" onClick={saveAll}>💾 儲存</button>
          </div>
        </div>

        <div className="p-4 grid gap-4 overflow-auto modal-scroll">
          <div className="flex items-center justify-between">
            <div className="text-sm text-slate-600">分類與題目皆可排序、顯示/隱藏。</div>
            <button className="rounded-lg bg-brand text-white px-3 py-1.5 text-sm" onClick={addCategory}>＋ 新增分類</button>
          </div>

          <div className="grid grid-cols-1 gap-3">
            {view.map(cat => (
              <div key={cat.id} className="rounded-xl border overflow-hidden">
                <div className="px-3 py-2 border-b bg-slate-50 dark:bg-slate-800 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <input className="rounded border px-2 py-1 text-sm" value={cat.name||""} onChange={e=>renameCategory(cat.id, e.target.value)} />
                    <label className="inline-flex items-center gap-1 text-sm">
                      <input type="checkbox" checked={cat.visible!==false} onChange={e=>toggleCategoryVisible(cat.id, e.target.checked)} />
                      <span>顯示</span>
                    </label>
                  </div>
                  <div className="flex items-center gap-2">
                    <button className="rounded border px-2 py-1 text-sm" onClick={()=>moveCategory(cat.id, -1)}>上移</button>
                    <button className="rounded border px-2 py-1 text-sm" onClick={()=>moveCategory(cat.id, +1)}>下移</button>
                    <button className="rounded bg-rose-600 text-white px-2 py-1 text-sm" onClick={()=>{ if(confirm('刪除此分類與其所有題目？')) removeCategory(cat.id) }}>刪除分類</button>
                    <button className="rounded bg-brand text-white px-2 py-1 text-sm" onClick={()=>addFaqItem(cat.id)}>＋ 新增題目</button>
                  </div>
                </div>

                <div className="p-3 space-y-2">
                  {(cat.items||[]).sort((a,b)=>(a?.order|0)-(b?.order|0)).map(it => (
                    <div key={it.id} className="rounded-lg border p-2">
                      <div className="flex items-center justify-between">
                        <label className="flex-1 mr-2">
                          <span className="block text-xs text-slate-500">問題</span>
                          <input className="w-full rounded border px-2 py-1 text-sm" value={it.q||""} onChange={e=>updateFaqItem(cat.id, it.id, { q: e.target.value })}/>
                        </label>
                        <label className="inline-flex items-center gap-1 text-sm shrink-0">
                          <input type="checkbox" checked={it.visible!==false} onChange={e=>updateFaqItem(cat.id, it.id, { visible: e.target.checked })}/>
                          <span>顯示</span>
                        </label>
                      </div>
                      <label className="block mt-2">
                        <span className="block text-xs text-slate-500">答案</span>
                        <textarea className="w-full rounded border px-2 py-1 text-sm h-20" value={it.a||""} onChange={e=>updateFaqItem(cat.id, it.id, { a: e.target.value })}/>
                      </label>
                      <div className="flex items-center justify-between mt-2">
                        <div className="flex items-center gap-1">
                          <button className="rounded border px-2 py-1 text-sm" onClick={()=>moveFaqItem(cat.id, it.id, -1)}>上移</button>
                          <button className="rounded border px-2 py-1 text-sm" onClick={()=>moveFaqItem(cat.id, it.id, +1)}>下移</button>
                        </div>
                        <button className="rounded bg-rose-600 text-white px-2 py-1 text-sm" onClick={()=>{ if(confirm('刪除此題目？')) removeFaqItem(cat.id, it.id); }}>刪除題目</button>
                      </div>
                    </div>
                  ))}
                  {(!cat.items || !cat.items.length) && <div className="text-sm text-slate-500">此分類目前沒有題目</div>}
                </div>
              </div>
            ))}
            {!view.length && <div className="text-sm text-slate-500">尚無分類，請先新增</div>}
          </div>
        </div>
      </div>
    </div>
  );
}
